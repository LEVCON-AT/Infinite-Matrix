<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Matrix</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#66665f;--text3:#bbb;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --blue:#378ADD;--bluebg:#E6F1FB;--bluetxt:#0C447C;
  --teal:#1D9E75;--tealbg:#E1F5EE;--tealtxt:#085041;
  --amber:#BA7517;--amberbg:#FAEEDA;--ambertxt:#633806;
  --red:#E24B4A;--redbg:#FCEBEB;--redtxt:#791F1F;
  --purple:#7F77DD;--purplebg:#EEEDFE;--purpletxt:#3C3489;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}
#app{display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ── */
#topbar{background:var(--bg);border-bottom:0.5px solid var(--border2);padding:8px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-wrap:wrap;}
#tl{flex:1;min-width:0;}
#tr{display:flex;align-items:center;gap:6px;position:relative;flex-shrink:0;}
#content{flex:1;padding:16px 14px;max-width:1200px;margin:0 auto;width:100%;}
.bc{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.bcs{font-size:12px;color:var(--blue);cursor:pointer;padding:2px 4px;border-radius:4px;white-space:nowrap;}
.bcs:hover{background:var(--bluebg);}
.bcc{font-size:12px;color:var(--text);font-weight:500;padding:2px 4px;white-space:nowrap;}
.bca{color:var(--text3);font-size:11px;}

/* ── EDIT-ONLY VISIBILITY ── */
.edit-only { display:none !important; }
body.editing .edit-only { display:inline-flex !important; }
/* label is not inline-flex by default */
body.editing label.edit-only { display:inline-flex !important; }

/* ── BUTTONS ── */
.btn{padding:5px 11px;font-size:12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap;font-family:inherit;}
.btn:hover{background:var(--bg2);}
.btn.danger{color:var(--red);}
.btn-p{padding:6px 14px;font-size:12px;border-radius:var(--r);border:none;background:var(--text);color:var(--bg);cursor:pointer;font-family:inherit;}
.btn-p:hover{opacity:0.85;}
.btn-c{padding:6px 12px;font-size:12px;border-radius:var(--r);border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.btn-c:hover{background:var(--bg2);}

/* ── TABS ── */
.tabs{display:flex;border:0.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;background:var(--bg2);margin-bottom:14px;}
.tab{flex:1;padding:8px 12px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;border-right:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;gap:5px;transition:background 0.1s;}
.tab:last-child{border-right:none;}
.tab:hover{background:var(--bg);color:var(--text);}
.tab.active{background:var(--bg);color:var(--text);}
.tbadge{font-size:10px;background:var(--bg3);color:var(--text2);padding:1px 5px;border-radius:20px;}
.tab.active .tbadge{background:var(--bluebg);color:var(--bluetxt);}

/* ── MATRIX ── */
.mwrap{overflow-x:auto;}
.matrix{display:grid;border:0.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;background:var(--bg);min-width:fit-content;}
.mh{background:var(--bg2);font-size:11px;font-weight:500;color:var(--text2);padding:7px 9px;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;gap:4px;}
.mh.corner{background:var(--bg3);}
.mh.ch{justify-content:center;text-align:center;}
.mh.rh{min-width:110px;}
.ni{font-size:11px;font-weight:500;color:var(--text2);background:transparent;border:none;outline:none;font-family:inherit;flex:1;min-width:0;}
.ni:focus{color:var(--text);}
.edel{display:none;font-size:12px;color:var(--red);cursor:pointer;margin-left:auto;padding:0 2px;flex-shrink:0;}
.emode .edel{display:inline;}
.emode .mh{background:#FFF5F5;}
.mcell{border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);min-height:66px;min-width:110px;display:flex;flex-direction:column;padding:6px 7px;gap:3px;transition:background 0.1s;}
.mcell:hover{background:var(--bg2);}
.mcell:focus{outline:2px solid var(--blue);outline-offset:-2px;background:var(--bg2);}
.cchips{display:flex;flex-wrap:wrap;gap:2px;}
.chip{font-size:10px;padding:1px 5px;border-radius:20px;font-weight:500;}
.chip-b{background:var(--tealbg);color:var(--tealtxt);}
.chip-m{background:var(--bluebg);color:var(--bluetxt);}
.cicons{display:flex;gap:3px;margin-top:auto;padding-top:3px;}
.cib{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all 0.1s;user-select:none;white-space:nowrap;}
.cib:hover{border-color:var(--blue);color:var(--bluetxt);background:var(--bluebg);}
.cib.ab{background:var(--tealbg);color:var(--tealtxt);border-color:var(--tealbg);}
.cell-ghost{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 3px;border-radius:3px;display:inline-flex;align-items:center;}
.cell-ghost:hover{color:var(--text2);background:var(--bg3);}
.cell-ghosts{display:flex;gap:4px;justify-content:flex-end;padding-top:2px;}
.cib.am{background:var(--bluebg);color:var(--bluetxt);border-color:var(--bluebg);}
.addcolhdr{background:var(--bg2);border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;padding:4px;}
.addrowcol{border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;background:var(--bg2);min-height:66px;}
.addrowfull{grid-column:1/-1;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;padding:5px;}
.addbtn{width:22px;height:22px;border-radius:50%;border:0.5px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.1s;font-family:inherit;}
.addbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--bluebg);}
.addfull{width:100%;padding:6px;font-size:12px;color:var(--text3);border:0.5px dashed var(--border2);border-radius:var(--r);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit;}
.addfull:hover{border-color:var(--blue);color:var(--blue);}

/* ── PANEL HEADER ── */
.phd{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.ptitle{font-size:17px;font-weight:500;}
.psub{font-size:12px;color:var(--text2);margin-top:2px;}

/* ── CARD ── */
.card{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;}
.cardhd{background:var(--bg2);padding:8px 13px;font-size:12px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;}

/* ── INFO TAB ── */
.info-field{padding:10px 13px;border-bottom:0.5px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.info-label{font-size:11px;font-weight:500;color:var(--text2);}
.info-val{font-size:13px;color:var(--text);outline:none;min-height:20px;line-height:1.5;}
.info-val a{color:var(--blue);}
.links-grid{display:flex;flex-wrap:wrap;gap:6px;padding:10px 13px;}
.link-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--bluetxt);font-size:12px;cursor:pointer;text-decoration:none;}
.link-btn:hover{background:var(--bluebg);}
.link-add{border-style:dashed;color:var(--text3);cursor:pointer;background:transparent;}
.link-add:hover{border-color:var(--blue);color:var(--blue);}

/* ── KANBAN ── */
.kb-wrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;align-items:flex-start;}
.kb-col{background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--border2);min-width:220px;max-width:260px;flex-shrink:0;display:flex;flex-direction:column;}
.kb-col-hd{padding:9px 12px;font-size:12px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:6px;border-bottom:0.5px solid var(--border);}
.kb-col-hd .cnt{font-size:10px;color:var(--text3);font-weight:400;}
.kb-col-hd .delbtn{margin-left:auto;font-size:12px;color:var(--text3);cursor:pointer;display:none;}
.emode .kb-col-hd .delbtn{display:inline;}
.kb-cards{padding:7px;display:flex;flex-direction:column;gap:6px;flex:1;}
.kb-card{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:9px 10px;cursor:pointer;transition:background 0.1s;}
.kb-card:hover{background:var(--bg2);}
.kb-card:focus{outline:2px solid var(--blue);outline-offset:-2px;}
.kb-card.archived{opacity:0.5;}
.kc-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;}
.kc-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.kc-tag{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--purplebg);color:var(--purpletxt);}
.kc-who{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--bluebg);color:var(--bluetxt);}
.kc-dl{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--amberbg);color:var(--ambertxt);display:flex;align-items:center;gap:3px;}
.kc-dl.overdue{background:var(--redbg);color:var(--redtxt);}
.kc-recur{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--tealbg);color:var(--tealtxt);display:flex;align-items:center;gap:3px;}
.kc-checklist{font-size:10px;color:var(--text3);margin-top:4px;}
.kc-actions{display:flex;gap:4px;margin-top:6px;border-top:0.5px solid var(--border);padding-top:5px;}
.kc-act{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;transition:all 0.1s;user-select:none;}
.kc-act:hover{background:var(--bg3);color:var(--text);}
.kc-act.disabled{opacity:0.25;cursor:default;pointer-events:none;}
.kb-done .kc-name{text-decoration:line-through;color:var(--text3);}
.kb-add-card{padding:7px;border-top:0.5px solid var(--border);}
.kb-add-col{min-width:180px;flex-shrink:0;display:flex;flex-direction:column;justify-content:flex-start;padding:7px;}

/* ── CHECKLISTS TAB ── */
.cl-list{padding:10px 13px;}
.cl-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border);}
.cl-item:last-child{border-bottom:none;}
.cl-check{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;cursor:pointer;position:relative;}
.cl-check.done{background:var(--teal);border-color:var(--teal);}
.cl-check.done::after{content:'';position:absolute;top:2px;left:2px;width:7px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg);}
.cl-text{font-size:13px;color:var(--text);flex:1;}
.cl-text.done{text-decoration:line-through;color:var(--text3);}

/* ── DAILY OVERVIEW ── */
.daily-wrap{margin-top:22px;}
.daily-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.daily-cols{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;align-items:flex-start;}
.daily-col{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);min-width:200px;flex-shrink:0;}
.daily-col-hd{padding:8px 12px;font-size:12px;font-weight:500;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:6px;}
.daily-col-hd .delbtn{margin-left:auto;font-size:11px;color:var(--text3);cursor:pointer;}
.daily-item{padding:7px 12px;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text);display:flex;align-items:flex-start;gap:7px;}
.daily-item:last-child{border-bottom:none;}
.daily-item .di-name{flex:1;}
.daily-item .di-from{font-size:10px;color:var(--text3);margin-top:1px;}
.recur-icon{font-size:10px;color:var(--teal);flex-shrink:0;margin-top:2px;}

/* ── CARD DETAIL MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto;}
.modal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);padding:0;width:560px;max-width:96vw;max-height:85vh;overflow-y:auto;}
.modal-hd{padding:14px 16px;border-bottom:0.5px solid var(--border2);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg);z-index:2;}
.modal-hd h3{font-size:15px;font-weight:500;flex:1;}
.modal-body{padding:14px 16px;}
.modal-label{font-size:11px;color:var(--text2);margin-bottom:3px;display:block;}
.modal-input{width:100%;font-size:13px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:10px;font-family:inherit;outline:none;}
.modal-input:focus{border-color:var(--blue);}
.modal-textarea{width:100%;font-size:12px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:10px;font-family:inherit;outline:none;resize:vertical;min-height:60px;}
.modal-textarea:focus{border-color:var(--blue);}
.modal-select{width:100%;font-size:13px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:10px;font-family:inherit;outline:none;}
.modal-actions{display:flex;gap:7px;justify-content:flex-end;padding:12px 16px;border-top:0.5px solid var(--border);position:sticky;bottom:0;background:var(--bg);}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tag-pick{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border2);cursor:pointer;background:var(--bg);}
.tag-pick.sel{background:var(--purplebg);color:var(--purpletxt);border-color:var(--purplebg);}
.who-pick{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border2);cursor:pointer;background:var(--bg);}
.who-pick.sel{background:var(--bluebg);color:var(--bluetxt);border-color:var(--bluebg);}
.recur-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.section-divider{font-size:11px;font-weight:500;color:var(--text2);margin:12px 0 6px;padding-bottom:4px;border-bottom:0.5px solid var(--border);}

/* ── SIMPLE MODAL ── */
.smodal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.28);z-index:300;display:flex;align-items:center;justify-content:center;}
.smodal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);padding:18px;width:320px;max-width:95vw;}
.smodal h3{font-size:14px;font-weight:500;margin-bottom:12px;}
.smodal input,.smodal select{width:100%;font-size:13px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:9px;font-family:inherit;outline:none;}
.smodal input:focus,.smodal select:focus{border-color:var(--blue);}
.smodal label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;}
.smodal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:4px;}

/* ── STAMMDATEN MODAL ── */
.sdmodal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);padding:0;width:480px;max-width:96vw;max-height:80vh;overflow-y:auto;}
.sdmodal-hd{padding:12px 16px;border-bottom:0.5px solid var(--border2);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg);}
.sdmodal-hd h3{font-size:14px;font-weight:500;flex:1;}
.sd-tabs{display:flex;border-bottom:0.5px solid var(--border2);}
.sd-tab{padding:8px 16px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;}
.sd-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.sd-body{padding:14px 16px;}
.sd-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);}
.sd-item:last-child{border-bottom:none;}
.sd-item input{flex:1;font-size:13px;border:none;outline:none;background:transparent;font-family:inherit;color:var(--text);}
.sd-item input:focus{color:var(--text);}
.sd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ── MISC ── */
.empty-state{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:13px;}
.sr-item{padding:9px 13px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.1s;}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover{background:var(--bg2);}
.sr-name{font-size:13px;color:var(--text);font-weight:500;}
.sr-from{font-size:11px;color:var(--text3);margin-top:2px;}
.sr-mark{background:var(--amberbg);color:var(--ambertxt);border-radius:2px;padding:0 2px;}
.empty-big{font-size:26px;margin-bottom:8px;}
#minimap-panel{display:none;position:absolute;top:38px;right:0;width:200px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);padding:10px;z-index:60;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
#minimap-panel.open{display:block;}
.mm-node{display:flex;align-items:center;gap:4px;cursor:pointer;border-radius:4px;padding:2px 3px;font-size:11px;color:var(--text2);line-height:1.7;}
.mm-node:hover{background:var(--bg2);}
.mm-node.active{color:var(--bluetxt);font-weight:500;background:var(--bluebg);}
.mm-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
.pill-o{background:#F1EFE8;color:#444441;}
.pill-w{background:var(--amberbg);color:var(--ambertxt);}
.pill-d{background:var(--tealbg);color:var(--tealtxt);}
.pill-a{background:var(--bg3);color:var(--text3);}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="tl" style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
      <div class="bc" id="bc" style="flex:1;min-width:0;"></div>
      <div style="position:relative;flex-shrink:0;">
        <input id="searchinput" type="text" placeholder="🔍 Suche..." style="font-size:12px;padding:4px 8px 4px 8px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none;width:160px;font-family:inherit;" oninput="doSearch(this.value)" onfocus="this.style.width='220px'" onblur="this.style.width='160px';if(!this.value)closeSearch()"/>
        <div id="searchresults" style="display:none;position:absolute;top:32px;right:0;width:320px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);z-index:80;max-height:360px;overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,0.1);"></div>
      </div>
    </div>
    <div id="tr">
      <span id="savedot" style="font-size:11px;color:var(--teal);display:none;">✓ gespeichert</span>
      <button class="btn edit-only" onclick="exportJSON()">Export JSON</button>
      <label class="btn edit-only" style="cursor:pointer;">Import JSON<input type="file" accept=".json" style="display:none;" onchange="importJSON(event)"></label>
      <button class="btn edit-only" onclick="openStammdaten()">Tags &amp; Personen</button>
      <button class="btn" id="editbtn" onclick="toggleEdit()">Bearbeiten</button>
      <button class="btn" onclick="toggleMM()">⊞ Karte</button>
      <button class="btn danger edit-only" onclick="resetAll()">↺ Reset</button>
      <div id="minimap-panel"><div style="font-size:11px;font-weight:500;color:var(--text2);margin-bottom:6px;">Struktur</div><div id="mmtree"></div></div>
    </div>
  </div>
  <div id="content"><div id="panel"></div></div>
</div>
<div id="mc"></div><!-- simple modal -->
<div id="cardmodal"></div><!-- card detail -->

<script>
// ═══════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════
let nodes={}, nid=1;
function uid(){return 'n'+(nid++);}

// Global stores (persisted)
let globalTags=[];   // [{id,label}]
let globalPeople=[]; // [{id,label}]
let dailyCols=[];    // [{id,label}]  — user-defined time buckets

function mkMatrix(label){
  const id=uid();
  nodes[id]={id,type:'matrix',label,data:{rows:[],cols:[],cells:{}}};
  return id;
}
function mkBoard(label){
  const id=uid();
  nodes[id]={id,type:'board',label,data:{
    infoFields:[],   // [{id,label,value}]
    links:[],        // [{id,label,url}]
    kbCols:[],       // [{id,label,archived?}]
    kbCards:[],      // [{id,colId,name,note,tags[],who[],deadline,recur{type,every,day,weekday},checklist[{id,text,done}],archived,done}]
    checklists:[],   // [{id,label,items:[{id,text,done}]}]
  }};
  return id;
}
function getCell(nid,key){
  const d=nodes[nid].data;
  if(!d.cells[key])d.cells[key]={boardId:null,matrixId:null};
  return d.cells[key];
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const SAVE_KEY='imatrix-v2';
let stack=[], editMode=false, mmOpen=false;
let currentTab={}; // nodeId -> tab name
let rootId;

function save(){
  try{
    const payload=JSON.stringify({nodes,nid,rootId,globalTags,globalPeople,dailyCols});
    localStorage.setItem(SAVE_KEY,payload);
    const d=document.getElementById('savedot');
    if(d){
      const kb=Math.round(payload.length/1024);
      const warn=kb>3500;
      d.style.color=warn?'var(--amber)':'var(--teal)';
      d.textContent=warn?`⚠ ${kb} KB — fast voll`:'✓ gespeichert';
      d.style.display='inline';
      clearTimeout(d._t);
      d._t=setTimeout(()=>d.style.display='none',warn?4000:1800);
    }
  }catch(e){
    const d=document.getElementById('savedot');
    if(d){d.style.color='var(--red)';d.textContent='✗ Speicher voll — JSON exportieren!';d.style.display='inline';}
  }
}
function loadData(d){
  nodes=d.nodes; nid=d.nid; rootId=d.rootId;
  globalTags=d.globalTags||[];
  globalPeople=d.globalPeople||[];
  dailyCols=d.dailyCols||[];
  stack=[{nodeId:rootId,label:nodes[rootId].label,cellRef:null}];
}
function tryLoad(){
  try{const r=localStorage.getItem(SAVE_KEY);if(!r)return false;loadData(JSON.parse(r));return true;}catch(e){return false;}
}
function exportJSON(){
  const blob=new Blob([JSON.stringify({nodes,nid,rootId,globalTags,globalPeople,dailyCols},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='matrix-backup.json';a.click();
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{loadData(JSON.parse(ev.target.result));save();render();}catch(x){alert('Ungültige Datei');}};
  r.readAsText(f);
}
function resetAll(){if(!confirm('Alle Daten löschen?'))return;localStorage.removeItem(SAVE_KEY);location.reload();}

if(!tryLoad()){
  rootId=mkMatrix('Meine Matrix');
  // default daily cols
  dailyCols=[{id:uid(),label:'Heute',type:'today'},{id:uid(),label:'Diese Woche',type:'thisweek'},{id:uid(),label:'Dieser Monat',type:'thismonth'},{id:uid(),label:'Nächster Monat',type:'nextmonth'}];
  stack=[{nodeId:rootId,label:'Meine Matrix',cellRef:null}];
}

// ═══════════════════════════════════════════════════════
// RENDER ROUTER
// ═══════════════════════════════════════════════════════
function render(){
  renderBC(); renderMM();
  document.getElementById('editbtn').textContent=editMode?'Fertig':'Bearbeiten';
  document.getElementById('editbtn').style.color=editMode?'var(--amber)':'';
  const cur=stack[stack.length-1];
  const el=document.getElementById('panel');
  if(cur.cellRef) el.innerHTML=renderCellPage(cur);
  else el.innerHTML=renderMatrixPage(nodes[cur.nodeId]);
  save();
}

function getTab(id,def){return currentTab[id]||def;}
function setTab(id,t){currentTab[id]=t;}

// ═══════════════════════════════════════════════════════
// BREADCRUMB & MINIMAP
// ═══════════════════════════════════════════════════════
function renderBC(){
  document.getElementById('bc').innerHTML=stack.map((s,i)=>{
    const sep=i>0?'<span class="bca">›</span>':'';
    return i<stack.length-1
      ?sep+`<span class="bcs" onclick="navTo(${i})">${esc(s.label)}</span>`
      :sep+`<span class="bcc">${esc(s.label)}</span>`;
  }).join('');
}
function navTo(i){stack=stack.slice(0,i+1);editMode=false;render();}

function renderMM(){
  function walk(nodeId,depth){
    const n=nodes[nodeId];if(!n||nodeId.startsWith('cell-'))return'';
    const color=n.type==='board'?'#1D9E75':'#378ADD';
    const active=nodeId===stack[stack.length-1].nodeId;
    let h=`<div class="mm-node${active?' active':''}" style="padding-left:${depth*10}px" onclick="mmNav('${nodeId}')"><div class="mm-dot" style="background:${color}"></div><span>${esc(n.label)}</span></div>`;
    if(n.type==='matrix')Object.values(n.data.cells).forEach(c=>{if(c.boardId)h+=walk(c.boardId,depth+1);if(c.matrixId)h+=walk(c.matrixId,depth+1);});
    return h;
  }
  document.getElementById('mmtree').innerHTML=walk(stack[0].nodeId,0);
}
function toggleMM(){mmOpen=!mmOpen;document.getElementById('minimap-panel').classList.toggle('open',mmOpen);renderMM();}
function mmNav(nodeId){
  function findPath(from,target,path){
    if(from===target)return[...path,from];
    const n=nodes[from];if(!n||n.type==='board')return null;
    for(const[k,c]of Object.entries(n.data.cells)){
      for(const cid of[c.boardId,c.matrixId]){if(!cid)continue;const r=findPath(cid,target,[...path,from]);if(r)return r;}
    }return null;
  }
  const path=findPath(stack[0].nodeId,nodeId,[]);if(!path)return;
  stack=path.map(id=>({nodeId:id,label:nodes[id].label,cellRef:null}));
  mmOpen=false;document.getElementById('minimap-panel').classList.remove('open');render();
}

// ═══════════════════════════════════════════════════════
// MATRIX PAGE
// ═══════════════════════════════════════════════════════
function renderMatrixPage(node){
  const{rows,cols}=node.data;
  const isRoot=node.id===rootId;
  let h=`<div class="phd">
    <div style="flex:1;min-width:0;">
      ${editMode
        ?`<input class="ptitle" style="border:none;outline:none;background:transparent;font-size:17px;font-weight:500;width:100%;font-family:inherit;" value="${esc(node.label)}" onchange="renameMatrixNode('${node.id}',this.value)" />`
        :`<div class="ptitle">${esc(node.label)}</div>`}
      <div class="psub">Hover auf Zelle → Tasks / Sub-Matrix anlegen</div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <button class="btn edit-only" onclick="addCol('${node.id}')">+ Spalte</button>
      <button class="btn edit-only" onclick="addRow('${node.id}')">+ Zeile</button>
    </div></div>`;

  if(rows.length===0&&cols.length===0){
    h+=`<div class="empty-state"><div class="empty-big">⊞</div><div style="margin-bottom:10px;">Leere Matrix — leg los.</div>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button class="btn edit-only" onclick="addCol('${node.id}')">+ Spalte</button>
        <button class="btn edit-only" onclick="addRow('${node.id}')">+ Zeile</button>
      </div></div>`;
  } else {
    const gc=`110px repeat(${cols.length},minmax(110px,1fr))${editMode?' 36px':''}`;
    h+=`<div class="mwrap"><div class="matrix${editMode?' emode':''}" style="grid-template-columns:${gc};">`;
    h+=`<div class="mh corner"></div>`;
    cols.forEach(col=>{
      h+=`<div class="mh ch"><input class="ni" value="${esc(col.label)}" onchange="renameCol('${node.id}','${col.id}',this.value)" ${editMode?'':'readonly'} style="text-align:center;"/>
        <span class="edel" onclick="delCol('${node.id}','${col.id}')">✕</span></div>`;
    });
    if(editMode)h+=`<div class="addcolhdr"><button class="addbtn" onclick="addCol('${node.id}')">+</button></div>`;
    rows.forEach(row=>{
      h+=`<div class="mh rh"><input class="ni" value="${esc(row.label)}" onchange="renameRow('${node.id}','${row.id}',this.value)" ${editMode?'':'readonly'}/>
        <span class="edel" onclick="delRow('${node.id}','${row.id}')">✕</span></div>`;
      cols.forEach(col=>{h+=cellHTML(node.id,row,col);});
      if(editMode)h+=`<div class="addrowcol"></div>`;
    });
    if(editMode)h+=`<div class="addrowfull"><button class="addfull" onclick="addRow('${node.id}')">+ Zeile hinzufügen</button></div>`;
    h+=`</div></div>`;
  }

  // Daily overview only on root
  if(isRoot) h+=renderDailyOverview();
  return h;
}

function cellHTML(nodeId,row,col){
  const key=`${row.id}-${col.id}`;
  const cell=getCell(nodeId,key);
  const hb=!!cell.boardId, hm=!!cell.matrixId;
  const lbl=esc(row.label+' / '+col.label);

  // SVG icons — larger when active
  const bicoSm=`<svg width="11" height="11" viewBox="0 0 14 14" fill="none"><line x1="2" y1="4" x2="12" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="2" y1="7.5" x2="12" y2="7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="2" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`;
  const micoSm=`<svg width="11" height="11" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>`;
  const bicoLg=`<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="2" y1="4" x2="12" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="2" y1="7.5" x2="12" y2="7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="2" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`;
  const micoLg=`<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>`;

  let topBadges='', bottomHints='';

  // ── BOARD ──
  if(hb){
    const b=nodes[cell.boardId];
    const active=b.data.kbCards.filter(c=>!c.archived);
    const tot=active.length;
    const dn=active.filter(c=>c.done).length;
    const hasRecur=active.some(c=>c.recur&&c.recur.type!=='none');
    // Active badge: colored, larger icon, name + summary, clickable
    topBadges+=`<div style="display:flex;align-items:center;gap:5px;background:var(--tealbg);color:var(--tealtxt);border-radius:var(--r);padding:4px 7px;cursor:pointer;margin-bottom:3px;" onclick="iconClick('${nodeId}','${row.id}','${col.id}','board','${lbl}')">
      ${bicoLg}
      <span style="font-size:11px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(b.label)}</span>
      <span style="font-size:10px;opacity:0.8;">${dn}/${tot}${hasRecur?' ↻':''}</span>
    </div>`;
  } else {
    // Not yet created: tiny gray ghost icon bottom-right, only in edit mode
    bottomHints+=`<span class="cell-ghost edit-only" onclick="iconClick('${nodeId}','${row.id}','${col.id}','board','${lbl}')" title="Task Board anlegen">${bicoSm}</span>`;
  }

  // ── MATRIX ──
  if(hm){
    const m=nodes[cell.matrixId];
    topBadges+=`<div style="display:flex;align-items:center;gap:5px;background:var(--bluebg);color:var(--bluetxt);border-radius:var(--r);padding:4px 7px;cursor:pointer;" onclick="iconClick('${nodeId}','${row.id}','${col.id}','matrix','${lbl}')">
      ${micoLg}
      <span style="font-size:11px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(m.label)}</span>
      <span style="font-size:10px;opacity:0.8;">${m.data.rows.length}×${m.data.cols.length}</span>
    </div>`;
  } else {
    bottomHints+=`<span class="cell-ghost edit-only" onclick="iconClick('${nodeId}','${row.id}','${col.id}','matrix','${lbl}')" title="Sub-Matrix anlegen">${micoSm}</span>`;
  }

  // Enter key: open first available child (board preferred)
  const enterAction=hb
    ?`iconClick('${nodeId}','${row.id}','${col.id}','board','${lbl}')`
    :hm?`iconClick('${nodeId}','${row.id}','${col.id}','matrix','${lbl}')`:'' ;

  return `<div class="mcell" style="justify-content:space-between;" tabindex="0"
    onkeydown="if(event.key==='Enter'&&'${enterAction}'){event.preventDefault();${enterAction};}
               if(event.key==='Tab'){
                 event.preventDefault();
                 const cells=Array.from(document.querySelectorAll('.mcell'));
                 const i=cells.indexOf(this);
                 const next=cells[i+(event.shiftKey?-1:1)];
                 if(next)next.focus();
               }">
    <div style="flex:1;">${topBadges}</div>
    ${bottomHints?`<div class="cell-ghosts">${bottomHints}</div>`:''}
  </div>`;
}

// ═══════════════════════════════════════════════════════
// CELL PAGE (tabs: Info | Kanban | Checklisten)
// ═══════════════════════════════════════════════════════
function renderCellPage(cur){
  const{parentId,rowId,colId}=cur.cellRef;
  const cell=getCell(parentId,`${rowId}-${colId}`);
  const hb=!!cell.boardId,hm=!!cell.matrixId;
  const tab=getTab(cur.nodeId, hb?'board':'matrix');
  // Find the boardId or matrixId to allow renaming
  const _cell=cur.cellRef?getCell(cur.cellRef.parentId,`${cur.cellRef.rowId}-${cur.cellRef.colId}`):null;
  const _renamableId=_cell?(tab==='board'?_cell.boardId:_cell.matrixId):null;
  let h=`<div class="phd"><div style="flex:1;min-width:0;">
    ${editMode&&_renamableId
      ?`<input class="ptitle" style="border:none;outline:none;background:transparent;font-size:17px;font-weight:500;width:100%;font-family:inherit;" value="${esc(cur.label)}" onchange="renameBoardOrMatrix('${_renamableId}',this.value,'${cur.nodeId}')" />`
      :`<div class="ptitle">${esc(cur.label)}</div>`}
  </div></div>`;
  h+=`<div class="tabs">`;
  if(hb){
    const b=nodes[cell.boardId];
    const tot=b.data.kbCards.filter(c=>!c.archived).length;
    h+=tabBtn('info',tab,cur.nodeId,'📋 Info');
    h+=tabBtn('board',tab,cur.nodeId,`☰ Kanban <span class="tbadge">${tot}</span>`);
    const cl=b.data.checklists.reduce((a,c)=>a+c.items.length,0);
    h+=tabBtn('checklists',tab,cur.nodeId,`✓ Checklisten <span class="tbadge">${cl}</span>`);
  }
  if(hm){h+=tabBtn('matrix',tab,cur.nodeId,'⊞ Sub-Matrix');}
  h+=`</div>`;
  if(tab==='info'&&hb) h+=renderInfoTab(nodes[cell.boardId]);
  else if(tab==='board'&&hb) h+=renderKanban(nodes[cell.boardId]);
  else if(tab==='checklists'&&hb) h+=renderChecklists(nodes[cell.boardId]);
  else if(tab==='matrix'&&hm) h+=renderSubMatrix(nodes[cell.matrixId]);
  return h;
}
function tabBtn(name,cur,nodeId,label){
  return `<div class="tab${cur===name?' active':''}" onclick="switchTab('${nodeId}','${name}')">${label}</div>`;
}
function switchTab(nodeId,tab){setTab(nodeId,tab);render();}

// ═══════════════════════════════════════════════════════
// INFO TAB
// ═══════════════════════════════════════════════════════
function renderInfoTab(node){
  const{infoFields,links}=node.data;
  let h=`<div class="card">`;
  h+=`<div class="cardhd">Info-Felder ${editMode?`<button class="btn" style="margin-left:auto;padding:3px 8px;" onclick="addInfoField('${node.id}')">+ Feld</button>`:''}`;
  h+=`</div>`;
  if(infoFields.length===0&&!editMode) h+=`<div style="padding:12px 13px;font-size:12px;color:var(--text3);">Keine Felder — Bearbeiten-Modus zum Anlegen.</div>`;
  infoFields.forEach((f,idx)=>{
    h+=`<div class="info-field">
      <div style="display:flex;align-items:center;gap:6px;">
        ${editMode?`<div style="display:flex;flex-direction:column;gap:1px;margin-right:2px;">
          <span style="font-size:9px;color:var(--text3);cursor:pointer;line-height:1;" onclick="moveInfoField('${node.id}','${f.id}',-1)" title="Nach oben">▲</span>
          <span style="font-size:9px;color:var(--text3);cursor:pointer;line-height:1;" onclick="moveInfoField('${node.id}','${f.id}',1)" title="Nach unten">▼</span>
        </div>`:''}
        <span class="info-label">${esc(f.label)}</span>
        ${editMode?`<span style="font-size:11px;color:var(--red);cursor:pointer;margin-left:auto;" onclick="delInfoField('${node.id}','${f.id}')">✕</span>`:''}
      </div>
      <div class="info-val" contenteditable="true" onblur="saveInfoField('${node.id}','${f.id}',this.innerHTML)">${f.value||''}</div>
    </div>`;
  });
  h+=`</div>`;

  // Links block
  h+=`<div class="card" style="margin-top:8px;">`;
  h+=`<div class="cardhd">Links & Absprünge</div>`;
  h+=`<div class="links-grid">`;
  links.forEach(l=>{
    h+=`<a class="link-btn" href="${esc(l.url)}" target="_blank" rel="noopener">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M6 3H3a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V8" stroke="currentColor" stroke-width="1.3"/><path d="M9 1h4m0 0v4m0-4L7 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      ${esc(l.label)}
      ${editMode?`<span onclick="event.preventDefault();delLink('${node.id}','${l.id}')" style="color:var(--red);margin-left:4px;">✕</span>`:''}
    </a>`;
  });
  h+=`<span class="link-btn link-add" onclick="addLink('${node.id}')">+ Link</span>`;
  h+=`</div></div>`;
  return h;
}
function addInfoField(boardId){
  smodal('Neues Feld',[{label:'Feldname',id:'l',ph:'z.B. Kunde'}],v=>{
    if(!v.l)return;
    nodes[boardId].data.infoFields.push({id:uid(),label:v.l,value:''});
    render();
  });
}
function delInfoField(boardId,fid){nodes[boardId].data.infoFields=nodes[boardId].data.infoFields.filter(f=>f.id!==fid);render();}
function moveInfoField(boardId,fid,dir){
  const arr=nodes[boardId].data.infoFields;
  const idx=arr.findIndex(f=>f.id===fid);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=arr.length)return;
  const tmp=arr[idx];arr[idx]=arr[newIdx];arr[newIdx]=tmp;
  save();render();
}
function saveInfoField(boardId,fid,val){const f=nodes[boardId].data.infoFields.find(x=>x.id===fid);if(f)f.value=val;save();}
function addLink(boardId){
  smodal('Neuer Link',[{label:'Bezeichnung',id:'l',ph:'z.B. Confluence'},{label:'URL',id:'u',ph:'https://...'}],v=>{
    if(!v.u)return;
    nodes[boardId].data.links.push({id:uid(),label:v.l||v.u,url:v.u});
    render();
  });
}
function delLink(boardId,lid){nodes[boardId].data.links=nodes[boardId].data.links.filter(l=>l.id!==lid);render();}

// ═══════════════════════════════════════════════════════
// KANBAN
// ═══════════════════════════════════════════════════════
function renderKanban(node){
  const{kbCols,kbCards}=node.data;
  // Filter: show non-archived in columns, archived in Archiv col
  let h=`<div style="margin-bottom:10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
    <button class="btn" onclick="addKbCard('${node.id}')">+ Karte</button>
    <button class="btn edit-only" onclick="addKbCol('${node.id}')">+ Spalte</button>
    <span id="kb-no-col-hint" style="display:none;font-size:12px;color:var(--amber);padding:4px 8px;background:var(--amberbg);border-radius:var(--r);">Erst eine Spalte anlegen</span>
  </div>`;
  h+=`<div class="kb-wrap">`;
  kbCols.forEach(col=>{
    const cards=kbCards.filter(c=>c.colId===col.id&&!c.archived);
    const colColor=col.color||'';
    h+=`<div class="kb-col" style="border-top:${colColor?`3px solid ${colColor}`:'0.5px solid var(--border2)'};border-radius:var(--rl);">
      <div class="kb-col-hd">
        ${colColor?`<span style="width:8px;height:8px;border-radius:50%;background:${colColor};flex-shrink:0;display:inline-block;"></span>`:''}
        ${editMode?`<input class="ni" value="${esc(col.label)}" onchange="renameKbCol('${node.id}','${col.id}',this.value)" style="font-size:12px;font-weight:500;"/>`:`<span>${esc(col.label)}</span>`}
        <span class="cnt">${cards.length}</span>
        ${editMode?`<span style="font-size:11px;color:var(--text3);cursor:pointer;margin-left:2px;" onclick="editKbColColor('${node.id}','${col.id}')">🎨</span>`:''}
        <span class="delbtn" onclick="delKbCol('${node.id}','${col.id}')">✕</span>
      </div>
      <div class="kb-cards">`;
    cards.forEach(card=>{h+=kbCardHTML(node.id,card);});
    h+=`</div>
      <div class="kb-add-card"><button class="addfull" onclick="addKbCardToCol('${node.id}','${col.id}')">+ Karte</button></div>
    </div>`;
  });
  // Archiv column
  const archived=kbCards.filter(c=>c.archived);
  h+=`<div class="kb-col">

function kbCardHTML(boardId,card){
  const now=new Date();now.setHours(0,0,0,0);
  let dlBadge='';
  if(card.deadline){
    const dl=new Date(card.deadline);dl.setHours(0,0,0,0);
    const overdue=dl<now&&!card.done;
    dlBadge=`<span class="kc-dl${overdue?' overdue':''}">📅 ${fmtDate(card.deadline)}</span>`;
  }
  let recurBadge='';
  if(card.recur&&card.recur.type!=='none'){
    const now7=new Date();now7.setDate(now7.getDate()+7);
    const endingSoon=card.recur.endType==='date'&&card.recur.endDate&&new Date(card.recur.endDate)<=now7;
    const endedCount=card.recur.endType==='count'&&card.recur.endCount&&card.recur.startDate&&(()=>{
      const sd=new Date(card.recur.startDate);sd.setHours(0,0,0,0);
      const nd=new Date();nd.setHours(0,0,0,0);
      let cnt=0;const d=new Date(sd);
      while(d<=nd){if(recurFiresOn(card.recur,d))cnt++;d.setDate(d.getDate()+1);}
      return cnt>=card.recur.endCount;
    })();
    const warn=endingSoon||endedCount;
    recurBadge=`<span class="kc-recur" style="${warn?'background:var(--amberbg);color:var(--ambertxt);':''}">↻ ${recurLabel(card.recur,true)}</span>`;
  }
  const cl=card.checklist||[];
  const clDone=cl.filter(x=>x.done).length;
  const cols=nodes[boardId].data.kbCols;
  const colIdx=cols.findIndex(col=>col.id===card.colId);
  const canLeft=colIdx>0;
  const canRight=colIdx<cols.length-1;
  // Priority dot
  const prioColors={high:'var(--red)',medium:'var(--amber)',low:'var(--teal)'};
  const prioDot=card.priority?`<span style="width:8px;height:8px;border-radius:50%;background:${prioColors[card.priority]||'transparent'};display:inline-block;flex-shrink:0;margin-top:3px;" title="${card.priority}"></span>`:'';
  return `<div class="kb-card${card.archived?' archived':''}${card.done?' kb-done':''}" tabindex="0" onclick="openCard('${boardId}','${card.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();openCard('${boardId}','${card.id}');}">
    <div style="display:flex;align-items:flex-start;gap:5px;">
      ${prioDot}
      <div style="flex:1;min-width:0;">
        <div class="kc-name" style="${card.done?'text-decoration:line-through;color:var(--text3)':''}">${esc(card.name)}</div>
        ${card.note?`<div style="font-size:11px;color:var(--text2);margin-top:2px;">${esc(stripHtml(card.note)).slice(0,80)}${stripHtml(card.note).length>80?'…':''}</div>`:''}
      </div>
    </div>
    <div class="kc-meta">
      ${(card.tags||[]).map(t=>`<span class="kc-tag">${esc(t)}</span>`).join('')}
      ${(card.who||[]).map(w=>`<span class="kc-who">${esc(w)}</span>`).join('')}
      ${dlBadge}${recurBadge}
      ${cl.length?`<span class="kc-checklist">✓ ${clDone}/${cl.length}</span>`:''}
    </div>
    <div class="kc-actions" onclick="event.stopPropagation()">
      <span class="kc-act${canLeft?'':' disabled'}" onclick="${canLeft?`moveCard('${boardId}','${card.id}',-1)`:''}" title="Spalte zurück">←</span>
      <span class="kc-act${canRight?'':' disabled'}" onclick="${canRight?`moveCard('${boardId}','${card.id}',1)`:''}" title="Spalte vor">→</span>
      <span class="kc-act" onclick="quickDoneCard('${boardId}','${card.id}')" title="${card.done?'Wiedereröffnen':'Erledigt'}">✓</span>
    </div>
  </div>`;
}

function recurLabel(r,short){
  if(!r||r.type==='none')return'';
  const WD=['Mo','Di','Mi','Do','Fr','Sa','So'];
  const ORD=['','1.','2.','3.','4.','letzten'];
  const MON=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const every=r.every||1;
  let base='';
  if(r.type==='daily') base=every===1?'täglich':`alle ${every} Tage`;
  else if(r.type==='weekly'){
    const days=(r.weekdays||[r.weekday||0]).map(i=>WD[i]).join(', ');
    base=every===1?`wöchentlich (${days})`:`alle ${every} Wo. (${days})`;
  }
  else if(r.type==='monthly'){
    const ord=r.weekdayOrd||-99;
    const ordLabel=ord===-1?'letzten':(ORD[ord]||'1.');
    base=r.monthType==='weekday'
      ?`monatl. (${ordLabel} ${WD[r.weekday||0]})`
      :`monatl. (am ${r.day||1}.)`;
  }
  else if(r.type==='yearly'){
    const m=MON[r.yearMonth!==undefined?r.yearMonth:0];
    base=r.monthType==='weekday'
      ?`jährl. (${r.weekdayOrd===-1?'letzter':'1.'} ${WD[r.weekday||0]} ${m})`
      :`jährl. (${r.yearDay||1}. ${m})`;
  }
  if(short)return base;
  // Append end info
  if(r.endType==='date'&&r.endDate) base+=` · bis ${fmtDate(r.endDate)}`;
  else if(r.endType==='count'&&r.endCount) base+=` · ${r.endCount}×`;
  return base;
}

    <button class="btn-c${card.done?' active':''}" onclick="toggleCardDone('${boardId}','${cardId}')" style="${card.done?'background:var(--tealbg);color:var(--tealtxt);border-color:var(--tealbg);':''}">
      ${card.done?'✓ Erledigt':'Als erledigt markieren'}
    </button>
    <button class="btn danger btn-c" onclick="deleteCard('${boardId}','${cardId}')">Löschen</button>
    <button class="btn-p" onclick="closeCard()">Fertig</button>
  </div></div></div>`;

  document.getElementById('cardmodal').innerHTML=h;
  const cnEl=document.getElementById('cn');
  if(cnEl){
    cnEl.focus();
    cnEl.addEventListener('keydown',e=>{
      if(e.key==='Enter'){e.preventDefault();closeCard();}
      // Tab from name goes to next focusable
    });
  }
  // Tab cycling within card modal
  document.getElementById('cardmodal').addEventListener('keydown',e=>{
    if(e.key==='Tab'){
      const modal=document.getElementById('cardmodal').querySelector('.modal');
      if(!modal)return;
      const focusable=Array.from(modal.querySelectorAll('input:not([disabled]),select:not([disabled]),button,[contenteditable]'));
      const idx=focusable.indexOf(document.activeElement);
      if(idx>=0){
        e.preventDefault();
        const next=focusable[(idx+(e.shiftKey?-1:1)+focusable.length)%focusable.length];
        if(next)next.focus();
      }
    }
    // Escape closes card
    if(e.key==='Escape'){e.stopPropagation();closeCard();}
  });
}

function closeCard(){document.getElementById('cardmodal').innerHTML='';render();}
function closeCardIfBg(e){if(e.target===e.currentTarget)closeCard();}

function card_set(boardId,cardId,field,val){
  const c=nodes[boardId].data.kbCards.find(x=>x.id===cardId);
  if(!c)return;
  c[field]=val;save();
  // Re-render modal for visual fields
  if(field==='priority'||field==='archived')openCard(boardId,cardId);
}
function card_recur_type(boardId,cardId,type){
  const card=nodes[boardId].data.kbCards.find(x=>x.id===cardId);
  if(!card)return;
  const anchor=card.deadline?new Date(card.deadline):new Date();
  const today=new Date();today.setHours(0,0,0,0);
  card.recur={
    type,
    every:1,
    weekdays:[anchor.getDay()===0?6:anchor.getDay()-1], // Mon=0
    weekday:anchor.getDay()===0?6:anchor.getDay()-1,
    weekdayOrd:1,
    day:anchor.getDate(),
    monthType:'day',
    yearMonth:anchor.getMonth(),
    yearDay:anchor.getDate(),
    anchorMonth:anchor.getMonth(),
    anchorDay:anchor.getDate(),
    endType:'none',
    endDate:'',
    endCount:10,
    startDate:today.toISOString().split('T')[0],
  };
  save();openCard(boardId,cardId);
}
function card_recur_field(boardId,cardId,field,val){
  const card=nodes[boardId].data.kbCards.find(x=>x.id===cardId);
  if(!card)return;
  if(!card.recur)card.recur={type:'none'};
  card.recur[field]=val;
  save();
  // Only re-open modal for fields that change the UI structure
  const rerenderFields=['type','monthType','endType'];
  if(rerenderFields.includes(field))openCard(boardId,cardId);
}
function toggleWeekday(boardId,cardId,day,checked){
  const card=nodes[boardId].data.kbCards.find(x=>x.id===cardId);
  if(!card||!card.recur)return;
  if(!card.recur.weekdays)card.recur.weekdays=[card.recur.weekday||0];
  if(checked){if(!card.recur.weekdays.includes(day))card.recur.weekdays.push(day);}
  else{card.recur.weekdays=card.recur.weekdays.filter(d=>d!==day);if(card.recur.weekdays.length===0)card.recur.weekdays=[0];}
  card.recur.weekday=card.recur.weekdays[0];
  save();
}
function toggleCardTag(boardId,cardId,tag){
  const c=nodes[boardId].data.kbCards.find(x=>x.id===cardId);
  if(!c)return;if(!c.tags)c.tags=[];
  c.tags=c.tags.includes(tag)?c.tags.filter(t=>t!==tag):[...c.tags,tag];
  save();openCard(boardId,cardId);
}
function toggleCardWho(boardId,cardId,who){
  const c=nodes[boardId].data.kbCards.find(x=>x.id===cardId);
  if(!c)return;if(!c.who)c.who=[];
  c.who=c.who.includes(who)?c.who.filter(w=>w!==who):[...c.who,who];
  save();openCard(boardId,cardId);
}

function addClItem(boardId,cardId){

function delClItem(boardId,cardId,itemId){

}
function toggleCardDone(boardId,cardId){
  const card=nodes[boardId].data.kbCards.find(x=>x.id===cardId);
  if(!card)return;
  card.done=!card.done;
  // Auto-move: if done, move to last col; if undone, move to first col
  const cols=nodes[boardId].data.kbCols;
  if(card.done&&cols.length>0) card.colId=cols[cols.length-1].id;
  else if(!card.done&&cols.length>0) card.colId=cols[0].id;
  save();openCard(boardId,cardId);
}
function moveCard(boardId,cardId,dir){
  const b=nodes[boardId].data;
  const card=b.kbCards.find(x=>x.id===cardId);
  if(!card)return;
  const cols=b.kbCols;
  const idx=cols.findIndex(c=>c.id===card.colId);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=cols.length)return;
  card.colId=cols[newIdx].id;
  save();render();
}
function quickDoneCard(boardId,cardId){
  const card=nodes[boardId].data.kbCards.find(x=>x.id===cardId);
  if(!card)return;
  card.done=!card.done;
  const cols=nodes[boardId].data.kbCols;
  if(card.done&&cols.length>0)card.colId=cols[cols.length-1].id;
  else if(!card.done&&cols.length>0)card.colId=cols[0].id;
  save();render();
}
function deleteCard(boardId,cardId){
  if(!confirm('Karte löschen?'))return;
  nodes[boardId].data.kbCards=nodes[boardId].data.kbCards.filter(c=>c.id!==cardId);
  closeCard();
}

// ═══════════════════════════════════════════════════════
function renderDailyOverview(){
  const today=new Date();today.setHours(0,0,0,0);
  // Collect all cards from all boards in tree
  const allCards=[];
  function collectBoards(nodeId){
    const n=nodes[nodeId];if(!n)return;
    if(n.type==='board'){
      n.data.kbCards.filter(c=>{
        if(c.archived||c.done)return false;
        if(!c.deadline&&(!c.recur||c.recur.type==='none'))return false;
        // endCount: if recur has fired endCount times already, hide
        if(c.recur&&c.recur.endType==='count'&&c.recur.endCount&&c.recur.startDate){
          const sd=new Date(c.recur.startDate);sd.setHours(0,0,0,0);
          const now=new Date();now.setHours(0,0,0,0);
          let count=0;const d=new Date(sd);
          while(d<=now){if(recurFiresOn(c.recur,d))count++;d.setDate(d.getDate()+1);}
          if(count>=c.recur.endCount)return false;
        }
        return true;
      }).forEach(c=>{c._boardId=n.id;allCards.push({card:c,boardLabel:n.label});});
    }
    if(n.type==='matrix'){
      Object.values(n.data.cells).forEach(cell=>{
        if(cell.boardId)collectBoards(cell.boardId);
        if(cell.matrixId)collectBoards(cell.matrixId);
      });
    }
  }
  collectBoards(rootId);

  // For each daily col, filter by explicit colType config
  function getTimeRange(type){
    const s=new Date(today),e=new Date(today);
    if(type==='today') return {s,e};
    if(type==='thisweek'){
      s.setDate(today.getDate()-((today.getDay()+6)%7)); // Mon
      e.setDate(s.getDate()+6); return {s,e};
    }
    if(type==='nextweek'){
      s.setDate(today.getDate()-((today.getDay()+6)%7)+7);
      e.setDate(s.getDate()+6); return {s,e};
    }
    if(type==='thismonth'){
      s.setDate(1);
      e.setFullYear(today.getFullYear(),today.getMonth()+1,0); return {s,e};
    }
    if(type==='nextmonth'){
      s.setFullYear(today.getFullYear(),today.getMonth()+1,1);
      e.setFullYear(today.getFullYear(),today.getMonth()+2,0); return {s,e};
    }
    if(type==='thisquarter'){
      const q=Math.floor(today.getMonth()/3);
      s.setMonth(q*3,1);
      e.setMonth(q*3+3,0); return {s,e};
    }
    if(type==='thisyear'){
      s.setMonth(0,1);e.setMonth(11,31); return {s,e};
    }
    if(type==='nextyear'){
      s.setFullYear(today.getFullYear()+1,0,1);
      e.setFullYear(today.getFullYear()+1,11,31); return {s,e};
    }
    return null;
  }
  function cardFitsCol(card,colIdx){
    const col=dailyCols[colIdx];
    const type=col.type||'today';
    const range=getTimeRange(type);
    if(!range)return false;
    const{s,e}=range;
    const isRecur=card.recur&&card.recur.type!=='none';
    let dlDate=card.deadline?new Date(card.deadline):null;
    if(dlDate)dlDate.setHours(0,0,0,0);
    function inRange(d){return d&&d>=s&&d<=e;}
    if(type==='today'){
      if(dlDate&&sameDay(dlDate,today))return true;
      if(isRecur&&recurFiresOn(card.recur,today))return true;
      return false;
    }
    if(inRange(dlDate))return true;
    if(isRecur&&recurFiresInRange(card.recur,s,e))return true;
    return false;
  }

  let h=`<div class="daily-wrap">
    <div class="daily-title">
      📅 Tagesübersicht — ${fmtDateFull(today)}
      <button class="btn edit-only" style="font-size:11px;margin-left:auto;" onclick="addDailyCol()">+ Spalte</button>
    </div>
    <div class="daily-cols">`;

  const DCTYPE_LABELS={today:'Heute',thisweek:'Diese Woche',nextweek:'Nächste Woche',thismonth:'Dieser Monat',nextmonth:'Nächster Monat',thisquarter:'Dieses Quartal',thisyear:'Dieses Jahr',nextyear:'Nächstes Jahr'};
  dailyCols.forEach((col,idx)=>{
    const items=allCards.filter(({card})=>cardFitsCol(card,idx));
    const typeLabel=DCTYPE_LABELS[col.type||'today']||col.type||'';
    h+=`<div class="daily-col">
      <div class="daily-col-hd">
        <div style="flex:1;min-width:0;">
          ${editMode
            ?`<input class="ni" value="${esc(col.label)}" onchange="renameDailyCol('${col.id}',this.value)" style="font-size:12px;font-weight:500;width:100%;"/>`
            :`<span style="font-size:12px;font-weight:500;">${esc(col.label)}</span>`}
          <div style="font-size:10px;color:var(--text3);margin-top:1px;">${typeLabel}</div>
        </div>
        <span style="font-size:10px;color:var(--text3);margin-left:4px;">${items.length}</span>
        <span style="font-size:12px;color:var(--text2);cursor:pointer;margin-left:4px;" onclick="editDailyCol('${col.id}')" title="Zeitfenster ändern">⚙</span>
        ${editMode?`<span class="delbtn" style="display:inline;margin-left:2px;" onclick="delDailyCol('${col.id}')">✕</span>`:''}
      </div>`;
    if(items.length===0){
      h+=`<div style="padding:10px 12px;font-size:12px;color:var(--text3);">Nichts fällig</div>`;
    } else {
      items.forEach(({card,boardLabel})=>{
        const isRecur=card.recur&&card.recur.type!=='none';
        const prioColors2={high:'var(--red)',medium:'var(--amber)',low:'var(--teal)'};
        const prioDot2=card.priority?`<span style="width:7px;height:7px;border-radius:50%;background:${prioColors2[card.priority]};display:inline-block;margin-right:4px;flex-shrink:0;margin-top:4px;"></span>`:'';
        h+=`<div class="daily-item">
          <div class="task-check" onclick="quickDoneFromDaily('${card._boardId}','${card.id}')" title="Erledigt markieren" style="flex-shrink:0;margin-top:3px;cursor:pointer;"></div>
          <div style="flex:1;min-width:0;cursor:pointer;" onclick="openCardFromDaily('${card._boardId}','${card.id}')">
            <div class="di-name" style="display:flex;align-items:flex-start;">${prioDot2}${esc(card.name)||'(ohne Name)'}</div>
            <div class="di-from">
              ${esc(boardLabel)}${card.deadline?' · '+fmtDate(card.deadline):''}
              ${isRecur?`<span style="color:var(--teal);">· ↻ ${recurLabel(card.recur,true)}</span>`:''}
            </div>
          </div>
          ${(card.tags||[]).slice(0,2).map(t=>`<span class="kc-tag" style="font-size:9px;">${esc(t)}</span>`).join('')}
        </div>`;
      });
    }
    h+=`</div>`;
  });
  if(editMode)h+=`<div style="min-width:160px;flex-shrink:0;padding:7px;"><button class="addfull" style="height:48px;" onclick="addDailyCol()">+ Spalte</button></div>`;
  h+=`</div></div>`;
  return h;
}

function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function recurFiresOn(r,date){
  if(!r||r.type==='none')return false;
  // Check endType gates
  if(r.endType==='date'&&r.endDate){
    const ed=new Date(r.endDate);ed.setHours(0,0,0,0);
    if(date>ed)return false;
  }
  if(r.startDate){
    const sd=new Date(r.startDate);sd.setHours(0,0,0,0);
    if(date<sd)return false;
  }
  const every=r.every||1;
  if(r.type==='daily'){
    if(!r.startDate)return true;
    const sd=new Date(r.startDate);sd.setHours(0,0,0,0);
    const diff=Math.round((date-sd)/(1000*60*60*24));
    return diff>=0&&diff%every===0;
  }
  if(r.type==='weekly'){
    // weekdays array (Mon=0..Sun=6), JS getDay: Sun=0..Sat=6
    const wd=r.weekdays||(r.weekday!==undefined?[r.weekday]:[0]);
    const jsDay=date.getDay(); // 0=Sun
    // Convert our Mon=0 to JS: Mon=1,Tue=2,...Sun=0
    const ourDay=jsDay===0?6:jsDay-1;
    if(!wd.includes(ourDay))return false;
    if(every===1)return true;
    // Check week interval from startDate
    if(!r.startDate)return true;
    const sd=new Date(r.startDate);sd.setHours(0,0,0,0);
    const weekDiff=Math.floor((date-sd)/(1000*60*60*24*7));
    return weekDiff>=0&&weekDiff%every===0;
  }
  if(r.type==='monthly'){
    if(r.monthType==='weekday'){
      const wd=r.weekday||0;
      const ord=r.weekdayOrd||1;
      const jsWd=wd===6?0:wd+1; // convert Mon=0 to JS Sun=0
      if(ord===-1){
        // Last weekday of month
        const last=new Date(date.getFullYear(),date.getMonth()+1,0);
        while(last.getDay()!==jsWd)last.setDate(last.getDate()-1);
        return sameDay(date,last);
      } else {
        // Nth weekday
        const first=new Date(date.getFullYear(),date.getMonth(),1);
        let count=0;
        const d=new Date(first);
        while(d.getMonth()===date.getMonth()){
          if(d.getDay()===jsWd){count++;if(count===ord)return sameDay(date,d);}
          d.setDate(d.getDate()+1);
        }
        return false;
      }
    }
    return date.getDate()===(r.day||1);
  }
  if(r.type==='yearly'){
    const month=r.yearMonth!==undefined?r.yearMonth:(r.anchorMonth||0);
    if(date.getMonth()!==month)return false;
    if(r.monthType==='weekday'){
      const wd=r.weekday||0;
      const ord=r.weekdayOrd||1;
      const jsWd=wd===6?0:wd+1;
      if(ord===-1){
        const last=new Date(date.getFullYear(),month+1,0);
        while(last.getDay()!==jsWd)last.setDate(last.getDate()-1);
        return sameDay(date,last);
      } else {
        const first=new Date(date.getFullYear(),month,1);
        let count=0,d=new Date(first);
        while(d.getMonth()===month){
          if(d.getDay()===jsWd){count++;if(count===ord)return sameDay(date,d);}
          d.setDate(d.getDate()+1);
        }
        return false;
      }
    }
    return date.getDate()===(r.yearDay||r.anchorDay||1);
  }
  return false;
}
function recurFiresInRange(r,start,end){
  if(!r||r.type==='none')return false;
  // endCount: check if we'd exceed count by start of range
  if(r.endType==='count'&&r.endCount&&r.startDate){
    // Count how many times it fires from startDate up to end
    const sd=new Date(r.startDate);sd.setHours(0,0,0,0);
    let count=0;
    const d2=new Date(sd);
    while(d2<=end){if(recurFiresOn(r,d2))count++;d2.setDate(d2.getDate()+1);}
    if(count===0)return false;
  }
  const d=new Date(start);
  while(d<=end){if(recurFiresOn(r,d))return true;d.setDate(d.getDate()+1);}
  return false;
}

function iconClick(nodeId,rowId,colId,type,label){
  const key=`${rowId}-${colId}`;const cell=getCell(nodeId,key);
  if(type==='board'){
    if(!cell.boardId){smodal('Task Board Name',[{label:'Name',id:'l',ph:label,v:label}],v=>{cell.boardId=mkBoard(v.l||label);openCell(nodeId,rowId,colId,v.l||label,'board');});}
    else openCell(nodeId,rowId,colId,nodes[cell.boardId].label,'board');
  } else {
    if(!cell.matrixId){smodal('Sub-Matrix Name',[{label:'Name',id:'l',ph:label,v:label}],v=>{cell.matrixId=mkMatrix(v.l||label);openCell(nodeId,rowId,colId,v.l||label,'matrix');});}
    else openCell(nodeId,rowId,colId,nodes[cell.matrixId].label,'matrix');
  }
}
function openCell(parentId,rowId,colId,label,tab){
  const pseudoId=`cell-${parentId}-${rowId}-${colId}`;
  nodes[pseudoId]={id:pseudoId,type:'cell',label,data:{}};
  setTab(pseudoId,tab);
  // Remove any existing entry for this cell before pushing (dedup)
  const existingIdx=stack.findIndex(s=>s.nodeId===pseudoId);
  if(existingIdx>=0) stack=stack.slice(0,existingIdx);
  stack.push({nodeId:pseudoId,label,cellRef:{parentId,rowId,colId}});
  editMode=false;render();
}
function renameMatrixNode(nodeId,val){
  const n=nodes[nodeId];if(!n||!val.trim())return;
  n.label=val.trim();
  // Update stack label if present
  const s=stack.find(x=>x.nodeId===nodeId);
  if(s)s.label=val.trim();
  save();renderBC();
}
function renameBoardOrMatrix(nodeId,val,pseudoId){
  const n=nodes[nodeId];if(!n||!val.trim())return;
  n.label=val.trim();
  // Update label in stack
  const s=stack.find(x=>x.nodeId===pseudoId);
  if(s)s.label=val.trim();
  save();renderBC();
}
function toggleEdit(){
  editMode=!editMode;
  document.body.classList.toggle('editing', editMode);
  document.getElementById('content').style.borderLeft=editMode?'3px solid var(--amber)':'';
  document.getElementById('content').style.paddingLeft=editMode?'13px':'14px';

}

function delRow(nodeId,rowId){if(!confirm('Zeile löschen?'))return;const d=nodes[nodeId].data;d.rows=d.rows.filter(r=>r.id!==rowId);Object.keys(d.cells).forEach(k=>{if(k.startsWith(rowId+'-'))delete d.cells[k];});render();}
function delCol(nodeId,colId){if(!confirm('Spalte löschen?'))return;const d=nodes[nodeId].data;d.cols=d.cols.filter(c=>c.id!==colId);Object.keys(d.cells).forEach(k=>{if(k.endsWith('-'+colId))delete d.cells[k];});render();}

// ═══════════════════════════════════════════════════════
// STAMMDATEN: Tags & People management
// ═══════════════════════════════════════════════════════
let sdTab='tags';
function openStammdaten(){
  sdTab=sdTab||'tags';
  renderStammdaten();
}
function renderStammdaten(){
  const isTags=sdTab==='tags';
  const list=isTags?globalTags:globalPeople;
  const color=isTags?'var(--purplebg)':'var(--bluebg)';
  let h=`<div class="smodal-overlay" onclick="closeSdIfBg(event)">
    <div class="sdmodal" onclick="event.stopPropagation()">
      <div class="sdmodal-hd">
        <h3>Tags &amp; Personen</h3>
        <button class="btn-c" onclick="closeStammdaten()">✕</button>
      </div>
      <div class="sd-tabs">
        <div class="sd-tab${sdTab==='tags'?' active':''}" onclick="sdTab='tags';renderStammdaten()">Tags (${globalTags.length})</div>
        <div class="sd-tab${sdTab==='people'?' active':''}" onclick="sdTab='people';renderStammdaten()">Personen (${globalPeople.length})</div>
      </div>
      <div class="sd-body">`;
  list.forEach(item=>{
    h+=`<div class="sd-item">
      <div class="sd-dot" style="background:${color};border:0.5px solid var(--border2);"></div>
      <input value="${esc(item.label)}" onchange="renameGlobal('${isTags?'tags':'people'}','${item.id}',this.value)" />
      <span style="font-size:12px;color:var(--red);cursor:pointer;" onclick="delGlobal('${isTags?'tags':'people'}','${item.id}')">✕</span>
    </div>`;
  });
  h+=`<div style="margin-top:10px;">
    <button class="btn" onclick="addGlobal('${isTags?'tags':'people'}')">+ ${isTags?'Neuer Tag':'Neue Person'}</button>
  </div>`;
  h+=`</div></div></div>`;
  document.getElementById('mc').innerHTML=h;
}
function closeSdIfBg(e){if(e.target.classList.contains('smodal-overlay'))closeStammdaten();}
function closeStammdaten(){document.getElementById('mc').innerHTML='';render();}
function renameGlobal(type,id,val){
  const list=type==='tags'?globalTags:globalPeople;
  const oldLabel=(list.find(x=>x.id===id)||{}).label;
  const item=list.find(x=>x.id===id);
  if(!item)return;
  const newLabel=val.trim();
  if(!newLabel||newLabel===oldLabel)return;
  // Update all cards that use this tag/person
  Object.values(nodes).forEach(n=>{
    if(n.type!=='board')return;
    n.data.kbCards.forEach(card=>{
      if(type==='tags'&&card.tags){card.tags=card.tags.map(t=>t===oldLabel?newLabel:t);}
      if(type==='people'&&card.who){card.who=card.who.map(w=>w===oldLabel?newLabel:w);}
    });
  });
  item.label=newLabel;
  save();
}
function delGlobal(type,id){
  if(!confirm('Löschen? Wird auch von allen Karten entfernt.'))return;
  const list=type==='tags'?globalTags:globalPeople;
  const item=list.find(x=>x.id===id);
  if(!item)return;
  // Remove from all cards
  Object.values(nodes).forEach(n=>{
    if(n.type!=='board')return;
    n.data.kbCards.forEach(card=>{
      if(type==='tags'&&card.tags)card.tags=card.tags.filter(t=>t!==item.label);
      if(type==='people'&&card.who)card.who=card.who.filter(w=>w!==item.label);
    });
  });
  if(type==='tags')globalTags=globalTags.filter(x=>x.id!==id);
  else globalPeople=globalPeople.filter(x=>x.id!==id);
  save();renderStammdaten();
}
function addGlobal(type){
  const label=prompt(type==='tags'?'Neuer Tag:':'Neue Person:');
  if(!label||!label.trim())return;
  const l=label.trim();
  if(type==='tags'){if(!globalTags.find(x=>x.label===l))globalTags.push({id:uid(),label:l});}
  else{if(!globalPeople.find(x=>x.label===l))globalPeople.push({id:uid(),label:l});}
  save();renderStammdaten();
}

// SIMPLE MODAL
// ═══════════════════════════════════════════════════════
let mcb=null,mfields=[];
function smodal(title,fields,cb){
  mcb=cb;mfields=fields.map(f=>f.id);
  let h=`<div class="smodal-overlay" onclick="closeS(event)"><div class="smodal"><h3>${title}</h3>`;
  fields.forEach(f=>{
    h+=`<label>${f.label}</label>`;
    if(f.sel)h+=`<select id="mf-${f.id}">${f.sel.map((o,i)=>`<option value="${o}">${f.sellabels?f.sellabels[i]:o}</option>`).join('')}</select>`;
    else h+=`<input id="mf-${f.id}" type="text" placeholder="${f.ph||''}" value="${f.v||''}"/>`;
  });
  h+=`<div class="smodal-actions"><button class="btn-c" onclick="closeS()">Abbrechen</button><button class="btn-p" onclick="subS()">OK</button></div></div></div>`;
  document.getElementById('mc').innerHTML=h;
  document.getElementById('mc').onkeydown=e=>{
    if(e.key==='Enter'){
      // Don't submit if focus is on select or textarea
      if(document.activeElement&&(document.activeElement.tagName==='SELECT'||document.activeElement.tagName==='TEXTAREA'))return;
      e.preventDefault();subS();
    }
    // Tab: cycle through focusable fields within modal
    if(e.key==='Tab'){
      const focusable=Array.from(document.getElementById('mc').querySelectorAll('input,select,button'));
      const idx=focusable.indexOf(document.activeElement);
      if(idx>=0){
        e.preventDefault();
        const next=focusable[(idx+(e.shiftKey?-1:1)+focusable.length)%focusable.length];
        if(next)next.focus();
      }
    }
  };
  setTimeout(()=>{const el=document.getElementById('mf-'+fields[0].id);if(el){el.focus();el.select();}},30);
}
function subS(){const v={};mfields.forEach(id=>{const el=document.getElementById('mf-'+id);if(el)v[id]=el.value;});document.getElementById('mc').innerHTML='';if(mcb){mcb(v);mcb=null;}}
function closeS(e){if(!e||e.target.classList.contains('smodal-overlay')){document.getElementById('mc').innerHTML='';mcb=null;}}

// ═══════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════
function doSearch(q){
  const el=document.getElementById('searchresults');
  if(!q||q.length<2){el.style.display='none';return;}
  const ql=q.toLowerCase();
  const results=[];
  // Collect all searchable items from entire tree
  function searchNode(nodeId){
    const n=nodes[nodeId];if(!n)return;
    if(n.type==='board'){
      // Cards
      n.data.kbCards.forEach(card=>{
        const score=matchScore(ql,[card.name,stripHtml(card.note),...(card.tags||[]),...(card.who||[])]);
        if(score>0)results.push({type:'card',boardId:nodeId,boardLabel:n.label,id:card.id,name:card.name||'(ohne Name)',from:n.label,score});
      });
      // Info fields
      n.data.infoFields.forEach(f=>{
        if((f.label+' '+stripHtml(f.value)).toLowerCase().includes(ql))
          results.push({type:'info',boardId:nodeId,id:f.id,name:f.label+': '+stripHtml(f.value).slice(0,60),from:n.label+' · Info',score:1});
      });
    }
    if(n.type==='matrix'){
      // Matrix label itself
      if(n.label.toLowerCase().includes(ql))results.push({type:'matrix',nodeId,name:n.label,from:'Matrix',score:2});
      Object.values(n.data.cells).forEach(cell=>{
        if(cell.boardId)searchNode(cell.boardId);
        if(cell.matrixId)searchNode(cell.matrixId);
      });
    }
  }
  searchNode(stack[0].nodeId);
  results.sort((a,b)=>b.score-a.score);
  if(results.length===0){
    el.style.display='block';
    el.innerHTML=`<div style="padding:12px;font-size:12px;color:var(--text3);text-align:center;">Keine Ergebnisse</div>`;
    return;
  }
  el.style.display='block';
  window._searchResults=results.slice(0,20);
  const safe=q.replace(/[.*+?^${}()|\[\]]/g,'\\$&');
  const re=new RegExp('('+safe+')','gi');
  const hi=s=>s?esc(s).replace(re,'<mark class="sr-mark">$1</mark>'):'';
  el.innerHTML=window._searchResults.map((r,i)=>{
    return '<div class="sr-item" onclick="searchOpen('+i+')">'
      +'<div class="sr-name">'+hi(r.name)+'</div>'
      +'<div class="sr-from">'+esc(r.from)+'</div>'
      +'</div>';
  }).join('');
}
function matchScore(q,fields){
  let score=0;
  fields.forEach(f=>{if(f&&f.toLowerCase().includes(q))score+=(f.toLowerCase()===q?3:1);});
  return score;
}
function searchOpen(i){
  const r=(window._searchResults||[])[i];
  if(!r)return;
  closeSearch();
  if(r.type==='card'||r.type==='info') openCard(r.boardId,r.id||r.boardId);
  else if(r.type==='matrix'){
    const s=stack.find(x=>x.nodeId===r.nodeId);
    if(!s)stack.push({nodeId:r.nodeId,label:r.name,cellRef:null});
    render();
  }
}
function closeSearch(){
  document.getElementById('searchresults').style.display='none';
  const inp=document.getElementById('searchinput');
  if(inp)inp.value='';
}
document.addEventListener('click',e=>{
  // Close search dropdown
  if(!e.target.closest('#searchresults')&&!e.target.closest('#searchinput'))
    document.getElementById('searchresults').style.display='none';
  // Close minimap if click outside panel and outside toggle button
  if(mmOpen&&!e.target.closest('#minimap-panel')&&!e.target.closest('[onclick="toggleMM()"]')){
    mmOpen=false;
    document.getElementById('minimap-panel').classList.remove('open');
  }
});

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function stripHtml(s){return s?s.replace(/<[^>]+>/g,''):'';  }
function fmtDate(d){if(!d)return'';const x=new Date(d);return x.toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDateFull(d){return d.toLocaleDateString('de-AT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    // Priority 1: close card modal
    if(document.getElementById('cardmodal').innerHTML){closeCard();return;}
    // Priority 2: close simple modal
    if(document.getElementById('mc').innerHTML){closeS();return;}
    // Priority 3: go one level up in stack
    if(stack.length>1){navTo(stack.length-2);}
  }
  // Ctrl+Shift+E — Bearbeitungsmodus toggle (kein Browser-Konflikt)
  if(e.ctrlKey&&e.shiftKey&&e.key==='E'){
    // Don't toggle edit mode when typing in an input/textarea/contenteditable
    const tag=document.activeElement?.tagName;
    const isEditing=tag==='INPUT'||tag==='TEXTAREA'||document.activeElement?.isContentEditable;
    if(!isEditing){e.preventDefault();toggleEdit();}
  }
});

render();
</script>
