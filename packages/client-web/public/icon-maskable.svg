<?xml version="1.0" encoding="UTF-8"?>
<!-- maskable icon: Safe-Zone nach W3C-Spec ist der innere 80%-Kreis (ca. Koordinaten 51..461).
     Wir malen das Motiv daher nur innerhalb der inneren Zone, der Rand bleibt Volltoene. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Infinite Matrix">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g stroke="url(#accent)" stroke-width="24" stroke-linecap="round" fill="none" transform="translate(0,0) scale(0.8) translate(64,64)">
    <path d="M112 168 L112 344 M112 168 L256 280 L400 168 M400 168 L400 344"/>
  </g>
  <g fill="url(#accent)" transform="translate(0,0) scale(0.8) translate(64,64)">
    <circle cx="112" cy="168" r="18"/>
    <circle cx="256" cy="280" r="18"/>
    <circle cx="400" cy="168" r="18"/>
    <circle cx="112" cy="344" r="18"/>
    <circle cx="400" cy="344" r="18"/>
  </g>
</svg>
