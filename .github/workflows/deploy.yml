name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'packages/bridge/**'
      - 'packages/shared/**'
      - 'packages/client-standalone/**'
      - 'infra/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      # Workflow-Aenderungen triggern sich selbst — sonst muss man
      # manuell ueber workflow_dispatch ausloesen.
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      bridge-sha: ${{ steps.hash.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      # pnpm-Version aus package.json "packageManager"-Feld (pnpm@9.15.9).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Audit prod-deps (ASVS V10.1.1 Supply-Chain)
        # Bricht den Build ab, wenn eine Production-Dependency eine
        # bekannte CVE >= high hat. Audit-Level "high" filtert
        # Low/Moderate-Findings raus — die laufen typischerweise zu
        # toten Pfaden in Tests/Build-Tools und blockieren den Deploy
        # nicht. Bei einem high/critical-Finding muss die Dep
        # aktualisiert werden, sonst kein Live-Push.
        run: pnpm audit --prod --audit-level=high

      - name: Lint + Typecheck + Test + Build (bridge)
        working-directory: packages/bridge
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test -- --run
          pnpm build

      - name: Hash build
        id: hash
        working-directory: packages/bridge
        run: echo "sha=$(sha256sum dist/index.js | cut -d' ' -f1 | head -c 12)" >> "$GITHUB_OUTPUT"

      - name: Package artifact (pnpm deploy mit flachem node_modules-Layout)
        env:
          # Erzwingt flaches node_modules (npm-Stil) statt pnpm-isolated/symlink.
          # Ohne das hoistet pnpm deploy transitive Deps des MCP-SDK (@hono/node-server,
          # zod-to-json-schema, …) nicht zuverlaessig auf Top-Level → ESM-Resolver
          # findet sie beim Start nicht.
          NPM_CONFIG_NODE_LINKER: hoisted
        run: |
          pnpm deploy --filter @infinite-matrix/bridge --prod artifact/bridge
          echo "=== Top-Level node_modules im Artifact ==="
          ls artifact/bridge/node_modules/ | head -20
          echo "=== Wichtige Transitiven ==="
          ls artifact/bridge/node_modules/@hono 2>&1 || echo "@hono FEHLT"
          ls artifact/bridge/node_modules/zod-to-json-schema 2>&1 || echo "zod-to-json-schema FEHLT"
          # Single-File-Client — wandert seit Phase 0g.1 in
          # packages/client-standalone/matrix.html. Wir deployen das
          # Artifact zusaetzlich an /standalone/ — root / wird vom
          # SaaS-Client ueberlagert, sobald der live geht. Bis dahin
          # wird matrix.html UND als /matrix_tool_beta.html (Legacy-
          # Pfad) UND unter /standalone/matrix.html serviert; siehe
          # nginx-Config + Deploy-Step unten.
          mkdir -p artifact/client artifact/standalone
          cp packages/client-standalone/matrix.html artifact/client/matrix_tool_beta.html
          cp packages/client-standalone/matrix.html artifact/standalone/matrix.html

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact
          path: artifact/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with: { name: deploy-artifact, path: artifact }

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: SSH Sanity (Diagnose bei Auth-Fehlern)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "=== Private-Key-Datei-Info ==="
          wc -l ~/.ssh/id_ed25519 || true
          head -1 ~/.ssh/id_ed25519 || true
          tail -1 ~/.ssh/id_ed25519 || true
          echo ""
          echo "=== Private-Key-Fingerprint (CI-seitig) ==="
          ssh-keygen -lf ~/.ssh/id_ed25519 || echo "FEHLER: Private-Key ungueltig/malformed"
          echo ""
          echo "=== Verbose SSH-Connect-Test ==="
          ssh -v -o BatchMode=yes -o ConnectTimeout=10 -i ~/.ssh/id_ed25519 \
            "$USER@$HOST" "echo 'SSH_OK whoami=$(whoami) hostname=$(hostname)'" 2>&1 | tail -30 || echo "SSH-Test fehlgeschlagen"

      - name: Apply DB migrations
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          # Repo-Mirror /opt/matrix-repo auf main bringen und Migrations
          # idempotent anwenden. Der Script ueberlebt leere migrations/.
          # Seeds bleiben manuell (bewusst nicht automatisiert).
          #
          # reset --hard bringt das Repo auf den origin-Stand. clean
          # NICHT global — sonst werden Bind-Mount-Volumes (Postgres-
          # Daten, Storage) weggeputzt, die im Working-Tree liegen
          # aber nicht im Repo. Stattdessen gezielt nur untracked
          # Migrations-Files raeumen, die hier ueblicherweise stoeren.
          # Lesson learned 2026-04-25: ein Pauschal-clean hat die
          # komplette Postgres-Datenbank weggeputzt (siehe Memory-
          # Eintrag feedback_no_pauschal_git_clean).
          ssh -i ~/.ssh/id_ed25519 "$USER@$HOST" bash -s <<'REMOTE'
            set -euo pipefail
            sudo git -C /opt/matrix-repo fetch --quiet origin main
            sudo git -C /opt/matrix-repo reset --hard origin/main
            # Gezielt nur untracked SQL-Files in migrations/ raeumen.
            # KEIN globales clean — sonst sind Postgres-Volumes weg.
            sudo git -C /opt/matrix-repo clean -fd -- infra/supabase/migrations/
            sudo env SUPABASE_DIR=/opt/matrix-repo/infra/supabase \
              bash /opt/matrix-repo/infra/scripts/supabase-migrate.sh
          REMOTE

      - name: Deploy bridge
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            artifact/bridge/ \
            "$USER@$HOST:/tmp/matrix-bridge-stage/"

          ssh -i ~/.ssh/id_ed25519 "$USER@$HOST" bash -s <<'REMOTE'
            set -euo pipefail
            # pnpm deploy-Artifakt enthaelt bereits node_modules — keine Install-Phase auf dem VPS.
            # --exclude bewahrt die Produktions-Dateien (.env, Laufzeit-State in data/) auf
            # dem VPS; sie liegen nicht im Artifact und wuerden sonst durch --delete geloescht.
            sudo rsync -az --delete \
              --exclude='.env' \
              --exclude='data/' \
              --chown=matrix-bridge:matrix-bridge \
              /tmp/matrix-bridge-stage/ \
              /opt/matrix-bridge/

            sudo systemctl restart matrix-bridge
            sleep 2
            curl -fsS http://127.0.0.1:3849/healthz || (sudo journalctl -u matrix-bridge -n 50 && exit 1)
          REMOTE

      - name: Deploy client (Legacy-Root)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # rsync auf das Web-Root. --exclude='standalone/' verhindert,
          # dass --delete den /standalone/-Subordner abraeumt (der
          # naechste Step befuellt ihn).
          rsync -az --delete --exclude='standalone/' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            artifact/client/ \
            "$USER@$HOST:/var/www/matrix/"

      - name: Deploy standalone (/standalone/)
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            artifact/standalone/ \
            "$USER@$HOST:/var/www/matrix/standalone/"

      - name: Deploy nginx config
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          # nginx-Configs liegen schon im Repo-Mirror (/opt/matrix-repo)
          # nach dem fetch+ff-merge im "Apply DB migrations"-Step. Wir
          # symlinken sie an die richtigen Stellen + reload nginx.
          # Idempotent: ln -sf ueberschreibt bestehende Symlinks.
          ssh -i ~/.ssh/id_ed25519 "$USER@$HOST" bash -s <<'REMOTE'
            set -euo pipefail
            REPO=/opt/matrix-repo

            # Site-Config: matrix.conf nach sites-available/ + symlink
            # in sites-enabled/. Bei Erst-Setup ist der Symlink in
            # sites-enabled noch nicht da — wir legen ihn an.
            sudo install -m 0644 -o root -g root \
              "$REPO/infra/nginx/matrix.conf" \
              /etc/nginx/sites-available/matrix.conf
            sudo ln -sf /etc/nginx/sites-available/matrix.conf \
              /etc/nginx/sites-enabled/matrix.conf

            # http-Context-Configs (rate-limit-Zonen etc.) nach
            # /etc/nginx/conf.d/. nginx-Default inkludiert das Verzeichnis.
            sudo rsync -a --delete-after \
              "$REPO/infra/nginx/conf.d/" \
              /etc/nginx/conf.d/matrix/
            # Trick: einzelnes Include-Snippet, das alle unsere conf.d-
            # Files liest. So vermischen wir uns nicht mit anderen Eintraegen
            # in /etc/nginx/conf.d/. Datei mit .conf-Endung wird automatisch
            # geladen.
            cat <<'EOF' | sudo tee /etc/nginx/conf.d/00-matrix-include.conf >/dev/null
            include /etc/nginx/conf.d/matrix/*.conf;
            EOF

            sudo nginx -t
            sudo systemctl reload nginx
          REMOTE

      - name: Smoke test
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          curl -fsS "https://$HOST/healthz" | grep -q '"ok":true'
          curl -fsS -o /dev/null -w "%{http_code}\n" "https://$HOST/" | grep -q 200
          curl -fsS -o /dev/null -w "%{http_code}\n" "https://$HOST/standalone/" | grep -q 200
