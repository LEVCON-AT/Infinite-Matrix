function kbCardHTML(boardId,card){
  const now=today0();
  let dlBadge='';
  if(card.deadline){
    const dl=day0(card.deadline);
    const overdue=dl<now&&!card.done;
    dlBadge=`<span class="kc-dl${overdue?' overdue':''}">${ICO.calendar(10)} ${fmtDate(card.deadline)}</span>`;
  }
  let recurBadge='';
  if(card.recur&&card.recur.type!=='none'){
    const now7=new Date();now7.setDate(now7.getDate()+7);
    const endingSoon=card.recur.endType==='date'&&card.recur.endDate&&new Date(card.recur.endDate)<=now7;
    const endedCount=card.recur.endType==='count'&&card.recur.endCount&&card.recur.startDate&&(()=>{
      const sd=day0(card.recur.startDate);
      const nd=today0();
      let cnt=0;const d=new Date(sd);
      while(d<=nd){if(recurFiresOn(card.recur,d))cnt++;d.setDate(d.getDate()+1);}
      return cnt>=card.recur.endCount;
    })();
    const warn=endingSoon||endedCount;
    recurBadge=`<span class="kc-recur" style="${warn?'background:var(--amberbg);color:var(--ambertxt);':''}">${ICO.recur(10)} ${recurLabel(card.recur,true)}</span>`;
  }
  // Last done badge — occurrence-based for recurring, doneDate for one-off
  let lastDoneBadge='';
  const doneOcc=card.doneOccurrences||[];
  if(doneOcc.length>0){
    const last=[...doneOcc].sort().reverse()[0];
    lastDoneBadge=renderBadge(ICO.check(9)+' '+fmtDate(last),'var(--tealbg)','var(--tealtxt)');
  } else if(card.done&&card.doneDate){
    lastDoneBadge=renderBadge(ICO.check(9)+' '+fmtDate(card.doneDate),'var(--tealbg)','var(--tealtxt)');
  }
  const cl=card.checklist||[];
  const clDone=cl.filter(x=>x.done).length;
  const cols=nodes[boardId].data.kbCols;
  const colIdx=cols.findIndex(col=>col.id===card.colId);
  const canLeft=colIdx>0;
  const canRight=colIdx<cols.length-1;
  // Priority dot
  return `<div class="kb-card${card.archived?' archived':''}${card.done?' kb-done':''}" tabindex="0" draggable="${card.archived?'false':'true'}" data-card-id="${card.id}" data-board-id="${boardId}" data-prio="${card.priority||''}" onclick="openCard('${boardId}','${card.id}')" onkeydown="kbCardKeydown(event,'${boardId}','${card.id}')" ondragstart="dragStart(event)" ondragend="dragEnd(event)">
    <div style="display:flex;align-items:flex-start;gap:5px;">
      <div style="flex:1;min-width:0;">
        <div class="kc-name" style="--card-lines:${appSettings.cardTitleLines||2};">${esc(card.name)}</div>
        ${card.note?`<div style="font-size:11px;color:var(--text2);margin-top:2px;">${esc(stripHtml(card.note)).slice(0,appSettings.noteTruncate||NOTE_TRUNCATE)}${stripHtml(card.note).length>(appSettings.noteTruncate||NOTE_TRUNCATE)?'…':''}</div>`:''}
      </div>
    </div>
    <div class="kc-meta">
      ${(card.tags||[]).map(t=>`<span class="kc-tag">${esc(t)}</span>`).join('')}
      ${(card.who||[]).map(w=>`<span class="kc-who">${esc(w)}</span>`).join('')}
      ${dlBadge}${recurBadge}${lastDoneBadge}
      ${cl.length?`<span class="kc-checklist">${ICO.check(9)} ${clDone}/${cl.length}</span>`:''}
    </div>
    <div class="kc-actions" onclick="event.stopPropagation()">
      <span class="kc-act${canLeft?'':' disabled'}" tabindex="0" role="button" onclick="${canLeft?`moveCard('${boardId}','${card.id}',-1)`:''}" onkeydown="${canLeft?`if(event.key==='Enter'){event.preventDefault();moveCard('${boardId}','${card.id}',-1);}`:''}" title="Spalte zurück">←</span>
      <span class="kc-act${canRight?'':' disabled'}" tabindex="0" role="button" onclick="${canRight?`moveCard('${boardId}','${card.id}',1)`:''}" onkeydown="${canRight?`if(event.key==='Enter'){event.preventDefault();moveCard('${boardId}','${card.id}',1);}`:''}" title="Spalte vor">→</span>
      <span style="margin-left:auto;"></span>
      <div class="cl-check${card.done?' done':''}" onclick="quickDoneCard(event,'${boardId}','${card.id}')" title="${card.done?'Wiedereröffnen':'Erledigt'}" style="width:13px;height:13px;margin-top:0;"></div>
    </div>
  </div>`;
}

function recurLabel(r,short){
  if(!r||r.type==='none')return'';
  const WD=WEEKDAY_SHORT;
  const ORD=['','1.','2.','3.','4.','letzten'];
  const MON=MONTH_SHORT;
  const every=r.every||1;
  let base='';
  if(r.type==='daily') base=every===1?'täglich':`alle ${every} Tage`;
  else if(r.type==='weekly'){
    const days=(r.weekdays||[r.weekday||0]).map(i=>WD[i]).join(', ');
    base=every===1?`wöchentlich (${days})`:`alle ${every} Wo. (${days})`;
  }
  else if(r.type==='monthly'){
    const ord=r.weekdayOrd||-99;
    const ordLabel=ord===-1?'letzten':(ORD[ord]||'1.');
    base=r.monthType==='weekday'
      ?`monatl. (${ordLabel} ${WD[r.weekday||0]})`
      :`monatl. (am ${r.day||1}.)`;
  }
  else if(r.type==='yearly'){
    const m=MON[r.yearMonth!==undefined?r.yearMonth:0];
    base=r.monthType==='weekday'
      ?`jährl. (${r.weekdayOrd===-1?'letzter':'1.'} ${WD[r.weekday||0]} ${m})`
      :`jährl. (${r.yearDay||1}. ${m})`;
  }
  if(short)return base;
  // Append end info
  if(r.endType==='date'&&r.endDate) base+=` · bis ${fmtDate(r.endDate)}`;
  else if(r.endType==='count'&&r.endCount) base+=` · ${r.endCount}×`;
  return base;
}

function moveKbCol(boardId,colId,dir){

  [arr[i],arr[j]]=[arr[j],arr[i]];
  save();render();
  setTimeout(()=>{
    const col=document.querySelector(`.kb-col[data-col-id="${colId}"]`);

          ${WEEKDAY_NAMES.map((d,i)=>`<option value="${i}"${(rv.weekday||0)===i?' selected':''}>${d}</option>`).join('')}

      </label>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <span class="modal-label" style="margin:0;white-space:nowrap;">Alle</span>
      <input type="number" min="1" max="12" class="modal-input" style="width:60px;margin:0;" value="${rv.every||1}" onchange="card_recur_field('${boardId}','${cardId}','every',parseInt(this.value))"/>
      <span class="modal-label" style="margin:0;">Monat(e)</span>
    </div>`;
  }
  if(rv.type==='yearly'){
    h+=`<div style="margin-bottom:8px;">
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;margin-bottom:6px;flex-wrap:wrap;">
        <input type="radio" name="ytype_${cardId}" value="day" ${rv.monthType!=='weekday'?'checked':''} onchange="card_recur_field('${boardId}','${cardId}','monthType','day')"/>
        Am
        <input type="number" min="1" max="31" class="modal-input" style="width:55px;margin:0;" value="${rv.yearDay||rv.anchorDay||1}" onchange="card_recur_field('${boardId}','${cardId}','yearDay',parseInt(this.value))"/>
        .
        <select class="modal-select" style="width:auto;margin:0;padding:3px 6px;" onchange="card_recur_field('${boardId}','${cardId}','yearMonth',parseInt(this.value))">
          ${MONTH_NAMES.map((m,i)=>`<option value="${i}"${(rv.yearMonth!==undefined?rv.yearMonth:rv.anchorMonth||0)===i?' selected':''}>${m}</option>`).join('')}
        </select>
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;flex-wrap:wrap;">
        <input type="radio" name="ytype_${cardId}" value="weekday" ${rv.monthType==='weekday'?'checked':''} onchange="card_recur_field('${boardId}','${cardId}','monthType','weekday')"/>
        Am
        <select class="modal-select" style="width:auto;margin:0;padding:3px 6px;" onchange="card_recur_field('${boardId}','${cardId}','weekdayOrd',parseInt(this.value))">
          ${[1,2,3,4,-1].map(o=>`<option value="${o}"${(rv.weekdayOrd||1)===o?' selected':''}>${o===-1?'letzten':o+'.'}</option>`).join('')}
        </select>
        <select class="modal-select" style="width:auto;margin:0;padding:3px 6px;" onchange="card_recur_field('${boardId}','${cardId}','weekday',parseInt(this.value))">
          ${WEEKDAY_NAMES.map((d,i)=>`<option value="${i}"${(rv.weekday||0)===i?' selected':''}>${d}</option>`).join('')}
        </select>
        im
        <select class="modal-select" style="width:auto;margin:0;padding:3px 6px;" onchange="card_recur_field('${boardId}','${cardId}','yearMonth',parseInt(this.value))">
          ${MONTH_NAMES.map((m,i)=>`<option value="${i}"${(rv.yearMonth!==undefined?rv.yearMonth:rv.anchorMonth||0)===i?' selected':''}>${m}</option>`).join('')}
        </select>
      </label>
    </div>`;
  }
  return h;
}

let _openCardRef=null; // {boardId,cardId} of currently open card modal
function openCard(boardId,cardId){
  _openCardRef={boardId,cardId};
  if(!nodes[boardId])return;
  const b=nodes[boardId].data;
  const card=b.kbCards.find(c=>c.id===cardId);
  if(!card)return;
  const cols=b.kbCols;

  let h=`<div class="modal-hd">
    <h3><input style="font-size:15px;font-weight:500;border:none;outline:none;background:transparent;width:100%;font-family:inherit;" value="${esc(card.name)}" placeholder="Aufgabenname" onchange="card_set('${boardId}','${cardId}','name',this.value)" id="cn"/></h3>
    ${_pendingCard
      ?`<input class="alias-input" placeholder="Kürzel" maxlength="${ALIAS_MAX_LEN}" value="${esc(card.alias||'')}" onchange="setCardAlias('${boardId}','${cardId}',this.value)" title="Kürzel für Schnellnavigation"/>`
      :editMode
        ?`<input class="alias-input" placeholder="Kürzel" maxlength="${ALIAS_MAX_LEN}" value="${esc(card.alias||'')}" onchange="setCardAlias('${boardId}','${cardId}',this.value)" title="Kürzel für Schnellnavigation"/>`
        :card.alias?`<span class="alias-input" style="opacity:0.5;cursor:default;border:none;background:transparent;">${esc(card.alias)}</span>`:''}
    <button class="btn-c" onclick="closeCard()">${ICO.close(12)}</button>
  </div>`;
  h+=`<div class="modal-body">`;

  // Column
  h+=`<span class="modal-label">Spalte</span>`;
  h+=`<select class="modal-select" onchange="card_set('${boardId}','${cardId}','colId',this.value)">`;
  cols.forEach(c=>h+=`<option value="${c.id}"${card.colId===c.id?' selected':''}>${esc(c.label)}</option>`);
  h+=`</select>`;

  // Priority
  const prioMap={high:'Hoch 🔴',medium:'Mittel 🟡',low:'Niedrig 🟢'};
  h+=`<span class="modal-label">Priorität</span>
  <div style="display:flex;gap:6px;margin-bottom:10px;">
    ${['high','medium','low',''].map(p=>`
      <span onclick="card_set('${boardId}','${cardId}','priority','${p}')" style="font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;border:0.5px solid var(--border2);background:${card.priority===p?(p==='high'?'var(--redbg)':p==='medium'?'var(--amberbg)':p==='low'?'var(--tealbg)':'var(--bg3)'):'var(--bg)'};color:${card.priority===p?(p==='high'?'var(--redtxt)':p==='medium'?'var(--ambertxt)':p==='low'?'var(--tealtxt)':'var(--text2)'):'var(--text2)'};">
        ${p==='high'?'🔴 Hoch':p==='medium'?'🟡 Mittel':p==='low'?'🟢 Niedrig':'— Keine'}
      </span>`).join('')}
  </div>`;

  // Note
  h+=`<span class="modal-label">Notiz (mit Links)</span>`;
  h+=`<div class="modal-textarea" contenteditable="true" onblur="card_set('${boardId}','${cardId}','note',sanitizeHtml(this.innerHTML))" style="min-height:70px;border:0.5px solid var(--border2);border-radius:var(--r);padding:7px 9px;font-size:12px;outline:none;">${sanitizeHtml(card.note)||''}</div>`;
  h+=`<div style="margin-bottom:10px;"></div>`;

  // Tags
  h+=`<span class="modal-label">Tags</span>`;
  h+=`<div class="tags-row">`;
  globalTags.forEach(t=>{
    const sel=(card.tags||[]).includes(t.label);
    h+=`<span class="tag-pick${sel?' sel':''}" onclick="toggleCardTagById('${boardId}','${cardId}','${t.id}')">${esc(t.label)}</span>`;
  });
  h+=`<span class="tag-pick" onclick="addGlobalTag('${boardId}','${cardId}')" style="border-style:dashed;color:var(--text3);">+ Neu</span>`;
  h+=`</div>`;

  // Who
  h+=`<span class="modal-label">Verantwortlich</span>`;
  h+=`<div class="tags-row">`;
  globalPeople.forEach(p=>{
    const sel=(card.who||[]).includes(p.label);
    h+=`<span class="who-pick${sel?' sel':''}" onclick="toggleCardWhoById('${boardId}','${cardId}','${p.id}')">${esc(p.label)}</span>`;
  });
  h+=`<span class="who-pick" onclick="addGlobalPerson('${boardId}','${cardId}')" style="border-style:dashed;color:var(--text3);">+ Neu</span>`;
  h+=`</div>`;

  // Deadline
  h+=`<div class="recur-row">`;
  h+=`<div><span class="modal-label">Deadline</span><input type="date" class="modal-input" value="${card.deadline||''}" onchange="card_set('${boardId}','${cardId}','deadline',this.value)" style="margin-bottom:0;"/></div>`;

  // Recurrence
  const rv=card.recur||{type:'none'};
  h+=`<div><span class="modal-label">Wiederholung</span>
    <select class="modal-select" style="margin-bottom:0;" onchange="card_recur_type('${boardId}','${cardId}',this.value)">
      <option value="none"${rv.type==='none'?' selected':''}>keine</option>
      <option value="daily"${rv.type==='daily'?' selected':''}>täglich</option>
      <option value="weekly"${rv.type==='weekly'?' selected':''}>wöchentlich</option>
      <option value="monthly"${rv.type==='monthly'?' selected':''}>monatlich</option>
      <option value="yearly"${rv.type==='yearly'?' selected':''}>jährlich</option>
    </select>
  </div></div>`;

  h+=buildRecurrenceUI(boardId,cardId,rv);
  // ── Seriendauer ──
  const endType=rv.endType||'none';
  h+=`<div class="section-divider">Seriendauer</div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
    <span class="modal-label" style="margin:0;white-space:nowrap;">Beginn</span>
    <input type="date" class="modal-input" style="margin:0;flex:1;" value="${rv.startDate||''}" onchange="card_recur_field('${boardId}','${cardId}','startDate',this.value)"/>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">
    <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;">
      <input type="radio" name="end_${cardId}" value="none" ${endType==='none'?'checked':''} onchange="card_recur_field('${boardId}','${cardId}','endType','none')"/>
      Kein Enddatum
    </label>
    <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;">
      <input type="radio" name="end_${cardId}" value="date" ${endType==='date'?'checked':''} onchange="card_recur_field('${boardId}','${cardId}','endType','date')"/>
      Endet am
      <input type="date" class="modal-input" style="margin:0;flex:1;" value="${rv.endDate||''}" ${endType!=='date'?'disabled':''} onchange="card_recur_field('${boardId}','${cardId}','endDate',this.value)"/>
    </label>
    <label style="display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;">
      <input type="radio" name="end_${cardId}" value="count" ${endType==='count'?'checked':''} onchange="card_recur_field('${boardId}','${cardId}','endType','count')"/>
      Endet nach
      <input type="number" min="1" max="999" class="modal-input" style="width:65px;margin:0;" value="${rv.endCount||10}" ${endType!=='count'?'disabled':''} onchange="card_recur_field('${boardId}','${cardId}','endCount',parseInt(this.value))"/>
      Terminen
    </label>
  </div>`;

  // Occurrence tracking for recurring cards
  const doneOcc=card.doneOccurrences||[];
  if(rv.type!=='none'&&doneOcc.length>0){
    const sorted=[...doneOcc].sort().reverse();
    const lastDone=sorted[0];
    h+=`<div class="section-divider">Erledigte Termine <span style="font-weight:400;color:var(--text3);">${doneOcc.length}${rv.endType==='count'&&rv.endCount?'/'+rv.endCount:''}</span></div>`;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <span style="font-size:12px;color:var(--teal);">${ICO.check(11)} Zuletzt: ${fmtDate(lastDone)}</span>
      ${doneOcc.length>1?`<span style="font-size:11px;color:var(--text3);">(${sorted.slice(1,4).map(d=>fmtDate(d)).join(', ')}${doneOcc.length>4?' …':''})</span>`:''}
    </div>`;
    h+=`<button class="btn" style="font-size:11px;margin-bottom:10px;" onclick="clearOccurrences('${boardId}','${cardId}')">Verlauf zurücksetzen</button>`;
  }

  // Checklist
  h+=`<div class="section-divider">Checkliste</div>`;
  h+=`<div id="card-cl-section">`;
  const cl=card.checklist||[];
  cl.forEach(item=>{
    h+=`<div class="cl-item" style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <div class="cl-check${item.done?' done':''}" tabindex="0" role="checkbox" aria-checked="${item.done}" onclick="toggleClItem('${boardId}','${cardId}','${item.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleClItem('${boardId}','${cardId}','${item.id}');}"></div>
      <input style="flex:1;font-size:12px;border:none;outline:none;background:transparent;font-family:inherit;${item.done?'text-decoration:line-through;color:var(--text3)':'color:var(--text)'};" value="${esc(item.text)}" onchange="updateClItem('${boardId}','${cardId}','${item.id}',this.value)" onblur="if(!this.value.trim())delClItem('${boardId}','${cardId}','${item.id}')"/>
      <span tabindex="0" role="button" style="font-size:12px;color:var(--red);cursor:pointer;" onclick="delClItem('${boardId}','${cardId}','${item.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();delClItem('${boardId}','${cardId}','${item.id}');}">${ICO.close(10)}</span>
    </div>`;
  });
  h+=`</div>`;
  h+=`<button class="btn" style="font-size:11px;" onclick="addClItem('${boardId}','${cardId}')">+ Punkt</button>`;

  h+=`</div>`; // modal-body
  h+=`<div class="modal-actions">
    <button class="btn-c" onclick="flushCardInputs();card_set('${boardId}','${cardId}','archived',${!card.archived});closeCard()" style="margin-right:auto;">${card.archived?'Aus Archiv':'Archivieren'}</button>
    <button class="btn-c${card.done?' active':''}" onclick="toggleCardDone('${boardId}','${cardId}')" style="${card.done?'background:var(--tealbg);color:var(--tealtxt);border-color:var(--tealbg);':''}">
      ${card.done?ICO.check(11)+' Erledigt':'Als erledigt markieren'}
    </button>
    <button class="btn danger btn-c" onclick="deleteCard('${boardId}','${cardId}')">Löschen</button>
    <button class="btn-p" onclick="closeCard()">Fertig</button>
  </div>`;

  const container=document.getElementById('cardmodal');
  const prevModal=container.querySelector('.modal');
  const savedScroll=prevModal?prevModal.scrollTop:0;
  const isRerender=!!prevModal;

  if(isRerender){
    // Only replace modal inner content — keep overlay intact to avoid flash
    prevModal.innerHTML=h;
    if(savedScroll)prevModal.scrollTop=savedScroll;
    container.onkeydown=cardModalKeyHandler;
  } else {
    // First open: wrap in overlay+modal, clone to clear old listeners
    const wrap=`<div class="modal-overlay" onclick="closeCardIfBg(event)"><div class="modal" onclick="event.stopPropagation()">${h}</div></div>`;
    const fresh=container.cloneNode(false);
    container.parentNode.replaceChild(fresh,container);
    fresh.innerHTML=wrap;
    fresh.onkeydown=cardModalKeyHandler;
    const cnEl=document.getElementById('cn');
    if(cnEl){
      cnEl.focus();
      cnEl.addEventListener('keydown',e=>{
        if(e.key==='Enter'){e.preventDefault();closeCard();}
      });
    }
  }
  function cardModalKeyHandler(e){
    if(e.key==='Tab'){
      const modal=document.querySelector('#cardmodal .modal');
      if(!modal)return;
      const focusable=Array.from(modal.querySelectorAll('input:not([disabled]),select:not([disabled]),button,[contenteditable]'));
      const idx=focusable.indexOf(document.activeElement);
      if(idx>=0){
        e.preventDefault();
        const next=focusable[(idx+(e.shiftKey?-1:1)+focusable.length)%focusable.length];
        if(next)next.focus();
      }
    }
    if(e.key==='Escape'){e.stopPropagation();closeCard();}
    if(matchShortcut(e,'edit')){e.preventDefault();e.stopPropagation();toggleEdit();if(_openCardRef)openCard(_openCardRef.boardId,_openCardRef.cardId);}
  }
}

function flushCardInputs(){
  // Save any unsaved input values before closing/archiving
  const nameEl=document.getElementById('cn');
  if(nameEl&&_pendingCard){
    const card=getCard(_pendingCard.boardId,_pendingCard.cardId);
    if(card&&nameEl.value.trim()){card.name=nameEl.value.trim();save();_pendingCard=null;}
  }
  document.querySelectorAll('#cardmodal [contenteditable]').forEach(el=>el.blur());
}
function cleanupEmptyClItems(boardId,cardId){
  const c=getCard(boardId,cardId);
  if(c&&c.checklist){const before=c.checklist.length;c.checklist=c.checklist.filter(x=>x.text.trim());if(c.checklist.length!==before)save();}
}
function closeCard(){
  flushCardInputs();
  // Cleanup empty checklist items
  if(_openCardRef)cleanupEmptyClItems(_openCardRef.boardId,_openCardRef.cardId);
  _openCardRef=null;
  // Remove card if name is empty (was never filled in)
  if(_pendingCard){
    const b=nodes[_pendingCard.boardId];
    if(b){
      const card=b.data.kbCards.find(c=>c.id===_pendingCard.cardId);
      if(card&&!card.name.trim()){
        b.data.kbCards=b.data.kbCards.filter(c=>c.id!==_pendingCard.cardId);
        save();
      }
    }
    _pendingCard=null;
  }
  const overlay=document.querySelector('#cardmodal .modal-overlay');
  if(overlay){
    overlay.classList.add('closing');
    setTimeout(()=>{document.getElementById('cardmodal').innerHTML='';render();},ANIM_EXIT_MS);
  } else {document.getElementById('cardmodal').innerHTML='';render();}
}
function closeCardIfBg(e){if(e.target===e.currentTarget)closeCard();}

function card_set(boardId,cardId,field,val){
  const c=getCard(boardId,cardId);
  if(!c)return;
  c[field]=val;save();
  if(field==='name'&&val.trim())_pendingCard=null; // name set, no longer pending
  // Re-render modal for visual fields
  if(field==='priority'||field==='archived')openCard(boardId,cardId);
}
function card_recur_type(boardId,cardId,type){
  const card=getCard(boardId,cardId);
  if(!card)return;
  const anchor=card.deadline?new Date(card.deadline):new Date();
  const today=today0();
  card.recur={
    type,
    every:1,
    weekdays:[anchor.getDay()===0?6:anchor.getDay()-1], // Mon=0
    weekday:anchor.getDay()===0?6:anchor.getDay()-1,
    weekdayOrd:1,
    day:anchor.getDate(),
    monthType:'day',
    yearMonth:anchor.getMonth(),
    yearDay:anchor.getDate(),
    anchorMonth:anchor.getMonth(),
    anchorDay:anchor.getDate(),
    endType:'none',
    endDate:'',
    endCount:10,
    startDate:today.toISOString().split('T')[0],
  };
  save();openCard(boardId,cardId);
}
function card_recur_field(boardId,cardId,field,val){
  const card=getCard(boardId,cardId);
  if(!card)return;
  if(!card.recur)card.recur={type:'none'};
  card.recur[field]=val;
  save();
  // Only re-open modal for fields that change the UI structure
  const rerenderFields=['type','monthType','endType'];
  if(rerenderFields.includes(field))openCard(boardId,cardId);
}
function toggleWeekday(boardId,cardId,day,checked){
  const card=getCard(boardId,cardId);
  if(!card||!card.recur)return;
  if(!card.recur.weekdays)card.recur.weekdays=[card.recur.weekday||0];
  if(checked){if(!card.recur.weekdays.includes(day))card.recur.weekdays.push(day);}
  else{card.recur.weekdays=card.recur.weekdays.filter(d=>d!==day);if(card.recur.weekdays.length===0)card.recur.weekdays=[0];}
  card.recur.weekday=card.recur.weekdays[0];
  save();
}
function toggleCardTagById(boardId,cardId,tagId){
  const t=globalTags.find(x=>x.id===tagId);if(!t)return;
  toggleCardTag(boardId,cardId,t.label);
}
function toggleCardWhoById(boardId,cardId,whoId){
  const p=globalPeople.find(x=>x.id===whoId);if(!p)return;
  toggleCardWho(boardId,cardId,p.label);
}
function toggleCardTag(boardId,cardId,tag){
  const c=getCard(boardId,cardId);
  if(!c)return;if(!c.tags)c.tags=[];
  c.tags=c.tags.includes(tag)?c.tags.filter(t=>t!==tag):[...c.tags,tag];
  save();openCard(boardId,cardId);
}
function toggleCardWho(boardId,cardId,who){
  const c=getCard(boardId,cardId);
  if(!c)return;if(!c.who)c.who=[];
  c.who=c.who.includes(who)?c.who.filter(w=>w!==who):[...c.who,who];
  save();openCard(boardId,cardId);
}
function addGlobalTag(boardId,cardId){
  smodal('Neuer Tag',[{label:'Name',id:'l',ph:'z.B. Reporting'}],v=>{
    if(!v.l)return;
    if(!globalTags.find(t=>t.label===v.l))globalTags.push({id:uid(),label:v.l});
    toggleCardTag(boardId,cardId,v.l);
  });
}
function addGlobalPerson(boardId,cardId){
  smodal('Neue Person',[{label:'Name',id:'l',ph:'z.B. Max'}],v=>{
    if(!v.l)return;
    if(!globalPeople.find(p=>p.label===v.l))globalPeople.push({id:uid(),label:v.l});
    toggleCardWho(boardId,cardId,v.l);
  });
}
function addClItem(boardId,cardId){
  const c=getCard(boardId,cardId);
  if(!c)return;if(!c.checklist)c.checklist=[];
  c.checklist.push({id:uid(),text:'',done:false});
  save();openCard(boardId,cardId);
  // Auto-focus the new empty input so onblur cleanup works
  setTimeout(()=>{const inputs=document.querySelectorAll('#card-cl-section input');if(inputs.length)inputs[inputs.length-1].focus();},FOCUS_RESTORE_MS);
}
function toggleClItem(boardId,cardId,itemId){
  const c=getCard(boardId,cardId);
  if(!c)return;const i=c.checklist.find(x=>x.id===itemId);if(!i)return;
  i.done=!i.done;save();
  // Update only the checklist section instead of full modal re-render
  const container=document.getElementById('card-cl-section');
  if(container){
    let h='';
    (c.checklist||[]).forEach(item=>{
      h+=`<div class="cl-item">
        <div class="cl-check${item.done?' done':''}" tabindex="0" role="checkbox" aria-checked="${item.done}" onclick="toggleClItem('${boardId}','${cardId}','${item.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleClItem('${boardId}','${cardId}','${item.id}');}"></div>
        <input style="flex:1;border:none;outline:none;background:transparent;font-size:12px;font-family:inherit;${item.done?'text-decoration:line-through;color:var(--text3)':''}" value="${esc(item.text)}" onchange="updateClItem('${boardId}','${cardId}','${item.id}',this.value)" onblur="if(!this.value.trim())delClItem('${boardId}','${cardId}','${item.id}')"/>
        <span tabindex="0" role="button" style="font-size:12px;color:var(--red);cursor:pointer;" onclick="delClItem('${boardId}','${cardId}','${item.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();delClItem('${boardId}','${cardId}','${item.id}');}">${ICO.close(10)}</span>
      </div>`;
    });
    container.innerHTML=h;
  } else {openCard(boardId,cardId);}
}
function updateClItem(boardId,cardId,itemId,val){
  const c=getCard(boardId,cardId);if(!c)return;
  if(!val.trim()){delClItem(boardId,cardId,itemId);return;}
  const i=c.checklist.find(x=>x.id===itemId);if(i)i.text=val;save();
}
function delClItem(boardId,cardId,itemId){
  const c=getCard(boardId,cardId);
  if(!c)return;c.checklist=c.checklist.filter(x=>x.id!==itemId);save();openCard(boardId,cardId);
}
function setCardDone(boardId,cardId,toggle){
  const card=getCard(boardId,cardId);
  if(!card)return card;
  card.done=toggle?!card.done:true;
  card.doneDate=card.done?getTodayStr():'';
  const cols=nodes[boardId].data.kbCols;
  if(card.done&&cols.length>0) card.colId=cols[cols.length-1].id;
  else if(!card.done&&cols.length>0) card.colId=cols[0].id;
  save();
  return card;
}
function toggleCardDone(boardId,cardId){
  if(!setCardDone(boardId,cardId,true))return;
  openCard(boardId,cardId);
}
function moveCard(boardId,cardId,dir){
  const b=nodes[boardId].data;
  const card=getCard(boardId,cardId);
  if(!card)return;
  const cols=b.kbCols;
  const idx=cols.findIndex(c=>c.id===card.colId);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=cols.length)return;
  card.colId=cols[newIdx].id;
  save();render();
}
function moveCardToBoard(sourceBoardId,cardId,targetBoardId,colName){
  const src=nodes[sourceBoardId];const tgt=nodes[targetBoardId];
  if(!src||!tgt)return false;
  const card=src.data.kbCards.find(c=>c.id===cardId);
  if(!card)return false;
  // Resolve target column
  const tgtCols=tgt.data.kbCols;
  let targetCol=tgtCols[0];
  if(colName){
    const cl=colName.toLowerCase();
    const match=tgtCols.find(c=>c.label.toLowerCase()===cl)||tgtCols.find(c=>c.label.toLowerCase().startsWith(cl));
    if(match)targetCol=match;
  }
  if(!targetCol)return false;
  // Move
  src.data.kbCards=src.data.kbCards.filter(c=>c.id!==cardId);
  card.colId=targetCol.id;
  tgt.data.kbCards.push(card);
  save();render();
  return true;
}
function quickDoneCard(e,boardId,cardId){
  const el=e&&e.target?e.target.closest('.cl-check'):null;
  if(el){el.classList.add('anim-done');setTimeout(()=>el.classList.remove('anim-done'),ANIM_CHECK_MS);}
  const card=getCard(boardId,cardId);
  if(!card)return;
  if(card.recur&&card.recur.type!=='none'){
    if(!card.doneOccurrences)card.doneOccurrences=[];
    const todayStr=getTodayStr();
    if(!card.doneOccurrences.includes(todayStr))card.doneOccurrences.push(todayStr);
    save();setTimeout(()=>render(),RENDER_DELAY_MS);
  } else {
    if(!setCardDone(boardId,cardId,true))return;
    setTimeout(()=>render(),RENDER_DELAY_MS);
  }
}
function deleteCard(boardId,cardId){
  if(!confirm(UI.confirmDeleteCard))return;
  nodes[boardId].data.kbCards=nodes[boardId].data.kbCards.filter(c=>c.id!==cardId);
  closeCard();
}

function renderChecklists(node){
  const{checklists}=node.data;
  let h=`<div style="margin-bottom:10px;"><button class="btn edit-only" onclick="addChecklist('${node.id}')">+ Checkliste</button></div>`;
  if(checklists.length===0) h+=emptyState(ICO.check(32),UI.emptyChecklists);
  checklists.forEach(cl=>{
    const done=cl.items.filter(i=>i.done).length;
    h+=`<div class="card">
      <div class="cardhd">
        ${editMode?`<input class="ni" value="${esc(cl.label)}" onchange="renameCl('${node.id}','${cl.id}',this.value)" style="font-size:12px;font-weight:500;"/>`:`<span>${esc(cl.label)}</span>`}
        <span style="font-size:10px;color:var(--text3);font-weight:400;">${done}/${cl.items.length}</span>
        ${editMode?`<span class="edel" tabindex="0" role="button" style="display:inline;" onclick="delChecklist('${node.id}','${cl.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();delChecklist('${node.id}','${cl.id}');}">${ICO.close(10)}</span>`:''}
      </div>
      <div class="cl-list">`;
    cl.items.forEach(item=>{
      h+=`<div class="cl-item">
        <div class="cl-check${item.done?' done':''}" tabindex="0" role="checkbox" aria-checked="${item.done}" onclick="toggleCl('${node.id}','${cl.id}','${item.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleCl('${node.id}','${cl.id}','${item.id}');}"></div>
        <span class="cl-text${item.done?' done':''}">${esc(item.text)}</span>
        ${editMode?`<span tabindex="0" role="button" style="font-size:12px;color:var(--red);cursor:pointer;" onclick="delClFromList('${node.id}','${cl.id}','${item.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();delClFromList('${node.id}','${cl.id}','${item.id}');}">${ICO.close(10)}</span>`:''}
      </div>`;
    });
    h+=`</div>
      <div style="padding:6px 13px;border-top:0.5px solid var(--border);">
        <button class="addfull edit-only" onclick="addClItem2('${node.id}','${cl.id}')">+ Punkt</button>
      </div>
    </div>`;
  });
  return h;
}
function addChecklist(boardId){
  smodal('Neue Checkliste',[{label:'Name',id:'l',ph:'z.B. Onboarding Schritte'}],v=>{
    if(!v.l)return;
    nodes[boardId].data.checklists.push({id:uid(),label:v.l,items:[]});
    save();render();
  });
}
function renameCl(boardId,clId,val){const c=nodes[boardId].data.checklists.find(x=>x.id===clId);if(c)c.label=val;save();}
function delChecklist(boardId,clId){nodes[boardId].data.checklists=nodes[boardId].data.checklists.filter(c=>c.id!==clId);save();render();}
function toggleCl(boardId,clId,itemId){const cl=nodes[boardId].data.checklists.find(x=>x.id===clId);if(!cl)return;const i=cl.items.find(x=>x.id===itemId);if(i)i.done=!i.done;save();render();}
function delClFromList(boardId,clId,itemId){const cl=nodes[boardId].data.checklists.find(x=>x.id===clId);if(cl)cl.items=cl.items.filter(i=>i.id!==itemId);save();render();}
function addClItem2(boardId,clId){
  smodal('Neuer Punkt',[{label:'Text',id:'t',ph:'z.B. Vertrag prüfen'}],v=>{
    if(!v.t)return;
    const cl=nodes[boardId].data.checklists.find(x=>x.id===clId);
    if(cl)cl.items.push({id:uid(),text:v.t,done:false});
    save();render();
  });
}

function hasCardsInTree(nodeId){
  const n=nodes[nodeId];if(!n)return false;
  if(n.type==='board')return n.data.kbCards.some(c=>!c.archived);
  if(n.type==='matrix'){
    for(const c of Object.values(n.data.cells)){
      if(c.boardId&&hasCardsInTree(c.boardId))return true;
      if(c.matrixId&&hasCardsInTree(c.matrixId))return true;
    }
  }
  return false;
}
function toggleFreqView(nodeId){
  const key='_freqView_'+nodeId;
  currentTab[key]=!currentTab[key];
  render();
}

// ═══════════════════════════════════════════════════════
// FREQUENCY MATRIX
// ═══════════════════════════════════════════════════════
const FREQ_CATEGORIES=[
  {key:'daily',label:'Täglich',test:c=>c.recur&&c.recur.type==='daily'},
  {key:'weekly',label:'Wöchentl.',test:c=>c.recur&&c.recur.type==='weekly'},
  {key:'monthly',label:'Monatl.',test:c=>c.recur&&c.recur.type==='monthly'},
  {key:'yearly',label:'Jährl.',test:c=>c.recur&&c.recur.type==='yearly'},
  {key:'once',label:'Einmalig',test:c=>c.deadline&&(!c.recur||c.recur.type==='none')},
  {key:'nodate',label:'Ohne Zeit',test:c=>!c.deadline&&(!c.recur||c.recur.type==='none')},
];

function renderFrequencyMatrix(allCards,startNodeId){
  // Collect unique boards (rows) from allCards
  const boardMap={};
  allCards.forEach(({card,boardId,boardLabel,path})=>{
    if(!boardMap[boardId])boardMap[boardId]={id:boardId,label:boardLabel,path:path||[],cards:[]};
    boardMap[boardId].cards.push(card);
  });
  const boards=Object.values(boardMap);
  if(boards.length===0)return'<div style="padding:12px;font-size:12px;color:var(--text3);text-align:center;">Keine Aufgaben</div>';

  // Determine which frequency columns have data
  const activeCols=FREQ_CATEGORIES.filter(cat=>allCards.some(({card})=>cat.test(card)));
  if(activeCols.length===0)return'';

  const cw=appSettings.colWidthEm||7;
  const gc=`${cw}em repeat(${activeCols.length},minmax(${cw}em,1fr))`;
  let h=`<div style="overflow-x:auto;margin-top:8px;"><div class="freq-grid" style="grid-template-columns:${gc};min-width:fit-content;">`;
  // Header row
  h+=`<div class="freq-hd corner"></div>`;
  activeCols.forEach(cat=>{h+=`<div class="freq-hd">${cat.label}</div>`;});
  // Data rows
  boards.forEach(board=>{
    // Row header: board name (clickable → navigate)
    const pathStr=board.path.filter(p=>p.type==='matrix').map(p=>esc(p.label)).join(' › ');
    h+=`<div class="freq-row-hd" onclick="navigateToBoardFromFreq('${board.id}')" title="${esc(pathStr?pathStr+' › '+board.label:board.label)}">${esc(board.label)}</div>`;
    // Cells
    activeCols.forEach(cat=>{
      const matching=board.cards.filter(c=>cat.test(c));
      const count=matching.length;
      if(count===0){
        h+=`<div class="freq-cell"></div>`;
      } else {
        const intensity=count<=2?'freq-1':count<=5?'freq-2':'freq-3';
        h+=`<div class="freq-cell"><span class="freq-badge ${intensity}" onclick="showFreqFlyout(event,'${board.id}','${cat.key}')">${count}</span></div>`;
      }
    });
  });
  h+=`</div></div>`;
  // Flyout container
  h+=`<div id="freq-flyout-container"></div>`;
  return h;
}

function navigateToBoardFromFreq(boardId){
  // Find parent matrix cell that contains this board and navigate
  for(const[nid,n]of Object.entries(nodes)){
    if(n.type!=='matrix')continue;
    for(const[k,c]of Object.entries(n.data.cells)){
      if(c.boardId===boardId){
        const[rowId,colId]=k.split('-');
        openCell(nid,rowId,colId,nodes[boardId].label,'board');
        return;
      }
    }
  }
}

function showFreqFlyout(e,boardId,catKey){
  e.stopPropagation();
  const board=nodes[boardId];if(!board)return;
  const cat=FREQ_CATEGORIES.find(c=>c.key===catKey);if(!cat)return;
  const cards=board.data.kbCards.filter(c=>!c.archived&&!c.done&&cat.test(c));
  if(cards.length===0)return;

  // Group by path depth (for hierarchical display we show the board's own cards)
  let h=`<div class="freq-flyout" style="left:${Math.min(e.clientX,window.innerWidth-380)}px;top:${Math.min(e.clientY,window.innerHeight-300)}px;">`;
  h+=`<div class="freq-flyout-hd"><span style="cursor:pointer;text-decoration:underline;" onclick="event.stopPropagation();closeFreqFlyout();navigateToBoardFromFreq('${boardId}')">${esc(board.label)}</span> <span>· ${cat.label} (${cards.length})</span></div>`;
  h+=`<div class="freq-group">`;
  cards.forEach(card=>{
    const detail=cat.key==='weekly'&&card.recur?.weekdays?` (${card.recur.weekdays.map(d=>WEEKDAY_SHORT[d]).join(',')})`
      :cat.key==='monthly'?` (${card.recur?.day||1}.)`
      :card.deadline?` · ${fmtDate(card.deadline)}`:'';
    h+=`<div class="freq-group-item" onclick="event.stopPropagation();closeFreqFlyout();openCard('${boardId}','${card.id}')">${esc(card.name||'(ohne Name)')}${detail}</div>`;
  });
  h+=`</div></div>`;

  const container=document.getElementById('freq-flyout-container');
  if(container)container.innerHTML=h;
  // Close on outside click
  const close=ev=>{if(!ev.target.closest('.freq-flyout')){closeFreqFlyout();document.removeEventListener('click',close);}};
  setTimeout(()=>document.addEventListener('click',close),0);
}
function closeFreqFlyout(){const c=document.getElementById('freq-flyout-container');if(c)c.innerHTML='';}

function renderTaskOverview(startNodeId){
  const today=today0();
  // Collect all cards from all boards in tree
  const allCards=[];
  function collectBoards(nodeId,path){
    const n=nodes[nodeId];if(!n)return;
    const curPath=[...path,{id:nodeId,label:n.label,type:n.type}];
    if(n.type==='board'){
      n.data.kbCards.filter(c=>{
        if(c.archived||c.done)return false;
        if(c.recur&&c.recur.endType==='count'&&c.recur.endCount&&c.recur.startDate){
          const sd=day0(c.recur.startDate);
          const now=today0();
          let count=0;const d=new Date(sd);
          while(d<=now){if(recurFiresOn(c.recur,d))count++;d.setDate(d.getDate()+1);}
          if(count>=c.recur.endCount)return false;
        }
        return true;
      }).forEach(c=>{allCards.push({card:c,boardId:n.id,boardLabel:n.label,path:curPath});});
    }
    if(n.type==='matrix'){
      Object.values(n.data.cells).forEach(cell=>{
        if(cell.boardId)collectBoards(cell.boardId,curPath);
        if(cell.matrixId)collectBoards(cell.matrixId,curPath);
      });
    }
  }
  collectBoards(startNodeId||rootId,[]);

  // For each daily col, filter by explicit colType config
  function getTimeRange(type){
    const s=new Date(today),e=new Date(today);
    if(type==='today') return {s,e};
    if(type==='thisweek'){
      s.setDate(today.getDate()-((today.getDay()+6)%7)); // Mon
      e.setDate(s.getDate()+6); return {s,e};
    }
    if(type==='nextweek'){
      s.setDate(today.getDate()-((today.getDay()+6)%7)+7);
      e.setDate(s.getDate()+6); return {s,e};
    }
    if(type==='thismonth'){
      s.setDate(1);
      e.setFullYear(today.getFullYear(),today.getMonth()+1,0); return {s,e};
    }
    if(type==='nextmonth'){
      s.setFullYear(today.getFullYear(),today.getMonth()+1,1);
      e.setFullYear(today.getFullYear(),today.getMonth()+2,0); return {s,e};
    }
    if(type==='thisquarter'){
      const q=Math.floor(today.getMonth()/3);
      s.setMonth(q*3,1);
      e.setMonth(q*3+3,0); return {s,e};
    }
    if(type==='thisyear'){
      s.setMonth(0,1);e.setMonth(11,31); return {s,e};
    }
    if(type==='nextyear'){
      s.setFullYear(today.getFullYear()+1,0,1);
      e.setFullYear(today.getFullYear()+1,11,31); return {s,e};
    }
    return null;
  }
  function cardFitsCol(card,colIdx){
    const col=dailyCols[colIdx];
    const type=col.type||'today';
    // "nodate": cards without deadline and without recurrence
    if(type==='nodate'){
      return !card.deadline&&(!card.recur||card.recur.type==='none');
    }
    const range=getTimeRange(type);
    if(!range)return false;
    const{s,e}=range;
    const isRecur=card.recur&&card.recur.type!=='none';
    let dlDate=card.deadline?new Date(card.deadline):null;
    if(dlDate){dlDate=day0(dlDate);}
    function inRange(d){return d&&d>=s&&d<=e;}
    if(type==='today'){
      if(dlDate&&sameDay(dlDate,today))return true;
      if(isRecur&&recurFiresOn(card.recur,today))return true;
      return false;
    }
    if(inRange(dlDate))return true;
    if(isRecur&&recurFiresInRange(card.recur,s,e))return true;
    return false;
  }

  const _freqView=currentTab['_freqView_'+(startNodeId||rootId)];
  let h=`<div class="daily-wrap">
    <div class="daily-title">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="vertical-align:-2px;margin-right:4px;"><line x1="2" y1="4" x2="12" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="2" y1="7.5" x2="12" y2="7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="2" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>${_freqView?'Intervallmatrix':'Aufgabenübersicht'}
      <span class="freq-toggle${_freqView?' active':''}" onclick="toggleFreqView('${startNodeId||rootId}')" title="${_freqView?'Spalten-Ansicht':'Intervallmatrix'}"><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg></span>
      ${!_freqView?`<button class="btn edit-only" style="font-size:11px;margin-left:auto;" onclick="addDailyCol()">+ Spalte</button>`:''}
    </div>`;
  if(_freqView){
    h+=renderFrequencyMatrix(allCards,startNodeId||rootId);
    h+=`</div>`;
    return h;
  }
  h+=`<div class="daily-cols">`;

  dailyCols.forEach((col,idx)=>{
    const colType=col.type||'today';
    const colRange=getTimeRange(colType);
    const items=allCards.filter(({card})=>{
      if(!cardFitsCol(card,idx))return false;
      // For recurring tasks: hide if all occurrences in this range are done
      const isRecur=card.recur&&card.recur.type!=='none';
      if(isRecur&&colRange){
        if(colType==='today'){
          const todayStr=getTodayStr();
          if(isOccurrenceDone(card,todayStr))return false;
        } else {
          if(allOccurrencesDoneInRange(card,colRange.s,colRange.e))return false;
        }
      }
      return true;
    });
    const typeLabel=DCTYPE_LABELS[col.type||'today']||col.type||'';
    const _dce=(appSettings.vis||{}).dailyColEdit||'edit';
    const _dceShow=_dce==='always'||(_dce==='edit'&&editMode);
    h+=`<div class="daily-col" data-dcol-id="${col.id}">
      <div class="daily-col-hd" ${_dceShow?`tabindex="0" onkeydown="dailyColKeydown(event,'${col.id}')"`:''}>
        <div style="flex:1;min-width:0;">
          ${_dceShow
            ?`<input class="ni" value="${esc(col.label)}" onchange="renameDailyCol('${col.id}',this.value)" style="font-size:0.75em;font-weight:500;width:100%;" onclick="event.stopPropagation()"/>`
            :`<span style="font-size:0.75em;font-weight:500;">${esc(col.label)}</span>`}
          <div style="font-size:0.625em;color:var(--text3);margin-top:0.1em;">${typeLabel}</div>
        </div>
        <span style="font-size:0.625em;color:var(--text3);margin-left:0.3em;">${items.length}</span>
        ${_dceShow?`<button class="hdr-arr" tabindex="0" onclick="moveDailyCol('${col.id}',-1)" title="Nach links"><svg width="7" height="8" viewBox="0 0 7 8"><path d="M6 1L2 4l4 3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="hdr-arr" tabindex="0" onclick="moveDailyCol('${col.id}',1)" title="Nach rechts"><svg width="7" height="8" viewBox="0 0 7 8"><path d="M1 1l4 3-4 3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button>`:''}
        ${_dceShow?`<span tabindex="0" style="font-size:0.75em;color:var(--text2);cursor:pointer;margin-left:0.3em;" onclick="editDailyCol('${col.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();editDailyCol('${col.id}');}" title="Zeitfenster ändern">⚙</span>`:''}
        ${_dceShow?`<span class="delbtn" style="display:inline;margin-left:0.15em;" onclick="delDailyCol('${col.id}')">${ICO.close(10)}</span>`:''}
      </div>`;
    if(items.length===0){
      h+=`<div style="padding:10px 12px;font-size:12px;color:var(--text3);">Nichts fällig</div>`;
    } else {
      items.forEach(({card,boardId,boardLabel})=>{
        const isRecur=card.recur&&card.recur.type!=='none';
        const dlDate=card.deadline?new Date(card.deadline):null;
        const isOverdue=dlDate&&!card.done&&day0(dlDate)<today;
        h+=`<div class="daily-item" data-prio="${card.priority||''}" style="${isOverdue?'border-left-color:var(--red);':''}">
          <div class="task-check" onclick="quickDoneFromDaily(event,'${boardId}','${card.id}')" title="Erledigt markieren" style="flex-shrink:0;margin-top:3px;cursor:pointer;"></div>
          <div style="flex:1;min-width:0;cursor:pointer;" tabindex="0" role="link" onclick="openCardFromDaily('${boardId}','${card.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();openCardFromDaily('${boardId}','${card.id}');}">
            <div class="di-name" style="display:flex;align-items:flex-start;${isOverdue?'color:var(--red);':''}">${isOverdue?ICO.warn(10)+' ':''}${esc(card.name)||'(ohne Name)'}</div>
            <div class="di-from">
              ${esc(boardLabel)}${card.deadline?' · '+fmtDate(card.deadline):''}${isOverdue?' · <span style="color:var(--red);">überfällig</span>':''}
              ${isRecur?`<span style="color:var(--teal);">· ${ICO.recur(10)} ${recurLabel(card.recur,true)}</span>`:''}
            </div>
          </div>
          ${(card.tags||[]).slice(0,2).map(t=>`<span class="kc-tag" style="font-size:9px;">${esc(t)}</span>`).join('')}
        </div>`;
      });
    }
    h+=`</div>`;
  });
  if(editMode)h+=`<div style="min-width:160px;flex-shrink:0;padding:7px;"><button class="addfull" style="height:48px;" onclick="addDailyCol()">+ Spalte</button></div>`;
  h+=`</div></div>`;
  return h;
}

function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function recurFiresOn(r,date){
  if(!r||r.type==='none')return false;
  // Check endType gates
  if(r.endType==='date'&&r.endDate){
    const ed=day0(r.endDate);
    if(date>ed)return false;
  }
  if(r.startDate){
    const sd=day0(r.startDate);
    if(date<sd)return false;
  }
  const every=r.every||1;
  if(r.type==='daily'){
    if(!r.startDate)return true;
    const sd=day0(r.startDate);
    const diff=Math.round((date-sd)/(1000*60*60*24));
    return diff>=0&&diff%every===0;
  }
  if(r.type==='weekly'){
    // weekdays array (Mon=0..Sun=6), JS getDay: Sun=0..Sat=6
    const wd=r.weekdays||(r.weekday!==undefined?[r.weekday]:[0]);
    const jsDay=date.getDay(); // 0=Sun
    // Convert our Mon=0 to JS: Mon=1,Tue=2,...Sun=0
    const ourDay=jsDay===0?6:jsDay-1;
    if(!wd.includes(ourDay))return false;
    if(every===1)return true;
    // Check week interval from startDate
    if(!r.startDate)return true;
    const sd=day0(r.startDate);
    const dayDiff=Math.round((Date.UTC(date.getFullYear(),date.getMonth(),date.getDate())-Date.UTC(sd.getFullYear(),sd.getMonth(),sd.getDate()))/(1000*60*60*24));
    const weekDiff=Math.floor(dayDiff/7);
    return weekDiff>=0&&weekDiff%every===0;
  }
  if(r.type==='monthly'){
    let fires=false;
    if(r.monthType==='weekday'){
      const wd=r.weekday||0;const ord=r.weekdayOrd||1;const jsWd=wd===6?0:wd+1;
      if(ord===-1){const last=new Date(date.getFullYear(),date.getMonth()+1,0);while(last.getDay()!==jsWd)last.setDate(last.getDate()-1);fires=sameDay(date,last);}
      else{const first=new Date(date.getFullYear(),date.getMonth(),1);let count=0;const d=new Date(first);while(d.getMonth()===date.getMonth()){if(d.getDay()===jsWd){count++;if(count===ord){fires=sameDay(date,d);break;}}d.setDate(d.getDate()+1);}}
    } else {fires=date.getDate()===(r.day||1);}
    if(!fires)return false;
    if(every===1)return true;
    if(!r.startDate)return true;
    const sd=day0(r.startDate);
    const mDiff=(date.getFullYear()-sd.getFullYear())*12+(date.getMonth()-sd.getMonth());
    return mDiff>=0&&mDiff%every===0;
  }
  if(r.type==='yearly'){
    const month=r.yearMonth!==undefined?r.yearMonth:(r.anchorMonth||0);
    if(date.getMonth()!==month)return false;
    let fires=false;
    if(r.monthType==='weekday'){
      const wd=r.weekday||0;const ord=r.weekdayOrd||1;const jsWd=wd===6?0:wd+1;
      if(ord===-1){const last=new Date(date.getFullYear(),month+1,0);while(last.getDay()!==jsWd)last.setDate(last.getDate()-1);fires=sameDay(date,last);}
      else{const first=new Date(date.getFullYear(),month,1);let count=0;const d=new Date(first);while(d.getMonth()===month){if(d.getDay()===jsWd){count++;if(count===ord){fires=sameDay(date,d);break;}}d.setDate(d.getDate()+1);}}
    } else {fires=date.getDate()===(r.yearDay||r.anchorDay||1);}
    if(!fires)return false;
    if(every===1)return true;
    if(!r.startDate)return true;
    const sd=day0(r.startDate);
    const yDiff=date.getFullYear()-sd.getFullYear();
    return yDiff>=0&&yDiff%every===0;
  }
  return false;
}
function recurFiresInRange(r,start,end){
  if(!r||r.type==='none')return false;
  // endCount: check if we'd exceed count by start of range
  if(r.endType==='count'&&r.endCount&&r.startDate){
    // Count how many times it has already fired before this range
    const sd=day0(r.startDate);
    let count=0;
    const d2=new Date(sd);
    while(d2<start){if(recurFiresOn(r,d2))count++;d2.setDate(d2.getDate()+1);}
    if(count>=r.endCount)return false;
  }
  const d=new Date(start);
  while(d<=end){if(recurFiresOn(r,d))return true;d.setDate(d.getDate()+1);}
  return false;
}

function isOccurrenceDone(card,dateStr){
  return(card.doneOccurrences||[]).includes(dateStr);
}
function getOccurrenceDatesInRange(card,start,end){
  const dates=[];
  if(!card.recur||card.recur.type==='none')return dates;
  const d=new Date(start);
  while(d<=end){
    if(recurFiresOn(card.recur,d))dates.push(d.toISOString().split('T')[0]);
    d.setDate(d.getDate()+1);
  }
  return dates;
}
function allOccurrencesDoneInRange(card,start,end){
  const dates=getOccurrenceDatesInRange(card,start,end);
  if(dates.length===0)return false;
  return dates.every(d=>isOccurrenceDone(card,d));
}

// MATRIX CELL KEYBOARD NAVIGATION
function mcellKeydown(e,el){
  if(e.key==='Enter'){
    e.preventDefault();
    const t=el.dataset;
    if(t.enterType)iconClick(t.enterNode,t.enterRow,t.enterCol,t.enterType,t.enterLbl);
    return;
  }
  // Shift+Arrow in edit mode: reorder row/col from within cells
  if(editMode&&e.shiftKey&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    const nodeId=el.dataset.node;
    if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
      e.preventDefault();e.stopPropagation();
      moveCol(nodeId,el.dataset.col,e.key==='ArrowLeft'?-1:1,'cell',el.dataset.row);
      return;
    }
    if(e.key==='ArrowUp'||e.key==='ArrowDown'){
      e.preventDefault();e.stopPropagation();
      moveRow(nodeId,el.dataset.row,e.key==='ArrowUp'?-1:1,'cell',el.dataset.col);
      return;
    }
  }
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab'].includes(e.key)){
    e.preventDefault();
    const nodeId=el.dataset.node;
    const n=nodes[nodeId];if(!n||n.type!=='matrix')return;
    const{rows,cols}=n.data;
    const ri=rows.findIndex(r=>r.id===el.dataset.row);
    const ci=cols.findIndex(c=>c.id===el.dataset.col);
    if(ri<0||ci<0)return;
    let nr=ri,nc=ci;
    if(e.key==='ArrowUp')nr=Math.max(0,ri-1);
    else if(e.key==='ArrowDown')nr=Math.min(rows.length-1,ri+1);
    else if(e.key==='ArrowLeft')nc=Math.max(0,ci-1);
    else if(e.key==='ArrowRight')nc=Math.min(cols.length-1,ci+1);
    else if(e.key==='Tab'){
      if(e.shiftKey){nc--;if(nc<0){nc=cols.length-1;nr--;}}
      else{nc++;if(nc>=cols.length){nc=0;nr++;}}
      if(nr<0||nr>=rows.length)return;
    }
    const target=document.querySelector(`.mcell[data-node="${nodeId}"][data-row="${rows[nr].id}"][data-col="${cols[nc].id}"]`);
    if(target)target.focus();
  }
  // Escape: go up one level
  if(e.key==='Escape'&&stack.length>1){e.preventDefault();navTo(stack.length-2);}
  // B=Board, M=Matrix, I=Info, C=Checklists
  // Edit mode: create if missing, open if exists
  // View mode: open only if exists
  const _ckeys={b:'board',m:'matrix',i:'info',c:'checklists'};
  const _ck=_ckeys[e.key.toLowerCase()];
  if(_ck&&!e.shiftKey&&!e.ctrlKey&&!e.altKey){
    e.preventDefault();
    const t=el.dataset;
    const _cell=getCell(t.node,`${t.row}-${t.col}`);
    const _has=(_cell.features||[]).includes(_ck);
    if(_has){
      // Feature exists → navigate into it
      iconClick(t.node,t.row,t.col,_ck,esc(t.enterLbl||''));
    } else if(editMode){
      // Edit mode + feature missing → create it
      iconClick(t.node,t.row,t.col,_ck,esc(t.enterLbl||''));
    }
    // View mode + missing → do nothing
  }
  // z=neue Zeile, s=neue Spalte (edit mode, no modifiers)
  if(editMode&&!e.shiftKey&&!e.ctrlKey&&!e.altKey&&(e.key==='z'||e.key==='s')){
    e.preventDefault();
    const nodeId=el.dataset.node;
    if(e.key==='z')addRow(nodeId);
    else addCol(nodeId);
  }
  // Ctrl+Shift+Z=Zeile löschen, Ctrl+Shift+S=Spalte löschen
  if(editMode&&e.ctrlKey&&e.shiftKey&&(e.key==='Z'||e.key==='S')){
    e.preventDefault();
    const nodeId=el.dataset.node;
    if(e.key==='Z')delRow(nodeId,el.dataset.row);
    else delCol(nodeId,el.dataset.col);
  }
}

// DRAG & DROP
let _dragCardId=null,_dragBoardId=null;
function dragStart(e){
  const el=e.target.closest('.kb-card');if(!el)return;
  _dragCardId=el.dataset.cardId;_dragBoardId=el.dataset.boardId;
  el.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',_dragCardId);
}
function dragEnd(e){
  const el=e.target.closest('.kb-card');if(el)el.classList.remove('dragging');
  document.querySelectorAll('.kb-cards.drag-over').forEach(c=>c.classList.remove('drag-over'));
  _dragCardId=null;_dragBoardId=null;
}
function dragOver(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  const col=e.target.closest('.kb-cards');if(col)col.classList.add('drag-over');
}
function dragLeave(e){
  const col=e.target.closest('.kb-cards');
  if(col&&!col.contains(e.relatedTarget))col.classList.remove('drag-over');
}
function dragDrop(e){
  e.preventDefault();
  const col=e.target.closest('.kb-cards');if(!col||!_dragCardId||!_dragBoardId)return;
  col.classList.remove('drag-over');
  const boardId=col.dataset.boardId;const colId=col.dataset.colId;
  // Cross-board: move card from source to target board
  const srcBoard=nodes[_dragBoardId].data;
  const card=srcBoard.kbCards.find(c=>c.id===_dragCardId);if(!card)return;
  if(boardId!==_dragBoardId){
    srcBoard.kbCards=srcBoard.kbCards.filter(c=>c.id!==_dragCardId);
    nodes[boardId].data.kbCards.push(card);
  }
  card.colId=colId;
  // Determine drop position within column
  const b=nodes[boardId].data;
  const cardEls=Array.from(col.querySelectorAll('.kb-card:not(.dragging)'));
  const afterEl=cardEls.find(el=>{
    const rect=el.getBoundingClientRect();
    return e.clientY<rect.top+rect.height/2;
  });
  // Reorder: remove card, insert at position
  b.kbCards=b.kbCards.filter(c=>c.id!==_dragCardId);
  if(afterEl){
    const afterId=afterEl.dataset.cardId;
    const idx=b.kbCards.findIndex(c=>c.id===afterId);
    b.kbCards.splice(idx,0,card);
  } else {
    b.kbCards.push(card);
  }
  card.archived=false;
  const droppedId=_dragCardId;
  save();render();
  setTimeout(()=>{
    const el=document.querySelector(`[data-card-id="${droppedId}"]`);
    if(el){el.classList.add('anim-add');setTimeout(()=>el.classList.remove('anim-add'),250);}
  },FOCUS_RESTORE_MS);
}

// KEYBOARD SHORTCUTS FOR KANBAN CARDS
function kbCardKeydown(e,boardId,cardId){
  if(e.key==='Enter'){e.preventDefault();openCard(boardId,cardId);return;}
  const b=nodes[boardId]?.data;if(!b)return;
  const card=b.kbCards.find(c=>c.id===cardId);if(!card)return;
  // Shift+Left/Right: move between columns — animate card
  if(e.shiftKey&&(e.key==='ArrowLeft'||e.key==='ArrowRight')){
    e.preventDefault();
    const srcEl=e.target.closest('.kb-card');
    if(srcEl)srcEl.style.transition='opacity 0.15s,transform 0.15s';
    if(srcEl)srcEl.style.opacity='0';
    if(srcEl)srcEl.style.transform=e.key==='ArrowLeft'?'translateX(-20px)':'translateX(20px)';
    const dir=e.key==='ArrowLeft'?-1:1;
    setTimeout(()=>{
      moveCard(boardId,cardId,dir);
      setTimeout(()=>{const el=document.querySelector(`[data-card-id="${cardId}"]`);if(el){el.classList.add('anim-add');el.focus();setTimeout(()=>el.classList.remove('anim-add'),250);}},FOCUS_RESTORE_MS);
    },150);
    return;
  }
  // Shift+Up/Down: reorder within column — animate swap
  if(e.shiftKey&&(e.key==='ArrowUp'||e.key==='ArrowDown')){
    e.preventDefault();
    const colCards=b.kbCards.filter(c=>c.colId===card.colId&&!c.archived);
    const idx=colCards.findIndex(c=>c.id===cardId);
    const newIdx=idx+(e.key==='ArrowUp'?-1:1);
    if(newIdx<0||newIdx>=colCards.length)return;
    const mainIdx=b.kbCards.indexOf(colCards[idx]);
    const mainNewIdx=b.kbCards.indexOf(colCards[newIdx]);
    const tmp=b.kbCards[mainIdx];b.kbCards[mainIdx]=b.kbCards[mainNewIdx];b.kbCards[mainNewIdx]=tmp;
    save();render();
    setTimeout(()=>{const el=document.querySelector(`[data-card-id="${cardId}"]`);if(el){el.classList.add('anim-add');el.focus();setTimeout(()=>el.classList.remove('anim-add'),250);}},FOCUS_RESTORE_MS);
    return;
  }
  // Shift+A: archive — fade out
  if(e.shiftKey&&e.key==='A'){
    e.preventDefault();
    const srcEl=e.target.closest('.kb-card');
    if(srcEl){srcEl.style.transition='opacity 0.2s,transform 0.2s';srcEl.style.opacity='0';srcEl.style.transform='scale(0.95)';}
    setTimeout(()=>{card.archived=!card.archived;save();render();},RENDER_DELAY_MS);
    return;
  }
  // Delete: delete card — fade out
  if(e.key==='Delete'){
    e.preventDefault();
    if(!confirm(UI.confirmDeleteCard))return;
    const srcEl=e.target.closest('.kb-card');
    if(srcEl){srcEl.style.transition='opacity 0.18s,transform 0.18s';srcEl.style.opacity='0';srcEl.style.transform='scale(0.9)';}
    setTimeout(()=>{b.kbCards=b.kbCards.filter(c=>c.id!==cardId);save();render();},ANIM_EXIT_MS);
    return;
  }
}

function delCellChild(nodeId,rowId,colId,type){
  const label=type==='board'?'Task Board':'Sub-Matrix';
  if(!confirm(`${label} unwiderruflich löschen? Alle enthaltenen Daten gehen verloren.`))return;
  const key=`${rowId}-${colId}`;
  const cell=getCell(nodeId,key);
  if(type==='board'&&cell.boardId){
    delete nodes[cell.boardId];
    cell.boardId=null;
  } else if(type==='matrix'&&cell.matrixId){
    removeTree(cell.matrixId);
    cell.matrixId=null;
  }
  save();render();
}
function addFeature(cell,feat){if(!cell.features)cell.features=[];if(!cell.features.includes(feat))cell.features.push(feat);}

function _applyAlias(cell,hasAlias,val){
  if(!hasAlias&&val&&val.trim()){const r=validateAlias(val.trim());if(r.valid)cell.alias=r.alias;}
}
function iconClick(nodeId,rowId,colId,type,label){
  const key=`${rowId}-${colId}`;const cell=getCell(nodeId,key);
  const _restoreFocus=()=>{setTimeout(()=>{const c=document.querySelector(`.mcell[data-node="${nodeId}"][data-row="${rowId}"][data-col="${colId}"]`);if(c)c.focus();},FOCUS_RESTORE_MS);};
  const hasAlias=!!cell.alias;
  const aliasField={label:'Kürzel',id:'a',ph:'z.B. abc',v:cell.alias||'',ro:hasAlias};

  if(type==='matrix'){
    if(!cell.matrixId){
      smodal('Neue Sub-Matrix anlegen',[{label:'Name',id:'l',ph:label,v:label},aliasField],v=>{
        _applyAlias(cell,hasAlias,v.a);
        const id=mkMatrix(v.l||label);
        cell.matrixId=id;addFeature(cell,'matrix');save();rebuildAliasIndex();
        openCell(nodeId,rowId,colId,v.l||label,'matrix');
      },_restoreFocus);
    } else {addFeature(cell,'matrix');openCell(nodeId,rowId,colId,nodes[cell.matrixId].label,'matrix');}
  } else if(type==='board'||type==='info'||type==='checklists'){
    const tab=type;
    const nameDefaults={board:'Aufgaben',info:'Info',checklists:'Checklisten'};
    const nameV=nameDefaults[type]||label;
    if(!cell.boardId){
      // Board existiert noch nicht → anlegen
      smodal('Neues Board anlegen',[{label:'Name',id:'l',ph:nameV,v:nameV},aliasField],v=>{
        _applyAlias(cell,hasAlias,v.a);
        const id=mkBoard(v.l||nameV);
        cell.boardId=id;addFeature(cell,type);save();rebuildAliasIndex();
        openCell(nodeId,rowId,colId,v.l||nameV,tab);
      },_restoreFocus);
    } else if(!cell.features||!cell.features.includes(type)){
      // Board existiert, aber Feature noch nicht aktiviert → Dialog
      const boardLabel=nodes[cell.boardId].label;
      const titles={board:'Aufgaben hinzufügen',info:'Info hinzufügen',checklists:'Checklisten hinzufügen'};
      smodal(titles[type]||'Feature hinzufügen',[{label:'Name',id:'l',ph:nameV,v:nameV},{label:'Kürzel',id:'a',ph:'',v:cell.alias||'',ro:true}],v=>{
        if(v.l&&v.l.trim())nodes[cell.boardId].label=v.l.trim();
        addFeature(cell,type);save();rebuildAliasIndex();
        openCell(nodeId,rowId,colId,nodes[cell.boardId].label,tab);
      },_restoreFocus);
    } else {
      // Feature bereits angelegt → direkt öffnen
      openCell(nodeId,rowId,colId,nodes[cell.boardId].label,tab);
    }
  }
}
function _hasData(nodeId,featureKey){
  const n=nodes[nodeId];if(!n)return false;
  if(n.type==='matrix')return(n.data.rows.length>0||n.data.cols.length>0);
  // board: check relevant data per feature
  const d=n.data;
  if(featureKey==='board')return(d.kbCards||[]).length>0;
  if(featureKey==='info')return(d.infoFields||[]).length>0||(d.links||[]).length>0;
  if(featureKey==='checklists')return(d.checklists||[]).length>0;
  return false;
}
function removeFeature(nodeId,rowId,colId,featureKey){
  const key=`${rowId}-${colId}`;const cell=getCell(nodeId,key);
  const exportId=featureKey==='matrix'?cell.matrixId:cell.boardId;
  // Offer export if data exists
  if(exportId&&_hasData(exportId,featureKey)){
    if(confirm('Daten vorhanden. Vorher exportieren?'))exportNode(exportId);
  }
  // Confirm BEFORE mutating features
  if(featureKey==='matrix'){
    if(cell.matrixId){
      if(!confirm(UI.confirmDeleteMatrix))return;
      removeTree(cell.matrixId);cell.matrixId=null;
    }
  } else {
    const remaining=(cell.features||[]).filter(f=>f!==featureKey).filter(f=>['info','board','checklists'].includes(f));
    if(remaining.length===0&&cell.boardId){
      if(!confirm(UI.confirmDeleteBoard))return;
      delete nodes[cell.boardId];cell.boardId=null;
    }
  }
  // Mutate features AFTER confirm passed
  cell.features=(cell.features||[]).filter(f=>f!==featureKey);
  save();render();
}
function openCell(parentId,rowId,colId,label,tab){
  const pseudoId=`cell-${parentId}-${rowId}-${colId}`;
  nodes[pseudoId]={id:pseudoId,type:'cell',label,data:{}};
  setTab(pseudoId,tab);
  // Remove any existing entry for this cell before pushing (dedup)
  const existingIdx=stack.findIndex(s=>s.nodeId===pseudoId);
  if(existingIdx>=0) stack=stack.slice(0,existingIdx);
  stack.push({nodeId:pseudoId,label,cellRef:{parentId,rowId,colId}});
  renderAnimated('in');
}
function renameMatrixNode(nodeId,val){
  const n=nodes[nodeId];if(!n||!val.trim())return;
  n.label=val.trim();
  // Update stack label if present
  const s=stack.find(x=>x.nodeId===nodeId);
  if(s)s.label=val.trim();
  save();renderBC();
}
function renameBoardOrMatrix(nodeId,val,pseudoId){
  const n=nodes[nodeId];if(!n||!val.trim())return;
  n.label=val.trim();
  // Update label in stack
  const s=stack.find(x=>x.nodeId===pseudoId);
  if(s)s.label=val.trim();
  save();renderBC();
}
function toggleEdit(){
  // Remember focused cell before re-render
  const _ae=document.activeElement;
  const _rowId=_ae&&_ae.dataset?_ae.dataset.row:null;
  const _colId=_ae&&_ae.dataset?_ae.dataset.col:null;

function addCol(nodeId){smodal('Neue Spalte',[{label:'Bezeichnung',id:'l',ph:'z.B. wöchentlich'}],v=>{nodes[nodeId].data.cols.push({id:uid(),label:v.l||'Spalte'});save();render();},()=>{setTimeout(()=>{const b=document.getElementById('addcol-'+nodeId);if(b)b.focus();},FOCUS_RESTORE_MS);});}

}
function renameCol(nodeId,colId,val){

  setTimeout(()=>{const el=document.querySelector(`.mh[data-col-id="${colId}"] input`);if(el)el.focus();},FOCUS_RESTORE_MS);
}
function removeTree(nid){
  const n=nodes[nid];if(!n)return;
  if(n.type==='matrix'){Object.values(n.data.cells).forEach(c=>{if(c.boardId){delete nodes[c.boardId];}if(c.matrixId){removeTree(c.matrixId);}});}
  delete nodes[nid];
}
function cleanupCellChildren(cell){
  if(!cell)return;
  if(cell.boardId){delete nodes[cell.boardId];}
  if(cell.matrixId){removeTree(cell.matrixId);}
}
function delRow(nodeId,rowId){if(!confirm(UI.confirmDeleteRow))return;const d=nodes[nodeId].data;d.rows=d.rows.filter(r=>r.id!==rowId);Object.keys(d.cells).forEach(k=>{if(k.startsWith(rowId+'-')){cleanupCellChildren(d.cells[k]);delete d.cells[k];}});save();render();}
function delCol(nodeId,colId){if(!confirm(UI.confirmDeleteCol))return;const d=nodes[nodeId].data;d.cols=d.cols.filter(c=>c.id!==colId);Object.keys(d.cells).forEach(k=>{if(k.endsWith('-'+colId)){cleanupCellChildren(d.cells[k]);delete d.cells[k];}});save();render();}

// ── REORDER & TRANSPOSE ──
function moveCol(nodeId,colId,dir,src,cellRowId){
  // src='cell' when called from a cell, cellRowId=row of the focused cell
  const arr=nodes[nodeId].data.cols;
  const i=arr.findIndex(c=>c.id===colId);
  const j=i+dir;
  if(j<0||j>=arr.length)return;
  const _rowId=cellRowId||null;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  save();render();
  setTimeout(()=>{
    // Animate header
    const hdr=document.querySelector(`.mh[data-col-id="${colId}"]`);
    if(hdr){
      const w=hdr.offsetWidth||80;
      hdr.style.setProperty('--dx',(dir>0?-w:w)+'px');
      hdr.classList.add('swap-h');
      hdr.addEventListener('animationend',()=>hdr.classList.remove('swap-h'),{once:true});
    }
    // Restore focus: cell if called from cell, header otherwise
    if(src==='cell'&&_rowId){
      const cell=document.querySelector(`.mcell[data-node="${nodeId}"][data-row="${_rowId}"][data-col="${colId}"]`);
      if(cell){cell.focus({preventScroll:true});return;}
    }
    if(hdr){const inp=hdr.querySelector('input');if(inp)inp.focus({preventScroll:true});}
  },20);
}
function moveRow(nodeId,rowId,dir,src,cellColId){
  const arr=nodes[nodeId].data.rows;
  const i=arr.findIndex(r=>r.id===rowId);
  const j=i+dir;
  if(j<0||j>=arr.length)return;
  const _colId=cellColId||null;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  save();render();
  setTimeout(()=>{
    const hdr=document.querySelector(`.mh[data-row-id="${rowId}"]`);
    if(hdr){
      const h=hdr.offsetHeight||32;
      hdr.style.setProperty('--dy',(dir>0?-h:h)+'px');
      hdr.classList.add('swap-v');
      hdr.addEventListener('animationend',()=>hdr.classList.remove('swap-v'),{once:true});
    }
    if(src==='cell'&&_colId){
      const cell=document.querySelector(`.mcell[data-node="${nodeId}"][data-row="${rowId}"][data-col="${_colId}"]`);
      if(cell){cell.focus({preventScroll:true});return;}
    }
    if(hdr){const inp=hdr.querySelector('input');if(inp)inp.focus({preventScroll:true});}
  },20);
}
function hdrKeydown(e,axis,nodeId,id){
  if(!editMode||!e.shiftKey)return;
  if(axis==='col'&&(e.key==='ArrowLeft'||e.key==='ArrowRight')){
    e.preventDefault();e.stopPropagation();
    moveCol(nodeId,id,e.key==='ArrowLeft'?-1:1);
  }
  if(axis==='row'&&(e.key==='ArrowUp'||e.key==='ArrowDown')){
    e.preventDefault();e.stopPropagation();
    moveRow(nodeId,id,e.key==='ArrowUp'?-1:1);
  }
}
function transposeMatrix(nodeId){
  const d=nodes[nodeId].data;
  // Phase 1: blur out
  const m=document.querySelector('.matrix');
  if(m)m.classList.add('transpose-exit');
  setTimeout(()=>{
    [d.rows,d.cols]=[d.cols,d.rows];
    const nc={};
    for(const[key,cell] of Object.entries(d.cells)){
      const sep=key.indexOf('-');
      nc[key.slice(sep+1)+'-'+key.slice(0,sep)]=cell;
    }
    d.cells=nc;
    save();render();
    // Phase 2: blur in
    setTimeout(()=>{
      const m2=document.querySelector('.matrix');
      if(m2){m2.classList.add('transpose-enter');m2.addEventListener('animationend',()=>m2.classList.remove('transpose-enter'),{once:true});}
    },20);
  },160);
}

let sdTab='tags';

function renderStammdaten(){

  let h=`<div class="smodal-overlay" onclick="closeSdIfBg(event)">
    <div class="sdmodal" onclick="event.stopPropagation()">

      </div>
      <div class="sd-tabs">
        <div class="sd-tab${sdTab==='tags'?' active':''}" onclick="sdTab='tags';renderStammdaten()">Tags (${globalTags.length})</div>
        <div class="sd-tab${sdTab==='people'?' active':''}" onclick="sdTab='people';renderStammdaten()">Personen (${globalPeople.length})</div>
      </div>
      <div class="sd-body">`;
  list.forEach(item=>{

      <div class="sd-dot" style="background:${color};border:0.5px solid var(--border2);"></div>
      <input value="${esc(item.label)}" onchange="renameGlobal('${isTags?'tags':'people'}','${item.id}',this.value)" />
      <span style="font-size:12px;color:var(--red);cursor:pointer;" onclick="delGlobal('${isTags?'tags':'people'}','${item.id}')">${ICO.close(10)}</span>
    </div>`;
  });
  h+=`<div style="margin-top:10px;">
    <button class="btn" onclick="addGlobal('${isTags?'tags':'people'}')">+ ${isTags?'Neuer Tag':'Neue Person'}</button>
  </div>`;

}
function closeSdIfBg(e){if(e.target.classList.contains('smodal-overlay'))closeStammdaten();}
function closeStammdaten(){
  const overlay=document.querySelector('#mc .smodal-overlay');
  if(overlay){overlay.classList.add('closing');setTimeout(()=>{document.getElementById('mc').innerHTML='';render();},SMODAL_EXIT_MS);}
  else{document.getElementById('mc').innerHTML='';render();}
}
function renameGlobal(type,id,val){
  const list=type==='tags'?globalTags:globalPeople;
  const oldLabel=(list.find(x=>x.id===id)||{}).label;
  const item=list.find(x=>x.id===id);
  if(!item)return;
  const newLabel=val.trim();
  if(!newLabel||newLabel===oldLabel)return;
  // Update all cards that use this tag/person
  Object.values(nodes).forEach(n=>{
    if(n.type!=='board')return;
    n.data.kbCards.forEach(card=>{
      if(type==='tags'&&card.tags){card.tags=card.tags.map(t=>t===oldLabel?newLabel:t);}
      if(type==='people'&&card.who){card.who=card.who.map(w=>w===oldLabel?newLabel:w);}
    });
  });
  item.label=newLabel;
  save();
}
function delGlobal(type,id){
  if(!confirm(UI.confirmDeleteGlobal))return;
  const list=type==='tags'?globalTags:globalPeople;
  const item=list.find(x=>x.id===id);
  if(!item)return;
  // Remove from all cards
  Object.values(nodes).forEach(n=>{
    if(n.type!=='board')return;
    n.data.kbCards.forEach(card=>{
      if(type==='tags'&&card.tags)card.tags=card.tags.filter(t=>t!==item.label);
      if(type==='people'&&card.who)card.who=card.who.filter(w=>w!==item.label);
    });
  });
  if(type==='tags')globalTags=globalTags.filter(x=>x.id!==id);
  else globalPeople=globalPeople.filter(x=>x.id!==id);
  save();renderStammdaten();
}
function addGlobal(type){
  const title=type==='tags'?'Neuer Tag':'Neue Person';
  const ph=type==='tags'?'z.B. Reporting':'z.B. Max';
  smodal(title,[{label:'Name',id:'l',ph}],v=>{
    if(!v.l||!v.l.trim())return;
    const l=v.l.trim();
    if(type==='tags'){if(!globalTags.find(x=>x.label===l))globalTags.push({id:uid(),label:l});}
    else{if(!globalPeople.find(x=>x.label===l))globalPeople.push({id:uid(),label:l});}
    save();renderStammdaten();
  });
}

let mcb=null,mfields=[],mOnClose=null; // mcb=modalCallback, mfields=modalFieldIds, mOnClose=always-called
function smodal(title,fields,cb,onClose){ // smodal = showSimpleModal
  mcb=cb;mfields=fields.map(f=>f.id);mOnClose=onClose||null;
  let h=`<div class="smodal-overlay" onclick="closeS(event)"><div class="smodal"><h3>${title}</h3>`;
  fields.forEach(f=>{
    h+=`<label>${f.label}</label>`;
    if(f.sel)h+=`<select id="mf-${f.id}">${f.sel.map((o,i)=>`<option value="${o}"${f.v===o?' selected':''}>${f.sellabels?f.sellabels[i]:o}</option>`).join('')}</select>`;
    else if(f.ro)h+=`<input id="mf-${f.id}" type="text" value="${f.v||''}" disabled style="opacity:0.5;cursor:default;"/>`;
    else h+=`<input id="mf-${f.id}" type="text" placeholder="${f.ph||''}" value="${f.v||''}"/>`;
  });
  h+=`<div class="smodal-actions"><button class="btn-c" onclick="closeS()">Abbrechen</button><button class="btn-p" onclick="subS()">OK</button></div></div></div>`;
  document.getElementById('mc').innerHTML=h;
  document.getElementById('mc').onkeydown=e=>{
    if(e.key==='Enter'){
      // Don't submit if focus is on select or textarea
      if(document.activeElement&&(document.activeElement.tagName==='SELECT'||document.activeElement.tagName==='TEXTAREA'))return;
      e.preventDefault();subS();
    }
    // Tab: cycle through focusable fields within modal
    if(e.key==='Tab'){
      const focusable=Array.from(document.getElementById('mc').querySelectorAll('input,select,button'));
      const idx=focusable.indexOf(document.activeElement);
      if(idx>=0){
        e.preventDefault();
        const next=focusable[(idx+(e.shiftKey?-1:1)+focusable.length)%focusable.length];
        if(next)next.focus();
      }
    }
  };
  setTimeout(()=>{const ff=fields.find(f=>!f.ro)||fields[0];const el=document.getElementById('mf-'+ff.id);if(el){el.focus();el.select();}},MODAL_FOCUS_DELAY_MS);
}
function subS(){const v={};mfields.forEach(id=>{const el=document.getElementById('mf-'+id);if(el)v[id]=el.value;});document.getElementById('mc').innerHTML='';const _oc=mOnClose;if(mcb){mcb(v);mcb=null;}mOnClose=null;if(_oc)_oc();}
function closeS(e){
  if(!e||e.target.classList.contains('smodal-overlay')){
    const overlay=document.querySelector('#mc .smodal-overlay');
    const _oc=mOnClose;mcb=null;mOnClose=null;
    if(overlay){overlay.classList.add('closing');setTimeout(()=>{document.getElementById('mc').innerHTML='';if(_oc)_oc();},SMODAL_EXIT_MS);}
    else{document.getElementById('mc').innerHTML='';if(_oc)_oc();}
  }
}

  });
  h+=`</div></div>
    </div>
    <div class="smodal-actions" style="flex-shrink:0;">

      <button class="btn-p" onclick="closeS()">OK</button>
    </div></div></div>`;
  document.getElementById('mc').innerHTML=h;
  const _mc=document.getElementById('mc');
  _mc.onkeydown=null;
  _mc.onclick=null;
  function startRebind(btn){
    const action=btn.dataset.rebind;if(!action)return;
    btn.textContent='Taste drücken…';
    btn.style.borderColor='var(--blue)';
    btn.style.background='var(--bg)';
    btn.style.animation='checkPop 0.3s ease-out';
    function onKey(ev){
      ev.preventDefault();ev.stopPropagation();ev.stopImmediatePropagation();
      if(ev.key==='Escape'){document.removeEventListener('keydown',onKey,true);showKeyboardHelp();return;}
      if(['Shift','Control','Alt','Meta'].includes(ev.key))return;
      keyBindings[action]={
        shift:ev.shiftKey,ctrl:ev.ctrlKey,alt:ev.altKey,
        key:ev.key.length===1?ev.key.toUpperCase():ev.key,
        label:shortcutLabel({shift:ev.shiftKey,ctrl:ev.ctrlKey,alt:ev.altKey,key:ev.key.length===1?ev.key.toUpperCase():ev.key})
      };
      saveKeyBindings();
      document.removeEventListener('keydown',onKey,true);
      showKeyboardHelp();
      // Re-focus the same action after re-render
      setTimeout(()=>{const el=document.getElementById('kb-btn-'+action);if(el)el.focus();},FOCUS_RESTORE_MS);
    }
    document.addEventListener('keydown',onKey,true);
  }
  _mc.onclick=function(e){const btn=e.target.closest('[data-rebind]');if(btn){e.stopPropagation();startRebind(btn);}};
  _mc.onkeydown=function(e){
    const btn=e.target.closest('[data-rebind]');
    if(btn&&(e.key===' '||e.key==='Enter')){e.preventDefault();e.stopPropagation();startRebind(btn);}
  };
  // Focus first configurable binding
  setTimeout(()=>{const first=_mc.querySelector('[data-rebind]');if(first)first.focus();},MODAL_FOCUS_DELAY_MS);
}
function resetKeyBindings(){
  keyBindings=JSON.parse(JSON.stringify(DEFAULT_KEYBINDINGS));
  saveKeyBindings();
  showKeyboardHelp();
}

function onSearchInput(val){

function handleCommandInput(raw){

      <div><b>^n kürzel</b> — Neue Karte auf Board</div>

      <div><b>^fa text</b> — Suche in Aufgaben</div>
      <div><b>^fi text</b> — Suche in Info-Feldern</div>
      <div><b>^fh text</b> — Suche in Links/Mail</div>

      } else {
        h+=`<div class="sr-item"><div class="sr-name" style="color:var(--text3);">^n kürzel — Kürzel eingeben</div></div>`;

        :(n?.label||alias);

      const cmd=esc(alias+(sub?' '+sub:'')+(card?' '+card:''));
