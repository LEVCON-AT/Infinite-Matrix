function onSearchInput(val){
  if(val.startsWith('^')){
    handleCommandInput(val.slice(1));
  }else if(!val||val.trim()===''){
    // Empty (user deleted text but stays focused) — show the history dropdown
    const inp=document.getElementById('searchinput');
    if(inp&&document.activeElement===inp&&_searchHistory.length>0)_renderSearchHistoryDropdown();
    else{const el=document.getElementById('searchresults');if(el)el.classList.remove('is-open');}
  }else{
    doSearch(val);
  }
}

// Show the history dropdown when the empty search field receives focus or a click.
function onSearchFocus(){
  const inp=document.getElementById('searchinput');
  if(!inp)return;
  if(inp.value)return; // only show history when the input is empty
  if(_searchHistory.length===0)return;

}
function _renderSearchHistoryDropdown(){
  const el=document.getElementById('searchresults');

  const entries=[..._searchHistory].reverse();
  let h=`<div style="padding:7px 13px;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;border-bottom:0.5px solid var(--border);font-weight:500;">Zuletzt</div>`;
  entries.forEach(q=>{
    const isCmd=q.startsWith('^');

      ?`<span style="color:var(--text3);font-family:monospace;font-size:11px;margin-right:4px;">^</span>`
      :`<span class="sr-ico" style="color:var(--text3);">${ICO.search(11)}</span>`;

function _applySearchHistoryEntry(q){

// Resolve the icon, color, label and type-text for one entry in the ^alias result list.
// For cells, icon and color adapt to the active subCmd (i/b/c/m) or — if none —
// to the cell's default feature (what openCell would actually open).
function _resolveAliasResultInfo(alias,target,subCmd){
  const FEAT_COLORS={matrix:'var(--blue)',board:'var(--teal)',info:'var(--amber)',checklists:'var(--purple)'};
  const out={icon:'',color:'var(--text2)',label:alias,typeLabel:''};
  if(target.type==='matrix'){
    const n=nodes[target.nodeId];
    out.icon=SB_ICONS.matrix;out.color='var(--blue)';
    out.label=n?.label||alias;out.typeLabel='Matrix';
    return out;
  }
  if(target.type==='board'){
    const n=nodes[target.nodeId];
    const def=getCellFeatureDef('board');
    out.icon=def.icoSm;out.color='var(--teal)';
    out.label=n?.label||alias;out.typeLabel='Board';
    return out;
  }
  if(target.type==='card'){
    const n=nodes[target.nodeId];
    const card=n?.data.kbCards.find(c=>c.id===target.cardId);
    out.icon=`<svg width="11" height="11" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="2" width="11" height="10" rx="1.3" stroke="currentColor" stroke-width="1.3"/><line x1="3.5" y1="5.5" x2="10.5" y2="5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="3.5" y1="8.5" x2="8.5" y2="8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`;
    out.color='var(--amber)';
    out.label=card?.name||alias;out.typeLabel='Karte';
    return out;
  }
  if(target.type==='link'){
    const n=nodes[target.nodeId];
    const link=n?.data.links.find(l=>l.id===target.linkId);
    out.icon=ICO.link(11);out.color='var(--text2)';
    out.label=link?.label||alias;out.typeLabel='Link';
    return out;
  }
  if(target.type==='mail'){
    const n=nodes[target.nodeId];
    const link=n?.data.links.find(l=>l.id===target.linkId);
    out.icon=ICO.mail(11);out.color='var(--text2)';
    out.label=link?.label||alias;out.typeLabel='Mailvorlage';
    return out;
  }
  if(target.type==='cell'){
    const parent=nodes[target.parentId];
    const row=parent?.data.rows.find(r=>r.id===target.rowId);
    const col=parent?.data.cols.find(c=>c.id===target.colId);
    out.label=(row&&col)?`${row.label} / ${col.label}`:alias;
    const cell=parent?.data.cells[`${target.rowId}-${target.colId}`];
    // Adaptive feature: explicit subCmd wins, else the cell's default (what openCell picks)
    let featKey=null;
    if(subCmd==='i')featKey='info';
    else if(subCmd==='b')featKey='board';
    else if(subCmd==='m')featKey='matrix';
    else if(subCmd==='c')featKey='checklists';
    else{featKey=cell?.boardId?'board':(cell?.matrixId?'matrix':null);}
    const def=featKey?getCellFeatureDef(featKey):null;
    if(def){out.icon=def.icoSm;out.color=FEAT_COLORS[featKey]||'var(--text2)';}
    else{out.icon=SB_ICONS.cellBox;out.color='var(--text2)';}
    out.typeLabel='Zelle';
    // Right-side feature glyphs (only meaningful when no subCmd — list of available features)
    const SUB_CHAR={info:'i',board:'b',matrix:'m',checklists:'c'};
    out.cellFeatures=cell?getActiveFeatures(cell).map(f=>({
      key:f.key,icon:f.icoSm,color:FEAT_COLORS[f.key]||'var(--text2)',subCmd:SUB_CHAR[f.key],label:f.label
    })):[];
    return out;
  }
  return out;
}

// Render the Zone-B sub-items under a single cell-match when subCmd (i/b/m/c) is present.
// - i: links & mails of the cell's board
// - b: open cards of the board
// - m: sub-cells of the cell's sub-matrix
// - c: static checklists on the board, with progress (done/total)
// Items with aliases route via executeCommand so the normal nav-flow + closeSearch applies.
function _renderAliasResultZoneB(cellAlias,target,subCmd){
  const parent=nodes[target.parentId];
  if(!parent)return'';
  const cell=parent.data.cells[`${target.rowId}-${target.colId}`];
  if(!cell)return'';
  const CARD_ICO=`<svg width="11" height="11" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="2" width="11" height="10" rx="1.3" stroke="currentColor" stroke-width="1.3"/><line x1="3.5" y1="5.5" x2="10.5" y2="5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="3.5" y1="8.5" x2="8.5" y2="8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`;
  const items=[];
  if(subCmd==='i'){
    const board=cell.boardId?nodes[cell.boardId]:null;
    const links=board?.data?.links||[];
    links.forEach(l=>{
      const isMail=l.type==='mail';
      const icon=isMail?ICO.mail(11):ICO.link(11);
      const aliasTag=l.alias?`<span class="alias-tag">${esc(l.alias)}</span>`:'';
      const onClick=l.alias?`executeCommand('${esc(l.alias)}')`:(isMail?`window.location.href=buildMailto(nodes['${cell.boardId}'].data.links.find(x=>x.id==='${l.id}'))`:`window.open('${esc(l.url||'')}','_blank')`);
      items.push(`<div class="sr-subitem" onclick="${onClick}"><span class="sr-ico" style="color:var(--text2)">${icon}</span>${aliasTag}<span>${esc(l.label||(isMail?'(Mail)':'(Link)'))}</span></div>`);
    });
  }else if(subCmd==='b'){
    const board=cell.boardId?nodes[cell.boardId]:null;
    const cards=(board?.data?.kbCards||[]).filter(c=>!c.archived);
    cards.forEach(c=>{
      const aliasTag=c.alias?`<span class="alias-tag">${esc(c.alias)}</span>`:'';
      const onClick=c.alias?`executeCommand('${esc(cellAlias)} k ${esc(c.alias)}')`:`closeSearch();openCard('${cell.boardId}','${c.id}')`;
      items.push(`<div class="sr-subitem" onclick="${onClick}"><span class="sr-ico" style="color:var(--amber)">${CARD_ICO}</span>${aliasTag}<span>${esc(c.name||'(ohne Name)')}</span></div>`);
    });
  }else if(subCmd==='m'){
    const submat=cell.matrixId?nodes[cell.matrixId]:null;
    if(submat&&submat.type==='matrix'){
      Object.entries(submat.data.cells).forEach(([k,c])=>{
        const sep=k.indexOf('-');const rid=k.slice(0,sep),cid=k.slice(sep+1);
        const row=submat.data.rows.find(r=>r.id===rid);
        const col=submat.data.cols.find(cc=>cc.id===cid);
        if(!row||!col)return;
        const label=`${row.label} / ${col.label}`;
        const aliasTag=c.alias?`<span class="alias-tag">${esc(c.alias)}</span>`:'';
        const onClick=c.alias?`executeCommand('${esc(c.alias)}')`:`closeSearch();openCell('${submat.id}','${rid}','${cid}','${esc(label).replace(/'/g,"\\'")}','matrix')`;
        items.push(`<div class="sr-subitem" onclick="${onClick}"><span class="sr-ico" style="color:var(--text2)">${SB_ICONS.cellBox}</span>${aliasTag}<span>${esc(label)}</span></div>`);
      });
    }
  }else if(subCmd==='c'){
    const board=cell.boardId?nodes[cell.boardId]:null;
    const lists=board?.data?.checklists||[];
    const clDef=getCellFeatureDef('checklists');
    const clIcon=clDef?clDef.icoSm:'';
    lists.forEach(cl=>{
      const items_=cl.items||[];
      const done=items_.filter(i=>i.done).length;
      const total=items_.length;
      const progress=total>0?`<span class="sr-subitem-progress">${done}/${total}</span>`:'';
      const onClick=`executeCommand('${esc(cellAlias)} c')`;
      items.push(`<div class="sr-subitem" onclick="${onClick}"><span class="sr-ico" style="color:var(--purple)">${clIcon}</span><span>${esc(cl.label||'(ohne Name)')}</span>${progress}</div>`);
    });
  }
  if(items.length===0)return'';
  return `<div class="sr-zone-b">${items.join('')}</div>`;
}

      const sub=parts[1]||'';const card=parts[2]||'';
      const cmd=esc(alias+(sub?' '+sub:'')+(card?' '+card:''));
      // Right-side glyphs: only for cell-matches without subCmd — show available features,

        ).join('')}</span>`;

      h+=`<div class="sr-item" onclick="executeCommand('${cmd}')"><div class="sr-name"><span class="sr-ico" style="color:${info.color}">${info.icon}</span><span class="alias-tag">${esc(displayAlias)}</span> ${esc(info.label)}${glyphsHtml}</div><div class="sr-from">${info.typeLabel}</div></div>`;
      // Zone B: only when exactly one match, target is a cell, and subCmd is one of i/b/m/c

// Custom confirm dialog for label-cleanup, design-matched to app style.
// Enter → OK, ESC → Cancel. OK button gets focus.
function sbConfirmChangesDialog(opts){
  const {scopeStr,aliasStr,changes,onConfirm}=opts;
  const nodeChanges=changes.filter(c=>c.kind==='node');
  const tabChanges=changes.filter(c=>c.kind==='tab');
  const sumParts=[];
  if(nodeChanges.length)sumParts.push(`${nodeChanges.length} Node-Label${nodeChanges.length===1?'':'s'}`);
  if(tabChanges.length)sumParts.push(`${tabChanges.length} Tab-Label${tabChanges.length===1?'':'s'}`);
  const summary=sumParts.join(' + ');
  function rowIconFor(c){
    // Determine icon based on change kind + node/type info
    if(c.kind==='tab'||c.kind==='tabReset'){
      const def=getCellFeatureDef(c.type);
      return {cls:'ic-'+c.type, svg:def?def.icoSm:''};
    }
    // node kind: figure out by nodeId's type
    const n=nodes[c.nodeId];
    if(!n)return {cls:'ic-board',svg:SB_ICONS.board};
    if(n.type==='matrix')return {cls:'ic-matrix',svg:SB_ICONS.matrix};
    // board → dominant-feature
    const dom=_sbBoardDominantFeature(c.nodeId);
    const def=getCellFeatureDef(dom);
    if(def&&dom!=='board')return {cls:'ic-'+dom,svg:def.icoSm};
    return {cls:'ic-board',svg:SB_ICONS.board};
  }
  const rows=changes.map(c=>{
    const ico=rowIconFor(c);
    const kindTxt=(c.kind==='tab'||c.kind==='tabReset')?'Tab':'Label';
    return `<div class="sb-confirm-row">
      <span class="cr-icon ${ico.cls}">${ico.svg}</span>
      <span class="cr-kind">${kindTxt}</span>
      <span class="cr-old" title="${esc(c.oldLabel)}">${esc(c.oldLabel)}</span>
      <span class="cr-arrow">→</span>
      <span class="cr-new" title="${esc(c.newLabel)}">${esc(c.newLabel)}</span>
    </div>`;
  }).join('');
  const h=`<div class="smodal-overlay" onclick="sbCloseConfirm(event)">
    <div class="sb-confirm" onclick="event.stopPropagation()">
      <div class="sb-confirm-hd">
        ${ICO.edit(14)}
        <h3>Labels zurücksetzen</h3>
      </div>
      <div class="sb-confirm-sub">${summary}${aliasStr} auf <b>${scopeStr}</b> — Individuell angepasste Tab-Bezeichnungen bleiben erhalten.</div>
      <div class="sb-confirm-list">${rows}</div>
      <div class="sb-confirm-actions">
        <button class="btn-c" onclick="sbCloseConfirm()">Abbrechen</button>
        <button class="btn-p" id="sb-confirm-ok" autofocus>OK (Enter)</button>
      </div>
    </div>
  </div>`;
  document.getElementById('mc').innerHTML=h;
  _sbConfirmOnConfirm=onConfirm;
  // Focus OK
  setTimeout(()=>{const ok=document.getElementById('sb-confirm-ok');if(ok)ok.focus();},20);
  // Enter/ESC handler
  const mc=document.getElementById('mc');
  mc.onkeydown=e=>{
    if(e.key==='Enter'){e.preventDefault();sbCloseConfirm(null,true);}
    else if(e.key==='Escape'){e.preventDefault();sbCloseConfirm();}
  };
  // Button click wiring
  setTimeout(()=>{
    const ok=document.getElementById('sb-confirm-ok');
    if(ok)ok.addEventListener('click',()=>sbCloseConfirm(null,true));
  },0);
}
let _sbConfirmOnConfirm=null;
function sbCloseConfirm(e,confirmed){
  if(e&&e.target&&!e.target.classList.contains('smodal-overlay'))return;
  const overlay=document.querySelector('#mc .smodal-overlay');
  const cb=_sbConfirmOnConfirm;_sbConfirmOnConfirm=null;
  if(overlay){overlay.classList.add('closing');setTimeout(()=>{document.getElementById('mc').innerHTML='';if(confirmed&&cb)cb();},150);}
  else{document.getElementById('mc').innerHTML='';if(confirmed&&cb)cb();}
}

// ── Label Cleanup (^c command) ──
// Resets node.label on Boards and Sub-Matrices to "{rowLabel} / {colLabel}" based on
// the cell they live in. Leaves cell.tabLabels UNTOUCHED (user customizations preserved).
// Root matrix is protected (no parent cell → not a candidate).
function _currentMatrixForCleanup(){
  const top=stack[stack.length-1];if(!top)return null;
  if(top.cellRef){return nodes[top.cellRef.parentId]||null;}
  const n=nodes[top.nodeId];
  return(n&&n.type==='matrix')?n:null;
}
function runLabelCleanup(filterAlias,recursive,mode){
  mode=mode||'node';
  const start=_currentMatrixForCleanup();
  if(!start){showCmdError();return;}
  // Track whether the alias filter matched any cell at all (so we can distinguish
  // "alias not found" (error) vs "alias found but nothing to change" (success))
  let aliasSeen=!filterAlias;
  // Two kinds of changes:
  //  - 'node': reset nodes[id].label (Board/Matrix node display name)
  //  - 'tab':  reset cell.tabLabels[type] (tab display in cell view) — but ONLY if the
  //            current value looks non-customized (empty, feature-default, or synced to old node.label).
  //            Truly custom tab labels stay untouched.
  const changes=[];
  const visited=new Set();
  function isNotCustomized(tabVal,oldNodeLabel,featureDefault){
    if(!tabVal||!tabVal.trim())return true;                 // empty/undefined
    if(oldNodeLabel&&tabVal===oldNodeLabel)return true;     // in-sync with old node.label
    if(featureDefault&&tabVal===featureDefault)return true; // feature-default
    return false;
  }
  function collectTabUpdates(cell,type,target,oldNodeLabel){
    if(!cell.features||!cell.features.includes(type))return;
    const def=getCellFeatureDef(type);const featureDefault=def?def.label:'';
    const cur=(cell.tabLabels&&cell.tabLabels[type])||'';
    if(cur===target)return; // already correct
    if(!isNotCustomized(cur,oldNodeLabel,featureDefault))return; // user-customized → keep
    changes.push({kind:'tab',cell,type,oldLabel:cur||featureDefault,newLabel:target});
  }
  function walk(matrix){
    if(!matrix||matrix.type!=='matrix'||visited.has(matrix.id))return;
    visited.add(matrix.id);
    const rowById=Object.fromEntries((matrix.data.rows||[]).map(r=>[r.id,r]));
    const colById=Object.fromEntries((matrix.data.cols||[]).map(c=>[c.id,c]));
    Object.entries(matrix.data.cells||{}).forEach(([key,cell])=>{
      const [rowId,colId]=key.split('-');
      const row=rowById[rowId],col=colById[colId];
      if(!row||!col)return;
      const target=`${row.label} / ${col.label}`;
      const aliasMatches=!filterAlias||(cell.alias&&cell.alias.toLowerCase()===filterAlias.toLowerCase());
      if(aliasMatches){
        aliasSeen=true;
        if(mode==='tab'){
          // Tab-reset mode: clear custom tabLabels → fall back to feature-defaults
          // Only for tab-keys where (a) a custom value exists AND (b) it differs from the default
          ['matrix','board','info','checklists'].forEach(t=>{
            const cur=cell.tabLabels&&cell.tabLabels[t];
            if(!cur||!cur.trim())return; // already default
            const def=getCellFeatureDef(t);const featDef=def?def.label:'';
            if(cur===featDef)return; // already equal to default
            changes.push({kind:'tabReset',cell,type:t,oldLabel:cur,newLabel:featDef});
          });
        }else{
          // Node mode (default): reset node.label + smart-sync tabLabels
          if(cell.boardId&&nodes[cell.boardId]){
            const oldLbl=nodes[cell.boardId].label;
            if(oldLbl!==target){
              changes.push({kind:'node',nodeId:cell.boardId,oldLabel:oldLbl,newLabel:target});
            }
            ['board','info','checklists'].forEach(t=>collectTabUpdates(cell,t,target,oldLbl));
          }
          if(cell.matrixId&&nodes[cell.matrixId]){
            const oldLbl=nodes[cell.matrixId].label;
            if(oldLbl!==target){
              changes.push({kind:'node',nodeId:cell.matrixId,oldLabel:oldLbl,newLabel:target});
            }
            collectTabUpdates(cell,'matrix',target,oldLbl);
          }
        }
      }
      if(recursive&&cell.matrixId&&nodes[cell.matrixId]){
        walk(nodes[cell.matrixId]);
      }
    });
  }
  walk(start);
  if(changes.length===0){
    if(filterAlias&&!aliasSeen){
      // Alias truly not found → error indicator
      showCmdError();
    }else{
      // Alias found (or no filter) but nothing needs changing → success indicator
      showCmdSuccess();
    }
    return;
  }
  const scopeStr=recursive?'aktuelle Ebene + darunter':'aktuelle Ebene';
  const aliasStr=filterAlias?` mit Kürzel „${filterAlias}"`:'';
  sbConfirmChangesDialog({
    scopeStr, aliasStr, changes,
    onConfirm:()=>{
      changes.forEach(c=>{
        if(c.kind==='node'){
          const n=nodes[c.nodeId];
          if(n){
            n.label=c.newLabel;
            stack.forEach(s=>{if(s.nodeId===c.nodeId)s.label=c.newLabel;});
          }
        }else if(c.kind==='tab'){
          if(!c.cell.tabLabels)c.cell.tabLabels={};
          c.cell.tabLabels[c.type]=c.newLabel;
        }else if(c.kind==='tabReset'){
          // Delete the custom tabLabel entry so getTabLabel falls back to feature-default
          if(c.cell.tabLabels)delete c.cell.tabLabels[c.type];
        }
      });
      rebuildAliasIndex();
      save();
      render();
    }
  });
}
function parseCommand(raw){
  const parts=raw.trim().toLowerCase().split(/\s+/);
  if(!parts[0])return null;
  // Scoped search: fa, fi, fh, fc
  const scopeMap={fa:'cards',fi:'info',fh:'links',fc:'checklists'};
  if(scopeMap[parts[0]]){
    return{type:'find',scope:scopeMap[parts[0]],query:parts.slice(1).join(' ')};
  }
  // Move card: n kartenalias -m zielkürzel [spalte]
  if(parts[0]==='n'&&parts.length>=4&&parts[2]==='-m'){
    return{type:'movecard',cardAlias:parts[1],targetAlias:parts[3],colName:parts.slice(4).join(' ')||null};
  }
  // New card: n kürzel
  if(parts[0]==='n'){
    return{type:'new',alias:parts[1]||null};
  }
  // Frequency matrix: w [alias]
  if(parts[0]==='w'){
    return{type:'freqview',alias:parts[1]||null};
  }
  if(parts[0]==='s'){
    return{type:'settings'};
  }
  if(parts[0]==='k'){
    return{type:'keybindings'};
  }
  // Toggle sidebar viewport-scroll
  if(parts[0]==='sc'){
    return{type:'togglesidebarscroll'};
  }
  // Cleanup labels: c [tab] [alias] [-all]
  //   - default mode (no 'tab' modifier): reset node.label + smart-sync tabLabels
  //   - 'tab' modifier: reset tabLabels to feature-defaults (Info/Aufgaben/Checklisten/Sub-Matrix)
  if(parts[0]==='c'){
    let alias=null,recursive=false,mode='node';
    let startIdx=1;
    if(parts[1]==='tab'){mode='tab';startIdx=2;}
    for(let i=startIdx;i<parts.length;i++){
      if(parts[i]==='-all')recursive=true;
      else if(!alias)alias=parts[i];
    }
    return{type:'cleanup',alias,recursive,mode};
  }
  // Navigation: kürzel [subCmd] [cardAlias]
  const alias=parts[0];
  const subCmd=parts[1]||null; // m, i, b, c
  const cardAlias=parts[2]||null;
  return{type:'nav',alias,subCmd,cardAlias};
}
function executeCommand(raw){
  const cmd=parseCommand(raw);
  if(!cmd)return showCmdError();
  _pushSearchHistory('^'+raw); // record with the leading ^ so recall restores the full command
  if(cmd.type==='find'){
    if(!cmd.query)return showCmdError();
    doScopedSearch(cmd.scope,cmd.query);
    return;
  }
  if(cmd.type==='movecard'){
    const cardTarget=aliasIndex[cmd.cardAlias];
    if(!cardTarget||cardTarget.type!=='card')return showCmdError();
    const destTarget=aliasIndex[cmd.targetAlias];
    if(!destTarget)return showCmdError();
    let targetBoardId=null;
    if(destTarget.type==='board')targetBoardId=destTarget.nodeId;
    else if(destTarget.type==='cell'){
      const cell=getCell(destTarget.parentId,`${destTarget.rowId}-${destTarget.colId}`);
      if(cell&&cell.boardId)targetBoardId=cell.boardId;
    }
    if(!targetBoardId)return showCmdError();
    closeSearch();
    if(!moveCardToBoard(cardTarget.boardId,cardTarget.cardId,targetBoardId,cmd.colName))showCmdError();
    return;
  }
  if(cmd.type==='cleanup'){
    closeSearch();
    runLabelCleanup(cmd.alias,cmd.recursive,cmd.mode||'node');
    return;
  }
  if(cmd.type==='new'){
    if(!cmd.alias)return showCmdError();
    const target=aliasIndex[cmd.alias];
    if(!target)return showCmdError();
    // Find boardId for this target
    let boardId=null;
    if(target.type==='board')boardId=target.nodeId;
    else if(target.type==='card')boardId=target.boardId;
    else if(target.type==='cell'){
      const cell=getCell(target.parentId,`${target.rowId}-${target.colId}`);
      if(cell&&cell.boardId)boardId=cell.boardId;
    }
    if(!boardId)return showCmdError();
    closeSearch();
    addKbCard(boardId);
    return;
  }
  if(cmd.type==='nav'){
    // ^home → Root-Matrix
    if(cmd.alias==='home'){
      closeSearch();
      stack=[{nodeId:rootId,label:nodes[rootId].label,cellRef:null}];
      renderAnimated('out');
      setTimeout(()=>{const c=document.querySelector('.mcell');if(c)c.focus();},RENDER_DELAY_MS);
      return;
    }
    const target=aliasIndex[cmd.alias];
    if(!target)return showCmdError();
    closeSearch();
    if(target.type==='card'){
      openCard(target.boardId,target.cardId);
      return;
    }
    if(target.type==='link'){
      const link=nodes[target.boardId]?.data.links.find(l=>l.id===target.linkId);
      if(link&&link.url)window.open(link.url,'_blank');
      return;
    }
    if(target.type==='mail'){
      const link=nodes[target.boardId]?.data.links.find(l=>l.id===target.linkId);
      if(link)window.location.href=buildMailto(link);
      return;
    }
    // Board or Matrix: navigate to it
    navigateToAlias(target,cmd.subCmd,cmd.cardAlias);
    return;
  }
  if(cmd.type==='keybindings'){
    closeSearch();showKeyboardHelp();return;
  }
  if(cmd.type==='settings'){
    closeSearch();showSettings();return;
  }
  if(cmd.type==='togglesidebarscroll'){
    closeSearch();
    appSettings.sidebarScroll=!appSettings.sidebarScroll;
    saveSettings();
    sbApplyBodyClasses();
    if(appSettings.sidebarEnabled){renderSidebar();sbUpdateScrollFade();}
    return;
  }
  if(cmd.type==='freqview'){
    closeSearch();
    if(cmd.alias){
      const target=aliasIndex[cmd.alias];
      if(!target)return showCmdError();
      navigateToAlias(target,null,null);
      setTimeout(()=>{toggleFreqView(target.nodeId);},RENDER_DELAY_MS);
    } else {
      // Toggle on current matrix
      const cur=stack[stack.length-1];
      const nodeId=cur.cellRef?cur.cellRef.parentId:cur.nodeId;
      toggleFreqView(nodeId);
    }
    return;
  }
  showCmdError();
}
function navigateToAlias(target,subCmd,cardAlias){
  // Cell-level alias: open the cell directly
  if(target.type==='cell'){
    const cell=getCell(target.parentId,`${target.rowId}-${target.colId}`);
    let tab=cell.boardId?'board':'matrix';
    if(subCmd==='i')tab='info';
    else if(subCmd==='b')tab='board';
    else if(subCmd==='m')tab='matrix';
    else if(subCmd==='c')tab='checklists';
    const pn=nodes[target.parentId];
    const row=pn.data.rows.find(r=>r.id===target.rowId);
    const col=pn.data.cols.find(c=>c.id===target.colId);
    const label=(row?row.label:'')+'/'+(col?col.label:'');
    openCell(target.parentId,target.rowId,target.colId,label,tab);
    if(cardAlias){
      setTimeout(()=>{const ct=aliasIndex[cardAlias];if(ct&&ct.type==='card')openCard(ct.boardId,ct.cardId);},RENDER_DELAY_MS+50);
    }
    if(tab==='matrix'){setTimeout(()=>{const c=document.querySelector('.mcell');if(c)c.focus();},RENDER_DELAY_MS+50);}
    return;
  }
  const nodeId=target.nodeId;
  // Find path: which matrix cell holds this node?
  for(const[nid,n]of Object.entries(nodes)){
    if(n.type!=='matrix')continue;
    for(const[k,c]of Object.entries(n.data.cells)){
      const match=(c.boardId===nodeId)?'board':(c.matrixId===nodeId)?'matrix':null;
      if(match){
        const[rowId,colId]=k.split('-');
        // Determine tab
        let tab=match;
        if(subCmd==='i')tab='info';
        else if(subCmd==='b')tab='board';
        else if(subCmd==='m')tab='matrix';
        else if(subCmd==='c')tab='checklists';
        openCell(nid,rowId,colId,nodes[nodeId].label,tab);
        // If cardAlias specified, highlight that card after render
        if(cardAlias){
          setTimeout(()=>{
            const ct=aliasIndex[cardAlias];
            if(ct&&ct.type==='card')openCard(ct.boardId,ct.cardId);
          },RENDER_DELAY_MS+50);
        }
        // Auto-focus first cell if matrix tab
        if(tab==='matrix'){
          setTimeout(()=>{const cell=document.querySelector('.mcell');if(cell)cell.focus();},RENDER_DELAY_MS+50);
        }
        return;
      }
    }
  }
  // Root matrix
  if(nodeId===rootId){
    stack=[{nodeId:rootId,label:nodes[rootId].label,cellRef:null}];
    renderAnimated('out');
    return;
  }
}

function doScopedSearch(scope,query){
  const el=document.getElementById('searchresults');
  const terms=query.split('|').map(t=>t.trim().toLowerCase()).filter(Boolean);
  if(terms.length===0){el.classList.remove('is-open');return;}
  const results=[];
  function searchNode(nodeId){
    const n=nodes[nodeId];if(!n)return;
    if(n.type==='board'){
      if(scope==='cards'||scope==='all'){
        n.data.kbCards.forEach(card=>{
          const fields=[card.name,stripHtml(card.note),...(card.tags||[]),...(card.who||[])];
          if(terms.every(t=>fields.some(f=>f&&f.toLowerCase().includes(t))))
            results.push({type:'card',boardId:nodeId,id:card.id,name:card.name||'(ohne Name)',from:n.label,score:2});
        });
      }
      if(scope==='info'){
        n.data.infoFields.forEach(f=>{
          const txt=(f.label+' '+stripHtml(f.value)).toLowerCase();
          if(terms.every(t=>txt.includes(t)))
            results.push({type:'info',boardId:nodeId,id:f.id,name:f.label+': '+stripHtml(f.value).slice(0,60),from:n.label+' · Info',score:1});
        });
      }
      if(scope==='links'){
        n.data.links.forEach(l=>{
          const txt=(l.label+' '+(l.url||'')+' '+(l.to||'')+' '+(l.subject||'')).toLowerCase();
          if(terms.every(t=>txt.includes(t)))
            results.push({type:'link',boardId:nodeId,id:l.id,name:l.label,from:n.label+' · Links',score:1});
        });
      }
      if(scope==='checklists'){
        (n.data.checklists||[]).forEach(cl=>{
          cl.items.forEach(item=>{
            if(terms.every(t=>item.text.toLowerCase().includes(t)))
              results.push({type:'info',boardId:nodeId,id:cl.id,name:item.text,from:n.label+' · '+cl.label,score:1});
          });
        });
      }
    }
    if(n.type==='matrix'){
      Object.values(n.data.cells).forEach(cell=>{
        if(cell.boardId)searchNode(cell.boardId);
        if(cell.matrixId)searchNode(cell.matrixId);
      });
    }
  }
  searchNode(rootId);
  _searchActiveIdx=-1;
  if(results.length===0){
    el.classList.add('is-open');el.innerHTML=`<div class="empty-hint">Keine Ergebnisse</div>`;
    return;
  }
  el.classList.add('is-open','sr-anim');
  window._searchResults=results.slice(0,appSettings.searchMax||SEARCH_MAX);
  const hi=s=>{let h=esc(s);terms.forEach(t=>{const re=new RegExp('('+t.replace(/[.*+?^${}()|\[\]]/g,'\\$&')+')','gi');h=h.replace(re,'<mark class="sr-mark">$1</mark>');});return h;};
  el.innerHTML=window._searchResults.map((r,i)=>{
    return '<div class="sr-item" onclick="searchOpen('+i+')">'
      +'<div class="sr-name">'+hi(r.name)+'</div>'
      +'<div class="sr-from">'+esc(r.from)+'</div>'
      +'</div>';
  }).join('');
}

function searchInputKey(e){
  const inp=document.getElementById('searchinput');
  const isCmd=inp&&inp.value.startsWith('^');
  const items=document.querySelectorAll('#searchresults .sr-item');
  // Alt+ArrowUp/Down: recall previous searches and commands (unified history).
  if(e.altKey&&(e.key==='ArrowUp'||e.key==='ArrowDown')){
    e.preventDefault();
    _navSearchHistory(e.key==='ArrowUp'?-1:1);
    return;
  }
  // Any other key resets the history-navigation state so the next Alt+Arrow starts fresh
  if(_searchHistoryCursor!==-1){_searchHistoryCursor=-1;_searchHistoryDraft='';}
  if(e.key==='ArrowDown'&&items.length>0){
    e.preventDefault();
    _searchActiveIdx=Math.min(_searchActiveIdx+1,items.length-1);
    updateSearchActive(items);
  } else if(e.key==='ArrowUp'&&items.length>0){
    e.preventDefault();
    _searchActiveIdx=Math.max(_searchActiveIdx-1,-1);
    updateSearchActive(items);
  } else if(e.key==='Enter'){
    e.preventDefault();
    if(_searchActiveIdx>=0&&items[_searchActiveIdx]){
      // If selected item has onclick with executeCmd, click it; else searchOpen
      const item=items[_searchActiveIdx];
      if(item.onclick){item.click();}
      else{searchOpen(_searchActiveIdx);}
    }
    else if(isCmd){executeCommand(inp.value.slice(1));}
    else if(items.length>0){searchOpen(0);}
  } else if(e.key==='Escape'){
    e.preventDefault();closeSearch();
  }
}
function updateSearchActive(items){
  items.forEach((el,i)=>{el.classList.toggle('sr-active',i===_searchActiveIdx);

}
function doSearch(q){
  _searchActiveIdx=-1;
  const el=document.getElementById('searchresults');
  if(!q||q.length<SEARCH_MIN_LEN){el.classList.remove('is-open');return;}
  // Multi-term support: split by |
  const terms=q.split('|').map(t=>t.trim().toLowerCase()).filter(Boolean);
  if(terms.length===0){el.classList.remove('is-open');return;}
  const results=[];
  function searchNode(nodeId){
    const n=nodes[nodeId];if(!n)return;
    if(n.type==='board'){
      n.data.kbCards.forEach(card=>{
        const fields=[card.name,stripHtml(card.note),...(card.tags||[]),...(card.who||[])];
        const score=matchScoreMulti(terms,fields);
        if(score>0)results.push({type:'card',boardId:nodeId,boardLabel:n.label,id:card.id,name:card.name||'(ohne Name)',from:n.label,score});
      });
      n.data.infoFields.forEach(f=>{
        const txt=f.label+' '+stripHtml(f.value);
        if(terms.every(t=>txt.toLowerCase().includes(t)))
          results.push({type:'info',boardId:nodeId,id:f.id,name:f.label+': '+stripHtml(f.value).slice(0,60),from:n.label+' · Info',score:1});
      });
    }
    if(n.type==='matrix'){
      if(terms.every(t=>n.label.toLowerCase().includes(t)))results.push({type:'matrix',nodeId,name:n.label,from:'Matrix',score:2});
      Object.values(n.data.cells).forEach(cell=>{
        if(cell.boardId)searchNode(cell.boardId);
        if(cell.matrixId)searchNode(cell.matrixId);
      });
    }
  }
  searchNode(stack[0].nodeId);
  results.sort((a,b)=>b.score-a.score);
  if(results.length===0){
    el.classList.add('is-open','sr-anim');
    el.innerHTML=`<div class="empty-hint">Keine Ergebnisse</div>`;
    return;
  }
  el.classList.add('is-open','sr-anim');
  window._searchResults=results.slice(0,appSettings.searchMax||SEARCH_MAX);
  const hi=s=>{let h=esc(s);terms.forEach(t=>{const re=new RegExp('('+t.replace(/[.*+?^${}()|\[\]]/g,'\\$&')+')','gi');h=h.replace(re,'<mark class="sr-mark">$1</mark>');});return h;};
  el.innerHTML=window._searchResults.map((r,i)=>{
    return '<div class="sr-item" onclick="searchOpen('+i+')">'
      +'<div class="sr-name">'+hi(r.name)+'</div>'
      +'<div class="sr-from">'+esc(r.from)+'</div>'
      +'</div>';
  }).join('');
}
function matchScoreMulti(terms,fields){
  let score=0;
  if(!terms.every(t=>fields.some(f=>f&&f.toLowerCase().includes(t))))return 0;
  terms.forEach(t=>{fields.forEach(f=>{if(f&&f.toLowerCase().includes(t))score+=(f.toLowerCase()===t?3:1);});});
  return score;
}
function matchScore(q,fields){
  let score=0;
  fields.forEach(f=>{if(f&&f.toLowerCase().includes(q))score+=(f.toLowerCase()===q?3:1);});
  return score;
}
let _lastSearchQuery='';
let _searchActiveIdx=-1;
function highlightSearchTerm(){
  const q=_lastSearchQuery;if(!q||q.length<SEARCH_MIN_LEN)return;
  setTimeout(()=>{
    const panel=document.getElementById('panel');if(!panel)return;
    const walker=document.createTreeWalker(panel,NodeFilter.SHOW_TEXT);
    const re=new RegExp('('+q.replace(/[.*+?^${}()|\[\]]/g,'\\$&')+')','gi');
    const marks=[];
    while(walker.nextNode()){
      const node=walker.currentNode;
      if(node.parentElement.closest('.sr-mark,.search-hl'))continue;
      if(re.test(node.textContent)){
        re.lastIndex=0;
        const span=document.createElement('span');
        span.innerHTML=node.textContent.replace(re,'<mark class="search-hl" style="background:var(--bluebg);color:var(--bluetxt);border-radius:2px;padding:0 2px;transition:background 0.5s ease,color 0.5s ease;">$1</mark>');
        node.parentNode.replaceChild(span,node);
        marks.push(span);
      }
    }
    // Scroll first match into view
    const first=panel.querySelector('.search-hl');
    if(first)first.scrollIntoView({behavior:'smooth',block:'center'});
    // Remove highlights after 3 seconds — fade background only, keep text visible
    setTimeout(()=>{marks.forEach(s=>{
      s.querySelectorAll('.search-hl').forEach(m=>{m.style.background='transparent';m.style.color='inherit';});
      setTimeout(()=>{if(s.parentNode)s.parentNode.replaceChild(document.createTextNode(s.textContent),s);},HIGHLIGHT_FADE_MS);
    });},3000);
  },RENDER_DELAY_MS);
}
function searchOpen(i){
  const r=(window._searchResults||[])[i];
  if(!r)return;
  const curVal=document.getElementById('searchinput')?.value||'';
  _lastSearchQuery=curVal;
  // Record the search query in history before the search closes (plain text searches
  // are committed here; ^-commands are recorded via executeCommand separately).
  if(curVal&&!curVal.startsWith('^'))_pushSearchHistory(curVal);
  closeSearch();
  if(r.type==='card'){openCard(r.boardId,r.id);highlightSearchTerm();}
  else if(r.type==='info'){
    // Navigate to board — find parent matrix cell that holds this board
    const boardId=r.boardId;
    if(nodes[boardId]){
      // Find which matrix cell references this board
      let found=false;
      for(const[nid,n]of Object.entries(nodes)){
        if(n.type!=='matrix')continue;
        for(const[k,c]of Object.entries(n.data.cells)){
          if(c.boardId===boardId){
            const[rowId,colId]=k.split('-');
            openCell(nid,rowId,colId,nodes[boardId].label,'info');
            highlightSearchTerm();
            found=true;break;
          }
        }
        if(found)break;
      }
    }
  }
  else if(r.type==='matrix'){
    const s=stack.find(x=>x.nodeId===r.nodeId);
    if(!s)stack.push({nodeId:r.nodeId,label:r.name,cellRef:null});
    render();highlightSearchTerm();
  }
  else if(r.type==='link'){
    const link=nodes[r.boardId]?.data.links.find(l=>l.id===r.id);
    if(link){
      if(link.type==='mail')window.location.href=buildMailto(link);
      else if(link.url)window.open(link.url,'_blank');
    }
  }
}

  const sr=document.getElementById('searchresults');

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function sanitizeHtml(s){if(!s)return'';const d=document.createElement('div');d.innerHTML=s;d.querySelectorAll('script,iframe,object,embed,form,meta,link,style').forEach(e=>e.remove());d.querySelectorAll('*').forEach(el=>{for(const a of Array.from(el.attributes)){if(a.name.startsWith('on')||a.name==='srcdoc'||(a.name==='href'&&a.value.trim().toLowerCase().startsWith('javascript:')))el.removeAttribute(a.name);}});return d.innerHTML;}
function sanitizeUrl(url){if(!url)return'';const u=url.trim().toLowerCase();if(u.startsWith('javascript:')||u.startsWith('data:')||u.startsWith('vbscript:'))return'';return url;}
function stripHtml(s){return s?s.replace(/<[^>]+>/g,''):'';  }
function getLocale(){return appSettings.dateLocale||DATE_LOCALE;}
function fmtDate(d){if(!d)return'';const x=new Date(d);return x.toLocaleDateString(getLocale(),{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDateFull(d){return d.toLocaleDateString(getLocale(),{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
function getCard(boardId,cardId){return nodes[boardId]?.data?.kbCards?.find(x=>x.id===cardId)||null;}
function getTodayStr(){return today0().toISOString().split('T')[0];}
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function day0(v){const d=new Date(v);d.setHours(0,0,0,0);return d;}
function renderPrioDot(prio,size){if(!prio)return'';return`<span style="width:${size||8}px;height:${size||8}px;border-radius:50%;background:${PRIO_COLORS[prio]||'transparent'};display:inline-block;flex-shrink:0;margin-top:3px;" title="${prio}"></span>`;}
function renderBadge(text,bg,txt){return`<span class="kc-recur" style="background:${bg};color:${txt};">${text}</span>`;}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    // Priority 1: topmost modal via stack (Sprint 3.2)
    const top=_topModalClose();
    if(top){top();return;}
    // Fallback 1: card modal (falls nicht registriert, z.B. Legacy-Pfade)
    if(document.getElementById('cardmodal').innerHTML){closeCard();return;}
    // Fallback 2: mc-Overlay — unterscheide Stammdaten (hat .sd-tabs) vs. Generic smodal
    const mc=document.getElementById('mc');
    if(mc&&mc.innerHTML){
      if(mc.querySelector('.sd-tabs')){closeStammdaten();return;}
      closeS();return;
    }
    // Priority 3: go one level up in stack
    if(stack.length>1){navTo(stack.length-2);}
  }
  // Shortcut guard: skip when typing in inputs
  const _ae=document.activeElement;
  const _typing=_ae&&(_ae.tagName==='INPUT'||_ae.tagName==='TEXTAREA'||_ae.isContentEditable);
  // Section navigation (configurable)
  if(!_typing&&(matchShortcut(e,'sectionDown')||matchShortcut(e,'sectionUp'))){
    e.preventDefault();
    const dir=matchShortcut(e,'sectionDown')?'ArrowDown':'ArrowUp';
    const panel=document.getElementById('panel');if(!panel)return;
    const allFocusable=Array.from(panel.querySelectorAll('[tabindex="0"],button,a[href],.task-check'));
    if(allFocusable.length===0)return;
    const cur=document.activeElement;
    const curSection=cur?.closest('.mwrap,.matrix,.kb-wrap,.daily-wrap,.tabs,.card,.cl-list');
    if(!curSection){
      const target=dir==='ArrowDown'?allFocusable[0]:allFocusable[allFocusable.length-1];
      if(target){target.focus();target.scrollIntoView({behavior:'smooth',block:'nearest'});}
      return;
    }
    if(dir==='ArrowDown'){
      const sectionEnd=curSection.getBoundingClientRect().bottom;
      const next=allFocusable.find(el=>el.getBoundingClientRect().top>sectionEnd-2&&!curSection.contains(el));
      if(next){next.focus();next.scrollIntoView({behavior:'smooth',block:'nearest'});}
    } else {
      const sectionTop=curSection.getBoundingClientRect().top;
      const prev=[...allFocusable].reverse().find(el=>el.getBoundingClientRect().bottom<sectionTop+2&&!curSection.contains(el));
      if(prev){prev.focus();prev.scrollIntoView({behavior:'smooth',block:'nearest'});}
    }
    return;
  }
  // Configurable shortcuts
  if(!_typing&&matchShortcut(e,'search')){
    e.preventDefault();
    const inp=document.getElementById('searchinput');if(inp){inp.focus();inp.select();}
    return;
  }
  if(!_typing&&matchShortcut(e,'save')){e.preventDefault();flushToFile();return;}
  if(!_typing&&matchShortcut(e,'edit')){e.preventDefault();toggleEdit();return;}
  if(!_typing&&matchShortcut(e,'freqview')){e.preventDefault();executeCommand('w');return;}
  if(!_typing&&matchShortcut(e,'toggleSidebar')){e.preventDefault();sbToggle();return;}
  if(!_typing&&matchShortcut(e,'sidebarExpandAll')){e.preventDefault();sbToggleExpandAll();return;}
  if(!_typing&&matchShortcut(e,'focusSwap')){e.preventDefault();focusSwap();return;}
  if(matchShortcut(e,'focusSidebarSearch')){
    e.preventDefault();
    if(!appSettings.sidebarEnabled){appSettings.sidebarEnabled=true;saveSettings();}
    if(!sbOpen){sbOpen=true;sbApplyBodyClasses();renderSidebar();}
    setTimeout(()=>{const s=document.getElementById('sb-search');if(s){s.focus();s.select();}},50);
    return;
  }
  // Remove feature shortcuts (edit mode + cell focused)
  if(editMode&&!_typing&&_ae&&_ae.classList.contains('mcell')){
    const _rmMap={removeMatrix:'matrix',removeBoard:'board',removeInfo:'info',removeChecklists:'checklists'};
    for(const[action,feat] of Object.entries(_rmMap)){
      if(matchShortcut(e,action)){
        e.preventDefault();
        const nid=_ae.dataset.node,rid=_ae.dataset.row,cid=_ae.dataset.col;
        if(nid&&rid&&cid)removeFeature(nid,rid,cid,feat);
        return;
      }
    }
  }
});

const THEME_KEY='imatrix-theme';
const THEME_ICONS={light:ICO.sun(14),dark:ICO.moon(14),auto:ICO.auto(14)};
const THEME_TITLES={light:'Hell',dark:'Dunkel',auto:'Automatisch'};
const THEME_CYCLE=['light','dark','auto'];
let currentTheme=localStorage.getItem(THEME_KEY)||'auto';

function applyTheme(mode){
  let effective=mode;
  if(mode==='auto'){
    const h=new Date().getHours();
    effective=(h>=7&&h<19)?'light':'dark';
  }
  document.documentElement.setAttribute('data-theme',effective==='dark'?'dark':'');
  const btn=document.getElementById('themebtn');
  if(btn){btn.innerHTML=THEME_ICONS[mode];btn.title='Design: '+THEME_TITLES[mode];}
}
function cycleTheme(){
  const idx=THEME_CYCLE.indexOf(currentTheme);
  currentTheme=THEME_CYCLE[(idx+1)%THEME_CYCLE.length];
  localStorage.setItem(THEME_KEY,currentTheme);
  applyTheme(currentTheme);
}
