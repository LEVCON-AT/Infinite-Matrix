<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data: blob:; connect-src *;">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23378ADD'/><rect x='3.5' y='3.5' width='11.5' height='11.5' rx='1.5' fill='%23fff' opacity='.22'/><rect x='17' y='3.5' width='11.5' height='11.5' rx='1.5' fill='%23fff' opacity='.22'/><rect x='17' y='17' width='11.5' height='11.5' rx='1.5' fill='%23fff' opacity='.22'/><rect x='3.5' y='17' width='11.5' height='11.5' rx='1.5' fill='%23fff' opacity='.22'/><rect x='5' y='5' width='4.25' height='4.25' rx='1' fill='%23fff' opacity='.55'/><rect x='10.25' y='5' width='4.25' height='4.25' rx='1' fill='%23fff' opacity='.55'/><rect x='5' y='10.25' width='4.25' height='4.25' rx='1' fill='%23fff' opacity='.55'/><rect x='10.25' y='10.25' width='4.25' height='4.25' rx='1' fill='%23fff' opacity='.55'/></svg>">
<title>Infinite Matrix</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
/* ── SCROLLBARS ── */
*{scrollbar-width:thin;scrollbar-color:var(--scroll-thumb) transparent;}
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-track{background:transparent;border-radius:var(--rs);}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:var(--rs);}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.28);}
[data-theme="dark"] ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.28);}
::-webkit-scrollbar-corner{background:transparent;}
:root{
  --scroll-thumb:rgba(0,0,0,0.18);
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#66665f;--text3:#bbb;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --blue:#378ADD;--bluebg:#E6F1FB;--bluetxt:#0C447C;
  --teal:#1D9E75;--tealbg:#E1F5EE;--tealtxt:#085041;
  --amber:#BA7517;--amberbg:#FAEEDA;--ambertxt:#633806;
  --prio-medium:#E8A317;
  --red:#E24B4A;--redbg:#FCEBEB;--redtxt:#791F1F;
  --purple:#7F77DD;--purplebg:#EEEDFE;--purpletxt:#3C3489;
  --rs:4px;--r:8px;--rl:12px;
  /* ── DESIGN-TOKENS (Sprint 1) ── */
  /* Spacing-Skala */
  --space-xs:4px; --space-sm:8px; --space-md:12px; --space-lg:16px;
  /* Transitions — CLAUDE.md-Standard */
  --tr-std:220ms cubic-bezier(.4,0,.2,1);
  --tr-enter:180ms cubic-bezier(.16,1,.3,1);
  /* Focus-Ring */
  --focus-color:var(--blue); --focus-offset:2px; --focus-width:2px;
  /* Shadows/Overlays */
  --overlay-strong:rgba(0,0,0,0.3);
  --overlay-soft:rgba(0,0,0,0.28);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.08);
  --shadow-md:0 4px 16px rgba(0,0,0,0.12);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.16);
  --fade-mask-color:#000;
  --bg-check:#fff;
  --freq-2-bg:#c8def5;
}
[data-theme="dark"]{
  --scroll-thumb:rgba(255,255,255,0.16);
  --bg:#1e1e1e;--bg2:#252525;--bg3:#181818;
  --text:#e0e0e0;--text2:#999;--text3:#555;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --blue:#5a9fd4;--bluebg:#1a2a3a;--bluetxt:#8ec5f0;
  --teal:#2db88a;--tealbg:#162e24;--tealtxt:#6ee0b8;
  --amber:#d4952e;--amberbg:#2e2414;--ambertxt:#f0c878;
  --prio-medium:#e8a830;
  --red:#e06060;--redbg:#2e1818;--redtxt:#f0a0a0;
  --purple:#9a94e8;--purplebg:#1e1c30;--purpletxt:#c4c0f0;
  /* Dark-Mode-Shadow/Overlay-Overrides */
  --overlay-strong:rgba(0,0,0,0.5);
  --overlay-soft:rgba(0,0,0,0.45);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.4);
  --shadow-md:0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.6);
  --fade-mask-color:#000;
  --bg-check:#fff;
  --freq-2-bg:#2d4a6e;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;transition:background 0.3s ease,color 0.3s ease;}
#app{display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ── */
#topbar{background:var(--bg);border-bottom:0.5px solid var(--border2);padding:8px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-wrap:wrap;}
#tl{flex:1;min-width:0;}
#tr{display:flex;align-items:center;gap:6px;position:relative;flex-shrink:0;}
#content{flex:1;padding:16px 14px;max-width:1200px;margin:0 auto;width:100%;}
.bc{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.bcs{font-size:12px;color:var(--blue);cursor:pointer;padding:2px 4px;border-radius:var(--rs);white-space:nowrap;}
.bcs:hover{background:var(--bluebg);}
.bcc{font-size:12px;color:var(--text);font-weight:500;padding:2px 4px;white-space:nowrap;}
.bca{color:var(--text3);font-size:11px;}

/* ── EDIT-ONLY VISIBILITY ── */
.edit-only{display:none !important;}
body.editing .edit-only{display:inline-flex !important;}
body.editing label.edit-only{display:inline-flex !important;}
/* Visibility overrides: vis-always forces visibility outside edit mode */
body.vis-addRowCol .edit-only[data-vis="addRowCol"]{display:inline-flex !important;}
body.vis-addKbCol .edit-only[data-vis="addKbCol"]{display:inline-flex !important;}
body.vis-exportImport .edit-only[data-vis="exportImport"]{display:inline-flex !important;}

/* ── BUTTONS ── */
.btn{padding:5px 11px;font-size:12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap;font-family:inherit;}
.btn:hover{background:var(--bg2);}
.btn.danger{color:var(--red);}
.ico-btn{padding:4px 7px;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
.btn-p{padding:6px 14px;font-size:12px;border-radius:var(--r);border:none;background:var(--text);color:var(--bg);cursor:pointer;font-family:inherit;}
.btn-p:hover{opacity:0.85;}
.btn-c{padding:6px 12px;font-size:12px;border-radius:var(--r);border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.btn-c:hover{background:var(--bg2);}

/* ── TABS ── */
.tabs{display:flex;border:0.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;background:var(--bg2);margin-bottom:14px;}
.tab{flex:1;padding:8px 12px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;border-right:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;gap:5px;transition:background 0.1s;}
.tab:last-child{border-right:none;}
.tab:hover{background:var(--bg);color:var(--text);}
.tab.active{background:var(--bg);color:var(--text);}
.tbadge{font-size:10px;background:var(--bg3);color:var(--text2);padding:1px 5px;border-radius:20px;}
.tab.active .tbadge{background:var(--bluebg);color:var(--bluetxt);}

/* ── MATRIX ── */
.mwrap{overflow-x:auto;}
.matrix{display:grid;border:0.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;background:var(--bg);min-width:fit-content;}
.mh{background:var(--bg2);font-size:11px;font-weight:500;color:var(--text2);padding:7px 9px;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;gap:4px;position:relative;overflow:visible;}
.mh.corner{background:var(--bg3);}
.mh.ch{justify-content:center;text-align:center;}
.mh.rh{}
.ni{font-size:11px;font-weight:500;color:var(--text2);background:transparent;border:none;outline:none;font-family:inherit;flex:1;min-width:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;}
.ni:focus{color:var(--text);white-space:normal;text-overflow:clip;}
.edel{display:none;font-size:12px;color:var(--red);cursor:pointer;margin-left:auto;padding:0 2px;flex-shrink:0;}
.emode .edel{display:inline;}
.emode .mh{background:var(--bg2);}
.mcell{border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);min-height:66px;display:flex;flex-direction:column;padding:6px 7px;gap:3px;transition:background 0.1s;}
.mcell:hover{background:var(--bg2);}
.mcell:focus{outline:none;}
.cchips{display:flex;flex-wrap:wrap;gap:2px;}
.chip{font-size:10px;padding:1px 5px;border-radius:20px;font-weight:500;}
.chip-b{background:var(--tealbg);color:var(--tealtxt);}
.chip-m{background:var(--bluebg);color:var(--bluetxt);}
.cicons{display:flex;gap:3px;margin-top:auto;padding-top:3px;}
.cib{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all 0.1s;user-select:none;white-space:nowrap;}
.cib:hover{border-color:var(--blue);color:var(--bluetxt);background:var(--bluebg);}
.cib.ab{background:var(--tealbg);color:var(--tealtxt);border-color:var(--tealbg);}
.cell-ghost{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 3px;border-radius:3px;display:inline-flex;align-items:center;}
.cell-ghost:hover{color:var(--text2);background:var(--bg3);}
.cell-ghosts{display:flex;gap:4px;justify-content:flex-end;padding-top:2px;}
.cib.am{background:var(--bluebg);color:var(--bluetxt);border-color:var(--bluebg);}
.addcolhdr{background:var(--bg2);border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;padding:4px;}
.addrowcol{border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;background:var(--bg2);min-height:66px;}
.addrowfull{grid-column:1/2;background:var(--bg2);border-top:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;padding:4px;}
.addbtn{width:22px;height:22px;border-radius:50%;border:0.5px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.1s;font-family:inherit;}
.addbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--bluebg);}
.addfull{width:100%;padding:6px;font-size:12px;color:var(--text3);border:0.5px dashed var(--border2);border-radius:var(--r);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit;}
.addfull:hover{border-color:var(--blue);color:var(--blue);}

/* ── PANEL HEADER ── */
.phd{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.ptitle{font-size:17px;font-weight:500;}
.psub{font-size:12px;color:var(--text2);margin-top:2px;}

/* ── CARD ── */
.card{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;}
.cardhd{background:var(--bg2);padding:8px 13px;font-size:12px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;}

/* ── INFO TAB ── */
.info-field{padding:10px 13px;border-bottom:0.5px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.info-label{font-size:11px;font-weight:500;color:var(--text2);}
.info-val{font-size:13px;color:var(--text);outline:none;min-height:20px;line-height:1.5;}
.info-val a{color:var(--blue);}
.links-grid{display:flex;flex-wrap:wrap;gap:6px;padding:10px 13px;}
.link-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--bluetxt);font-size:12px;cursor:pointer;text-decoration:none;}
.link-btn:hover{background:var(--bluebg);}
.link-add{border-style:dashed;color:var(--text3);cursor:pointer;background:transparent;}
.link-add:hover{border-color:var(--blue);color:var(--blue);}

/* ── KANBAN ── */
.kb-wrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;align-items:flex-start;}
.scroll-fade-r{-webkit-mask-image:linear-gradient(to right,var(--fade-mask-color) calc(100% - 1.5em),transparent);mask-image:linear-gradient(to right,var(--fade-mask-color) calc(100% - 1.5em),transparent);}
.scroll-fade-l{-webkit-mask-image:linear-gradient(to right,transparent,var(--fade-mask-color) 1.5em);mask-image:linear-gradient(to right,transparent,var(--fade-mask-color) 1.5em);}
.scroll-fade-lr{-webkit-mask-image:linear-gradient(to right,transparent,var(--fade-mask-color) 1.5em,var(--fade-mask-color) calc(100% - 1.5em),transparent);mask-image:linear-gradient(to right,transparent,var(--fade-mask-color) 1.5em,var(--fade-mask-color) calc(100% - 1.5em),transparent);}
.kb-col{background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--border2);min-width:220px;max-width:260px;flex-shrink:0;display:flex;flex-direction:column;}
.kb-col-hd{padding:9px 12px;font-size:12px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:6px;border-bottom:0.5px solid var(--border);}
.kb-col-hd .cnt{font-size:10px;color:var(--text3);font-weight:400;}
.kb-col-hd .delbtn{margin-left:auto;font-size:12px;color:var(--text3);cursor:pointer;display:none;}
.emode .kb-col-hd .delbtn{display:inline;}
.kb-cards{padding:7px;display:flex;flex-direction:column;gap:6px;flex:1;}
.kb-card{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:9px 10px;cursor:pointer;transition:background 0.1s;border-left:5px solid transparent;}
.kb-card[data-prio="high"]{border-left-color:var(--red);}
.kb-card[data-prio="medium"]{border-left-color:var(--prio-medium);}
.kb-card[data-prio="low"]{border-left-color:var(--teal);}
.kb-card:hover{background:var(--bg2);}
.kb-card:focus{outline:none;}
.kb-card.archived{opacity:0.5;}
.kc-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:var(--card-lines,2);overflow:hidden;word-break:break-word;}
.kc-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.kc-tag{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--purplebg);color:var(--purpletxt);}
.kc-who{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--bluebg);color:var(--bluetxt);}
.kc-dl{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--amberbg);color:var(--ambertxt);display:flex;align-items:center;gap:3px;}
.kc-dl.overdue{background:var(--redbg);color:var(--redtxt);}
.kc-recur{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--tealbg);color:var(--tealtxt);display:flex;align-items:center;gap:3px;}
.kc-checklist{font-size:10px;color:var(--text3);margin-top:4px;}
.kc-actions{display:flex;gap:4px;margin-top:6px;border-top:0.5px solid var(--border);padding-top:5px;}
.kc-act{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:var(--rs);transition:all 0.1s;user-select:none;}
.kc-act:hover{background:var(--bg3);color:var(--text);}
.kc-act.disabled{opacity:0.25;cursor:default;pointer-events:none;}
.kb-done .kc-name{text-decoration:line-through;color:var(--text3);}
.kb-add-card{padding:7px;border-top:0.5px solid var(--border);}
.kb-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:80px;border:1.5px dashed var(--border2);border-radius:var(--r);cursor:pointer;transition:all 0.15s;margin:2px;}
.kb-empty:hover{border-color:var(--blue);background:var(--bluebg);}
.kb-empty-icon{font-size:18px;color:var(--text3);line-height:1;}
.kb-empty-label{font-size:11px;color:var(--text3);}
.kb-empty:hover .kb-empty-icon,.kb-empty:hover .kb-empty-label{color:var(--blue);}
.kb-add-col{min-width:180px;flex-shrink:0;display:flex;flex-direction:column;justify-content:flex-start;padding:7px;}

/* ── CHECKLISTS TAB ── */
.cl-list{padding:10px 13px;}
.cl-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border);}
.cl-item:last-child{border-bottom:none;}
.cl-check{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;cursor:pointer;position:relative;}
.cl-check.done{background:var(--teal);border-color:var(--teal);}
.cl-check.done::after{content:'';position:absolute;top:2px;left:2px;width:7px;height:4px;border-left:1.5px solid var(--bg-check);border-bottom:1.5px solid var(--bg-check);transform:rotate(-45deg);}
.cl-text{font-size:13px;color:var(--text);flex:1;}
.cl-text.done{text-decoration:line-through;color:var(--text3);}

/* ── DAILY OVERVIEW ── */
.daily-wrap{margin-top:22px;}
.daily-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.daily-cols{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;align-items:flex-start;}
.daily-col{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);min-width:200px;flex-shrink:0;}
.daily-col-hd{padding:8px 12px;font-size:12px;font-weight:500;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:6px;}
.daily-col-hd .delbtn{margin-left:auto;font-size:11px;color:var(--text3);cursor:pointer;}
.daily-item{padding:7px 12px;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text);display:flex;align-items:flex-start;gap:7px;border-left:5px solid transparent;}
.daily-item[data-prio="high"]{border-left-color:var(--red);}
.daily-item[data-prio="medium"]{border-left-color:var(--prio-medium);}
.daily-item[data-prio="low"]{border-left-color:var(--teal);}
.daily-item:last-child{border-bottom:none;}
.daily-item .di-name{flex:1;}
.daily-item .di-from{font-size:10px;color:var(--text3);margin-top:1px;}
.card-origin{cursor:pointer;margin-right:0.4em;opacity:0.65;transition:opacity 0.15s;display:inline-block;}
.card-origin:hover{opacity:1;}
.origin-alias{font-family:monospace;font-size:0.9em;padding:0.05em 0.4em;border-radius:var(--rs);background:var(--bg3);color:var(--text2);}
.origin-label{font-size:0.9em;color:var(--text3);font-style:italic;}
.recur-icon{font-size:10px;color:var(--teal);flex-shrink:0;margin-top:2px;}
.task-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;position:relative;transition:all 0.1s;}
.task-check:hover{border-color:var(--teal);background:var(--tealbg);}

/* ── CARD DETAIL MODAL ── */
.modal-overlay{position:fixed;inset:0;background:var(--overlay-strong);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto;}
.modal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);padding:0;width:560px;max-width:96vw;max-height:85vh;overflow-y:auto;}
.modal-hd{padding:14px 16px;border-bottom:0.5px solid var(--border2);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg);z-index:2;}
.modal-hd h3{font-size:15px;font-weight:500;flex:1;}
.modal-body{padding:14px 16px;}
.modal-label{font-size:11px;color:var(--text2);margin-bottom:3px;display:block;}
.modal-input{width:100%;font-size:13px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:10px;font-family:inherit;outline:none;}
.modal-input:focus{border-color:var(--blue);}
[data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.8);cursor:pointer;}
[data-theme="dark"] input[type="date"]{color-scheme:dark;}
.modal-textarea{width:100%;font-size:12px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:10px;font-family:inherit;outline:none;resize:vertical;min-height:60px;}
.modal-textarea:focus{border-color:var(--blue);}
.modal-select{width:100%;font-size:13px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:10px;font-family:inherit;outline:none;}
.modal-actions{display:flex;gap:7px;justify-content:flex-end;padding:12px 16px;border-top:0.5px solid var(--border);position:sticky;bottom:0;background:var(--bg);}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tag-pick{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border2);cursor:pointer;background:var(--bg);}
.tag-pick.sel{background:var(--purplebg);color:var(--purpletxt);border-color:var(--purplebg);}
.who-pick{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border2);cursor:pointer;background:var(--bg);}
.who-pick.sel{background:var(--bluebg);color:var(--bluetxt);border-color:var(--bluebg);}
.recur-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.section-divider{font-size:11px;font-weight:500;color:var(--text2);margin:12px 0 6px;padding-bottom:4px;border-bottom:0.5px solid var(--border);}

/* ── SIMPLE MODAL ── */
.smodal-overlay{position:fixed;inset:0;background:var(--overlay-soft);z-index:300;display:flex;align-items:center;justify-content:center;}
.smodal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);padding:18px;width:320px;max-width:95vw;}
.smodal h3{font-size:14px;font-weight:500;margin-bottom:12px;}
.smodal input,.smodal select{width:100%;font-size:13px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:9px;font-family:inherit;outline:none;}
.smodal input:focus,.smodal select:focus{border-color:var(--blue);}
.smodal label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;}
.smodal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:4px;}

/* ── STAMMDATEN MODAL ── */
.sdmodal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);padding:0;width:480px;max-width:96vw;max-height:80vh;overflow-y:auto;}
.sdmodal-hd{padding:12px 16px;border-bottom:0.5px solid var(--border2);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg);}
.sdmodal-hd h3{font-size:14px;font-weight:500;flex:1;}
.sd-tabs{display:flex;border-bottom:0.5px solid var(--border2);}
.sd-tab{padding:8px 16px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;}
.sd-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.sd-body{padding:14px 16px;}
.sd-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);}
.sd-item:last-child{border-bottom:none;}
.sd-item input{flex:1;font-size:13px;border:none;outline:none;background:transparent;font-family:inherit;color:var(--text);}
.sd-item input:focus{color:var(--text);}
.sd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ── MISC ── */
.empty-state{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:13px;}
.sr-item{padding:9px 13px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.1s;}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover{background:var(--bg2);}
.sr-name{font-size:13px;color:var(--text);font-weight:500;display:flex;align-items:center;gap:6px;}
.sr-from{font-size:11px;color:var(--text3);margin-top:2px;}
.sr-mark{background:var(--bluebg);color:var(--bluetxt);border-radius:2px;padding:0 2px;}
.sr-item.sr-active{background:var(--bluebg);}
.sr-ico{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;}
/* Feature glyphs on the right side of a cell-match (no subCmd): shows which features exist */
.sr-glyphs{margin-left:auto;display:inline-flex;align-items:center;gap:2px;flex-shrink:0;}
.sr-feat-glyph{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;cursor:pointer;transition:background 0.1s;}
.sr-feat-glyph:hover{background:var(--bg3);}
/* Zone B: sub-content under a single-match ^alias result when subCmd is present */
.sr-zone-b{padding:4px 0 8px 0;animation:fadeSlideIn 180ms cubic-bezier(.4,0,.2,1);}
.sr-divider{height:1px;background:var(--border);margin:0 13px 6px 13px;}
.sr-subitem{padding:5px 13px 5px 30px;font-size:12px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.1s;}
.sr-subitem:hover{background:var(--bg2);}
.sr-subitem .sr-ico{width:13px;height:13px;}
.sr-subitem-progress{color:var(--text3);font-size:11px;margin-left:auto;font-variant-numeric:tabular-nums;}
.empty-big{font-size:26px;margin-bottom:8px;}
#minimap-panel{display:none;position:absolute;top:38px;right:0;width:200px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);padding:10px;z-index:60;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
#minimap-panel.open{display:block;}
.mm-node{display:flex;align-items:center;gap:4px;cursor:pointer;border-radius:var(--rs);padding:2px 3px;font-size:11px;color:var(--text2);line-height:1.7;}
.mm-node:hover{background:var(--bg2);}
.mm-node.active{color:var(--bluetxt);font-weight:500;background:var(--bluebg);}
.mm-node.drag-over{background:var(--tealbg);color:var(--tealtxt);}
.mm-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
.pill-o{background:var(--bg3);color:var(--text);}
.pill-w{background:var(--amberbg);color:var(--ambertxt);}
.pill-d{background:var(--tealbg);color:var(--tealtxt);}
.pill-a{background:var(--bg3);color:var(--text3);}

/* ── CELL FEATURE SEGMENTS ── */
.cell-segment{display:flex;align-items:center;gap:5px;border-radius:var(--rs);cursor:pointer;transition:filter 0.1s;overflow:hidden;}
.cell-segment:hover{filter:brightness(0.95);}
.cell-segment-label{font-size:11px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cell-segment-meta{font-size:10px;opacity:0.8;white-space:nowrap;}

/* ── CELL QUADRANT VIEW ── */
.cell-quad{display:grid;margin:auto;}
.cell-quad-item{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--rs);cursor:pointer;transition:filter 0.1s;text-align:center;overflow:hidden;}
.cell-quad-item:hover{filter:brightness(0.92);}
.cell-quad-meta{font-size:9px;opacity:0.8;white-space:nowrap;margin-top:1px;}

/* ── ALIAS ── */
.alias-input{width:65px;font-size:11px;font-family:monospace;padding:2px 6px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text2);outline:none;transition:border-color 0.15s;}
.alias-input:focus{border-color:var(--blue);color:var(--text);}
.alias-input::placeholder{color:var(--text3);}
.alias-tag{font-size:10px;font-family:monospace;color:var(--text3);padding:1px 4px;border-radius:3px;background:var(--bg3);}

/* ── FREQUENCY MATRIX ── */
.freq-grid{display:grid;border:0.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;background:var(--bg);}
.freq-hd{background:var(--bg2);font-size:11px;font-weight:500;color:var(--text2);padding:7px 9px;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);text-align:center;white-space:nowrap;}
.freq-hd.corner{background:var(--bg3);}
.freq-row-hd{background:var(--bg2);font-size:11px;font-weight:500;color:var(--bluetxt);padding:7px 9px;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.freq-row-hd:hover{background:var(--bluebg);}
.freq-cell{border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:34px;cursor:default;transition:background 0.1s;}
.freq-badge{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:22px;border-radius:var(--rs);font-size:11px;font-weight:600;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;}
.freq-badge:hover{transform:scale(1.12);box-shadow:0 2px 6px rgba(0,0,0,0.12);}
.freq-1{background:var(--bluebg);color:var(--bluetxt);}
.freq-2{background:var(--freq-2-bg);color:var(--bluetxt);}
.freq-3{background:var(--blue);color:var(--bg);}
.freq-flyout{position:fixed;z-index:200;min-width:240px;max-width:360px;max-height:400px;overflow-y:auto;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);box-shadow:0 4px 16px rgba(0,0,0,0.15);padding:0;animation:popIn 0.2s cubic-bezier(0.16,1,0.3,1);}
.freq-flyout-hd{padding:10px 12px;border-bottom:0.5px solid var(--border);font-size:12px;font-weight:500;color:var(--text);}
.freq-flyout-hd span{font-weight:400;color:var(--text2);}
.freq-group{padding:6px 12px;border-bottom:0.5px solid var(--border);}
.freq-group-hd{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px;cursor:pointer;}
.freq-group-hd:hover{color:var(--bluetxt);}
.freq-group-item{font-size:12px;color:var(--text);padding:3px 0 3px 12px;cursor:pointer;border-radius:var(--r);transition:background 0.1s;}
.freq-group-item:hover{background:var(--bluebg);color:var(--bluetxt);}
.freq-toggle{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);cursor:pointer;padding:3px 8px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);transition:all 0.15s;margin-left:8px;}
.freq-toggle:hover,.freq-toggle.active{background:var(--bluebg);color:var(--bluetxt);border-color:var(--bluebg);}
.freq-chevron{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;font-size:10px;color:var(--text3);cursor:pointer;user-select:none;transition:transform 0.15s,color 0.1s;margin-right:4px;vertical-align:-1px;}
.freq-chevron:hover{color:var(--text);}
.freq-chevron.expanded{transform:rotate(90deg);}
.freq-chevron-spacer{display:inline-block;width:14px;height:14px;margin-right:4px;vertical-align:-1px;}

/* ── KEYBOARD HELP ── */
.kb-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;}
.kb-spacer{grid-column:1/-1;height:6px;}
.kb-section{grid-column:1/-1;font-size:11px;font-weight:500;color:var(--text2);padding-top:4px;border-bottom:0.5px solid var(--border);padding-bottom:3px;}
.kb-key{font-size:12px;font-family:monospace;color:var(--text2);background:var(--bg3);padding:2px 6px;border-radius:var(--rs);white-space:nowrap;text-align:right;}
.kb-key-cfg{font-size:12px;font-family:monospace;color:var(--bluetxt);background:var(--bluebg);padding:2px 6px;border-radius:var(--rs);white-space:nowrap;text-align:right;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;}
.kb-key-cfg:hover{border-color:var(--blue);}
.kb-desc{font-size:12px;color:var(--text);padding:2px 0;}
.kb-desc-fixed{font-size:12px;color:var(--text2);padding:2px 0;}

/* ── COMMAND ERROR / SUCCESS ── */
@keyframes cmdError{0%,100%{transform:none}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes cmdSuccess{0%{box-shadow:0 0 0 0 var(--teal)}70%{box-shadow:0 0 0 6px rgba(29,158,117,0)}100%{box-shadow:0 0 0 0 rgba(29,158,117,0)}}
#searchinput{font-size:12px;padding:4px 8px 4px 22px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none;width:200px;font-family:inherit;transition:width 0.2s ease;}
#searchinput.cmd-error{animation:cmdError 0.3s ease;border-color:var(--red);color:var(--red);}
#searchinput.cmd-success{animation:cmdSuccess 0.6s ease;border-color:var(--teal);color:var(--tealtxt);}
.cmd-help{font-size:11px;font-family:monospace;padding:10px 12px;line-height:1.8;}
.cmd-help b{color:var(--bluetxt);}

/* ── SIDEBAR ── */
#main-layout{display:flex;flex:1;min-height:0;}
body.has-sidebar-right #main-layout{flex-direction:row-reverse;}
body.has-sidebar #content{max-width:none;margin:0;}
body.has-sidebar #minimap-panel,body.has-sidebar #mapbtn{display:none;}
#sidebar{
  position:relative;flex-shrink:0;
  width:var(--sb-w,280px);min-width:0;max-width:520px;
  background:var(--bg);border-right:0.5px solid var(--border2);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width var(--tr-std),min-width var(--tr-std);
  --sb-alias-w:52px;--sb-depth-indent:14px;--sb-rails-w:24px;
}
body.has-sidebar-right #sidebar{border-right:none;border-left:0.5px solid var(--border2);}
/* Viewport-Scroll-Mode: Sidebar klebt am Viewport-Top und bleibt 100vh hoch;
   Tree scrollt intern statt die Seite zu strecken. Tree-Wrap erbt flex:1 → bekommt
   verfügbare Höhe, overflow-y:auto scrollt, Mask-Fade wird aktiv. */
body.sb-scroll-viewport #sidebar{position:sticky;top:0;align-self:flex-start;height:100vh;}
body.sb-state-full #sidebar{min-width:200px;}
body.sb-state-rails #sidebar{width:var(--sb-rails-w,24px);min-width:0;max-width:var(--sb-rails-w,24px);cursor:pointer;}
body.sb-state-rails #sidebar .sb-resize-handle{display:none;}
body.sb-state-rails #sidebar .sb-node{pointer-events:none;}
body.sb-state-rails #sidebar .sb-node-chevron,body.sb-state-rails #sidebar .sb-node-alias,body.sb-state-rails #sidebar .sb-node-icon,body.sb-state-rails #sidebar .sb-node-title,body.sb-state-rails #sidebar .sb-row-actions{opacity:0;pointer-events:none;}
body.sb-state-rails #sidebar .sb-tree-wrap{padding:32px 0 16px 0;}
body.sb-collapsed #sidebar{width:0;min-width:0;border:none;}
.sb-node-chevron,.sb-node-alias,.sb-node-icon,.sb-node-title,.sb-row-actions{transition:opacity 160ms ease;}
.sb-header{padding:10px 10px 6px;border-bottom:0.5px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:6px;
  max-height:320px;opacity:1;overflow:hidden;
  transition:max-height var(--tr-std),opacity 160ms ease,padding-top var(--tr-std),padding-bottom var(--tr-std),border-bottom-color 160ms ease;}
body.sb-state-rails #sidebar .sb-header,body.sb-collapsed #sidebar .sb-header{max-height:0;opacity:0;padding-top:0;padding-bottom:0;border-bottom-color:transparent;pointer-events:none;}
.sb-header-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sb-header-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.4px;text-transform:uppercase;}
#sb-inline-toggle{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border:0.5px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--text2);cursor:pointer;padding:0;flex-shrink:0;transition:background .12s,color .12s,border-color .12s;}
#sb-inline-toggle:hover{background:var(--bluebg);color:var(--bluetxt);border-color:var(--blue);}
#sb-rail-cap{position:absolute;top:0;left:0;right:0;height:28px;display:none;align-items:center;justify-content:center;background:var(--bg2);border:none;border-bottom:0.5px solid var(--border);color:var(--text2);cursor:pointer;padding:0;z-index:3;transition:background .12s,color .12s;}
#sb-rail-cap:hover{background:var(--bluebg);color:var(--bluetxt);}
body.sb-state-rails #sb-rail-cap{display:inline-flex;}
.sb-search-wrap{position:relative;}
#sb-search{width:100%;font-size:12px;padding:5px 8px 5px 24px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none;}
#sb-search:focus{border-color:var(--blue);}
.sb-search-icon{position:absolute;left:7px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:0.55;color:var(--text3);}
.sb-chips{display:flex;gap:4px;flex-wrap:wrap;}
.sb-chip{font-size:10px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;line-height:1.3;transition:all .12s;display:inline-flex;align-items:center;gap:4px;}
.sb-chip:hover{border-color:var(--blue);color:var(--text);}
.sb-chip.active{background:var(--bluebg);color:var(--bluetxt);border-color:var(--bluebg);}
.sb-chip svg{display:block;}
.sb-chips-group{margin-top:6px;}
.sb-chips-group:first-of-type{margin-top:0;}
.sb-chips-label{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin:0 0 3px 2px;font-weight:500;}
/* Link/Mail: neutrale Referenz-Farbe — bewusst kein Feature-Farbkanon */
.ln-link,.ln-mail{stroke:var(--text3);}
circle.dot-link,circle.dot-mail{fill:var(--text3);}
.sb-node-icon.ico-link,.sb-node-icon.ico-mail{color:var(--text3);}
.sb-adv-filter{font-size:11px;}
.sb-adv-filter summary{font-size:11px;color:var(--text2);cursor:pointer;padding:2px 0;user-select:none;}
.sb-adv-filter summary:hover{color:var(--text);}
.sb-filter-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 8px;margin-top:4px;align-items:start;}
.sb-filter-grid label{font-size:10px;color:var(--text2);padding-top:3px;}
.sb-pills-wrap{display:flex;flex-wrap:wrap;gap:3px;}
.sb-pill{font-size:10px;padding:2px 7px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;line-height:1.3;}
.sb-pill.active{background:var(--bluebg);color:var(--bluetxt);border-color:var(--bluebg);}
.sb-pill.prio-high.active{background:var(--redbg);color:var(--redtxt);border-color:var(--redbg);}
.sb-pill.prio-medium.active{background:var(--amberbg);color:var(--ambertxt);border-color:var(--amberbg);}
.sb-pill.prio-low.active{background:var(--tealbg);color:var(--tealtxt);border-color:var(--tealbg);}
.sb-clear-filter{font-size:10px;padding:3px 8px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;align-self:flex-start;}
.sb-clear-filter:hover{border-color:var(--red);color:var(--red);}
@property --fade-top{syntax:'<length>';inherits:false;initial-value:0px;}
@property --fade-bot{syntax:'<length>';inherits:false;initial-value:0px;}
.sb-tree-wrap{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;padding:6px 6px 16px;--fade-top:0px;--fade-bot:0px;-webkit-mask-image:linear-gradient(to bottom,transparent 0,var(--fade-mask-color) var(--fade-top),var(--fade-mask-color) calc(100% - var(--fade-bot)),transparent 100%);mask-image:linear-gradient(to bottom,transparent 0,var(--fade-mask-color) var(--fade-top),var(--fade-mask-color) calc(100% - var(--fade-bot)),transparent 100%);transition:--fade-top .18s ease,--fade-bot .18s ease;}
.sb-tree{position:relative;z-index:1;}
.sb-connections{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;z-index:2;}
.sb-connections path{fill:none;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;}
.sb-connections path.ln-rail{stroke:var(--border2);opacity:0.9;}
.sb-connections path.ln-split{opacity:0.55;}
.sb-connections path.ln-split.ln-matrix{stroke:var(--blue);}
.sb-connections path.ln-split.ln-board{stroke:var(--teal);}
.sb-connections path.ln-split.ln-cell{stroke:var(--amber);}
.sb-connections path.ln-split.ln-info{stroke:var(--amber);}
.sb-connections path.ln-split.ln-checklists{stroke:var(--purple);}
.sb-connections path.ln-split.ln-cellbox{stroke:var(--text2);}
.sb-connections circle.sb-dot{stroke:var(--bg);stroke-width:1.5;transition:r 0.12s;}
.sb-connections circle.sb-dot.dot-matrix{fill:var(--blue);}
.sb-connections circle.sb-dot.dot-board{fill:var(--teal);}
.sb-connections circle.sb-dot.dot-cell{fill:var(--amber);}
.sb-connections circle.sb-dot.dot-info{fill:var(--amber);}
.sb-connections circle.sb-dot.dot-checklists{fill:var(--purple);}
.sb-connections circle.sb-dot.dot-cellbox{fill:var(--text2);}
.sb-connections circle.sb-dot.dot-active{stroke-width:2;}
.sb-node{
  display:grid;
  grid-template-columns:14px var(--sb-alias-w,52px) 16px 1fr auto;
  column-gap:4px;align-items:center;
  padding:2px 6px 2px 0;font-size:12px;color:var(--text);
  border-radius:var(--rs);cursor:pointer;position:relative;
  line-height:1.6;white-space:nowrap;min-height:22px;
}
.sb-node:hover{background:var(--bg2);}
.sb-node.active{background:var(--bluebg);color:var(--bluetxt);font-weight:500;}
.sb-node.drag-over{background:var(--tealbg);color:var(--tealtxt);box-shadow:inset 0 0 0 1px var(--teal);}
.sb-node.active-outside-filter{font-style:italic;opacity:0.7;}
.sb-node.sb-matrix{font-weight:500;}
.sb-node.sb-cell{font-weight:400;}
.sb-node.sb-feature{color:var(--text2);font-size:11px;}
.sb-node.sb-feature .sb-node-title{color:var(--text2);}
.sb-node.sb-feature.active{color:var(--text);font-weight:500;}
.sb-node.filter-hit{box-shadow:inset 2px 0 0 var(--amber);}
@keyframes sbRowSlideIn{
  from{opacity:0;transform:translateX(-6px) scaleY(.85);}
  to{opacity:1;transform:translateX(0) scaleY(1);}
}
.sb-node.sb-anim-enter{animation:sbRowSlideIn 180ms cubic-bezier(.16,1,.3,1);transform-origin:left center;}
.sb-node.hidden{display:none;}
.sb-node-chevron{font-size:10px;color:var(--text3);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;user-select:none;transition:transform 0.15s;width:14px;height:14px;border-radius:var(--rs);}
.sb-node-chevron:hover{color:var(--text);background:var(--bg2);}
.sb-node-chevron.expanded{transform:rotate(90deg);}
.sb-node[data-expandable="0"] .sb-node-chevron{visibility:hidden;}
.sb-node-alias{font-family:monospace;font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;text-align:left;padding-left:2px;}
.sb-node.active .sb-node-alias{color:var(--bluetxt);opacity:0.75;}
.sb-node-icon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;flex-shrink:0;}
.sb-node-icon.ico-matrix{color:var(--blue);}
.sb-node-icon.ico-board{color:var(--teal);}
.sb-node-icon.ico-cell{color:var(--amber);}
.sb-node-icon.ico-info{color:var(--amber);}
.sb-node-icon.ico-checklists{color:var(--purple);}
.sb-node-icon.ico-cellbox{color:var(--text2);opacity:0.75;}
.sb-node-title{overflow:hidden;text-overflow:ellipsis;}
.sb-row-actions{display:inline-flex;gap:2px;opacity:0;transition:opacity 0.12s;}
.sb-node:hover .sb-row-actions,.sb-node:focus-within .sb-row-actions{opacity:1;}
body:not(.editing) .sb-row-actions{display:none;}
.sb-row-actions button{background:transparent;border:none;padding:2px 4px;border-radius:var(--rs);color:var(--text2);cursor:pointer;font-size:11px;line-height:1;}
.sb-row-actions button:hover{background:var(--bg);color:var(--text);}
.sb-resize-handle{position:absolute;top:0;right:-3px;width:6px;height:100%;cursor:col-resize;z-index:10;}
body.has-sidebar-right .sb-resize-handle{right:auto;left:-3px;}
.sb-resize-handle:hover,.sb-resize-handle.active{background:var(--blue);opacity:0.3;}
/* Edge-toggle — only visible in collapsed state, sits outside the (0-width) sidebar. */
#sb-edge-toggle{
  position:absolute;top:8px;
  width:22px;height:28px;
  background:var(--bg);
  border:0.5px solid var(--border2);
  border-radius:0 var(--r) var(--r) 0;
  color:var(--text2);cursor:pointer;
  display:none;align-items:center;justify-content:center;
  padding:0;z-index:55;
  box-shadow:2px 0 6px rgba(0,0,0,.06);
  transition:background .12s,color .12s,border-color .12s,opacity 160ms ease;
}
#sb-edge-toggle:hover{color:var(--blue);border-color:var(--blue);background:var(--bluebg);}
body.has-sidebar.sb-collapsed #sb-edge-toggle{display:inline-flex;left:0;}
body.has-sidebar-right.sb-collapsed #sb-edge-toggle{left:auto;right:0;border-radius:var(--r) 0 0 var(--r);border-right:none;border-left:0.5px solid var(--border2);box-shadow:-2px 0 6px rgba(0,0,0,.06);}
/* Canvas-padding im collapsed-State: Edge-Button sitzt in der Randzone, nicht über Inhalt */
body.has-sidebar-left.sb-collapsed #content{padding-left:26px;}
body.has-sidebar-right.sb-collapsed #content{padding-right:26px;}
#content{transition:padding-left var(--tr-std),padding-right var(--tr-std);}
/* Ensure main-layout is positioned (anchor for absolute button) */
#main-layout{position:relative;}
.sb-context-menu{position:fixed;z-index:260;background:var(--bg);border:0.5px solid var(--border2);border-left:2px solid var(--blue);border-radius:var(--rl);box-shadow:0 4px 16px rgba(0,0,0,0.15);padding:0 0 4px 0;min-width:180px;max-width:320px;overflow:hidden;animation:popIn 0.12s cubic-bezier(0.16,1,0.3,1);}
.sb-context-menu button{display:flex;align-items:center;gap:8px;width:100%;padding:7px 12px;border:none;background:transparent;font-size:12px;color:var(--text);cursor:pointer;text-align:left;}
.sb-context-menu button:hover{background:var(--bg2);}
.sb-context-menu button.danger{color:var(--red);}
.sb-context-menu button.danger:hover{background:var(--redbg);}
.ctx-breadcrumb{font-size:10px;color:var(--text2);padding:6px 10px;border-bottom:0.5px solid var(--border);display:flex;gap:4px;align-items:center;margin-bottom:4px;background:var(--bg2);min-width:0;}
.ctx-breadcrumb .crumb{white-space:nowrap;text-overflow:ellipsis;overflow:hidden;flex:0 1 auto;min-width:0;}
.ctx-breadcrumb .crumb.target{color:var(--text);font-weight:500;flex:1 1 auto;min-width:40px;}
.ctx-breadcrumb .sep{color:var(--text3);opacity:.6;flex:0 0 auto;}
.ctx-breadcrumb .ctx-ico{display:inline-flex;width:14px;height:14px;align-items:center;justify-content:center;flex:0 0 auto;}
/* Source-Highlight: Row visuell an Kontextmenü binden (gleicher Blue-Akzent) */
.sb-node.sb-node-ctx-src{background:var(--bluebg);box-shadow:inset 2px 0 0 var(--blue);}
#sb-peek{position:fixed;z-index:250;width:280px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);box-shadow:0 6px 20px rgba(0,0,0,0.18);padding:12px;animation:popIn 0.14s cubic-bezier(0.16,1,0.3,1);pointer-events:none;font-size:11px;}
.sb-confirm{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);width:520px;max-width:96vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
.sb-confirm-hd{padding:14px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.sb-confirm-hd h3{font-size:14px;font-weight:500;flex:1;}
.sb-confirm-sub{font-size:11px;color:var(--text2);padding:8px 18px 4px;flex-shrink:0;}
.sb-confirm-list{overflow-y:auto;padding:4px 10px 10px;flex:1;min-height:0;}
.sb-confirm-row{display:grid;grid-template-columns:18px auto 1fr auto 1fr;gap:8px;align-items:center;padding:5px 8px;border-radius:var(--rs);font-size:12px;}
.sb-confirm-row:hover{background:var(--bg2);}
.sb-confirm-row .cr-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;}
.sb-confirm-row .cr-icon.ic-matrix{color:var(--blue);}
.sb-confirm-row .cr-icon.ic-board{color:var(--teal);}
.sb-confirm-row .cr-icon.ic-info{color:var(--amber);}
.sb-confirm-row .cr-icon.ic-checklists{color:var(--purple);}
.sb-confirm-row .cr-kind{font-size:9px;color:var(--text3);font-family:monospace;text-transform:uppercase;letter-spacing:0.5px;}
.sb-confirm-row .cr-old{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;}
.sb-confirm-row .cr-arrow{color:var(--text3);font-size:10px;}
.sb-confirm-row .cr-new{color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-confirm-actions{padding:12px 18px;border-top:0.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
#sb-peek .peek-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#sb-peek .peek-sub{font-size:10px;color:var(--text3);margin-bottom:8px;}
#sb-peek .peek-grid{display:grid;gap:2px;margin-top:4px;}
#sb-peek .peek-grid-cell{aspect-ratio:1;border-radius:2px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text3);}
#sb-peek .peek-cols{display:flex;flex-direction:column;gap:4px;}
#sb-peek .peek-col{display:flex;align-items:center;gap:6px;font-size:11px;}
#sb-peek .peek-col .pc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#sb-peek .peek-col .pc-count{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--text2);font-size:10px;}
#sb-peek .peek-features{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
#sb-peek .peek-feat-badge{font-size:10px;padding:2px 6px;border-radius:var(--rs);}
@media (max-width:900px){
  body.has-sidebar #sidebar{position:fixed;top:0;bottom:0;left:0;z-index:60;box-shadow:2px 0 12px rgba(0,0,0,0.12);}
  body.has-sidebar.has-sidebar-right #sidebar{left:auto;right:0;box-shadow:-2px 0 12px rgba(0,0,0,0.12);}
  body.has-sidebar.sb-collapsed #sidebar{display:none;}
}

/* ── FOCUS STYLES ── */
/* Sprint 5.2: Reset nur für Custom-Elemente & native Focusables, :focus-visible bleibt global */
button:focus,a:focus,input:focus,select:focus,textarea:focus,[contenteditable]:focus,[tabindex]:focus,.mcell:focus,.sb-node:focus,.kb-card:focus,.mm-node:focus,.tab:focus,.bcs:focus,.btn:focus,.ico-btn:focus,.sb-chip:focus{outline:none;}
*:focus-visible{outline:var(--focus-width) solid var(--focus-color);outline-offset:var(--focus-offset);border-radius:var(--r);transition:outline-offset 0.1s ease;}
.mcell:focus-visible{outline-offset:-2px;background:var(--bg2);border-radius:0;}
.kb-card:focus-visible{outline-offset:-2px;background:var(--bg2);}
.tab:focus-visible{outline:none;box-shadow:inset 0 -2px 0 var(--blue);color:var(--text);}
.bcs:focus-visible{outline-offset:0;background:var(--bluebg);}
.mm-node:focus-visible{outline-offset:0;background:var(--bg2);}
.sb-node:focus-visible{outline-offset:-1px;outline:1.5px solid var(--blue);}
.btn:focus-visible{outline-offset:1px;}
input:focus-visible,select:focus-visible,textarea:focus-visible,[contenteditable]:focus-visible{outline:none;border-color:var(--blue);}

/* ── GEAR MENU ── */
.gear-wrap{position:relative;}
.gear-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;min-width:190px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);padding:4px 0;z-index:60;box-shadow:0 4px 16px rgba(0,0,0,0.12);transform-origin:top right;}
.gear-menu.open{display:block;animation:popIn 0.2s cubic-bezier(0.16,1,0.3,1);}
.gear-item{display:flex;align-items:center;gap:8px;width:100%;padding:7px 14px;font-size:12px;border:none;background:none;color:var(--text);cursor:pointer;font-family:inherit;text-align:left;transition:background 0.1s;}
.gear-item:hover{background:var(--bg2);}
.gear-item.danger{color:var(--red);}
.gear-sep{height:0;border-top:0.5px solid var(--border);margin:4px 0;}

/* ── ANIMATIONS ── */
/* A1: Panel navigation zoom+fade */
#panel{transform-origin:center top;}
#panel.exit-in{opacity:0;transform:scale(1.06);transition:opacity 0.18s ease-in,transform 0.18s ease-in;}
#panel.enter-in{opacity:0;transform:scale(0.94);}
#panel.exit-out{opacity:0;transform:scale(0.94);transition:opacity 0.18s ease-in,transform 0.18s ease-in;}
#panel.enter-out{opacity:0;transform:scale(1.06);}
#panel.exit-fade{opacity:0;transition:opacity 0.15s ease-in;}
#panel.enter-fade{opacity:0;}
#panel.anim-enter{transition:opacity 0.22s ease-out,transform 0.22s ease-out;opacity:1;transform:scale(1);}

/* A2: Card detail modal */
.modal-overlay{animation:overlayIn 0.2s ease-out;}
.modal{animation:modalIn 0.25s cubic-bezier(0.16,1,0.3,1);}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:translateY(24px) scale(0.97)}to{opacity:1;transform:none}}
.modal-overlay.closing{animation:overlayOut 0.18s ease-in forwards;}
.modal-overlay.closing .modal{animation:modalOut 0.18s ease-in forwards;}
@keyframes overlayOut{to{opacity:0}}
@keyframes modalOut{to{opacity:0;transform:translateY(12px) scale(0.98)}}

/* A3: Simple modal + Stammdaten */
.smodal-overlay{animation:overlayIn 0.18s ease-out;}
.smodal,.sb-confirm{animation:modalIn 0.22s cubic-bezier(0.16,1,0.3,1);}
.smodal-overlay.closing{animation:overlayOut 0.15s ease-in forwards;}
.smodal-overlay.closing .smodal,
.smodal-overlay.closing .sdmodal,
.smodal-overlay.closing .sb-confirm{animation:modalOut 0.15s ease-in forwards;}

/* A4: Checkbox pop */
.cl-check.anim-done,.task-check.anim-done{animation:checkPop 0.35s cubic-bezier(0.16,1,0.3,1);}
@keyframes checkPop{0%{transform:scale(1)}40%{transform:scale(1.35) rotate(8deg)}70%{transform:scale(0.9)}100%{transform:scale(1)}}

/* A5: Badge/Tag slide-in */
@keyframes fadeSlideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.anim-slide-in{animation:fadeSlideIn 0.3s ease-out;}

/* A6: Kanban card add */
.kb-card{transition:opacity 0.15s,transform 0.15s;}
@keyframes cardSlideIn{from{opacity:0;transform:translateY(-8px) scale(0.96)}to{opacity:1;transform:none}}
.kb-card.anim-add,.cl-item.anim-add{animation:cardSlideIn 0.25s cubic-bezier(0.16,1,0.3,1);}

/* A7: Minimap panel pop */
#minimap-panel{transform-origin:top right;}
#minimap-panel.open{animation:popIn 0.2s cubic-bezier(0.16,1,0.3,1);}
@keyframes popIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:none}}

/* A8: Search dropdown */
#searchresults{display:none;transform-origin:top right;position:absolute;top:32px;right:0;width:320px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);z-index:80;max-height:360px;overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
#searchresults.is-open{display:block;}
.sr-anim{animation:popIn 0.18s ease-out;}

/* Utility: Klassen-basierte Sichtbarkeit (Sprint 4.2) */
.is-hidden{display:none;}
/* Utility: Layout-Muster (Sprint 4.1) */
.flex-fill{flex:1;min-width:0;}
.inp-sm{width:auto;margin:0;padding:3px 6px;}
.empty-hint{padding:12px;font-size:12px;color:var(--text3);text-align:center;}

/* A9: Saved indicator */
#savedot{display:none;align-items:center;flex-shrink:0;}
#savedot.save-ok,#savedot.save-dirty,#savedot.save-err{display:inline-flex;}
#savedot svg{width:16px;height:16px;}
@keyframes savePulse{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes saveShake{0%,100%{transform:none}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@keyframes savedotFade{0%{opacity:1}60%{opacity:1}100%{opacity:0}}
#savedot.save-ok svg{color:var(--teal);animation:savePulse 0.5s ease;}
#savedot.save-ok{animation:savedotFade 2s ease forwards;}
#savedot.save-dirty svg{color:var(--blue);animation:savePulse 0.8s ease infinite;}
#savedot.save-err svg{color:var(--red);animation:saveShake 0.3s ease;}

/* ── TOAST-STACK (Sprint 3.4) ── */
#toast-stack{position:fixed;right:18px;bottom:18px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:min(420px,calc(100vw - 36px));}
.toast{pointer-events:auto;background:var(--bg);color:var(--text);border:0.5px solid var(--border2);border-left:3px solid var(--text3);border-radius:var(--r);padding:10px 14px 10px 12px;font-size:12.5px;line-height:1.4;box-shadow:var(--shadow-md);display:flex;align-items:flex-start;gap:8px;animation:toastIn var(--tr-enter) forwards;max-width:100%;word-wrap:break-word;}
.toast.closing{animation:toastOut 140ms cubic-bezier(.4,0,.2,1) forwards;}
.toast.error{border-left-color:var(--red);}
.toast.success{border-left-color:var(--teal);}
.toast.warning{border-left-color:var(--amber);}
.toast.info{border-left-color:var(--blue);}
.toast-icon{flex-shrink:0;margin-top:1px;}
.toast-icon.error{color:var(--red);}
.toast-icon.success{color:var(--teal);}
.toast-icon.warning{color:var(--amber);}
.toast-icon.info{color:var(--blue);}
.toast-body{flex:1;min-width:0;}
.toast-close{flex-shrink:0;background:none;border:none;color:var(--text3);cursor:pointer;padding:0 2px;font-size:16px;line-height:1;opacity:0.6;transition:opacity var(--tr-std);}
.toast-close:hover{opacity:1;color:var(--text);}
@keyframes toastIn{from{opacity:0;transform:translateX(16px) scale(0.96);}to{opacity:1;transform:none;}}
@keyframes toastOut{from{opacity:1;transform:none;}to{opacity:0;transform:translateX(16px) scale(0.96);}}

/* ── LOADING-OVERLAY (Sprint 3.5) ── */
#loading-overlay{position:fixed;inset:0;z-index:400;background:var(--overlay-soft);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--tr-std);}
#loading-overlay.visible{opacity:1;pointer-events:auto;}
.loading-card{background:var(--bg);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--r);padding:18px 22px;font-size:13px;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:12px;min-width:180px;}
.loading-spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── BREADCRUMB IN SMODAL (Sprint 3.6) ── */
.smodal-crumb{font-size:10.5px;color:var(--text2);margin:-2px 0 8px;padding:4px 8px;background:var(--bg2);border-radius:var(--rs);display:inline-flex;align-items:center;gap:5px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:0.5px solid var(--border);}
.smodal-crumb .crumb-sep{color:var(--text3);}
.smodal-crumb .crumb-ico{color:var(--text3);flex-shrink:0;display:inline-flex;align-items:center;}

/* Drag & Drop */
.kb-card[draggable="true"]{cursor:grab;}
.kb-card.dragging{opacity:0.4;transform:scale(0.96);}
.kb-cards.drag-over{background:var(--bluebg);border-radius:var(--r);transition:background 0.15s;}
.kb-drop-indicator{height:3px;background:var(--blue);border-radius:2px;margin:2px 0;transition:opacity 0.1s;}

/* ── HEADER REORDER ANIMATION ── */
.mh.swap-h,.daily-col.swap-h,.kb-col.swap-h{animation:swapH 0.22s ease-out;}
.mh.swap-v,.cl-item.swap-v{animation:swapV 0.22s ease-out;}
.cl-drag{cursor:grab;color:var(--text3);user-select:none;padding:0 2px;font-size:10px;line-height:1;}
.cl-drag:hover{color:var(--text);}
.cl-drag:active{cursor:grabbing;}
.cl-item.dragging{opacity:0.4;}
.cl-item.drag-over{box-shadow:inset 0 2px 0 var(--blue);}
@keyframes swapH{from{opacity:.5;transform:translateX(var(--dx))}to{opacity:1;transform:none}}
@keyframes swapV{from{opacity:.5;transform:translateY(var(--dy))}to{opacity:1;transform:none}}

/* ── HEADER MOVE ARROWS ── */
.hdr-arrows{display:none;position:absolute;gap:1px;z-index:2;}
.emode .mh:hover .hdr-arrows,.emode .mh:focus-within .hdr-arrows{display:flex;}
.hdr-arrows.col-arrows{bottom:-1px;left:50%;transform:translateX(-50%);flex-direction:row;}
.hdr-arrows.row-arrows{right:-1px;top:50%;transform:translateY(-50%);flex-direction:column;}
.hdr-arr{width:14px;height:14px;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:color 0.1s;opacity:0.6;}
.hdr-arr:hover{color:var(--blue);opacity:1;}

/* ── TRANSPOSE BUTTON ── */
.transpose-btn{width:22px;height:22px;border-radius:50%;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;padding:0;}
.transpose-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--bluebg);transform:rotate(90deg);}
.matrix.transpose-exit{animation:transposeOut 0.15s ease forwards;}
.matrix.transpose-enter{animation:transposeIn 0.25s ease-out;}
@keyframes transposeOut{to{filter:blur(4px);opacity:0.3;transform:scale(0.98)}}
@keyframes transposeIn{from{filter:blur(4px);opacity:0.3;transform:scale(0.98)}to{filter:none;opacity:1;transform:none}}

/* A10: Edit mode border */
#content{transition:border-left 0.2s ease,padding-left 0.2s ease;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="tl" style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
      <span id="applogo" style="flex-shrink:0;display:flex;align-items:center;cursor:pointer;" onclick="stack=[stack[0]];renderAnimated('out');" title="Infinite Matrix – Home"></span>
      <div class="bc flex-fill" id="bc"></div>
      <span id="savedot"><svg viewBox="0 0 16 16" fill="none"><path d="M2 2h8l4 4v8H2V2z" stroke="currentColor" stroke-width="1.4"/><path d="M5 2v4h6V2" stroke="currentColor" stroke-width="1.2"/><path d="M4 9h8v5H4V9z" stroke="currentColor" stroke-width="1.2"/></svg></span>

function _toastIcon(type){
  // Inline SVG statt ICO.* (ICO ist hier noch nicht definiert) – 14px
  if(type==='error')return '<svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6.4"/><path d="M8 5v3.5M8 11v.01"/></svg>';

  return '<svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6.4"/><path d="M8 7.2v4M8 4.8v.01"/></svg>';
}
function showToast(msg,opts){
  const o=opts||{};
  const type=o.type||'info';
  const ms=Number.isFinite(o.ms)?o.ms:(type==='error'?TOAST_ERROR_MS:TOAST_DEFAULT_MS);
  const stack=document.getElementById('toast-stack');
  if(!stack){console.warn('toast-stack missing, fallback alert:',msg);alert(msg);return;}
  const id='toast-'+(++_toastSeq);
  const div=document.createElement('div');
  div.className='toast '+type;
  div.setAttribute('role',type==='error'?'alert':'status');
  div.id=id;
  const safe=String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  div.innerHTML=`<span class="toast-icon ${type}">${_toastIcon(type)}</span><div class="toast-body">${safe}</div><button class="toast-close" aria-label="Schließen">&times;</button>`;
  const remove=()=>{ if(!div.isConnected)return; div.classList.add('closing'); setTimeout(()=>{if(div.parentNode)div.parentNode.removeChild(div);},160); };
  div.querySelector('.toast-close').onclick=remove;
  stack.appendChild(div);
  if(ms>0)setTimeout(remove,ms);
  return id;
}
// ── ERROR-TRANSLATION (Sprint 3.3) ──
// translateError(err) → deutscher String. Prüft bekannte Fehler-Klassen/-Namen.
function translateError(err,fallback){
  if(!err)return fallback||'Unerwarteter Fehler.';
  if(typeof err==='string')return err;
  const name=err.name||'';
  const msg=err.message||'';
  if(name==='AbortError')return 'Abgebrochen.';
  if(name==='SyntaxError'||/JSON/i.test(msg))return 'Datei ist beschädigt oder kein gültiges JSON.';
  if(name==='OperationError'||/decrypt|cipher|tag|integrity/i.test(msg))return 'Entschlüsselung fehlgeschlagen — falsches Passwort oder beschädigte Datei.';
  if(name==='QuotaExceededError')return 'Speicher voll — nicht genug Platz für Speicherung.';
  if(name==='NotAllowedError')return 'Zugriff verweigert. Bitte Berechtigung erteilen.';
  if(name==='NotFoundError')return 'Datei oder Ziel nicht gefunden.';
  if(name==='SecurityError')return 'Browser hat den Zugriff aus Sicherheitsgründen blockiert.';
  if(name==='TypeError'&&/network|fetch/i.test(msg))return 'Netzwerkfehler.';
  if(name==='InvalidStateError')return 'Ungültiger Zustand — bitte Aktion wiederholen.';
  if(msg)return msg;
  return fallback||'Unerwarteter Fehler.';
}

}

  const idx=_modalStack.lastIndexOf(close);
  if(idx>=0)_modalStack.splice(idx,1);
}
function _topModalClose(){return _modalStack.length?_modalStack[_modalStack.length-1]:null;}
// ── FOCUS-RESTORE-STACK (Sprint 3.1) ──
// Pro Modal-Instanz wird das zuletzt fokussierte Element gemerkt und beim Schließen zurückgesetzt.
const _focusRestoreStack=[];
function _pushFocusRestore(){
  const ae=document.activeElement;
  _focusRestoreStack.push(ae&&ae!==document.body?ae:null);
}
function _popFocusRestore(){
  const target=_focusRestoreStack.pop();
  if(!target)return;
  // Defer to allow animation/close to complete
  setTimeout(()=>{
    if(document.contains(target)&&typeof target.focus==='function'){
      try{target.focus();}catch(e){}

  },0);
}

// Display order for feature rows/tabs: Infos, Aufgaben, Checklisten, Matrix (Matrix last)
const FEATURE_DISPLAY_ORDER=['info','board','checklists','matrix'];
// Returns the active features for a cell as union of:
//   - Explicit: cell.features[] (user-activated, visible even if empty content)
//   - Implicit: features whose backing data exists (board.data.infoFields/checklists/kbCards or matrixId)
// Non-destructive (does NOT mutate cell.features). Used by both sidebar and cell-page rendering for consistency.
// Returns features in FEATURE_DISPLAY_ORDER (info, board, checklists, matrix).
function getActiveFeatures(cell){
  if(!cell)return [];
  const active=new Set(cell.features||[]);
  if(cell.boardId&&nodes[cell.boardId]){
    const b=nodes[cell.boardId].data||{};
    if((b.kbCards||[]).some(c=>!c.archived))active.add('board');
    if((b.infoFields||[]).length>0||(b.links||[]).length>0)active.add('info');
    if((b.checklists||[]).length>0)active.add('checklists');
  }
  if(cell.matrixId)active.add('matrix');
  return FEATURE_DISPLAY_ORDER.filter(k=>active.has(k)).map(k=>getCellFeatureDef(k));
}

// ── Alias system ──
const ALIAS_MAX_LEN=8;
const ALIAS_RE=/^[a-z0-9]+$/;
const RESERVED_ALIASES=['n','fa','fi','fh','fc','home','w','s'];
let aliasIndex={}; // alias → {type,nodeId,boardId?,cardId?,linkId?}

function migrateNodeAliasesToCells(){
  // One-time migration: move aliases from board/matrix nodes to the cells that contain them
  if(!rootId)return;
  let migrated=false;
  function walk(matrixId){
    const m=nodes[matrixId];if(!m||m.type!=='matrix')return;
    Object.entries(m.data.cells).forEach(([key,c])=>{
      if(c.boardId&&nodes[c.boardId]?.alias&&!c.alias){
        c.alias=nodes[c.boardId].alias;
        delete nodes[c.boardId].alias;
        migrated=true;
      }
      if(c.matrixId&&nodes[c.matrixId]?.alias&&!c.alias){
        c.alias=nodes[c.matrixId].alias;
        delete nodes[c.matrixId].alias;
        migrated=true;
      }
      if(c.matrixId)walk(c.matrixId);
    });
  }
  walk(rootId);
  if(migrated)save();
}
function rebuildAliasIndex(){
  aliasIndex={};
  // Keys are normalized to lowercase so legacy uppercase aliases (e.g. imported "S1", "HH")
  // remain reachable, since handleCommandInput/parseCommand lowercase the user input.
  // The original casing is preserved in value.alias for display.
  function put(aliasStr,value){
    if(!aliasStr)return;
    aliasIndex[String(aliasStr).toLowerCase()]={...value,alias:aliasStr};
  }
  function walkNode(nodeId){
    const n=nodes[nodeId];if(!n||nodeId.startsWith('cell-'))return;
    if(n.alias)put(n.alias,{type:n.type,nodeId});
    if(n.type==='board'){
      (n.data.kbCards||[]).forEach(c=>{if(c.alias)put(c.alias,{type:'card',nodeId,boardId:nodeId,cardId:c.id});});
      (n.data.links||[]).forEach(l=>{if(l.alias)put(l.alias,{type:l.type==='mail'?'mail':'link',nodeId,boardId:nodeId,linkId:l.id});});
    }
    if(n.type==='matrix'){
      Object.entries(n.data.cells).forEach(([key,c])=>{
        // Cell-level alias (1 alias for all 4 tabs)
        if(c.alias){
          const sep=key.indexOf('-');
          put(c.alias,{type:'cell',parentId:nodeId,rowId:key.slice(0,sep),colId:key.slice(sep+1)});
        }
        if(c.boardId)walkNode(c.boardId);
        if(c.matrixId)walkNode(c.matrixId);
      });
    }
  }
  if(rootId)walkNode(rootId);
}
function validateAlias(alias,excludeAlias){
  if(!alias)return{valid:true,alias:''};
  const a=alias.toLowerCase().trim();
  if(!a)return{valid:true,alias:''};
  if(a.length>ALIAS_MAX_LEN)return{valid:false,msg:`Max ${ALIAS_MAX_LEN} Zeichen`};
  if(!ALIAS_RE.test(a))return{valid:false,msg:'Nur a-z, 0-9'};
  if(RESERVED_ALIASES.includes(a))return{valid:false,msg:`"${a}" ist reserviert`};
  if(aliasIndex[a]&&a!==excludeAlias)return{valid:false,msg:`"${a}" bereits vergeben`};
  return{valid:true,alias:a};
}
function setNodeAlias(nodeId,val){
  const n=nodes[nodeId];if(!n)return;
  const oldAlias=n.alias||'';
  const v=validateAlias(val,oldAlias);
  if(!v.valid){showToast(v.msg,{type:'warning'});return;}
  n.alias=v.alias;
  rebuildAliasIndex();save();
}
function setCellAlias(parentId,rowId,colId,val){
  const cell=getCell(parentId,`${rowId}-${colId}`);if(!cell)return;
  const oldAlias=cell.alias||'';
  const v=validateAlias(val,oldAlias);
  if(!v.valid){showToast(v.msg,{type:'warning'});return;}
  cell.alias=v.alias;
  rebuildAliasIndex();save();
}
function setCardAlias(boardId,cardId,val){
  const c=getCard(boardId,cardId);if(!c)return;
  const oldAlias=c.alias||'';
  const v=validateAlias(val,oldAlias);
  if(!v.valid){showToast(v.msg,{type:'warning'});return;}
  c.alias=v.alias;
  rebuildAliasIndex();save();
}
function setLinkAlias(boardId,linkId,val){
  const l=nodes[boardId]?.data.links.find(x=>x.id===linkId);if(!l)return;
  const oldAlias=l.alias||'';
  const v=validateAlias(val,oldAlias);
  if(!v.valid){showToast(v.msg,{type:'warning'});return;}
  l.alias=v.alias;
  rebuildAliasIndex();save();
}

function matchShortcut(e,action){
  const kb=keyBindings[action];if(!kb)return false;
  // Single-letter shortcuts (no modifiers) never fire in text inputs
  if(!kb.ctrl&&!kb.shift&&!kb.alt){
    const ae=document.activeElement;
    if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.isContentEditable))return false;
  }
  if(kb.ctrl&&!e.ctrlKey)return false;if(!kb.ctrl&&e.ctrlKey)return false;
  if(kb.shift&&!e.shiftKey)return false;if(!kb.shift&&e.shiftKey)return false;
  if(kb.alt&&!e.altKey)return false;if(!kb.alt&&e.altKey)return false;
  return e.key.toUpperCase()===kb.key.toUpperCase();
}
const KEY_SYMBOLS={ArrowUp:'↑',ArrowDown:'↓',ArrowLeft:'←',ArrowRight:'→',Backspace:'⌫',Delete:'Entf',Enter:'↵',' ':'Leertaste'};
function shortcutLabel(kb){
  const parts=[];
  if(kb.ctrl)parts.push('Ctrl');if(kb.shift)parts.push('Shift');if(kb.alt)parts.push('Alt');
  parts.push(KEY_SYMBOLS[kb.key]||kb.key.toUpperCase());
  return parts.join(' + ');
}

function mkMatrix(label){

function mkBoard(label){

function getCell(nid,key){
  if(!nodes[nid])return{boardId:null,matrixId:null,features:[]};
  const d=nodes[nid].data;
  if(!d.cells[key])d.cells[key]={boardId:null,matrixId:null,features:[]};
  const c=d.cells[key];
  // Migration: backfill features for legacy data
  if(!c.features)c.features=[];
  if(c.boardId&&c.features.length===0)c.features=['info','board','checklists'];
  if(c.matrixId&&!c.features.includes('matrix'))c.features.push('matrix');
  return c;
}

// Unified search/command history (Alt+ArrowUp/Down). Stores the raw input string including
// the leading '^' for commands, plain text for regular searches. Capped at 25.
// Persisted via localStorage for immediate responsiveness AND included in the JSON payload
// (getPayload/loadData) so import/export carries the history too.
const SEARCH_HISTORY_KEY='imatrix-search-history';
const SEARCH_HISTORY_MAX=25;
let _searchHistory=[];
let _searchHistoryCursor=-1;      // -1 means "not navigating"; otherwise index into _searchHistory
let _searchHistoryDraft='';        // saved input state before navigation began
try{const raw=localStorage.getItem(SEARCH_HISTORY_KEY);if(raw){const arr=JSON.parse(raw);if(Array.isArray(arr))_searchHistory=arr.slice(-SEARCH_HISTORY_MAX);}}catch(e){}
function _pushSearchHistory(raw){
  if(!raw||!raw.trim())return;
  if(raw.trim().length<2)return; // too short to be a meaningful history entry
  // Dedup against the most recent entry
  if(_searchHistory[_searchHistory.length-1]===raw)return;
  _searchHistory.push(raw);
  if(_searchHistory.length>SEARCH_HISTORY_MAX)_searchHistory=_searchHistory.slice(-SEARCH_HISTORY_MAX);
  try{localStorage.setItem(SEARCH_HISTORY_KEY,JSON.stringify(_searchHistory));}catch(e){}
  _searchHistoryCursor=-1;_searchHistoryDraft='';
}
function _navSearchHistory(dir){
  const inp=document.getElementById('searchinput');
  if(!inp||_searchHistory.length===0)return;
  if(_searchHistoryCursor===-1){
    _searchHistoryDraft=inp.value;
    _searchHistoryCursor=_searchHistory.length;
  }
  _searchHistoryCursor=Math.max(0,Math.min(_searchHistory.length,_searchHistoryCursor+dir));
  if(_searchHistoryCursor>=_searchHistory.length){
    inp.value=_searchHistoryDraft;
    _searchHistoryCursor=-1;
  }else{
    inp.value=_searchHistory[_searchHistoryCursor];
  }
  onSearchInput(inp.value);
  setTimeout(()=>{inp.setSelectionRange(inp.value.length,inp.value.length);},0);
}

// ── Encryption (AES-GCM 256-bit via Web Crypto API) ──
const ENC_PREFIX='IMATRIX_ENC:';
let _encPw=null; // session-cached password
function isEncrypted(text){return typeof text==='string'&&text.startsWith(ENC_PREFIX);}
async function _deriveKey(pw,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:CRYPTO.PBKDF2_ITERATIONS,hash:CRYPTO.HASH},km,{name:'AES-GCM',length:CRYPTO.KEY_LEN},false,['encrypt','decrypt']);
}
async function encryptPayload(plain,pw){
  const salt=crypto.getRandomValues(new Uint8Array(CRYPTO.SALT_BYTES));
  const iv=crypto.getRandomValues(new Uint8Array(CRYPTO.IV_BYTES));
  const key=await _deriveKey(pw,salt);
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(plain));
  const buf=new Uint8Array(salt.length+iv.length+ct.byteLength);
  buf.set(salt,0);buf.set(iv,CRYPTO.SALT_BYTES);buf.set(new Uint8Array(ct),CRYPTO.SALT_BYTES+CRYPTO.IV_BYTES);
  return ENC_PREFIX+btoa(String.fromCharCode(...buf));
}
async function decryptPayload(encoded,pw){
  const raw=atob(encoded.slice(ENC_PREFIX.length));
  const buf=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)buf[i]=raw.charCodeAt(i);
  const key=await _deriveKey(pw,buf.slice(0,CRYPTO.SALT_BYTES));
  const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(CRYPTO.SALT_BYTES,CRYPTO.SALT_BYTES+CRYPTO.IV_BYTES)},key,buf.slice(CRYPTO.SALT_BYTES+CRYPTO.IV_BYTES));
  return new TextDecoder().decode(dec);
}
async function getEncPw(){
  if(_encPw)return _encPw;
  // Wichtig: setzt _encPw NICHT — der Caller muss nach erfolgreichem Encrypt cachen.
  return prompt('Passwort für Verschlüsselung:');
}
function hasEncPw(){return !!_encPw;}
function setEncPasswordDialog(){
  smodal('Verschlüsselungs-Passwort setzen',[
    {label:'Neues Passwort',id:'p1',type:'password',ph:'mindestens 4 Zeichen'},
    {label:'Passwort bestätigen',id:'p2',type:'password'}
  ],v=>{
    const p1=(v.p1||'').trim();
    if(p1.length<4){showToast('Passwort muss mindestens 4 Zeichen haben.',{type:'warning'});showSettings();return;}
    if(p1!==(v.p2||'').trim()){showToast('Passwörter stimmen nicht überein.',{type:'warning'});showSettings();return;}
    _encPw=p1;
    showSaveStatus('✓ Passwort gesetzt','var(--teal)',SAVE_INDICATOR_MS);
    showSettings();
  },()=>showSettings());
}
function clearEncPassword(){
  if(!_encPw){showSettings();return;}
  if(!confirm('Passwort aus dem Session-Speicher löschen? Beim nächsten verschlüsselten Speichern wirst du erneut gefragt.'))return;

  showSaveStatus('Passwort gelöscht','var(--amber)',SAVE_INDICATOR_MS);
  showSettings();
}

// localStorage-Flush ist debounced. In-Memory-State ist sofort konsistent;
// der eigentliche setItem-Call passiert nach TIMING.SAVE_DEBOUNCE_MS, sodass
// Hot-Path-Mutationen (Tippen in einer Zelle) nicht mehrfach pro Sekunde
// blockieren. beforeunload forced den Flush, damit nichts verloren geht.
let lsSaveTimer=null;
let _lsPendingPayload=null;
function flushLocalStorageNow(){
  if(_lsPendingPayload==null)return;
  try{localStorage.setItem(SAVE_KEY,_lsPendingPayload);}catch(e){console.warn('localStorage save failed:',e.message);}
  _lsPendingPayload=null;
  if(lsSaveTimer){clearTimeout(lsSaveTimer);lsSaveTimer=null;}
}
window.addEventListener('beforeunload',flushLocalStorageNow);

function save(){
  const payload=getPayload();
  _lsPendingPayload=payload;
  clearTimeout(lsSaveTimer);
  lsSaveTimer=setTimeout(flushLocalStorageNow,TIMING.SAVE_DEBOUNCE_MS);

  if(fileHandle){
    fileDirty=true;
    showSaveStatus('● ungespeichert','var(--blue)',0); // persistent, no timeout
    clearTimeout(fileSaveTimer);
    fileSaveTimer=setTimeout(()=>flushToFile(),appSettings.autoSaveDelay||FILE_DEBOUNCE_MS);
  } else {
    const kb=Math.round(payload.length/1024);
    const warn=kb>SAVE_WARN_KB;
    showSaveStatus(
      warn?'localStorage '+kb+' KB — Datei wählen!':'gespeichert',
      warn?'var(--amber)':'var(--teal)',
      warn?SAVE_WARN_MS:SAVE_INDICATOR_MS
    );
  }
}

async function flushToFile(){
  if(!fileHandle||!fileDirty)return;
  const useEnc=!!appSettings.encryption;
  if(useEnc)showLoading('Verschlüssele & speichere …');
  try{
    let content=getPayloadPretty();
    if(useEnc){
      const pw=await getEncPw();
      if(!pw){showSaveStatus('✗ Verschlüsselung abgebrochen','var(--red)',SAVE_WARN_MS);return;}
      content=await encryptPayload(content,pw);
      _encPw=pw;
    }
    const writable=await fileHandle.createWritable();
    await writable.write(content);
    await writable.close();
    fileDirty=false;
    showSaveStatus('✓ gespeichert'+(useEnc?' 🔒':''),'var(--teal)',SAVE_INDICATOR_MS);
  }catch(e){
    showSaveStatus(`✗ Schreibfehler: ${fileHandle.name}`,'var(--red)',SAVE_WARN_MS);
  }finally{
    if(useEnc)hideLoading();
  }
  updateFileBtn();
}

async function openFile(){
  if(!hasFileAPI)return;
  try{
    const[handle]=await window.showOpenFilePicker(FILE_OPTS);
    const file=await handle.getFile();
    let text=await file.text();
    if(isEncrypted(text)){
      const pw=prompt('Passwort für Entschlüsselung:');
      if(!pw)return;
      showLoading('Entschlüssele …');
      try{text=await decryptPayload(text,pw);}
      catch(e){hideLoading();showToast(translateError(e,'Entschlüsselung fehlgeschlagen — falsches Passwort oder beschädigte Datei.'),{type:'error'});return;}
      hideLoading();
      _encPw=pw;
    }
    const d=JSON.parse(text);
    if(!validateImport(d)){showToast(UI.errInvalidFormat,{type:'error'});return;}
    fileHandle=handle;
    loadData(d);save();render();
  }catch(e){
    if(e.name!=='AbortError')showToast('Fehler beim Öffnen: '+translateError(e),{type:'error'});
  }
}

async function saveFileAs(){
  if(!hasFileAPI)return;
  try{
    const handle=await window.showSaveFilePicker({...FILE_OPTS,suggestedName:'matrix-data.json'});
    fileHandle=handle;
    fileDirty=true;
    await flushToFile();
    render();
  }catch(e){
    if(e.name!=='AbortError')showToast('Fehler beim Speichern: '+translateError(e),{type:'error'});
  }
}
