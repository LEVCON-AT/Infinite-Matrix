function loadData(d){
  nodes=d.nodes; nid=d.nid; rootId=d.rootId;
  globalTags=d.globalTags||[];
  globalPeople=d.globalPeople||[];
  dailyCols=d.dailyCols||[];
  if(d.keyBindings){Object.keys(DEFAULT_KEYBINDINGS).forEach(k=>{if(d.keyBindings[k])keyBindings[k]=d.keyBindings[k];});}
  if(Array.isArray(d.searchHistory)){
    _searchHistory=d.searchHistory.slice(-SEARCH_HISTORY_MAX);
    try{localStorage.setItem(SEARCH_HISTORY_KEY,JSON.stringify(_searchHistory));}catch(e){}
  }
  currentTab=(d.currentTab&&typeof d.currentTab==='object'&&!Array.isArray(d.currentTab))?d.currentTab:{};
  stack=[{nodeId:rootId,label:nodes[rootId].label,cellRef:null}];
  migrateNodeAliasesToCells();
  rebuildAliasIndex();
}
function tryLoad(){
  try{
    const r=localStorage.getItem(SAVE_KEY);if(!r)return false;
    const d=JSON.parse(r);
    if(!validateImport(d)){console.warn('tryLoad: invalid payload shape, falling back to default state');return false;}
    loadData(d);
    return true;
  }catch(e){console.warn('tryLoad failed:',e.message);return false;}
}
async function exportJSON(){
  const cur=stack[stack.length-1];
  if(cur.cellRef){
    const cell=getCell(cur.cellRef.parentId,`${cur.cellRef.rowId}-${cur.cellRef.colId}`);
    const tab=getTab(cur.nodeId,'board');
    const exportId=tab==='matrix'?cell.matrixId:cell.boardId;
    if(exportId)await exportNode(exportId);
    return;
  }
  let content=getPayloadPretty();
  let encrypted=false;
  if(appSettings.encryption){
    const pw=await getEncPw();if(!pw)return;
    showLoading('Verschlüssele Export …');
    try{content=await encryptPayload(content,pw);_encPw=pw;encrypted=true;}
    finally{hideLoading();}
  }
  const blob=new Blob([content],{type:encrypted?'application/octet-stream':'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='matrix-backup.'+(encrypted?'imx':'json');
  a.click();
}
function validateImport(d){
  if(!d||typeof d!=='object')return false;
  if(!d.nodes||typeof d.nodes!=='object')return false;
  if(typeof d.nid!=='number'||d.nid<1)return false;
  if(!d.rootId||!d.nodes[d.rootId])return false;
  const root=d.nodes[d.rootId];
  if(!root||root.type!=='matrix'||!root.data)return false;
  for(const[id,n]of Object.entries(d.nodes)){
    if(!n.id||!n.type||!n.data)return false;
    if(!['matrix','board','cell'].includes(n.type))return false;
  }
  if(d.globalTags&&!Array.isArray(d.globalTags))return false;
  if(d.globalPeople&&!Array.isArray(d.globalPeople))return false;
  if(d.dailyCols&&!Array.isArray(d.dailyCols))return false;
  return true;
}
function importJSON(e){
  const cur=stack[stack.length-1];
  if(cur.cellRef){
    const tab=getTab(cur.nodeId,'board');
    const targetType=tab==='matrix'?'matrix':'board';
    importNodeData(e,cur.cellRef.parentId,cur.cellRef.rowId,cur.cellRef.colId,targetType);
    return;
  }
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{try{
    let text=ev.target.result;
    if(isEncrypted(text)){
      const pw=prompt('Passwort für Entschlüsselung:');
      if(!pw)return;
      showLoading('Entschlüssele Import …');
      try{text=await decryptPayload(text,pw);}catch(x){hideLoading();showToast(translateError(x,'Entschlüsselung fehlgeschlagen — falsches Passwort oder beschädigte Datei.'),{type:'error'});return;}
      hideLoading();
      _encPw=pw;
    }
    const d=JSON.parse(text);
    if(!validateImport(d)){showToast(UI.errImportAbort,{type:'error'});return;}
    loadData(d);save();render();
  }catch(x){showToast(translateError(x,UI.errInvalidFile),{type:'error'});}};
  r.readAsText(f);
}

// ── Scroll-fade: dynamic mask on horizontally scrollable containers ──
function updateScrollFade(el){
  const t=2; // threshold px
  const canL=el.scrollLeft>t;
  const canR=el.scrollLeft<el.scrollWidth-el.clientWidth-t;
  el.classList.toggle('scroll-fade-lr',canL&&canR);
  el.classList.toggle('scroll-fade-l',canL&&!canR);
  el.classList.toggle('scroll-fade-r',!canL&&canR);
  if(!canL&&!canR){el.classList.remove('scroll-fade-lr','scroll-fade-l','scroll-fade-r');}
}
function initScrollFade(){
  document.querySelectorAll('.kb-wrap,.daily-cols').forEach(el=>{
    updateScrollFade(el);
    if(!el._sfBound){el.addEventListener('scroll',()=>updateScrollFade(el),{passive:true});el._sfBound=true;}
  });
}

function render(){
  try{
    // Apply visibility classes
    Object.keys(DEFAULT_SETTINGS.vis).forEach(k=>{document.body.classList.toggle('vis-'+k,(appSettings.vis||{})[k]==='always');});
    renderBC();
    if(appSettings.sidebarEnabled){renderSidebar();}else{renderMM();sbApplyBodyClasses();}
    const _eb=document.getElementById('editbtn');
    _eb.innerHTML=editMode?ICO.check():ICO.edit();
    _eb.style.color=editMode?'var(--amber)':'';
    _eb.title=editMode?'Fertig':'Bearbeiten';
    const cur=stack[stack.length-1];
    const el=document.getElementById('panel');
    const _sy=window.scrollY;
    el.style.minHeight=el.offsetHeight+'px';
    if(cur.cellRef) el.innerHTML=renderCellPage(cur);
    else el.innerHTML=renderMatrixPage(nodes[cur.nodeId]);
    void el.offsetHeight; // force layout before scrollTo
    window.scrollTo(0,_sy);
    requestAnimationFrame(()=>{el.style.minHeight='';});
    // Update gear menu labels for context-aware export/import
    const _isSubLevel=!!cur.cellRef;
    const _ge=document.getElementById('gear-export');
    const _gi=document.getElementById('gear-import');
    if(_ge)_ge.innerHTML=ICO.download(12)+(_isSubLevel?' Export Knoten':' Export JSON');
    if(_gi){const _lbl=_isSubLevel?' Import Knoten':' Import JSON';_gi.innerHTML='';_gi.insertAdjacentHTML('afterbegin',ICO.upload(12)+_lbl);const _inp=_gi.querySelector('input');if(!_inp){_gi.insertAdjacentHTML('beforeend','<input type="file" class="is-hidden" accept=".json,.imx" onchange="importJSON(event);toggleGearMenu();">');}}
    // Scroll-fade masks on horizontally scrollable containers
    initScrollFade();
    // Auto-focus first cell on matrix pages
    if(!cur.cellRef){setTimeout(()=>{const ae=document.activeElement;if(ae&&document.getElementById('panel')?.contains(ae)&&ae!==document.getElementById('panel'))return;const c=document.querySelector('.mcell');if(c)c.focus({preventScroll:true});},FOCUS_RESTORE_MS);}
  }catch(err){
    console.error('Render error:',err);
    document.getElementById('panel').innerHTML=`<div class="empty-state"><div class="empty-big">${ICO.warn(32)}</div><div>Darstellungsfehler — bitte Seite neu laden.</div><div style="font-size:11px;color:var(--text3);margin-top:6px;">${esc(err.message)}</div></div>`;
  }
}

let _animating=false;
function renderAnimated(dir){
  if(_animating||!appSettings.animationsEnabled){render();return;}
  const p=document.getElementById('panel');

function renderBC(){
  document.getElementById('bc').innerHTML=stack.map((s,i)=>{
    const sep=i>0?'<span class="bca">›</span>':'';
    return i<stack.length-1
      ?sep+`<span class="bcs" tabindex="0" role="link" onclick="navTo(${i})" onkeydown="if(event.key==='Enter'){event.preventDefault();navTo(${i});}">${esc(s.label)}</span>`
      :sep+`<span class="bcc">${esc(s.label)}</span>`;
  }).join('');
}
function navTo(i){
  // Remember cellRef of the view we're leaving, so we can restore focus
  const leaving=stack[i+1];
  const _cr=leaving&&leaving.cellRef?leaving.cellRef:null;
  stack=stack.slice(0,i+1);
  // Auto-collapse sidebar's manual expansions on navigation
  if(typeof sbExpanded!=='undefined')sbExpanded.clear();
  renderAnimated('out');
  if(_cr){
    // After animation + render, focus the cell we came from
    const delay=(appSettings.animationsEnabled?ANIM_EXIT_MS+ANIM_ENTER_MS:0)+FOCUS_RESTORE_MS;
    setTimeout(()=>{
      const cell=document.querySelector(`.mcell[data-node="${_cr.parentId}"][data-row="${_cr.rowId}"][data-col="${_cr.colId}"]`);
      if(cell)cell.focus();
    },delay);
  }
}

function renderMM(){
  function walk(nodeId,depth,cellAlias){
    const n=nodes[nodeId];if(!n||nodeId.startsWith('cell-'))return'';
    const color=n.type==='board'?'var(--teal)':'var(--blue)';
    const active=nodeId===stack[stack.length-1].nodeId;
    const alias=cellAlias||n.alias||(nodeId===rootId?'home':'');
    const _alias=alias?`<span style="margin-left:auto;font-size:10px;color:var(--text3);font-family:monospace;">${esc(alias)}</span>`:'';
    const _drop=n.type==='board'?` ondragover="mmDragOver(event)" ondragleave="mmDragLeave(event)" ondrop="mmDrop(event,'${nodeId}')"`:''
    let h=`<div class="mm-node${active?' active':''}" style="padding-left:${depth*10}px" tabindex="0" role="link" onclick="mmNav('${nodeId}')" onkeydown="if(event.key==='Enter'){event.preventDefault();mmNav('${nodeId}');}"${_drop}><div class="mm-dot" style="background:${color}"></div><span style="flex:1;">${esc(n.label)}</span>${_alias}</div>`;
    if(n.type==='matrix')Object.values(n.data.cells).forEach(c=>{const ca=c.alias||'';if(c.boardId)h+=walk(c.boardId,depth+1,ca);if(c.matrixId)h+=walk(c.matrixId,depth+1,ca);});
    return h;
  }
  document.getElementById('mmtree').innerHTML=walk(stack[0].nodeId,0,null);
}
function toggleMM(){mmOpen=!mmOpen;document.getElementById('minimap-panel').classList.toggle('open',mmOpen);renderMM();}
function mmDragEnter(){if(!_dragCardId)return;if(!mmOpen){mmOpen=true;document.getElementById('minimap-panel').classList.add('open');renderMM();}}
function mmDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';const n=e.target.closest('.mm-node');if(n)n.classList.add('drag-over');}
function mmDragLeave(e){const n=e.target.closest('.mm-node');if(n&&!n.contains(e.relatedTarget))n.classList.remove('drag-over');}
function _dropCardOntoBoard(srcBoardId,cardId,targetBoardId){
  if(!srcBoardId||!cardId||!targetBoardId)return;
  if(srcBoardId===targetBoardId)return;
  const tgt=nodes[targetBoardId];if(!tgt||tgt.type!=='board')return;
  const cols=tgt.data.kbCols;
  if(cols.length<=1){
    moveCardToBoard(srcBoardId,cardId,targetBoardId,null);
  } else {
    const opts=cols.map(c=>[c.id,c.label]);
    smodal('Zielspalte wählen',[{label:'Spalte',id:'c',sel:opts.map(o=>o[0]),sellabels:opts.map(o=>o[1]),v:opts[0][0]}],v=>{
      const col=cols.find(c=>c.id===v.c);
      moveCardToBoard(srcBoardId,cardId,targetBoardId,col?col.label:null);
    });
  }
}
function mmDrop(e,targetBoardId){
  e.preventDefault();
  const n=e.target.closest('.mm-node');if(n)n.classList.remove('drag-over');
  if(!_dragCardId||!_dragBoardId||!targetBoardId)return;
  _dropCardOntoBoard(_dragBoardId,_dragCardId,targetBoardId);
}
function toggleGearMenu(){
  const menu=document.getElementById('gearmenu');if(!menu)return;
  const isOpen=menu.classList.contains('open');
  menu.classList.toggle('open',!isOpen);
  if(!isOpen){
    const close=e=>{if(!e.target.closest('.gear-wrap')){menu.classList.remove('open');document.removeEventListener('click',close);}};
    setTimeout(()=>document.addEventListener('click',close),0);
  }
}
function mmNav(nodeId){
  const target=nodes[nodeId];if(!target)return;
  // For boards/sub-matrices: find their parent cell and open via openCell
  if(target.type==='board'||target.type==='matrix'){
    for(const[nid,n]of Object.entries(nodes)){
      if(n.type!=='matrix')continue;
      for(const[k,c]of Object.entries(n.data.cells)){
        const match=(c.boardId===nodeId)?'board':(c.matrixId===nodeId)?'matrix':null;
        if(match){
          const[rowId,colId]=k.split('-');
          // First navigate to parent matrix
          function findPath(from,tgt,path){
            if(from===tgt)return[...path,from];
            const nd=nodes[from];if(!nd||nd.type!=='matrix')return null;
            for(const[key,cell]of Object.entries(nd.data.cells)){
              for(const cid of[cell.boardId,cell.matrixId]){if(!cid)continue;const r=findPath(cid,tgt,[...path,from]);if(r)return r;}
            }return null;
          }
          const parentPath=findPath(stack[0].nodeId,nid,[]);
          if(parentPath){
            stack=parentPath.map(id=>({nodeId:id,label:nodes[id].label,cellRef:null}));
            mmOpen=false;document.getElementById('minimap-panel').classList.remove('open');
            openCell(nid,rowId,colId,target.label,match==='board'?'board':'matrix');
            return;
          }
        }
      }
    }
  }
  // For matrix nodes: direct navigation
  function findPath(from,tgt,path){
    if(from===tgt)return[...path,from];
    const n=nodes[from];if(!n||n.type!=='matrix')return null;
    for(const[k,c]of Object.entries(n.data.cells)){
      for(const cid of[c.boardId,c.matrixId]){if(!cid)continue;const r=findPath(cid,tgt,[...path,from]);if(r)return r;}
    }return null;
  }
  const path=findPath(stack[0].nodeId,nodeId,[]);if(!path)return;
  stack=path.map(id=>({nodeId:id,label:nodes[id].label,cellRef:null}));
  mmOpen=false;document.getElementById('minimap-panel').classList.remove('open');renderAnimated('in');
}

// Find the parent cell of a given node (board or sub-matrix)
function _sbFindParentCell(nodeId){
  for(const[pid,p]of Object.entries(nodes)){
    if(p.type!=='matrix'||!p.data||!p.data.cells)continue;
    for(const[key,cell]of Object.entries(p.data.cells)){
      if(cell.boardId===nodeId||cell.matrixId===nodeId){
        return {parentId:pid,key,cell};
      }
    }
  }
  return null;
}
// Determine dominant feature for a Board node (for icon selection)
// Priority: board > checklists > info. Fallback: 'board'.
function _sbBoardDominantFeature(nodeId){
  const parent=_sbFindParentCell(nodeId);
  if(!parent||!parent.cell.features)return 'board';
  const f=parent.cell.features;
  if(f.includes('board'))return 'board';
  if(f.includes('checklists'))return 'checklists';
  if(f.includes('info'))return 'info';
  return 'board';
}

function sbApplyBodyClasses(){
  const b=document.body.classList;
  const enabled=!!appSettings.sidebarEnabled;
  b.toggle('has-sidebar',enabled);
  b.toggle('has-sidebar-left',enabled&&appSettings.sidebarPosition!=='right');
  b.toggle('has-sidebar-right',enabled&&appSettings.sidebarPosition==='right');
  b.toggle('sb-state-full',enabled&&sbState==='full');
  b.toggle('sb-state-rails',enabled&&sbState==='rails');
  b.toggle('sb-collapsed',enabled&&sbState==='collapsed');
  b.toggle('sb-scroll-viewport',enabled&&!!appSettings.sidebarScroll);
  const sb=document.getElementById('sidebar');
  if(sb){sb.style.setProperty('--sb-w',(appSettings.sidebarWidth||280)+'px');}
  // Also set on body so external anchors like #sb-cycle-btn (sibling of sidebar) can read these vars
  document.body.style.setProperty('--sb-w',(appSettings.sidebarWidth||280)+'px');
  // Icons for the three chevron-buttons (inline in header, rail-cap, and edge/outside).
  // Rule: in full/rails, chevron points *toward* the edge (next click = close further).
  //       in collapsed, edge-button points *toward* content (next click = reopen).
  if(typeof ICO!=='undefined'){
    const isRight=appSettings.sidebarPosition==='right';
    const setIcon=(id,pointRight)=>{const el=document.getElementById(id);if(el)el.innerHTML=pointRight?ICO.arrowR(11):ICO.arrowL(11);};
    // Inline (full) + rail-cap (rails): close-direction → left-sidebar ‹ / right-sidebar ›
    setIcon('sb-inline-toggle',isRight);
    setIcon('sb-rail-cap',isRight);
    // Edge (collapsed): open-direction → left-sidebar › / right-sidebar ‹
    setIcon('sb-edge-toggle',!isRight);
  }
}

// Path of dataIds from root to currently focused entry (for force-show under filter + expand).
// Returns dataIds like: 'matrix-n1', 'cell-n1-n7-n10', 'feat-n1-n7-n10-matrix', ...
function sbComputeActivePath(){
  const set=new Set();
  if(stack[0])set.add('matrix-'+stack[0].nodeId);
  for(const s of stack){
    if(!s)continue;
    if(s.cellRef){
      const cellDataId='cell-'+s.cellRef.parentId+'-'+s.cellRef.rowId+'-'+s.cellRef.colId;
      set.add(cellDataId);
      // Also add active feature (based on currentTab)
      const tab=currentTab[s.nodeId];
      if(tab){
        set.add('feat-'+s.cellRef.parentId+'-'+s.cellRef.rowId+'-'+s.cellRef.colId+'-'+tab);
      }
    }
  }
  // After jumps via ^alias, `stack` only contains [root, target] — intermediate
  // ancestors between root-matrix and target are not in the stack. Walk the parent
  // chain from the active entry up to root so the full tree-path is also expanded.
  // Requires sbParentMap to be populated by a prior sbWalkCellTree call.
  const top=sbActiveTopId();
  if(top){
    let cur=sbParentMap.get(top);
    while(cur){set.add(cur);cur=sbParentMap.get(cur);}
  }
  return set;
}
// All descendant dataIds under the currently focused top entry — for auto-expand only.
// Only active when we're on a specific cell (not on the root matrix), to avoid expanding
// the entire tree when the user hasn't drilled into anything.
function sbComputeActiveSubtree(){
  const set=new Set();
  const topDataId=sbActiveTopId();
  if(!topDataId)return set;
  // At root matrix level: do NOT auto-expand subtree — keep top-level cells collapsed
  if(topDataId.startsWith('matrix-'))return set;
  // Walk the WHOLE cell tree, collecting descendants of topDataId based on sbParentMap.
  // sbParentMap is populated by the most recent sbWalkCellTree call.
  // For robustness, we also rebuild the tree here if needed.
  const entries=[];
  const rootMid=stack[0]?stack[0].nodeId:rootId;
  sbWalkCellTree(rootMid,e=>entries.push(e));
  // Build a reverse: parentDataId → [childDataIds]
  const childrenMap=new Map();
  entries.forEach(e=>{
    if(e.parentDataId){
      if(!childrenMap.has(e.parentDataId))childrenMap.set(e.parentDataId,[]);
      childrenMap.get(e.parentDataId).push(e.dataId);
    }
  });
  function addSubtree(dataId){
    set.add(dataId);
    const children=childrenMap.get(dataId)||[];
    children.forEach(addSubtree);
  }
  addSubtree(topDataId);
  return set;
}

// Returns the dataId of the currently focused entry in the cell-centric sidebar.
// If we're on a cell page, returns the feat-dataId when a tab is active, else the cell-dataId.
// If we're on a matrix page (top-level), returns the matrix-dataId.
function sbActiveTopId(){
  const top=stack[stack.length-1];if(!top)return null;
  if(top.cellRef){
    const cellDataId='cell-'+top.cellRef.parentId+'-'+top.cellRef.rowId+'-'+top.cellRef.colId;
    const parent=nodes[top.cellRef.parentId];
    if(parent&&parent.type==='matrix'){
      const key=top.cellRef.rowId+'-'+top.cellRef.colId;
      const cell=parent.data.cells[key];
      if(cell){
        const activeKeys=getActiveFeatures(cell).map(f=>f.key);
        const isSingle=activeKeys.length===1;
        if(!isSingle){
          const tab=currentTab[top.nodeId];
          if(tab&&activeKeys.includes(tab)){
            return 'feat-'+top.cellRef.parentId+'-'+top.cellRef.rowId+'-'+top.cellRef.colId+'-'+tab;
          }
        }
      }
    }
    return cellDataId;
  }
  // No cell in stack → we're at a matrix page (usually root)
  return 'matrix-'+top.nodeId;
}

// Cell-centric walker: produces entries in visual order.
// Entry types:
//   {kind:'matrix', dataId:'matrix-{id}', matrixId, label, depth:0}          — root only
//   {kind:'cell', dataId:'cell-{M}-{R}-{C}', parentMatrixId, rowId, colId, cell, row, col,
//                 alias, label:'row / col', depth, features, isSingle, singleIsMatrix, parentDataId}
//   {kind:'feature', dataId:'feat-{M}-{R}-{C}-{TYPE}', cellDataId, parentMatrixId, rowId, colId,
//                    cell, type, tabLabel, depth, parentDataId}
function sbWalkCellTree(rootMatrixId,visitor){
  sbParentMap.clear();
  // Helper: emit link/mail rows as children of parentDataId (cell or feat-info).
  function emitLinks(cell,parentDataId,childDepth){
    if(!cell.boardId)return;
    const b=nodes[cell.boardId];
    if(!b||!b.data||!Array.isArray(b.data.links))return;
    b.data.links.forEach(l=>{
      const isMail=l.type==='mail';
      const linkDataId='link-'+cell.boardId+'-'+l.id;
      sbParentMap.set(linkDataId,parentDataId);
      visitor({
        kind:'link',dataId:linkDataId,boardId:cell.boardId,linkId:l.id,
        linkType:isMail?'mail':'link',
        label:l.label||l.url||l.to||'(unbenannt)',
        alias:l.alias||'',depth:childDepth,parentDataId
      });
    });
  }
  function cellHasLinks(cell){
    if(!cell.boardId)return false;
    const b=nodes[cell.boardId];
    return !!(b&&b.data&&Array.isArray(b.data.links)&&b.data.links.length);
  }
  function walk(mid,depth,parentDataId){
    const m=nodes[mid];
    if(!m||m.type!=='matrix')return;
    let curParentDataId=parentDataId;
    if(depth===0){
      const matrixDataId='matrix-'+mid;
      visitor({kind:'matrix',dataId:matrixDataId,matrixId:mid,label:m.label,depth:0,parentDataId:null});
      curParentDataId=matrixDataId;
    }
    Object.entries(m.data.cells||{}).forEach(([key,cell])=>{
      const [rowId,colId]=key.split('-');
      const row=(m.data.rows||[]).find(r=>r.id===rowId);
      const col=(m.data.cols||[]).find(c=>c.id===colId);
      if(!row||!col)return;
      const activeFeatures=getActiveFeatures(cell);
      if(activeFeatures.length===0)return; // skip cells with no features (explicit or implicit)
      const cellDataId='cell-'+mid+'-'+rowId+'-'+colId;
      const cellDepth=depth+(depth===0?1:1);
      const isSingle=activeFeatures.length===1;
      const singleIsMatrix=isSingle&&activeFeatures[0].key==='matrix';
      const singleIsInfo=isSingle&&activeFeatures[0].key==='info';
      const hasLinks=cellHasLinks(cell);
      sbParentMap.set(cellDataId,curParentDataId);
      visitor({
        kind:'cell',dataId:cellDataId,parentMatrixId:mid,rowId,colId,cell,row,col,
        alias:cell.alias||'',label:row.label+' / '+col.label,depth:cellDepth,
        features:activeFeatures,isSingle,singleIsMatrix,singleIsInfo,hasLinks,
        parentDataId:curParentDataId
      });
      if(singleIsMatrix){
        // Skip feature-row; recurse sub-matrix directly as cell's children
        if(cell.matrixId)walk(cell.matrixId,cellDepth,cellDataId);
      }else if(!isSingle){
        // Multi-feature: render each feature
        activeFeatures.forEach(feat=>{
          const featDataId='feat-'+mid+'-'+rowId+'-'+colId+'-'+feat.key;
          const tabLabel=getTabLabel(cell,feat.key);
          sbParentMap.set(featDataId,cellDataId);
          visitor({
            kind:'feature',dataId:featDataId,cellDataId,parentMatrixId:mid,rowId,colId,cell,
            type:feat.key,tabLabel,depth:cellDepth+1,parentDataId:cellDataId,
            hasLinks:feat.key==='info'&&hasLinks
          });
          if(feat.key==='matrix'&&cell.matrixId){
            walk(cell.matrixId,cellDepth+1,featDataId);
          }else if(feat.key==='info'&&hasLinks){
            // Links hängen als Kinder der info-Feature-Row
            emitLinks(cell,featDataId,cellDepth+2);
          }
        });
      }else if(singleIsInfo&&hasLinks){
        // Single-Info-Zelle: Links als direkte Kinder der Zelle (macht Zelle expandable)
        emitLinks(cell,cellDataId,cellDepth+1);
      }
      // else: single non-matrix → leaf, no children
    });
  }
  walk(rootMatrixId,0,null);
}

function sbCollectWhoValues(){
  const set=new Set();
  for(const id in nodes){
    const n=nodes[id];
    if(n&&n.type==='board'&&n.data&&n.data.kbCards){
      n.data.kbCards.forEach(c=>{
        if(Array.isArray(c.who))c.who.forEach(w=>{if(w)set.add(w);});
      });
    }
  }
  return [...set].sort((a,b)=>a.localeCompare(b));
}

// Check if a cell has a given feature-chip characteristic. Uses getActiveFeatures (union of
// explicit + implicit), so a cell with board data but no explicit 'info' feature still counts
// for the 'infos' chip.
function sbCellHasFeature(cell,feat){
  if(!cell)return false;
  const activeKeys=getActiveFeatures(cell).map(f=>f.key);
  if(feat==='matrices')return activeKeys.includes('matrix');
  if(feat==='checklists')return activeKeys.includes('checklists');
  if(feat==='infos')return activeKeys.includes('info');
  if(feat==='tasks')return activeKeys.includes('board');
  return false;
}
function sbNodeCardsMatching(node,predicate){
  if(!node||node.type!=='board'||!node.data||!node.data.kbCards)return false;
  return node.data.kbCards.some(c=>!c.archived&&predicate(c));
}
function sbDeadlineMatch(card,mode){
  if(!card.deadline)return false;
  const d=day0(card.deadline);const t=today0();
  if(mode==='today')return d.getTime()===t.getTime();
  if(mode==='overdue')return d.getTime()<t.getTime()&&!card.done;
  if(mode==='week'){
    const end=new Date(t);end.setDate(end.getDate()+7);
    return d.getTime()>=t.getTime()&&d.getTime()<=end.getTime();
  }
  return false;
}
// Does a cell have cards matching a predicate (for who/prio/deadline filters)?
function sbCellCardsMatching(cell,predicate){
  if(!cell||!cell.boardId)return false;
  const b=nodes[cell.boardId];
  if(!b||b.type!=='board'||!b.data||!b.data.kbCards)return false;
  return b.data.kbCards.some(c=>!c.archived&&predicate(c));
}
// Filter match for cell entries (matrix/feature entries inherit visibility from parent cell)
function sbMatchesFilter(entry){
  if(entry.kind!=='cell')return true; // matrix/feature rows: no independent filter match
  const cell=entry.cell;const ca=entry.alias;
  const f=sbFilter;
  const hasAnyFilter=f.text||f.chips.matrices||f.chips.tasks||f.chips.checklists||f.chips.infos||f.whoSet.size||f.prio.size||f.deadline;
  if(!hasAnyFilter)return true;
  // Text filter: cell alias + row/col label + tab labels + any feature default labels
  if(f.text){
    const q=f.text.toLowerCase();
    const tabLabels=(entry.features||[]).map(ft=>getTabLabel(cell,ft.key)).join(' ');
    const txt=[ca,entry.label||'',tabLabels].join(' ').toLowerCase();
    if(!txt.includes(q))return false;
  }
  if(f.chips.matrices && !sbCellHasFeature(cell,'matrices'))return false;
  if(f.chips.tasks && !sbCellHasFeature(cell,'tasks'))return false;
  if(f.chips.checklists && !sbCellHasFeature(cell,'checklists'))return false;
  if(f.chips.infos && !sbCellHasFeature(cell,'infos'))return false;
  if(f.whoSet.size){
    if(!sbCellCardsMatching(cell,c=>Array.isArray(c.who)&&c.who.some(w=>f.whoSet.has(w))))return false;
  }
  if(f.prio.size){
    if(!sbCellCardsMatching(cell,c=>c.priority&&f.prio.has(c.priority)))return false;
  }
  if(f.deadline){
    if(!sbCellCardsMatching(cell,c=>sbDeadlineMatch(c,f.deadline)))return false;
  }
  return true;
}

let _sbFilterActivePathAncestors=new Set();
let _sbFilterMatched=new Set();
function sbComputeFilterSets(rootMatrixId){
  _sbFilterMatched.clear();_sbFilterActivePathAncestors.clear();
  const hasAnyFilter=sbFilter.text||sbFilter.chips.matrices||sbFilter.chips.tasks||sbFilter.chips.checklists||sbFilter.chips.infos||sbFilter.whoSet.size||sbFilter.prio.size||sbFilter.deadline;
  if(!hasAnyFilter)return;
  const entries=[];
  sbWalkCellTree(rootMatrixId,e=>entries.push(e));
  entries.forEach(e=>{
    if(e.kind==='cell'&&sbMatchesFilter(e)){
      _sbFilterMatched.add(e.dataId);
      let p=sbParentMap.get(e.dataId);
      while(p){_sbFilterActivePathAncestors.add(p);p=sbParentMap.get(p);}
    }
  });
}

function sbRenderTree(rootMatrixId){
  const hasAnyFilter=sbFilter.text||sbFilter.chips.matrices||sbFilter.chips.tasks||sbFilter.chips.checklists||sbFilter.chips.infos||sbFilter.whoSet.size||sbFilter.prio.size||sbFilter.deadline;
  sbComputeFilterSets(rootMatrixId);

  // Walk first so sbParentMap is populated before sbComputeActivePath runs
  // (it relies on sbParentMap to resolve ancestor chains after ^alias jumps).
  const entries=[];
  sbWalkCellTree(rootMatrixId,e=>entries.push(e));

  // Sticky "Alles expandiert"-Mode (Shift+A): refülle sbExpanded vor jedem Render,
  // damit der Zustand Navigation + sbExpanded.clear() in sbNav übersteht.
  if(_sbExpandAllSticky){
    entries.forEach(e=>{
      if(e.kind==='cell'){
        if(!e.isSingle||e.singleIsMatrix)sbExpanded.add(e.dataId);
      }else if(e.kind==='feature'&&e.type==='matrix'){
        sbExpanded.add(e.dataId);
      }
    });
  }

  const activePath=sbComputeActivePath();
  const activeSubtree=hasAnyFilter?new Set():sbComputeActiveSubtree();
  const activeTopId=sbActiveTopId();
  const showIcons=appSettings.sidebarShowIcons;
  const showAliases=appSettings.sidebarShowAliases;

  // Build parent → children map based on parentDataId
  const childrenMap=new Map();
  entries.forEach(e=>{
    if(!e.parentDataId)return;
    if(!childrenMap.has(e.parentDataId))childrenMap.set(e.parentDataId,[]);
    childrenMap.get(e.parentDataId).push(e.dataId);
  });
  const entryById=new Map();
  entries.forEach(e=>entryById.set(e.dataId,e));

  function isExpandedFor(e){
    // Matrix root: always expanded
    if(e.kind==='matrix')return true;
    // Cell: expandable when multi-feature OR single-matrix (sub-cells beneath)
    // Feature: expandable only when type==='matrix'
    return sbExpanded.has(e.dataId)||activePath.has(e.dataId)||activeSubtree.has(e.dataId)||(hasAnyFilter&&_sbFilterActivePathAncestors.has(e.dataId));
  }
  function isExpandable(e){
    if(e.kind==='matrix')return false; // root is implicit
    if(e.kind==='cell'){
      if(!e.isSingle)return true;
      if(e.singleIsMatrix)return true;
      if(e.singleIsInfo&&e.hasLinks)return true; // single-info-cell with links
      return false;
    }
    if(e.kind==='feature')return e.type==='matrix'||(e.type==='info'&&e.hasLinks);
    return false;
  }

  let html='';
  function renderEntry(e){
    const dataId=e.dataId;
    const depth=e.depth;
    const parentDataId=e.parentDataId;
    const expandable=isExpandable(e);
    const expanded=isExpandedFor(e);
    const isActive=(dataId===activeTopId);
    // Filter visibility — only activePath force-shows, NOT activeSubtree
    let hiddenByFilter=false;
    if(hasAnyFilter){
      // Matrix root always visible. Cell rows hidden unless matched/ancestor/forced. Feature rows: inherit from cell.
      if(e.kind==='cell'){
        const inPath=_sbFilterActivePathAncestors.has(dataId)||_sbFilterMatched.has(dataId);
        const forced=activePath.has(dataId);
        if(!inPath&&!forced)hiddenByFilter=true;
      }else if(e.kind==='feature'){
        // Show feature if parent cell is matched/ancestor/forced
        const cellDataId=e.cellDataId;
        const inPath=_sbFilterActivePathAncestors.has(cellDataId)||_sbFilterMatched.has(cellDataId);
        const forced=activePath.has(cellDataId);
        if(!inPath&&!forced)hiddenByFilter=true;
      }
    }
    if(hiddenByFilter)return;
    // Absprung-Gate: Link/Mail-Rows per Settings ein/aus
    if(e.kind==='link'){
      const vkey=e.linkType==='mail'?'sbJumpMails':'sbJumpLinks';
      if(!isVis(vkey))return;
    }
    const isActiveOutsideFilter=(hasAnyFilter&&!_sbFilterMatched.has(dataId)&&!_sbFilterActivePathAncestors.has(dataId)&&(isActive||activePath.has(dataId)));
    const isFilterHit=hasAnyFilter&&e.kind==='cell'&&_sbFilterMatched.has(dataId);

    const paddingLeft=(depth+1)*14+6;
    const classes=['sb-node'];
    if(e.kind==='matrix')classes.push('sb-matrix');
    else if(e.kind==='cell')classes.push('sb-cell');
    else if(e.kind==='feature')classes.push('sb-feature');
    else if(e.kind==='link')classes.push('sb-link');
    if(isActive)classes.push('active');
    if(isActiveOutsideFilter)classes.push('active-outside-filter');
    if(isFilterHit)classes.push('filter-hit');
    // Targeted expand animation: animate descendants of the just-toggled node
    if(_sbLastExpandedId){
      let p=parentDataId;
      while(p){if(p===_sbLastExpandedId){classes.push('sb-anim-enter');break;}p=sbParentMap.get(p);}
    }
    const chevronChar=expandable?'▸':'';
    const chevronCls='sb-node-chevron'+(expanded?' expanded':'');

    // Alias text (shown only on cells)
    let aliasText='';
    if(e.kind==='matrix')aliasText=showAliases?'home':'';
    else if(e.kind==='cell'&&showAliases)aliasText=e.alias||'';
    const aliasHtml=showAliases?`<span class="sb-node-alias" title="${esc(aliasText)}">${esc(aliasText)}</span>`:'';

    // Icon + dot-type based on entry kind
    let iconHtml='<span class="sb-node-icon"></span>';
    let dotTypeCls='matrix';
    let primaryFeatureKey=null;
    if(e.kind==='matrix'){
      dotTypeCls='matrix';
      if(showIcons)iconHtml=`<span class="sb-node-icon ico-matrix">${SB_ICONS.matrix}</span>`;
    }else if(e.kind==='cell'){
      // For single-feature cells: inline feature icon (colored).
      // For multi-feature cells: generic cell-box icon (neutral) — features shown as rows below.
      if(e.isSingle){
        primaryFeatureKey=e.features[0].key;
        const def=getCellFeatureDef(primaryFeatureKey);
        dotTypeCls=primaryFeatureKey==='matrix'?'matrix':primaryFeatureKey;
        if(showIcons&&def)iconHtml=`<span class="sb-node-icon ico-${primaryFeatureKey}">${def.icoSm}</span>`;
      }else{
        // Multi-feature: generic cell icon, neutral gray color
        dotTypeCls='cellbox';
        if(showIcons)iconHtml=`<span class="sb-node-icon ico-cellbox">${SB_ICONS.cellBox}</span>`;
      }
    }else if(e.kind==='feature'){
      const def=getCellFeatureDef(e.type);
      dotTypeCls=e.type==='matrix'?'matrix':e.type;
      if(showIcons&&def)iconHtml=`<span class="sb-node-icon ico-${e.type}">${def.icoSm}</span>`;
    }else if(e.kind==='link'){
      const isMail=e.linkType==='mail';
      dotTypeCls=isMail?'mail':'link';
      if(showIcons)iconHtml=`<span class="sb-node-icon ico-${dotTypeCls}">${isMail?ICO.mail(12):ICO.link(12)}</span>`;
    }

    // Label text
    let labelText='';
    if(e.kind==='matrix')labelText=e.label;
    else if(e.kind==='cell')labelText=e.label;
    else if(e.kind==='feature')labelText=e.tabLabel;
    else if(e.kind==='link')labelText=e.label;

    // Drop target: boards (feature-row type=board, OR single-board cell)
    let isDropTarget=false, dropBoardId=null;
    if(e.kind==='feature'&&e.type==='board'&&e.cell.boardId){isDropTarget=true;dropBoardId=e.cell.boardId;}
    else if(e.kind==='cell'&&e.isSingle&&e.features[0].key==='board'&&e.cell.boardId){isDropTarget=true;dropBoardId=e.cell.boardId;}
    const dropAttrs=isDropTarget?` ondragover="sbDragOver(event)" ondragleave="sbDragLeave(event)" ondrop="sbDrop(event,'${dropBoardId}')"`:'';

    // Context menu: cells (feature-add + rename/delete), feature rows (content-add), link rows (edit/delete)
    const ctxAttr=(e.kind==='cell'||e.kind==='feature'||e.kind==='link')?` oncontextmenu="sbContextMenu(event,'${dataId}')"`:'';
    // Row actions (edit-mode) only shown on cells
    const actionsHtml=(e.kind==='cell')?`<span class="sb-row-actions">
      <button title="Umbenennen" onclick="event.stopPropagation();sbRename('${dataId}')" tabindex="-1">✎</button>
      <button title="Löschen" onclick="event.stopPropagation();sbDelete('${dataId}')" tabindex="-1">×</button>
    </span>`:'<span></span>';

    const chevronHandler=`event.stopPropagation();sbToggleExpand('${dataId}',false)`;
    html+=`<div class="${classes.join(' ')}" data-id="${dataId}" data-depth="${depth}" data-dot-type="${dotTypeCls}" data-expandable="${expandable?1:0}" tabindex="0" role="treeitem" aria-level="${depth+1}" aria-expanded="${expandable?expanded:false}" style="padding-left:${paddingLeft}px" onclick="sbNodeClick(event,'${dataId}')"${ctxAttr} onkeydown="sbNodeKey(event,'${dataId}')" onmouseenter="sbNodeMouseEnter(event,'${dataId}')" onmouseleave="sbNodeMouseLeave(event)" onfocus="sbNodeFocus(event,'${dataId}')" onblur="sbNodeBlur(event)"${dropAttrs}>
      <span class="${chevronCls}" onclick="${chevronHandler}">${chevronChar}</span>
      ${aliasHtml}
      ${iconHtml}
      <span class="sb-node-title" title="${esc(labelText)}">${esc(labelText)}</span>
      ${actionsHtml}
    </div>`;

    // Render children if expanded (matrix is always expanded; cell/feature only when expandable+expanded)
    const shouldRenderChildren=(e.kind==='matrix')||(expandable&&expanded);
    if(shouldRenderChildren){
      const kids=childrenMap.get(dataId)||[];
      kids.forEach(kid=>{
        const ke=entryById.get(kid);
        if(ke)renderEntry(ke);
      });
    }
  }
  // Only render the root matrix entry; its descendants are rendered recursively via expansion
  const rootEntry=entries.find(e=>e.kind==='matrix');
  if(rootEntry)renderEntry(rootEntry);
  return html;
}

function sbToggleJump(kind){
  const key=kind==='mails'?'sbJumpMails':'sbJumpLinks';
  if(!appSettings.vis)appSettings.vis={};
  const v=appSettings.vis[key];
  appSettings.vis[key]=(v==='always')?'never':'always';
  saveSettings();
  renderSidebar();
}

function renderSidebar(){
  sbApplyBodyClasses();
  if(!appSettings.sidebarEnabled)return;
  const rootNodeId=stack[0]?stack[0].nodeId:rootId;
  if(!rootNodeId||!nodes[rootNodeId])return;
  const tree=document.getElementById('sb-tree');
  if(!tree)return;
  // Preserve the tree-wrap's scrollTop across the innerHTML swap. Without this,
  // replacing tree.innerHTML resets the scroll position to 0, making the subsequent
  // auto-scroll-to-active visible as a "jump" (the ruck effect).
  const wrap=document.getElementById('sb-tree-wrap');
  const savedScrollTop=wrap?wrap.scrollTop:0;
  tree.innerHTML=sbRenderTree(rootNodeId);
  if(wrap)wrap.scrollTop=savedScrollTop;
  sbUpdateFilterUI();
  // Compute rails width based on max visible depth (for rails-mode)
  sbUpdateRailsWidth();
  // SVG connections
  requestAnimationFrame(()=>{
    sbDrawConnections();
    sbAutoScrollToActive();
    // After sb-anim-enter finishes (max-height 0→40 over 180ms), element heights stabilize.
    // Re-draw so dots land on the true row centers.
    const firstAnimated=document.querySelector('.sb-tree .sb-node.sb-anim-enter');
    if(firstAnimated){
      const once=(ev)=>{
        if(ev.target!==firstAnimated)return;
        firstAnimated.removeEventListener('animationend',once);
        sbDrawConnections();
      };
      firstAnimated.addEventListener('animationend',once);
    }
  });
}
// Compute dynamic rails-mode width from max visible depth. Sets --sb-rails-w CSS var which
// the sidebar width transitions to when in rails mode.
function sbUpdateRailsWidth(){
  const sb=document.getElementById('sidebar');
  if(!sb)return;
  const nodeEls=document.querySelectorAll('.sb-node');
  let maxDepth=0;
  nodeEls.forEach(n=>{
    const d=parseInt(n.dataset.depth||'0',10);
    if(d>maxDepth)maxDepth=d;
  });
  // dot center x = depth*14 + 8; add right padding for dot radius + breathing room
  const INDENT=14,DOT_X=8,RIGHT_PAD=14;
  const w=Math.max(24,maxDepth*INDENT+DOT_X+RIGHT_PAD);
  sb.style.setProperty('--sb-rails-w',w+'px');
  document.body.style.setProperty('--sb-rails-w',w+'px');
}

let _sbScrolled=false;
function sbAutoScrollToActive(){
  if(!appSettings.sidebarAutoScroll)return;
  if(_sbSkipNextAutoScroll){_sbSkipNextAutoScroll=false;return;}
  const activeTopId=sbActiveTopId();
  if(!activeTopId)return;
  const el=document.querySelector(`.sb-node[data-id="${activeTopId}"]`);
  // 'nearest' only scrolls when the active element is actually out of view — prevents
  // the tree from jumping when the user has scrolled elsewhere or re-renders preserve position.
  if(el)el.scrollIntoView({block:'nearest',behavior:_sbScrolled?'smooth':'auto'});
  _sbScrolled=true;
  sbUpdateScrollFade();
}

// Setzt --fade-top/--fade-bot je nach Scroll-Position. Fade nur wenn wirklich in die
// entsprechende Richtung scrollbar (Hinweis für den User, dass oben/unten noch Inhalt liegt).
function sbUpdateScrollFade(){
  const wrap=document.getElementById('sb-tree-wrap');
  if(!wrap)return;
  // Während Sidebar-Collapse ist clientHeight~0 — überspringen (transitionend löst später aus).
  if(wrap.clientHeight<=1)return;
  const FADE=16; // px
  const canUp = wrap.scrollTop>0;
  const canDown = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight > 1;
  wrap.style.setProperty('--fade-top', canUp ? FADE+'px' : '0px');
  wrap.style.setProperty('--fade-bot', canDown ? FADE+'px' : '0px');
}

function sbDrawConnections(){
  const svg=document.getElementById('sb-connections');
  const wrap=document.getElementById('sb-tree-wrap');
  const tree=document.getElementById('sb-tree');
  if(!svg||!wrap||!tree)return;
  const nodeEls=Array.from(tree.querySelectorAll('.sb-node'));
  const h=tree.scrollHeight;const w=tree.clientWidth;
  // Bail out during sidebar collapse/expand transition when tree width is ~0;
  // a later transitionend-driven redraw will catch it when widths are final.
  if(w<=1||h<=1)return;
  svg.setAttribute('width',w);
  svg.setAttribute('height',h);
  svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  svg.setAttribute('preserveAspectRatio','xMinYMin meet');
  svg.style.width=w+'px';
  svg.style.height=h+'px';
  // Align SVG coordinate origin with the tree's content origin so that cy values
  // derived from `el.offsetTop` (relative to .sb-tree) land on the actual row
  // centers. Without this, sb-tree-wrap's padding offsets the SVG by 6px.
  svg.style.top=tree.offsetTop+'px';
  svg.style.left=tree.offsetLeft+'px';
  // Metadata per node
  const INDENT=14,DOT_IN_SLOT=8;
  const activeTopId=sbActiveTopId();
  const meta=new Map();
  nodeEls.forEach(el=>{
    const id=el.dataset.id;
    const depth=parseInt(el.dataset.depth||'0',10);
    const top=el.offsetTop;const height=el.offsetHeight;
    const cy=top+height/2;
    const cx=depth*INDENT+DOT_IN_SLOT; // dot center-x
    meta.set(id,{cx,cy,depth,el});
  });
  const useColors=nodeEls.length<=500;
  // Group children by parent (preserving visual order)
  const byParent=new Map();
  nodeEls.forEach(el=>{
    const id=el.dataset.id;
    const parent=sbParentMap.get(id);if(!parent)return;
    if(!byParent.has(parent))byParent.set(parent,[]);
    byParent.get(parent).push(id);
  });
  // Helper: find the greatest cy among a node's descendants (recursive through byParent)
  function lastDescendantCy(nodeId){
    const children=byParent.get(nodeId);
    if(!children||children.length===0){
      const m=meta.get(nodeId);return m?m.cy:-Infinity;
    }
    let maxY=-Infinity;
    children.forEach(cid=>{const y=lastDescendantCy(cid);if(y>maxY)maxY=y;});
    return maxY;
  }
  // Pass A: Rails
  //   - "Own rail": per parent-with-children, a vertical rail through the parent's own dot,
  //     extending down to the last descendant's cy (shows depth-level presence, DevOps-style)
  //   - "Sibling rail": per parent, a vertical rail at child-x from first child cy to last child cy
  //     (connects siblings at their own depth — in most cases this overlaps with one of the
  //     deeper parent's own rails, which is harmless)
  // Pass B: Split-curves per parent (colored by first child's type)
  let rails='';
  let splits='';
  byParent.forEach((childIds,parentId)=>{
    const pm=meta.get(parentId);if(!pm)return;
    const firstId=childIds[0],lastId=childIds[childIds.length-1];
    const firstMeta=meta.get(firstId),lastMeta=meta.get(lastId);
    if(!firstMeta||!lastMeta)return;
    // Own rail through parent's dot
    const ownLastY=lastDescendantCy(parentId);
    if(ownLastY>pm.cy+3){
      rails+=`<path class="ln-rail" d="M ${pm.cx} ${pm.cy} L ${pm.cx} ${ownLastY}"/>`;
    }
    // Sibling rail between first and last child (only if >1 children, otherwise redundant)
    const railX=firstMeta.cx;
    if(childIds.length>1&&lastMeta.cy>firstMeta.cy){
      rails+=`<path class="ln-rail" d="M ${railX} ${firstMeta.cy} L ${railX} ${lastMeta.cy}"/>`;
    }
    // Split-curve: from parent-dot bottom → smooth curve → rail top (first child y).
    // Arc colour = first-child's dot-type so the bow visually matches the dot it leads to.
    const px=pm.cx,py=pm.cy;
    const cy=firstMeta.cy;
    const d=`M ${px} ${py+3} C ${px} ${cy}, ${railX} ${cy-6}, ${railX} ${cy}`;
    const firstDt=firstMeta.el?.dataset?.dotType||'matrix';
    const cls=useColors?('ln-'+firstDt):'';
    splits+=`<path class="ln-split ${cls}" d="${d}"/>`;
  });
  // Pass B: Dots (colored per node type), on top of rails
  let dots='';
  nodeEls.forEach(el=>{
    const id=el.dataset.id;
    const m=meta.get(id);if(!m)return;
    // Pull the stored dotTypeCls from the DOM node for cell-leaves (data-dot-type),
    // otherwise derive from node type
    const dtAttr=el.dataset.dotType;
    let cls='dot-matrix';
    if(dtAttr){cls='dot-'+dtAttr;}
    else{
      const n=nodes[id];
      if(n){
        if(n.type==='board')cls='dot-board';
        else if(n.type==='cell')cls='dot-cell';
      }else if(String(id).startsWith('cell-'))cls='dot-cell';
    }
    const isActive=(id===activeTopId);
    const r=isActive?4.2:3;
    const activeCls=isActive?' dot-active':'';
    dots+=`<circle class="sb-dot ${cls}${activeCls}" cx="${m.cx}" cy="${m.cy}" r="${r}"/>`;
  });
  svg.innerHTML=rails+splits+dots;
}

// Path-finding helpers (shared with mmNav semantics)
function sbFindMatrixPath(from,tgt,path){
  if(from===tgt)return[...path,from];
  const n=nodes[from];if(!n||n.type!=='matrix')return null;
  for(const[k,c]of Object.entries(n.data.cells)){
    for(const cid of[c.boardId,c.matrixId]){
      if(!cid)continue;
      const r=sbFindMatrixPath(cid,tgt,[...path,from]);
      if(r)return r;
    }
  }return null;
}

// Navigate to a dataId: 'matrix-X', 'cell-M-R-C', 'feat-M-R-C-TYPE', or 'link-B-L'
function sbNav(dataId){
  if(!dataId)return;
  const p=parseDataId(dataId);
  if(!p)return;
  // Link/Mail-Row: open URL or mailto, no stack change
  if(p.type==='link'){
    const link=nodes[p.boardId]?.data?.links?.find(l=>l.id===p.linkId);
    if(!link)return;
    if(link.type==='mail')window.location.href=buildMailto(link);
    else if(link.url)window.open(link.url,'_blank');
    return;
  }
  // Auto-collapse manually-expanded branches on nav (user requested behavior).
  // Current cell + descendants will re-expand via activeSubtree on render.
  sbExpanded.clear();
  _sbLastExpandedId=null;
  // If in rails mode, promote to full for context during navigation
  if(sbState==='rails')sbSetState('full');
  if(p.type==='matrix'){
    const target=nodes[p.matrixId];if(!target||target.type!=='matrix')return;
    const path=sbFindMatrixPath(stack[0].nodeId,p.matrixId,[]);
    if(!path)return;
    stack=path.map(id=>({nodeId:id,label:nodes[id].label,cellRef:null}));
    renderAnimated('in');
    return;
  }
  if(p.type==='feat'){
    _sbOpenCellAt(p.matrixId,p.rowId,p.colId,p.key);
    return;
  }
  if(p.type==='cell'){
    const parent=nodes[p.matrixId];if(!parent||parent.type!=='matrix')return;
    const cell=parent.data.cells[p.rowId+'-'+p.colId];if(!cell||!cell.features||!cell.features.length)return;
    // Default tab = first feature in CELL_FEATURES order
    const firstFeature=CELL_FEATURES.find(f=>cell.features.includes(f.key));
    const tab=firstFeature?firstFeature.key:cell.features[0];
    _sbOpenCellAt(p.matrixId,p.rowId,p.colId,tab);
    return;
  }
}
function _sbOpenCellAt(parentMatrixId,rowId,colId,tab){
  const parent=nodes[parentMatrixId];if(!parent||parent.type!=='matrix')return;
  const cell=parent.data.cells[rowId+'-'+colId];if(!cell)return;
  const rowLbl=(parent.data.rows.find(r=>r.id===rowId)||{}).label||'';
  const colLbl=(parent.data.cols.find(co=>co.id===colId)||{}).label||'';
  const label=(rowLbl&&colLbl?rowLbl+' / '+colLbl:(rowLbl||colLbl||'Zelle'));
  const parentPath=sbFindMatrixPath(stack[0].nodeId,parentMatrixId,[]);
  if(parentPath){
    stack=parentPath.map(id=>({nodeId:id,label:nodes[id].label,cellRef:null}));
    openCell(parentMatrixId,rowId,colId,label,tab);
  }
}

function sbNodeClick(e,nodeId){
  if(e.ctrlKey&&e.shiftKey){
    sbToggleExpand(nodeId,true);return;
  }
  if(e.ctrlKey){
    sbToggleExpand(nodeId,false);return;
  }
  sbNav(nodeId);
}
function sbNodeKey(e,nodeId){
  if(e.key==='Enter'||e.key===' '){e.preventDefault();sbNav(nodeId);return;}
  // "+" opens the context menu on the focused row (cell or feature)
  if(e.key==='+'){
    e.preventDefault();
    const el=e.currentTarget;
    const rect=el.getBoundingClientRect();
    sbContextMenu({clientX:rect.right-10,clientY:rect.top+rect.height/2,preventDefault:()=>{}},nodeId);
    return;
  }
  if(e.key==='ArrowRight'){
    const el=e.currentTarget;
    if(el.dataset.expandable==='1'&&!sbExpanded.has(nodeId)){e.preventDefault();sbExpanded.add(nodeId);sbSavePersist();renderSidebar();}
  }
  if(e.key==='ArrowLeft'){
    if(sbExpanded.has(nodeId)){e.preventDefault();sbExpanded.delete(nodeId);sbSavePersist();renderSidebar();}
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const all=Array.from(document.querySelectorAll('.sb-node'));
    const idx=all.findIndex(x=>x.dataset.id===nodeId);
    if(idx>=0&&idx<all.length-1)all[idx+1].focus();
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    const all=Array.from(document.querySelectorAll('.sb-node'));
    const idx=all.findIndex(x=>x.dataset.id===nodeId);
    if(idx>0)all[idx-1].focus();
  }
}

function sbToggleExpand(nodeId,siblingsToo){
  let willExpand=false;
  if(siblingsToo){
    // Toggle all siblings at same depth
    const parent=sbParentMap.get(nodeId);
    if(!parent)return;
    const siblings=[];
    sbParentMap.forEach((pid,cid)=>{if(pid===parent)siblings.push(cid);});
    const anyCollapsed=siblings.some(s=>!sbExpanded.has(s));
    willExpand=anyCollapsed;
    siblings.forEach(s=>{if(anyCollapsed)sbExpanded.add(s);else sbExpanded.delete(s);});
    _sbLastExpandedId=anyCollapsed?parent:null; // expand children of parent get animated
  } else {
    if(sbExpanded.has(nodeId)){sbExpanded.delete(nodeId);_sbLastExpandedId=null;}
    else{sbExpanded.add(nodeId);_sbLastExpandedId=nodeId;willExpand=true;}
  }
  sbSavePersist();
  renderSidebar();
  // Clear the flag after animations have had time to start
  setTimeout(()=>{_sbLastExpandedId=null;},50);
}
// Toggle "Alles expandiert"-Sticky-Mode im Full-Modus. Solange aktiv, wird sbExpanded
// vor jedem Render mit allen expandables aufgefüllt (sbRenderTree) — überlebt
// sbExpanded.clear() in sbNav und alle Navigationen. Erneutes Shift+A schaltet ab.
// Im Rails-Modus: klappt Sidebar temporär zu full (altes Verhalten, kein Sticky).
function sbToggleExpandAll(){
  if(!appSettings.sidebarEnabled){showCmdError();return;}
  if(sbState==='rails'){sbSetState('full');_sbRailExpanded=true;return;}
  if(sbState!=='full'){showCmdError();return;}
  const rootMid=stack[0]?stack[0].nodeId:rootId;
  if(_sbExpandAllSticky){
    // Off: Sticky aus, alles kollabieren
    _sbExpandAllSticky=false;
    sbExpanded.clear();
    _sbLastExpandedId=null;
  }else{
    // On: Sticky an, alle expandables initial eintragen (damit Animation sauber läuft)
    _sbExpandAllSticky=true;
    sbWalkCellTree(rootMid,e=>{
      if(e.kind==='cell'){
        if(!e.isSingle||e.singleIsMatrix)sbExpanded.add(e.dataId);
      }else if(e.kind==='feature'&&e.type==='matrix'){
        sbExpanded.add(e.dataId);
      }
    });
    _sbLastExpandedId='matrix-'+rootMid;
  }
  sbSavePersist();
  renderSidebar();
  setTimeout(()=>{_sbLastExpandedId=null;},50);
}
// Cycle through 3 states: full → rails → collapsed → full
// Rail-expansion tracking: true when the sidebar was expanded from rails via a
// sidebar-click (sbRailsClick) — in this mode, clicking anywhere OUTSIDE the
// sidebar collapses it back to rails. Cleared when the state changes for any
// other reason (cycle-btn, keyboard shortcut, explicit setState call).
let _sbRailExpanded=false;
// Focus-swap state: remember the last-focused element per region so the 'S' shortcut
// can jump back to where the user was, not always the first focusable.
let _lastSidebarFocus=null;
let _lastCanvasFocus=null;
// When true, the next sbAutoScrollToActive call is skipped — used to avoid the
// visible scroll-ruck when the sidebar is mid-width-transition. The transitionend
// listener triggers the auto-scroll once dimensions have settled.
let _sbSkipNextAutoScroll=false;

function sbToggle(){
  _sbRailExpanded=false;
  const order=['full','rails','collapsed'];
  const idx=order.indexOf(sbState);
  sbState=order[(idx+1)%order.length];
  // Width will transition; skip the initial auto-scroll to avoid the visible jump.
  _sbSkipNextAutoScroll=true;
  sbSavePersist();
  sbApplyBodyClasses();
  if(sbState!=='collapsed')renderSidebar();
}
function sbSetState(newState){
  if(!['full','rails','collapsed'].includes(newState))return;
  if(sbState===newState)return;
  _sbRailExpanded=false;
  _sbSkipNextAutoScroll=true;
  sbState=newState;
  sbSavePersist();
  sbApplyBodyClasses();
  if(newState!=='collapsed')renderSidebar();
}
// Swap keyboard focus between the canvas and the sidebar.
// Jumps back to the last-focused element per region (tracked via focusin).
// Falls back to the first sensible focus target if none is remembered.
function focusSwap(){
  const ae=document.activeElement;
  const inSidebar=ae&&ae.closest&&ae.closest('#sidebar');
  if(inSidebar){
    const target=(_lastCanvasFocus&&document.contains(_lastCanvasFocus))
      ?_lastCanvasFocus
      :(document.querySelector('#panel [tabindex="0"]')||document.querySelector('#panel button')||document.querySelector('.mcell'));
    if(target)target.focus();
    return;
  }
  // Not in sidebar → jump to sidebar. If disabled/collapsed, expand to at least rails.
  if(!appSettings.sidebarEnabled){appSettings.sidebarEnabled=true;saveSettings();}
  if(sbState==='collapsed')sbSetState('full');
  const target=(_lastSidebarFocus&&document.contains(_lastSidebarFocus))
    ?_lastSidebarFocus
    :(document.querySelector('#sidebar .sb-node.active')||document.querySelector('#sidebar .sb-node'));
  if(target)setTimeout(()=>target.focus(),0);
}
// Click anywhere in rails-mode sidebar returns to full mode
function sbRailsClick(e){
  if(sbState==='rails'){e.preventDefault();e.stopPropagation();sbSetState('full');_sbRailExpanded=true;}
}
function sbTabDragEnter(e){

// Peek Preview
function sbPeekShow(nodeId,anchorEl){
  if(!appSettings.peekEnabled)return;
  if(sbPeekCurrentId===nodeId&&sbPeekEl)return;
  sbPeekHide();
  sbPeekCurrentId=nodeId;
  const el=document.createElement('div');
  el.id='sb-peek';
  el.innerHTML=sbPeekContent(nodeId);
  document.body.appendChild(el);
  sbPeekEl=el;
  // Position
  const rect=anchorEl.getBoundingClientRect();
  const peekW=280;const peekH=el.offsetHeight||200;
  let left;
  if(appSettings.sidebarPosition==='right'){
    left=rect.left-peekW-8;
    if(left<8)left=rect.right+8;
  } else {
    left=rect.right+8;
    if(left+peekW>window.innerWidth-8)left=rect.left-peekW-8;
  }
  let top=rect.top;
  if(top+peekH>window.innerHeight-8)top=window.innerHeight-peekH-8;
  if(top<8)top=8;
  el.style.left=left+'px';
  el.style.top=top+'px';
}
function sbPeekHide(){
  if(sbPeekEl){sbPeekEl.remove();sbPeekEl=null;}
  sbPeekCurrentId=null;
}
function sbPeekContent(dataId){
  const pd=parseDataId(dataId);
  if(!pd)return '';
  // Matrix entry
  if(pd.type==='matrix'){
    const n=nodes[pd.matrixId];if(!n||n.type!=='matrix')return '';
    const cols=n.data.cols.length||1,rows=n.data.rows.length||1;
    const maxC=Math.min(cols,5),maxR=Math.min(rows,5);
    let grid='';
    for(let r=0;r<maxR;r++){
      for(let c=0;c<maxC;c++){
        const row=n.data.rows[r],col=n.data.cols[c];
        if(!row||!col){grid+='<div class="peek-grid-cell"></div>';continue;}
        const cell=n.data.cells[row.id+'-'+col.id];
        let bg='var(--bg3)';
        if(cell){
          if(cell.matrixId)bg='var(--blue)';
          else if(cell.boardId)bg='var(--teal)';
          else if(cell.features&&cell.features.length)bg='var(--amber)';
        }
        grid+=`<div class="peek-grid-cell" style="background:${bg};"></div>`;
      }
    }
    return `<div class="peek-title">${esc(n.label)}</div>
      <div class="peek-sub">Matrix · ${rows}×${cols}</div>
      <div class="peek-grid" style="grid-template-columns:repeat(${maxC},1fr);">${grid}</div>`;
  }
  // Cell or feature entry
  if(pd.type==='cell'||pd.type==='feat'){
    const parent=nodes[pd.matrixId];if(!parent)return '';
    const cell=parent.data.cells[pd.rowId+'-'+pd.colId];if(!cell)return '';
    const rowLbl=(parent.data.rows.find(r=>r.id===pd.rowId)||{}).label||'';
    const colLbl=(parent.data.cols.find(co=>co.id===pd.colId)||{}).label||'';
    if(pd.type==='feat'){
      // Feature peek: show that tab's content summary
      const type=pd.key;
      if(type==='matrix'&&cell.matrixId){
        const sub=nodes[cell.matrixId];
        if(sub){
          const cols=sub.data.cols.length,rows=sub.data.rows.length;
          return `<div class="peek-title">${esc(getTabLabel(cell,'matrix'))}</div>
            <div class="peek-sub">Sub-Matrix · ${rows}×${cols} Zellen</div>`;
        }
      }
      if(cell.boardId){
        const b=nodes[cell.boardId];
        if(b){
          if(type==='board'){
            const cards=(b.data.kbCards||[]).filter(c=>!c.archived);
            const cols=b.data.kbCols||[];
            const colHtml=cols.map(col=>{
              const count=cards.filter(c=>c.colId===col.id).length;
              const color=col.color||'var(--text3)';
              return `<div class="peek-col"><span class="pc-dot" style="background:${color};"></span><span>${esc(col.label)}</span><span class="pc-count">${count}</span></div>`;
            }).join('');
            return `<div class="peek-title">${esc(getTabLabel(cell,'board'))}</div>
              <div class="peek-sub">Aufgaben · ${cards.length}</div>
              <div class="peek-cols">${colHtml}</div>`;
          }
          if(type==='info'){
            const infos=(b.data.infoFields||[]).length;
            const links=(b.data.links||[]).length;
            return `<div class="peek-title">${esc(getTabLabel(cell,'info'))}</div>
              <div class="peek-sub">Info · ${infos} Felder · ${links} Links</div>`;
          }
          if(type==='checklists'){
            const cl=(b.data.checklists||[]).length;
            return `<div class="peek-title">${esc(getTabLabel(cell,'checklists'))}</div>
              <div class="peek-sub">Checklisten · ${cl}</div>`;
          }
        }
      }
    }
    // Cell peek: show feature badges
    const feats=(cell.features||[]).map(f=>{
      const bg={matrix:'var(--bluebg)',board:'var(--tealbg)',info:'var(--amberbg)',checklists:'var(--purplebg)'}[f]||'var(--bg3)';
      const tx={matrix:'var(--bluetxt)',board:'var(--tealtxt)',info:'var(--ambertxt)',checklists:'var(--purpletxt)'}[f]||'var(--text)';
      return `<span class="peek-feat-badge" style="background:${bg};color:${tx};">${getTabLabel(cell,f)}</span>`;
    }).join('');
    return `<div class="peek-title">${esc(rowLbl+' / '+colLbl)}</div>
      <div class="peek-sub">Zelle · ${cell.alias?esc(cell.alias):'kein Kürzel'}</div>
      <div class="peek-features">${feats||'<span style="color:var(--text3);font-size:10px;">(keine Features)</span>'}</div>`;
  }
  const n=nodes[dataId];if(!n)return '';
  if(n.type==='matrix'){
    const cols=n.data.cols.length||1;
    const rows=n.data.rows.length||1;
    const maxC=Math.min(cols,5),maxR=Math.min(rows,5);
    let grid='';
    for(let r=0;r<maxR;r++){
      for(let c=0;c<maxC;c++){
        const row=n.data.rows[r],col=n.data.cols[c];
        if(!row||!col){grid+='<div class="peek-grid-cell"></div>';continue;}
        const cell=n.data.cells[row.id+'-'+col.id];
        let bg='var(--bg3)';
        if(cell){
          if(cell.matrixId)bg='var(--blue)';
          else if(cell.boardId)bg='var(--teal)';
          else if(cell.features&&cell.features.length)bg='var(--amber)';
        }
        grid+=`<div class="peek-grid-cell" style="background:${bg};"></div>`;
      }
    }
    const extra=cols>5||rows>5?`<div class="peek-sub" style="margin-top:6px;">${rows}×${cols} (Ausschnitt ${maxR}×${maxC})</div>`:'';
    return `<div class="peek-title">${esc(n.label)}</div>
      <div class="peek-sub">Matrix · ${rows} Zeilen × ${cols} Spalten</div>
      <div class="peek-grid" style="grid-template-columns:repeat(${maxC},1fr);">${grid}</div>${extra}`;
  }
  if(n.type==='board'){
    const cols=n.data.kbCols||[];
    const cards=(n.data.kbCards||[]).filter(c=>!c.archived);
    const colHtml=cols.map(col=>{
      const count=cards.filter(c=>c.colId===col.id).length;
      const color=col.color||'var(--text3)';
      return `<div class="peek-col"><span class="pc-dot" style="background:${color};"></span><span>${esc(col.label)}</span><span class="pc-count">${count}</span></div>`;
    }).join('');
    const cl=(n.data.checklists||[]).length;
    const inf=(n.data.infoFields||[]).length+(n.data.links||[]).length;
    return `<div class="peek-title">${esc(n.label)}</div>
      <div class="peek-sub">Board · ${cards.length} Aufgabe${cards.length===1?'':'n'}${cl?' · '+cl+' Checkliste'+(cl===1?'':'n'):''}${inf?' · '+inf+' Info-Element':''}</div>
      <div class="peek-cols">${colHtml||'<span style="color:var(--text3);font-size:10px;">(keine Spalten)</span>'}</div>`;
  }
  return '';
}

// Label für eine einzelne dataId-Komponente im Breadcrumb-Pfad
function _sbCrumbLabelFor(dataId){
  const p=parseDataId(dataId);if(!p)return '?';
  if(p.type==='matrix')return nodes[p.matrixId]?.label||'Matrix';
  if(p.type==='cell'){
    const parent=nodes[p.matrixId];if(!parent)return '?';
    const row=(parent.data.rows||[]).find(r=>r.id===p.rowId);
    const col=(parent.data.cols||[]).find(c=>c.id===p.colId);
    return (row?.label||'')+' / '+(col?.label||'');
  }
  if(p.type==='feat'){
    const cell=nodes[p.matrixId]?.data?.cells?.[p.rowId+'-'+p.colId];
    if(cell&&typeof getTabLabel==='function')return getTabLabel(cell,p.key);
    return getCellFeatureDef(p.key)?.label||p.key;
  }
  if(p.type==='link'){
    const link=nodes[p.boardId]?.data?.links?.find(l=>l.id===p.linkId);
    return link?(link.label||link.url||link.to||'(unbenannt)'):'?';
  }
  return '?';
}
// Kompakter Breadcrumb: Parent-Cell-Label + Target mit Icon. Max zwei Segmente.
// - Cell-Target: nur Cell (kein Icon, kein Parent).
// - Feature-Target: Parent-Cell + Feature-Icon + Feature-Label.
// - Link-Target: Parent-Cell (info-Feature wird übersprungen) + Link/Mail-Icon + Link-Label.
function _sbShortCrumb(dataId){
  const pd=parseDataId(dataId);
  if(!pd)return {parent:null,target:{label:'?',icon:'',color:''}};
  if(pd.type==='cell'){
    return {parent:null,target:{label:_sbCrumbLabelFor(dataId),icon:'',color:''}};
  }
  if(pd.type==='feat'){
    const cellId='cell-'+pd.matrixId+'-'+pd.rowId+'-'+pd.colId;
    const def=getCellFeatureDef(pd.key);
    const C={matrix:'var(--bluetxt)',board:'var(--tealtxt)',info:'var(--ambertxt)',checklists:'var(--purpletxt)'};
    return {
      parent:_sbCrumbLabelFor(cellId),
      target:{label:_sbCrumbLabelFor(dataId),icon:def?.icoSm||'',color:C[pd.key]||''}
    };
  }
  if(pd.type==='link'){
    const link=nodes[pd.boardId]?.data?.links?.find(l=>l.id===pd.linkId);
    // Parent = Cell; bei Multi-Feature hängt der Link an feat-info → eine Ebene überspringen
    let p=sbParentMap.get(dataId);
    if(p&&p.startsWith('feat-'))p=sbParentMap.get(p);
    const parentLabel=(p&&p.startsWith('cell-'))?_sbCrumbLabelFor(p):null;
    const isMail=link?.type==='mail';
    return {
      parent:parentLabel,
      target:{
        label:link?(link.label||link.url||link.to||'(unbenannt)'):'?',
        icon:isMail?ICO.mail(12):ICO.link(12),
        color:'var(--text3)'
      }
    };
  }
  return {parent:null,target:{label:'?',icon:'',color:''}};
}

// Context menu
function sbContextMenu(e,dataId){
  const pd=parseDataId(dataId);
  if(!pd||(pd.type!=='cell'&&pd.type!=='feat'&&pd.type!=='link'))return;
  const isCell=pd.type==='cell',isFeat=pd.type==='feat',isLink=pd.type==='link';
  const cp=isCell?_sbParseCellDataId(dataId):null;
  const fp=isFeat?_sbParseFeatureDataId(dataId):null;
  let lp=null;
  if(isLink){
    const link=nodes[pd.boardId]?.data?.links?.find(l=>l.id===pd.linkId);
    if(link)lp={boardId:pd.boardId,linkId:pd.linkId,link};
  }
  if(!cp&&!fp&&!lp)return;

  const featureAnlageOn=isVis('sbCtxFeature');
  const contentAnlageOn=isVis('sbCtxContent');
  const FEAT_COLORS={matrix:'var(--bluetxt)',board:'var(--tealtxt)',info:'var(--ambertxt)',checklists:'var(--purpletxt)'};
  const buttons=[];

  if(lp){
    const isMail=lp.link.type==='mail';
    buttons.push({
      icon:ICO.edit(12),label:isMail?'Mailvorlage bearbeiten':'Link bearbeiten',
      onClick:()=>isMail?editMailTemplate(lp.boardId,lp.linkId):editLink(lp.boardId,lp.linkId)
    });
    if(editMode){
      buttons.push({divider:true});
      buttons.push({icon:ICO.close(12),label:'Löschen',className:'danger',
        onClick:()=>delLink(lp.boardId,lp.linkId)});
    }
  }else if(cp){
    // Cell: "fehlende Features anlegen" — je nach Setting und Edit-Mode-Gate
    if(featureAnlageOn){
      const active=new Set(getActiveFeatures(cp.cell).map(f=>f.key));
      const rowLabel=cp.parent.data.rows.find(r=>r.id===cp.rowId)?.label||'';
      const colLabel=cp.parent.data.cols.find(c=>c.id===cp.colId)?.label||'';
      const lbl=`${rowLabel} / ${colLabel}`;
      FEATURE_DISPLAY_ORDER.forEach(k=>{
        if(active.has(k))return;
        const def=getCellFeatureDef(k);if(!def)return;
        buttons.push({
          icon:def.icoSm,iconColor:FEAT_COLORS[k],
          label:`${def.label} anlegen`,
          onClick:()=>iconClick(cp.parentMatrixId,cp.rowId,cp.colId,k,lbl),
        });
      });
    }
    if(editMode){
      if(buttons.length)buttons.push({divider:true});
      buttons.push({icon:ICO.edit(12),label:'Umbenennen',onClick:()=>sbRename(dataId)});
      buttons.push({icon:ICO.close(12),label:'Löschen',className:'danger',onClick:()=>sbDelete(dataId)});
    }
  }else if(fp){
    // Feature: "neuen Inhalt anlegen" — je nach Feature-Typ
    if(contentAnlageOn){
      const b=fp.cell.boardId?nodes[fp.cell.boardId]:null;
      if(fp.key==='info'&&b){
        buttons.push({icon:ICO.link(12),label:'Neuer Link',onClick:()=>addLink(fp.cell.boardId)});
        buttons.push({icon:ICO.mail(12),label:'Neue Mailvorlage',onClick:()=>addMailTemplate(fp.cell.boardId)});
      }else if(fp.key==='board'&&b){
        const def=getCellFeatureDef('board');
        buttons.push({icon:def?def.icoSm:'',iconColor:FEAT_COLORS.board,label:'Neue Karte',onClick:()=>addKbCard(fp.cell.boardId)});
      }else if(fp.key==='checklists'&&b){
        const def=getCellFeatureDef('checklists');
        buttons.push({icon:def?def.icoSm:'',iconColor:FEAT_COLORS.checklists,label:'Neue Checkliste',onClick:()=>addChecklist(fp.cell.boardId)});
      }
      // matrix-feature: bewusst ausgelassen
    }
  }

  if(buttons.length===0)return; // nothing to show — don't intercept the event
  e.preventDefault();

  document.querySelectorAll('.sb-context-menu').forEach(m=>m.remove());
  // Source-Row-Highlight — wird bei allen 3 Close-Pfaden wieder entfernt (close/kdClose/button-click)
  const srcEl=document.querySelector(`.sb-node[data-id="${CSS.escape(dataId)}"]`);
  if(srcEl)srcEl.classList.add('sb-node-ctx-src');
  // Close-Handler werden in setTimeout unten erzeugt — hier nur Platzhalter, damit closeMenu sie kennt.
  let _closeClick=null, _closeKey=null;
  // Zentraler Close-Pfad: räumt Highlight, entfernt Menü UND document-Listener (idempotent).
  const closeMenu=()=>{
    srcEl?.classList.remove('sb-node-ctx-src');
    menu.remove();
    if(_closeClick)document.removeEventListener('click',_closeClick);
    if(_closeKey)document.removeEventListener('keydown',_closeKey,true);
    _closeClick=_closeKey=null;
  };
  // Kompakter Breadcrumb: Parent-Cell + Icon + Target (max 2 Segmente)
  const sc=_sbShortCrumb(dataId);
  const parentHtml=sc.parent?`<span class="crumb">${esc(sc.parent)}</span><span class="sep">›</span>`:'';
  const iconHtml=sc.target.icon?`<span class="ctx-ico" style="color:${sc.target.color||'var(--text2)'}">${sc.target.icon}</span>`:'';
  const fullPath=(sc.parent?sc.parent+' › ':'')+sc.target.label;
  const headerHtml=`<div class="ctx-breadcrumb" title="${esc(fullPath)}">
    ${parentHtml}${iconHtml}<span class="crumb target">${esc(sc.target.label)}</span>
  </div>`;
  const menu=document.createElement('div');
  menu.className='sb-context-menu';
  menu.style.left=e.clientX+'px';menu.style.top=e.clientY+'px';
  menu.innerHTML=headerHtml+buttons.map((b,i)=>{
    if(b.divider)return '<div style="height:1px;background:var(--border);margin:3px 0;"></div>';
    const cls=b.className?' class="'+b.className+'"':'';
    const iconHtml=b.icon?`<span style="display:inline-flex;width:14px;height:14px;align-items:center;justify-content:center;color:${b.iconColor||'var(--text2)'};flex-shrink:0;">${b.icon}</span>`:'';
    return `<button${cls} data-idx="${i}">${iconHtml}<span>${esc(b.label)}</span></button>`;
  }).join('');
  document.body.appendChild(menu);
  menu.querySelectorAll('button[data-idx]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const b=buttons[+btn.dataset.idx];
      closeMenu();
      if(b&&b.onClick)b.onClick();
    });
  });
  // Clamp to viewport
  const r=menu.getBoundingClientRect();
  if(r.right>window.innerWidth-8)menu.style.left=(window.innerWidth-r.width-8)+'px';
  if(r.bottom>window.innerHeight-8)menu.style.top=(window.innerHeight-r.height-8)+'px';
  // Auto-focus first action so Enter works immediately
  const firstBtn=menu.querySelector('button');
  if(firstBtn)setTimeout(()=>firstBtn.focus(),0);
  // Dismiss on outside click OR Escape. ESC-Handler läuft in Capture-Phase +
  // stopImmediatePropagation — sonst fängt der globale Back-Handler (Stack-Pop) das Event ab.
  setTimeout(()=>{
    _closeClick=ev=>{if(!ev.target.closest('.sb-context-menu'))closeMenu();};
    _closeKey=ev=>{
      if(ev.key==='Escape'){
        ev.preventDefault();ev.stopImmediatePropagation();
        closeMenu();
      }
    };
    document.addEventListener('click',_closeClick);
    document.addEventListener('keydown',_closeKey,true); // capture-Phase
  },0);
}
// ── DATAID-PARSER (Sprint 4.3) ──
// Pure string parse, no node lookups. Returns null for unrecognized input.
//   'matrix-<id>'             → {type:'matrix', matrixId}
//   'cell-<m>-<r>-<c>'        → {type:'cell',   matrixId, rowId, colId}
//   'feat-<m>-<r>-<c>-<key>'  → {type:'feat',   matrixId, rowId, colId, key}
//   'link-<b>-<id>'           → {type:'link',   boardId, linkId}
function parseDataId(id){
  if(!id)return null;
  const s=String(id);
  let m=/^matrix-(.+)$/.exec(s);
  if(m)return {type:'matrix',matrixId:m[1]};
  m=/^feat-(.+?)-([^-]+)-([^-]+)-(info|board|checklists|matrix)$/.exec(s);
  if(m)return {type:'feat',matrixId:m[1],rowId:m[2],colId:m[3],key:m[4]};
  m=/^cell-(.+?)-([^-]+)-([^-]+)$/.exec(s);
  if(m)return {type:'cell',matrixId:m[1],rowId:m[2],colId:m[3]};
  m=/^link-(.+?)-(.+)$/.exec(s);
  if(m)return {type:'link',boardId:m[1],linkId:m[2]};
  return null;
}
// Parse cell dataId → {parentMatrixId, rowId, colId, cell, parent}
function _sbParseCellDataId(dataId){
  const p=parseDataId(dataId);if(!p||p.type!=='cell')return null;
  const parent=nodes[p.matrixId];if(!parent||parent.type!=='matrix')return null;
  const cell=parent.data.cells[p.rowId+'-'+p.colId];if(!cell)return null;
  return {parentMatrixId:p.matrixId,rowId:p.rowId,colId:p.colId,cell,parent};
}
// Parse feature dataId → {parentMatrixId, rowId, colId, cell, parent, key}
function _sbParseFeatureDataId(dataId){
  const p=parseDataId(dataId);if(!p||p.type!=='feat')return null;
  const parent=nodes[p.matrixId];if(!parent||parent.type!=='matrix')return null;
  const cell=parent.data.cells[p.rowId+'-'+p.colId];if(!cell)return null;
  return {parentMatrixId:p.matrixId,rowId:p.rowId,colId:p.colId,cell,parent,key:p.key};
}
function sbRename(dataId){
  const p=_sbParseCellDataId(dataId);if(!p)return;
  // Rename the row + col labels (user can pick which? For now: show current label and on accept update both via simple prompt)
  // Simpler approach: allow renaming the Board/Matrix node.label that lives in this cell
  const tgtNode=p.cell.boardId?nodes[p.cell.boardId]:(p.cell.matrixId?nodes[p.cell.matrixId]:null);
  if(!tgtNode){showToast('Keine Node zum Umbenennen in dieser Zelle.',{type:'warning'});return;}
  const crumb=_sbShortCrumb(dataId);
  smodal('Node-Label umbenennen',[{label:'Neuer Name',id:'l',v:tgtNode.label}],v=>{
    if(!v.l||!v.l.trim())return;
    renameMatrixNode(tgtNode.id,v.l);
    render();
  },null,{context:{label:crumb.target.label,sub:tgtNode.label}});
}
function sbDelete(dataId){
  const p=_sbParseCellDataId(dataId);if(!p)return;
  const {parentMatrixId,rowId,colId,cell}=p;
  if(!confirm(`Alle Inhalte der Zelle „${p.parent.data.rows.find(r=>r.id===rowId)?.label} / ${p.parent.data.cols.find(c=>c.id===colId)?.label}" löschen?`))return;
  if(cell.boardId){delete nodes[cell.boardId];cell.boardId=null;}
  if(cell.matrixId){removeTree(cell.matrixId);cell.matrixId=null;}
  cell.features=[];
  // Pop stack if it points inside this cell
  while(stack.length>1){
    const top=stack[stack.length-1];
    if(top.cellRef&&top.cellRef.parentId===parentMatrixId&&top.cellRef.rowId===rowId&&top.cellRef.colId===colId){stack.pop();}
    else break;
  }
  save();render();
}

// Resize handle — mousemove/mouseup nur während aktivem Drag registriert,
// danach entfernt. Verhindert dauerhafte Listener auf document.
function sbInitResize(){
  const h=document.getElementById('sb-resize-handle');
  if(!h||h._bound)return;
  h._bound=true;
  let startX=0,startW=0;
  const onMove=e=>{
    let dx=e.clientX-startX;
    if(appSettings.sidebarPosition==='right')dx=-dx;
    let w=Math.max(200,Math.min(520,startW+dx));
    appSettings.sidebarWidth=w;
    const sb=document.getElementById('sidebar');
    if(sb)sb.style.setProperty('--sb-w',w+'px');
  };
  const onUp=()=>{
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    h.classList.remove('active');
    document.body.style.userSelect='';
    saveSettings();
    sbDrawConnections();
  };
  h.addEventListener('mousedown',e=>{
    startX=e.clientX;startW=appSettings.sidebarWidth||280;
    h.classList.add('active');
    document.body.style.userSelect='none';
    e.preventDefault();
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

function initSidebar(){
  if(initSidebar._done)return;initSidebar._done=true;
  sbLoadPersist();
  // Bind search input
  const si=document.getElementById('sb-search');
  if(si){
    si.value=sbFilter.text||'';
    si.addEventListener('input',e=>sbOnSearchInput(e.target.value));
    si.addEventListener('keydown',e=>{e.stopPropagation();if(e.key==='Escape'){e.target.blur();}});
  }
  // Set search icon
  const si_ic=document.querySelector('.sb-search-icon');
  if(si_ic)si_ic.innerHTML=ICO.search(11);
  // Cycle-button icon is managed by sbApplyBodyClasses (state-dependent)
  sbInitResize();
  // Ctrl tracking for peek
  document.addEventListener('keydown',e=>{if(e.key==='Control')sbCtrlDown=true;});
  document.addEventListener('keyup',e=>{if(e.key==='Control'){sbCtrlDown=false;sbPeekHide();}});
  window.addEventListener('blur',()=>{sbCtrlDown=false;sbPeekHide();});
  // Click-outside handler: if the sidebar is in "rail-expanded" mode (came from
  // sbRailsClick or Shift+A), any click outside the sidebar collapses it back to rails.
  document.addEventListener('click',e=>{
    if(!_sbRailExpanded||sbState!=='full')return;
    const t=e.target;
    if(t.closest&&(t.closest('#sidebar')||t.closest('#sb-cycle-btn')||t.closest('#sb-edge-toggle')||t.closest('#sb-inline-toggle')||t.closest('#sb-rail-cap')))return;
    sbSetState('rails'); // sbSetState clears _sbRailExpanded
  });
  // Track the most recently focused element per region — sidebar vs. canvas (main panel)
  // so the 'S' focus-swap shortcut can restore the user's last position.
  document.addEventListener('focusin',e=>{
    const t=e.target;
    if(!t||!t.closest)return;
    if(t.closest('#sidebar')){_lastSidebarFocus=t;}
    else if(t.closest('#content')||t.closest('#panel')){_lastCanvasFocus=t;}
  });
  // Redraw connections on resize
  window.addEventListener('resize',()=>{if(appSettings.sidebarEnabled)sbDrawConnections();});
  // Redraw after sidebar width transition (collapsed↔rails↔full) so rails/dots
  // stabilize at final widths — initial sbDrawConnections during the transition
  // measures mid-animation widths and would produce a 0-size SVG.
  const sbEl=document.getElementById('sidebar');
  if(sbEl)sbEl.addEventListener('transitionend',e=>{
    if(e.target!==sbEl)return;
    if(e.propertyName!=='width')return;
    if(sbState==='collapsed')return;
    sbDrawConnections();
    // Auto-scroll was skipped during the width transition to avoid the visible
    // jump; now that the sidebar has settled at final width, scroll normally.
    sbAutoScrollToActive();
  });
  // Scroll redraws (lines stay aligned) + Mask-Fade-Update (oben/unten je nach Position)
  const wrap=document.getElementById('sb-tree-wrap');
  if(wrap){
    wrap.addEventListener('scroll',()=>{sbUpdateScrollFade();});
  }
}
