function parseCommand(raw){
  const parts=raw.trim().toLowerCase().split(/\s+/);
  if(!parts[0])return null;
  // Scoped search: fa, fi, fh, fc
  const scopeMap={fa:'cards',fi:'info',fh:'links',fc:'checklists'};
  if(scopeMap[parts[0]]){
    return{type:'find',scope:scopeMap[parts[0]],query:parts.slice(1).join(' ')};
  }
  // Move card: n kartenalias -m zielkürzel [spalte]
  if(parts[0]==='n'&&parts.length>=4&&parts[2]==='-m'){
    return{type:'movecard',cardAlias:parts[1],targetAlias:parts[3],colName:parts.slice(4).join(' ')||null};
  }
  // New card: n kürzel
  if(parts[0]==='n'){
    return{type:'new',alias:parts[1]||null};
  }
  // Frequency matrix: w [alias]
  if(parts[0]==='w'){
    return{type:'freqview',alias:parts[1]||null};
  }
  if(parts[0]==='s'){
    return{type:'settings'};
  }
  if(parts[0]==='k'){
    return{type:'keybindings'};
  }
  // Navigation: kürzel [subCmd] [cardAlias]
  const alias=parts[0];
  const subCmd=parts[1]||null; // m, i, b, c
  const cardAlias=parts[2]||null;
  return{type:'nav',alias,subCmd,cardAlias};
}
function executeCommand(raw){
  const cmd=parseCommand(raw);
  if(!cmd)return showCmdError();
  if(cmd.type==='find'){
    if(!cmd.query)return showCmdError();
    doScopedSearch(cmd.scope,cmd.query);
    return;
  }
  if(cmd.type==='movecard'){
    const cardTarget=aliasIndex[cmd.cardAlias];
    if(!cardTarget||cardTarget.type!=='card')return showCmdError();
    const destTarget=aliasIndex[cmd.targetAlias];
    if(!destTarget)return showCmdError();
    let targetBoardId=null;
    if(destTarget.type==='board')targetBoardId=destTarget.nodeId;
    else if(destTarget.type==='cell'){
      const cell=getCell(destTarget.parentId,`${destTarget.rowId}-${destTarget.colId}`);
      if(cell&&cell.boardId)targetBoardId=cell.boardId;
    }
    if(!targetBoardId)return showCmdError();
    closeSearch();
    if(!moveCardToBoard(cardTarget.boardId,cardTarget.cardId,targetBoardId,cmd.colName))showCmdError();
    return;
  }
  if(cmd.type==='new'){
    if(!cmd.alias)return showCmdError();
    const target=aliasIndex[cmd.alias];
    if(!target)return showCmdError();
    // Find boardId for this target
    let boardId=null;
    if(target.type==='board')boardId=target.nodeId;
    else if(target.type==='card')boardId=target.boardId;
    else if(target.type==='cell'){
      const cell=getCell(target.parentId,`${target.rowId}-${target.colId}`);
      if(cell&&cell.boardId)boardId=cell.boardId;
    }
    if(!boardId)return showCmdError();
    closeSearch();
    addKbCard(boardId);
    return;
  }
  if(cmd.type==='nav'){
    // ^home → Root-Matrix
    if(cmd.alias==='home'){
      closeSearch();
      stack=[{nodeId:rootId,label:nodes[rootId].label,cellRef:null}];
      renderAnimated('out');
      setTimeout(()=>{const c=document.querySelector('.mcell');if(c)c.focus();},RENDER_DELAY_MS);
      return;
    }
    const target=aliasIndex[cmd.alias];
    if(!target)return showCmdError();
    closeSearch();
    if(target.type==='card'){
      openCard(target.boardId,target.cardId);
      return;
    }
    if(target.type==='link'){
      const link=nodes[target.boardId]?.data.links.find(l=>l.id===target.linkId);
      if(link&&link.url)window.open(link.url,'_blank');
      return;
    }
    if(target.type==='mail'){
      const link=nodes[target.boardId]?.data.links.find(l=>l.id===target.linkId);
      if(link)window.location.href=buildMailto(link);
      return;
    }
    // Board or Matrix: navigate to it
    navigateToAlias(target,cmd.subCmd,cmd.cardAlias);
    return;
  }
  if(cmd.type==='keybindings'){
    closeSearch();showKeyboardHelp();return;
  }
  if(cmd.type==='settings'){
    closeSearch();showSettings();return;
  }
  if(cmd.type==='freqview'){
    closeSearch();
    if(cmd.alias){
      const target=aliasIndex[cmd.alias];
      if(!target)return showCmdError();
      navigateToAlias(target,null,null);
      setTimeout(()=>{toggleFreqView(target.nodeId);},RENDER_DELAY_MS);
    } else {
      // Toggle on current matrix
      const cur=stack[stack.length-1];
      const nodeId=cur.cellRef?cur.cellRef.parentId:cur.nodeId;
      toggleFreqView(nodeId);
    }
    return;
  }
  showCmdError();
}
function navigateToAlias(target,subCmd,cardAlias){
  // Cell-level alias: open the cell directly
  if(target.type==='cell'){
    const cell=getCell(target.parentId,`${target.rowId}-${target.colId}`);
    let tab=cell.boardId?'board':'matrix';
    if(subCmd==='i')tab='info';
    else if(subCmd==='b')tab='board';
    else if(subCmd==='m')tab='matrix';
    else if(subCmd==='c')tab='checklists';
    const pn=nodes[target.parentId];
    const row=pn.data.rows.find(r=>r.id===target.rowId);
    const col=pn.data.cols.find(c=>c.id===target.colId);
    const label=(row?row.label:'')+'/'+(col?col.label:'');
    openCell(target.parentId,target.rowId,target.colId,label,tab);
    if(cardAlias){
      setTimeout(()=>{const ct=aliasIndex[cardAlias];if(ct&&ct.type==='card')openCard(ct.boardId,ct.cardId);},RENDER_DELAY_MS+50);
    }
    if(tab==='matrix'){setTimeout(()=>{const c=document.querySelector('.mcell');if(c)c.focus();},RENDER_DELAY_MS+50);}
    return;
  }
  const nodeId=target.nodeId;
  // Find path: which matrix cell holds this node?
  for(const[nid,n]of Object.entries(nodes)){
    if(n.type!=='matrix')continue;
    for(const[k,c]of Object.entries(n.data.cells)){
      const match=(c.boardId===nodeId)?'board':(c.matrixId===nodeId)?'matrix':null;
      if(match){
        const[rowId,colId]=k.split('-');
        // Determine tab
        let tab=match;
        if(subCmd==='i')tab='info';
        else if(subCmd==='b')tab='board';
        else if(subCmd==='m')tab='matrix';
        else if(subCmd==='c')tab='checklists';
        openCell(nid,rowId,colId,nodes[nodeId].label,tab);
        // If cardAlias specified, highlight that card after render
        if(cardAlias){
          setTimeout(()=>{
            const ct=aliasIndex[cardAlias];
            if(ct&&ct.type==='card')openCard(ct.boardId,ct.cardId);
          },RENDER_DELAY_MS+50);
        }
        // Auto-focus first cell if matrix tab
        if(tab==='matrix'){
          setTimeout(()=>{const cell=document.querySelector('.mcell');if(cell)cell.focus();},RENDER_DELAY_MS+50);
        }
        return;
      }
    }
  }
  // Root matrix
  if(nodeId===rootId){
    stack=[{nodeId:rootId,label:nodes[rootId].label,cellRef:null}];
    renderAnimated('out');
    return;
  }
}
function executeCmdFromSearch(){
  const inp=document.getElementById('searchinput');
  if(!inp||!inp.value.startsWith('^'))return;
  executeCommand(inp.value.slice(1));
}
function showCmdError(){
  const inp=document.getElementById('searchinput');if(!inp)return;
  inp.classList.add('cmd-error');
  setTimeout(()=>{inp.classList.remove('cmd-error');},CMD_ERROR_MS);
}
function doScopedSearch(scope,query){
  const el=document.getElementById('searchresults');
  const terms=query.split('|').map(t=>t.trim().toLowerCase()).filter(Boolean);
  if(terms.length===0){el.style.display='none';return;}
  const results=[];
  function searchNode(nodeId){
    const n=nodes[nodeId];if(!n)return;
    if(n.type==='board'){
      if(scope==='cards'||scope==='all'){
        n.data.kbCards.forEach(card=>{
          const fields=[card.name,stripHtml(card.note),...(card.tags||[]),...(card.who||[])];
          if(terms.every(t=>fields.some(f=>f&&f.toLowerCase().includes(t))))
            results.push({type:'card',boardId:nodeId,id:card.id,name:card.name||'(ohne Name)',from:n.label,score:2});
        });
      }
      if(scope==='info'){
        n.data.infoFields.forEach(f=>{
          const txt=(f.label+' '+stripHtml(f.value)).toLowerCase();
          if(terms.every(t=>txt.includes(t)))
            results.push({type:'info',boardId:nodeId,id:f.id,name:f.label+': '+stripHtml(f.value).slice(0,60),from:n.label+' · Info',score:1});
        });
      }
      if(scope==='links'){
        n.data.links.forEach(l=>{
          const txt=(l.label+' '+(l.url||'')+' '+(l.to||'')+' '+(l.subject||'')).toLowerCase();
          if(terms.every(t=>txt.includes(t)))
            results.push({type:'link',boardId:nodeId,id:l.id,name:l.label,from:n.label+' · Links',score:1});
        });
      }
      if(scope==='checklists'){
        (n.data.checklists||[]).forEach(cl=>{
          cl.items.forEach(item=>{
            if(terms.every(t=>item.text.toLowerCase().includes(t)))
              results.push({type:'info',boardId:nodeId,id:cl.id,name:item.text,from:n.label+' · '+cl.label,score:1});
          });
        });
      }
    }
    if(n.type==='matrix'){
      Object.values(n.data.cells).forEach(cell=>{
        if(cell.boardId)searchNode(cell.boardId);
        if(cell.matrixId)searchNode(cell.matrixId);
      });
    }
  }
  searchNode(rootId);
  _searchActiveIdx=-1;
  if(results.length===0){
    el.style.display='block';el.innerHTML=`<div style="padding:12px;font-size:12px;color:var(--text3);text-align:center;">Keine Ergebnisse</div>`;
    return;
  }
  el.style.display='block';el.classList.add('sr-anim');
  window._searchResults=results.slice(0,appSettings.searchMax||SEARCH_MAX);
  const hi=s=>{let h=esc(s);terms.forEach(t=>{const re=new RegExp('('+t.replace(/[.*+?^${}()|\[\]]/g,'\\$&')+')','gi');h=h.replace(re,'<mark class="sr-mark">$1</mark>');});return h;};
  el.innerHTML=window._searchResults.map((r,i)=>{
    return '<div class="sr-item" onclick="searchOpen('+i+')">'
      +'<div class="sr-name">'+hi(r.name)+'</div>'
      +'<div class="sr-from">'+esc(r.from)+'</div>'
      +'</div>';
  }).join('');
}

function searchInputKey(e){
  const inp=document.getElementById('searchinput');
  const isCmd=inp&&inp.value.startsWith('^');
  const items=document.querySelectorAll('#searchresults .sr-item');
  if(e.key==='ArrowDown'&&items.length>0){
    e.preventDefault();
    _searchActiveIdx=Math.min(_searchActiveIdx+1,items.length-1);
    updateSearchActive(items);
  } else if(e.key==='ArrowUp'&&items.length>0){
    e.preventDefault();
    _searchActiveIdx=Math.max(_searchActiveIdx-1,-1);
    updateSearchActive(items);
  } else if(e.key==='Enter'){
    e.preventDefault();
    if(_searchActiveIdx>=0&&items[_searchActiveIdx]){
      // If selected item has onclick with executeCmd, click it; else searchOpen
      const item=items[_searchActiveIdx];
      if(item.onclick){item.click();}
      else{searchOpen(_searchActiveIdx);}
    }
    else if(isCmd){executeCommand(inp.value.slice(1));}
    else if(items.length>0){searchOpen(0);}
  } else if(e.key==='Escape'){
    e.preventDefault();closeSearch();
  }
}
function updateSearchActive(items){
  items.forEach((el,i)=>{el.classList.toggle('sr-active',i===_searchActiveIdx);
    if(i===_searchActiveIdx)el.scrollIntoView({block:'nearest'});});
}
function doSearch(q){
  _searchActiveIdx=-1;
  const el=document.getElementById('searchresults');
  if(!q||q.length<SEARCH_MIN_LEN){el.style.display='none';return;}
  // Multi-term support: split by |
  const terms=q.split('|').map(t=>t.trim().toLowerCase()).filter(Boolean);
  if(terms.length===0){el.style.display='none';return;}
  const results=[];
  function searchNode(nodeId){
    const n=nodes[nodeId];if(!n)return;
    if(n.type==='board'){
      n.data.kbCards.forEach(card=>{
        const fields=[card.name,stripHtml(card.note),...(card.tags||[]),...(card.who||[])];
        const score=matchScoreMulti(terms,fields);
        if(score>0)results.push({type:'card',boardId:nodeId,boardLabel:n.label,id:card.id,name:card.name||'(ohne Name)',from:n.label,score});
      });
      n.data.infoFields.forEach(f=>{
        const txt=f.label+' '+stripHtml(f.value);
        if(terms.every(t=>txt.toLowerCase().includes(t)))
          results.push({type:'info',boardId:nodeId,id:f.id,name:f.label+': '+stripHtml(f.value).slice(0,60),from:n.label+' · Info',score:1});
      });
    }
    if(n.type==='matrix'){
      if(terms.every(t=>n.label.toLowerCase().includes(t)))results.push({type:'matrix',nodeId,name:n.label,from:'Matrix',score:2});
      Object.values(n.data.cells).forEach(cell=>{
        if(cell.boardId)searchNode(cell.boardId);
        if(cell.matrixId)searchNode(cell.matrixId);
      });
    }
  }
  searchNode(stack[0].nodeId);
  results.sort((a,b)=>b.score-a.score);
  if(results.length===0){
    el.style.display='block';el.classList.add('sr-anim');
    el.innerHTML=`<div style="padding:12px;font-size:12px;color:var(--text3);text-align:center;">Keine Ergebnisse</div>`;
    return;
  }
  el.style.display='block';el.classList.add('sr-anim');
  window._searchResults=results.slice(0,appSettings.searchMax||SEARCH_MAX);
  const hi=s=>{let h=esc(s);terms.forEach(t=>{const re=new RegExp('('+t.replace(/[.*+?^${}()|\[\]]/g,'\\$&')+')','gi');h=h.replace(re,'<mark class="sr-mark">$1</mark>');});return h;};
  el.innerHTML=window._searchResults.map((r,i)=>{
    return '<div class="sr-item" onclick="searchOpen('+i+')">'
      +'<div class="sr-name">'+hi(r.name)+'</div>'
      +'<div class="sr-from">'+esc(r.from)+'</div>'
      +'</div>';
  }).join('');
}
function matchScoreMulti(terms,fields){
  let score=0;
  if(!terms.every(t=>fields.some(f=>f&&f.toLowerCase().includes(t))))return 0;
  terms.forEach(t=>{fields.forEach(f=>{if(f&&f.toLowerCase().includes(t))score+=(f.toLowerCase()===t?3:1);});});
  return score;
}
function matchScore(q,fields){
  let score=0;
  fields.forEach(f=>{if(f&&f.toLowerCase().includes(q))score+=(f.toLowerCase()===q?3:1);});
  return score;
}
let _lastSearchQuery='';
let _searchActiveIdx=-1;
function highlightSearchTerm(){
  const q=_lastSearchQuery;if(!q||q.length<SEARCH_MIN_LEN)return;
  setTimeout(()=>{
    const panel=document.getElementById('panel');if(!panel)return;
    const walker=document.createTreeWalker(panel,NodeFilter.SHOW_TEXT);
    const re=new RegExp('('+q.replace(/[.*+?^${}()|\[\]]/g,'\\$&')+')','gi');
    const marks=[];
    while(walker.nextNode()){
      const node=walker.currentNode;
      if(node.parentElement.closest('.sr-mark,.search-hl'))continue;
      if(re.test(node.textContent)){
        re.lastIndex=0;
        const span=document.createElement('span');
        span.innerHTML=node.textContent.replace(re,'<mark class="search-hl" style="background:var(--bluebg);color:var(--bluetxt);border-radius:2px;padding:0 2px;transition:background 0.5s ease,color 0.5s ease;">$1</mark>');
        node.parentNode.replaceChild(span,node);
        marks.push(span);
      }
    }
    // Scroll first match into view
    const first=panel.querySelector('.search-hl');
    if(first)first.scrollIntoView({behavior:'smooth',block:'center'});
    // Remove highlights after 3 seconds — fade background only, keep text visible
    setTimeout(()=>{marks.forEach(s=>{
      s.querySelectorAll('.search-hl').forEach(m=>{m.style.background='transparent';m.style.color='inherit';});
      setTimeout(()=>{if(s.parentNode)s.parentNode.replaceChild(document.createTextNode(s.textContent),s);},HIGHLIGHT_FADE_MS);
    });},3000);
  },RENDER_DELAY_MS);
}
function searchOpen(i){
  const r=(window._searchResults||[])[i];
  if(!r)return;
  _lastSearchQuery=document.getElementById('searchinput')?.value||'';
  closeSearch();
  if(r.type==='card'){openCard(r.boardId,r.id);highlightSearchTerm();}
  else if(r.type==='info'){
    // Navigate to board — find parent matrix cell that holds this board
    const boardId=r.boardId;
    if(nodes[boardId]){
      // Find which matrix cell references this board
      let found=false;
      for(const[nid,n]of Object.entries(nodes)){
        if(n.type!=='matrix')continue;
        for(const[k,c]of Object.entries(n.data.cells)){
          if(c.boardId===boardId){
            const[rowId,colId]=k.split('-');
            openCell(nid,rowId,colId,nodes[boardId].label,'info');
            highlightSearchTerm();
            found=true;break;
          }
        }
        if(found)break;
      }
    }
  }
  else if(r.type==='matrix'){
    const s=stack.find(x=>x.nodeId===r.nodeId);
    if(!s)stack.push({nodeId:r.nodeId,label:r.name,cellRef:null});
    render();highlightSearchTerm();
  }
  else if(r.type==='link'){
    const link=nodes[r.boardId]?.data.links.find(l=>l.id===r.id);
    if(link){
      if(link.type==='mail')window.location.href=buildMailto(link);
      else if(link.url)window.open(link.url,'_blank');
    }
  }
}
function closeSearch(){
  const sr=document.getElementById('searchresults');
  sr.classList.remove('sr-anim');sr.style.display='none';
  const inp=document.getElementById('searchinput');
  if(inp)inp.value='';
}
document.addEventListener('click',e=>{
  // Close search dropdown
  if(!e.target.closest('#searchresults')&&!e.target.closest('#searchinput'))
    document.getElementById('searchresults').style.display='none';
  // Close minimap if click outside panel and outside toggle button
  if(mmOpen&&!e.target.closest('#minimap-panel')&&!e.target.closest('[onclick="toggleMM()"]')){
    mmOpen=false;
    document.getElementById('minimap-panel').classList.remove('open');
  }
});

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function sanitizeHtml(s){if(!s)return'';const d=document.createElement('div');d.innerHTML=s;d.querySelectorAll('script,iframe,object,embed,form,meta,link,style').forEach(e=>e.remove());d.querySelectorAll('*').forEach(el=>{for(const a of Array.from(el.attributes)){if(a.name.startsWith('on')||a.name==='srcdoc'||(a.name==='href'&&a.value.trim().toLowerCase().startsWith('javascript:')))el.removeAttribute(a.name);}});return d.innerHTML;}
function sanitizeUrl(url){if(!url)return'';const u=url.trim().toLowerCase();if(u.startsWith('javascript:')||u.startsWith('data:')||u.startsWith('vbscript:'))return'';return url;}
function stripHtml(s){return s?s.replace(/<[^>]+>/g,''):'';  }
function getLocale(){return appSettings.dateLocale||DATE_LOCALE;}
function fmtDate(d){if(!d)return'';const x=new Date(d);return x.toLocaleDateString(getLocale(),{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDateFull(d){return d.toLocaleDateString(getLocale(),{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}
function getCard(boardId,cardId){return nodes[boardId]?.data?.kbCards?.find(x=>x.id===cardId)||null;}
function getTodayStr(){return today0().toISOString().split('T')[0];}
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function day0(v){const d=new Date(v);d.setHours(0,0,0,0);return d;}
function renderPrioDot(prio,size){if(!prio)return'';return`<span style="width:${size||8}px;height:${size||8}px;border-radius:50%;background:${PRIO_COLORS[prio]||'transparent'};display:inline-block;flex-shrink:0;margin-top:3px;" title="${prio}"></span>`;}
function renderBadge(text,bg,txt){return`<span class="kc-recur" style="background:${bg};color:${txt};">${text}</span>`;}
function emptyState(icon,text){return`<div class="empty-state"><div class="empty-big">${icon}</div><div>${text}</div></div>`;}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    // Priority 1: close card modal
    if(document.getElementById('cardmodal').innerHTML){closeCard();return;}
    // Priority 2: close simple modal
    if(document.getElementById('mc').innerHTML){closeS();return;}
    // Priority 3: go one level up in stack
    if(stack.length>1){navTo(stack.length-2);}
  }
  // Shortcut guard: skip when typing in inputs
  const _ae=document.activeElement;
  const _typing=_ae&&(_ae.tagName==='INPUT'||_ae.tagName==='TEXTAREA'||_ae.isContentEditable);
  // Section navigation (configurable)
  if(!_typing&&(matchShortcut(e,'sectionDown')||matchShortcut(e,'sectionUp'))){
    e.preventDefault();
    const dir=matchShortcut(e,'sectionDown')?'ArrowDown':'ArrowUp';
    const panel=document.getElementById('panel');if(!panel)return;
    const allFocusable=Array.from(panel.querySelectorAll('[tabindex="0"],button,a[href],.task-check'));
    if(allFocusable.length===0)return;
    const cur=document.activeElement;
    const curSection=cur?.closest('.mwrap,.matrix,.kb-wrap,.daily-wrap,.tabs,.card,.cl-list');
    if(!curSection){
      const target=dir==='ArrowDown'?allFocusable[0]:allFocusable[allFocusable.length-1];
      if(target){target.focus();target.scrollIntoView({behavior:'smooth',block:'nearest'});}
      return;
    }
    if(dir==='ArrowDown'){
      const sectionEnd=curSection.getBoundingClientRect().bottom;
      const next=allFocusable.find(el=>el.getBoundingClientRect().top>sectionEnd-2&&!curSection.contains(el));
      if(next){next.focus();next.scrollIntoView({behavior:'smooth',block:'nearest'});}
    } else {
      const sectionTop=curSection.getBoundingClientRect().top;
      const prev=[...allFocusable].reverse().find(el=>el.getBoundingClientRect().bottom<sectionTop+2&&!curSection.contains(el));
      if(prev){prev.focus();prev.scrollIntoView({behavior:'smooth',block:'nearest'});}
    }
    return;
  }
  // Configurable shortcuts
  if(!_typing&&matchShortcut(e,'search')){
    e.preventDefault();
    const inp=document.getElementById('searchinput');if(inp){inp.focus();inp.select();}
    return;
  }
  if(!_typing&&matchShortcut(e,'save')){e.preventDefault();flushToFile();return;}
  if(!_typing&&matchShortcut(e,'edit')){e.preventDefault();toggleEdit();return;}
  if(!_typing&&matchShortcut(e,'freqview')){e.preventDefault();executeCommand('w');return;}
  // Remove feature shortcuts (edit mode + cell focused)
  if(editMode&&!_typing&&_ae&&_ae.classList.contains('mcell')){
    const _rmMap={removeMatrix:'matrix',removeBoard:'board',removeInfo:'info',removeChecklists:'checklists'};
    for(const[action,feat] of Object.entries(_rmMap)){
      if(matchShortcut(e,action)){
        e.preventDefault();
        const nid=_ae.dataset.node,rid=_ae.dataset.row,cid=_ae.dataset.col;
        if(nid&&rid&&cid)removeFeature(nid,rid,cid,feat);
        return;
      }
    }
  }
});

// ── THEME: 3-state toggle (sun/moon/auto) ──
const THEME_KEY='imatrix-theme';
const THEME_ICONS={light:ICO.sun(14),dark:ICO.moon(14),auto:ICO.auto(14)};
const THEME_TITLES={light:'Hell',dark:'Dunkel',auto:'Automatisch'};
const THEME_CYCLE=['light','dark','auto'];
let currentTheme=localStorage.getItem(THEME_KEY)||'auto';

function applyTheme(mode){
  let effective=mode;
  if(mode==='auto'){
    const h=new Date().getHours();
    effective=(h>=7&&h<19)?'light':'dark';
  }
  document.documentElement.setAttribute('data-theme',effective==='dark'?'dark':'');
  const btn=document.getElementById('themebtn');
  if(btn){btn.innerHTML=THEME_ICONS[mode];btn.title='Design: '+THEME_TITLES[mode];}
}
function cycleTheme(){
  const idx=THEME_CYCLE.indexOf(currentTheme);
  currentTheme=THEME_CYCLE[(idx+1)%THEME_CYCLE.length];
  localStorage.setItem(THEME_KEY,currentTheme);
  applyTheme(currentTheme);
}
applyTheme(currentTheme);
// Auto-mode: recheck every minute
if(currentTheme==='auto')setInterval(()=>{if(currentTheme==='auto')applyTheme('auto');},60000);
