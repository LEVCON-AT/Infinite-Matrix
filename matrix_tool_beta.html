<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data: blob:; connect-src *;">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23378ADD'/><rect x='3.5' y='3.5' width='11.5' height='11.5' rx='1.5' fill='%23fff' opacity='.22'/><rect x='17' y='3.5' width='11.5' height='11.5' rx='1.5' fill='%23fff' opacity='.22'/><rect x='17' y='17' width='11.5' height='11.5' rx='1.5' fill='%23fff' opacity='.22'/><rect x='3.5' y='17' width='11.5' height='11.5' rx='1.5' fill='%23fff' opacity='.22'/><rect x='5' y='5' width='4.25' height='4.25' rx='1' fill='%23fff' opacity='.55'/><rect x='10.25' y='5' width='4.25' height='4.25' rx='1' fill='%23fff' opacity='.55'/><rect x='5' y='10.25' width='4.25' height='4.25' rx='1' fill='%23fff' opacity='.55'/><rect x='10.25' y='10.25' width='4.25' height='4.25' rx='1' fill='%23fff' opacity='.55'/></svg>">
<title>Infinite Matrix</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
/* ── SCROLLBARS ── */
*{scrollbar-width:thin;scrollbar-color:var(--scroll-thumb) transparent;}
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-track{background:transparent;border-radius:var(--rs);}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:var(--rs);}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.28);}
[data-theme="dark"] ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.28);}
::-webkit-scrollbar-corner{background:transparent;}
:root{
  --scroll-thumb:rgba(0,0,0,0.18);
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#66665f;--text3:#bbb;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --blue:#378ADD;--bluebg:#E6F1FB;--bluetxt:#0C447C;
  --teal:#1D9E75;--tealbg:#E1F5EE;--tealtxt:#085041;
  --amber:#BA7517;--amberbg:#FAEEDA;--ambertxt:#633806;
  --prio-medium:#E8A317;
  --red:#E24B4A;--redbg:#FCEBEB;--redtxt:#791F1F;
  --purple:#7F77DD;--purplebg:#EEEDFE;--purpletxt:#3C3489;
  --rs:4px;--r:8px;--rl:12px;
}
[data-theme="dark"]{
  --scroll-thumb:rgba(255,255,255,0.16);
  --bg:#1e1e1e;--bg2:#252525;--bg3:#181818;
  --text:#e0e0e0;--text2:#999;--text3:#555;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --blue:#5a9fd4;--bluebg:#1a2a3a;--bluetxt:#8ec5f0;
  --teal:#2db88a;--tealbg:#162e24;--tealtxt:#6ee0b8;
  --amber:#d4952e;--amberbg:#2e2414;--ambertxt:#f0c878;
  --prio-medium:#e8a830;
  --red:#e06060;--redbg:#2e1818;--redtxt:#f0a0a0;
  --purple:#9a94e8;--purplebg:#1e1c30;--purpletxt:#c4c0f0;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;transition:background 0.3s ease,color 0.3s ease;}
#app{display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ── */
#topbar{background:var(--bg);border-bottom:0.5px solid var(--border2);padding:8px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;flex-wrap:wrap;}
#tl{flex:1;min-width:0;}
#tr{display:flex;align-items:center;gap:6px;position:relative;flex-shrink:0;}
#content{flex:1;padding:16px 14px;max-width:1200px;margin:0 auto;width:100%;}
.bc{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.bcs{font-size:12px;color:var(--blue);cursor:pointer;padding:2px 4px;border-radius:var(--rs);white-space:nowrap;}
.bcs:hover{background:var(--bluebg);}
.bcc{font-size:12px;color:var(--text);font-weight:500;padding:2px 4px;white-space:nowrap;}
.bca{color:var(--text3);font-size:11px;}

/* ── EDIT-ONLY VISIBILITY ── */
.edit-only{display:none !important;}
body.editing .edit-only{display:inline-flex !important;}
body.editing label.edit-only{display:inline-flex !important;}
/* Visibility overrides: vis-always forces visibility outside edit mode */
body.vis-addRowCol .edit-only[data-vis="addRowCol"]{display:inline-flex !important;}
body.vis-addKbCol .edit-only[data-vis="addKbCol"]{display:inline-flex !important;}
body.vis-exportImport .edit-only[data-vis="exportImport"]{display:inline-flex !important;}

/* ── BUTTONS ── */
.btn{padding:5px 11px;font-size:12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap;font-family:inherit;}
.btn:hover{background:var(--bg2);}
.btn.danger{color:var(--red);}
.ico-btn{padding:4px 7px;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
.btn-p{padding:6px 14px;font-size:12px;border-radius:var(--r);border:none;background:var(--text);color:var(--bg);cursor:pointer;font-family:inherit;}
.btn-p:hover{opacity:0.85;}
.btn-c{padding:6px 12px;font-size:12px;border-radius:var(--r);border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.btn-c:hover{background:var(--bg2);}

/* ── TABS ── */
.tabs{display:flex;border:0.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;background:var(--bg2);margin-bottom:14px;}
.tab{flex:1;padding:8px 12px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;border-right:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;gap:5px;transition:background 0.1s;}
.tab:last-child{border-right:none;}
.tab:hover{background:var(--bg);color:var(--text);}
.tab.active{background:var(--bg);color:var(--text);}
.tbadge{font-size:10px;background:var(--bg3);color:var(--text2);padding:1px 5px;border-radius:20px;}
.tab.active .tbadge{background:var(--bluebg);color:var(--bluetxt);}

/* ── MATRIX ── */
.mwrap{overflow-x:auto;}
.matrix{display:grid;border:0.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;background:var(--bg);min-width:fit-content;}
.mh{background:var(--bg2);font-size:11px;font-weight:500;color:var(--text2);padding:7px 9px;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;gap:4px;position:relative;overflow:visible;}
.mh.corner{background:var(--bg3);}
.mh.ch{justify-content:center;text-align:center;}
.mh.rh{}
.ni{font-size:11px;font-weight:500;color:var(--text2);background:transparent;border:none;outline:none;font-family:inherit;flex:1;min-width:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap;}
.ni:focus{color:var(--text);white-space:normal;text-overflow:clip;}
.edel{display:none;font-size:12px;color:var(--red);cursor:pointer;margin-left:auto;padding:0 2px;flex-shrink:0;}
.emode .edel{display:inline;}
.emode .mh{background:var(--bg2);}
.mcell{border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);min-height:66px;display:flex;flex-direction:column;padding:6px 7px;gap:3px;transition:background 0.1s;}
.mcell:hover{background:var(--bg2);}
.mcell:focus{outline:none;}
.cchips{display:flex;flex-wrap:wrap;gap:2px;}
.chip{font-size:10px;padding:1px 5px;border-radius:20px;font-weight:500;}
.chip-b{background:var(--tealbg);color:var(--tealtxt);}
.chip-m{background:var(--bluebg);color:var(--bluetxt);}
.cicons{display:flex;gap:3px;margin-top:auto;padding-top:3px;}
.cib{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all 0.1s;user-select:none;white-space:nowrap;}
.cib:hover{border-color:var(--blue);color:var(--bluetxt);background:var(--bluebg);}
.cib.ab{background:var(--tealbg);color:var(--tealtxt);border-color:var(--tealbg);}
.cell-ghost{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 3px;border-radius:3px;display:inline-flex;align-items:center;}
.cell-ghost:hover{color:var(--text2);background:var(--bg3);}
.cell-ghosts{display:flex;gap:4px;justify-content:flex-end;padding-top:2px;}
.cib.am{background:var(--bluebg);color:var(--bluetxt);border-color:var(--bluebg);}
.addcolhdr{background:var(--bg2);border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;padding:4px;}
.addrowcol{border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;background:var(--bg2);min-height:66px;}
.addrowfull{grid-column:1/2;background:var(--bg2);border-top:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;padding:4px;}
.addbtn{width:22px;height:22px;border-radius:50%;border:0.5px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.1s;font-family:inherit;}
.addbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--bluebg);}
.addfull{width:100%;padding:6px;font-size:12px;color:var(--text3);border:0.5px dashed var(--border2);border-radius:var(--r);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit;}
.addfull:hover{border-color:var(--blue);color:var(--blue);}

/* ── PANEL HEADER ── */
.phd{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.ptitle{font-size:17px;font-weight:500;}
.psub{font-size:12px;color:var(--text2);margin-top:2px;}

/* ── CARD ── */
.card{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;margin-bottom:8px;}
.cardhd{background:var(--bg2);padding:8px 13px;font-size:12px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;}

/* ── INFO TAB ── */
.info-field{padding:10px 13px;border-bottom:0.5px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.info-label{font-size:11px;font-weight:500;color:var(--text2);}
.info-val{font-size:13px;color:var(--text);outline:none;min-height:20px;line-height:1.5;}
.info-val a{color:var(--blue);}
.links-grid{display:flex;flex-wrap:wrap;gap:6px;padding:10px 13px;}
.link-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--bluetxt);font-size:12px;cursor:pointer;text-decoration:none;}
.link-btn:hover{background:var(--bluebg);}
.link-add{border-style:dashed;color:var(--text3);cursor:pointer;background:transparent;}
.link-add:hover{border-color:var(--blue);color:var(--blue);}

/* ── KANBAN ── */
.kb-wrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;align-items:flex-start;}
.scroll-fade-r{-webkit-mask-image:linear-gradient(to right,#000 calc(100% - 1.5em),transparent);mask-image:linear-gradient(to right,#000 calc(100% - 1.5em),transparent);}
.scroll-fade-l{-webkit-mask-image:linear-gradient(to right,transparent,#000 1.5em);mask-image:linear-gradient(to right,transparent,#000 1.5em);}
.scroll-fade-lr{-webkit-mask-image:linear-gradient(to right,transparent,#000 1.5em,#000 calc(100% - 1.5em),transparent);mask-image:linear-gradient(to right,transparent,#000 1.5em,#000 calc(100% - 1.5em),transparent);}
.kb-col{background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--border2);min-width:220px;max-width:260px;flex-shrink:0;display:flex;flex-direction:column;}
.kb-col-hd{padding:9px 12px;font-size:12px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:6px;border-bottom:0.5px solid var(--border);}
.kb-col-hd .cnt{font-size:10px;color:var(--text3);font-weight:400;}
.kb-col-hd .delbtn{margin-left:auto;font-size:12px;color:var(--text3);cursor:pointer;display:none;}
.emode .kb-col-hd .delbtn{display:inline;}
.kb-cards{padding:7px;display:flex;flex-direction:column;gap:6px;flex:1;}
.kb-card{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:9px 10px;cursor:pointer;transition:background 0.1s;border-left:5px solid transparent;}
.kb-card[data-prio="high"]{border-left-color:var(--red);}
.kb-card[data-prio="medium"]{border-left-color:var(--prio-medium);}
.kb-card[data-prio="low"]{border-left-color:var(--teal);}
.kb-card:hover{background:var(--bg2);}
.kb-card:focus{outline:none;}
.kb-card.archived{opacity:0.5;}
.kc-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:var(--card-lines,2);overflow:hidden;word-break:break-word;}
.kc-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.kc-tag{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--purplebg);color:var(--purpletxt);}
.kc-who{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--bluebg);color:var(--bluetxt);}
.kc-dl{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--amberbg);color:var(--ambertxt);display:flex;align-items:center;gap:3px;}
.kc-dl.overdue{background:var(--redbg);color:var(--redtxt);}
.kc-recur{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--tealbg);color:var(--tealtxt);display:flex;align-items:center;gap:3px;}
.kc-checklist{font-size:10px;color:var(--text3);margin-top:4px;}
.kc-actions{display:flex;gap:4px;margin-top:6px;border-top:0.5px solid var(--border);padding-top:5px;}
.kc-act{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:var(--rs);transition:all 0.1s;user-select:none;}
.kc-act:hover{background:var(--bg3);color:var(--text);}
.kc-act.disabled{opacity:0.25;cursor:default;pointer-events:none;}
.kb-done .kc-name{text-decoration:line-through;color:var(--text3);}
.kb-add-card{padding:7px;border-top:0.5px solid var(--border);}
.kb-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:80px;border:1.5px dashed var(--border2);border-radius:var(--r);cursor:pointer;transition:all 0.15s;margin:2px;}
.kb-empty:hover{border-color:var(--blue);background:var(--bluebg);}
.kb-empty:hover span{color:var(--blue)!important;}
.kb-add-col{min-width:180px;flex-shrink:0;display:flex;flex-direction:column;justify-content:flex-start;padding:7px;}

/* ── CHECKLISTS TAB ── */
.cl-list{padding:10px 13px;}
.cl-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border);}
.cl-item:last-child{border-bottom:none;}
.cl-check{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;cursor:pointer;position:relative;}
.cl-check.done{background:var(--teal);border-color:var(--teal);}
.cl-check.done::after{content:'';position:absolute;top:2px;left:2px;width:7px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg);}
.cl-text{font-size:13px;color:var(--text);flex:1;}
.cl-text.done{text-decoration:line-through;color:var(--text3);}

/* ── DAILY OVERVIEW ── */
.daily-wrap{margin-top:22px;}
.daily-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.daily-cols{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;align-items:flex-start;}
.daily-col{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);min-width:200px;flex-shrink:0;}
.daily-col-hd{padding:8px 12px;font-size:12px;font-weight:500;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:6px;}
.daily-col-hd .delbtn{margin-left:auto;font-size:11px;color:var(--text3);cursor:pointer;}
.daily-item{padding:7px 12px;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text);display:flex;align-items:flex-start;gap:7px;border-left:5px solid transparent;}
.daily-item[data-prio="high"]{border-left-color:var(--red);}
.daily-item[data-prio="medium"]{border-left-color:var(--prio-medium);}
.daily-item[data-prio="low"]{border-left-color:var(--teal);}
.daily-item:last-child{border-bottom:none;}
.daily-item .di-name{flex:1;}
.daily-item .di-from{font-size:10px;color:var(--text3);margin-top:1px;}
.recur-icon{font-size:10px;color:var(--teal);flex-shrink:0;margin-top:2px;}
.task-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;position:relative;transition:all 0.1s;}
.task-check:hover{border-color:var(--teal);background:var(--tealbg);}

/* ── CARD DETAIL MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto;}
.modal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);padding:0;width:560px;max-width:96vw;max-height:85vh;overflow-y:auto;}
.modal-hd{padding:14px 16px;border-bottom:0.5px solid var(--border2);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg);z-index:2;}
.modal-hd h3{font-size:15px;font-weight:500;flex:1;}
.modal-body{padding:14px 16px;}
.modal-label{font-size:11px;color:var(--text2);margin-bottom:3px;display:block;}
.modal-input{width:100%;font-size:13px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:10px;font-family:inherit;outline:none;}
.modal-input:focus{border-color:var(--blue);}
.modal-textarea{width:100%;font-size:12px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:10px;font-family:inherit;outline:none;resize:vertical;min-height:60px;}
.modal-textarea:focus{border-color:var(--blue);}
.modal-select{width:100%;font-size:13px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:10px;font-family:inherit;outline:none;}
.modal-actions{display:flex;gap:7px;justify-content:flex-end;padding:12px 16px;border-top:0.5px solid var(--border);position:sticky;bottom:0;background:var(--bg);}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tag-pick{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border2);cursor:pointer;background:var(--bg);}
.tag-pick.sel{background:var(--purplebg);color:var(--purpletxt);border-color:var(--purplebg);}
.who-pick{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border2);cursor:pointer;background:var(--bg);}
.who-pick.sel{background:var(--bluebg);color:var(--bluetxt);border-color:var(--bluebg);}
.recur-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.section-divider{font-size:11px;font-weight:500;color:var(--text2);margin:12px 0 6px;padding-bottom:4px;border-bottom:0.5px solid var(--border);}

/* ── SIMPLE MODAL ── */
.smodal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.28);z-index:300;display:flex;align-items:center;justify-content:center;}
.smodal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);padding:18px;width:320px;max-width:95vw;}
.smodal h3{font-size:14px;font-weight:500;margin-bottom:12px;}
.smodal input,.smodal select{width:100%;font-size:13px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);margin-bottom:9px;font-family:inherit;outline:none;}
.smodal input:focus,.smodal select:focus{border-color:var(--blue);}
.smodal label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;}
.smodal-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:4px;}

/* ── STAMMDATEN MODAL ── */
.sdmodal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);padding:0;width:480px;max-width:96vw;max-height:80vh;overflow-y:auto;}
.sdmodal-hd{padding:12px 16px;border-bottom:0.5px solid var(--border2);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--bg);}
.sdmodal-hd h3{font-size:14px;font-weight:500;flex:1;}
.sd-tabs{display:flex;border-bottom:0.5px solid var(--border2);}
.sd-tab{padding:8px 16px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;}
.sd-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.sd-body{padding:14px 16px;}
.sd-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);}
.sd-item:last-child{border-bottom:none;}
.sd-item input{flex:1;font-size:13px;border:none;outline:none;background:transparent;font-family:inherit;color:var(--text);}
.sd-item input:focus{color:var(--text);}
.sd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ── MISC ── */
.empty-state{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:13px;}
.sr-item{padding:9px 13px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.1s;}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover{background:var(--bg2);}
.sr-name{font-size:13px;color:var(--text);font-weight:500;}
.sr-from{font-size:11px;color:var(--text3);margin-top:2px;}
.sr-mark{background:var(--bluebg);color:var(--bluetxt);border-radius:2px;padding:0 2px;}
.sr-item.sr-active{background:var(--bluebg);}
.empty-big{font-size:26px;margin-bottom:8px;}
#minimap-panel{display:none;position:absolute;top:38px;right:0;width:200px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);padding:10px;z-index:60;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
#minimap-panel.open{display:block;}
.mm-node{display:flex;align-items:center;gap:4px;cursor:pointer;border-radius:var(--rs);padding:2px 3px;font-size:11px;color:var(--text2);line-height:1.7;}
.mm-node:hover{background:var(--bg2);}
.mm-node.active{color:var(--bluetxt);font-weight:500;background:var(--bluebg);}
.mm-node.drag-over{background:var(--tealbg);color:var(--tealtxt);}
.mm-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
.pill-o{background:var(--bg3);color:var(--text);}
.pill-w{background:var(--amberbg);color:var(--ambertxt);}
.pill-d{background:var(--tealbg);color:var(--tealtxt);}
.pill-a{background:var(--bg3);color:var(--text3);}

/* ── CELL FEATURE SEGMENTS ── */
.cell-segment{display:flex;align-items:center;gap:5px;border-radius:var(--rs);cursor:pointer;transition:filter 0.1s;overflow:hidden;}
.cell-segment:hover{filter:brightness(0.95);}
.cell-segment-label{font-size:11px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cell-segment-meta{font-size:10px;opacity:0.8;white-space:nowrap;}

/* ── CELL QUADRANT VIEW ── */
.cell-quad{display:grid;margin:auto;}
.cell-quad-item{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--rs);cursor:pointer;transition:filter 0.1s;text-align:center;overflow:hidden;}
.cell-quad-item:hover{filter:brightness(0.92);}
.cell-quad-meta{font-size:9px;opacity:0.8;white-space:nowrap;margin-top:1px;}

/* ── ALIAS ── */
.alias-input{width:65px;font-size:11px;font-family:monospace;padding:2px 6px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text2);outline:none;transition:border-color 0.15s;}
.alias-input:focus{border-color:var(--blue);color:var(--text);}
.alias-input::placeholder{color:var(--text3);}
.alias-tag{font-size:10px;font-family:monospace;color:var(--text3);padding:1px 4px;border-radius:3px;background:var(--bg3);}

/* ── FREQUENCY MATRIX ── */
.freq-grid{display:grid;border:0.5px solid var(--border2);border-radius:var(--rl);overflow:hidden;background:var(--bg);}
.freq-hd{background:var(--bg2);font-size:11px;font-weight:500;color:var(--text2);padding:7px 9px;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);text-align:center;white-space:nowrap;}
.freq-hd.corner{background:var(--bg3);}
.freq-row-hd{background:var(--bg2);font-size:11px;font-weight:500;color:var(--bluetxt);padding:7px 9px;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.freq-row-hd:hover{background:var(--bluebg);}
.freq-cell{border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:34px;cursor:default;transition:background 0.1s;}
.freq-badge{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:22px;border-radius:var(--rs);font-size:11px;font-weight:600;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;}
.freq-badge:hover{transform:scale(1.12);box-shadow:0 2px 6px rgba(0,0,0,0.12);}
.freq-1{background:var(--bluebg);color:var(--bluetxt);}
.freq-2{background:#c8def5;color:var(--bluetxt);}
.freq-3{background:var(--blue);color:#fff;}
.freq-flyout{position:fixed;z-index:200;min-width:240px;max-width:360px;max-height:400px;overflow-y:auto;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);box-shadow:0 4px 16px rgba(0,0,0,0.15);padding:0;animation:popIn 0.2s cubic-bezier(0.16,1,0.3,1);}
.freq-flyout-hd{padding:10px 12px;border-bottom:0.5px solid var(--border);font-size:12px;font-weight:500;color:var(--text);}
.freq-flyout-hd span{font-weight:400;color:var(--text2);}
.freq-group{padding:6px 12px;border-bottom:0.5px solid var(--border);}
.freq-group-hd{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:4px;cursor:pointer;}
.freq-group-hd:hover{color:var(--bluetxt);}
.freq-group-item{font-size:12px;color:var(--text);padding:3px 0 3px 12px;cursor:pointer;border-radius:var(--r);transition:background 0.1s;}
.freq-group-item:hover{background:var(--bluebg);color:var(--bluetxt);}
.freq-toggle{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);cursor:pointer;padding:3px 8px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);transition:all 0.15s;margin-left:8px;}
.freq-toggle:hover,.freq-toggle.active{background:var(--bluebg);color:var(--bluetxt);border-color:var(--bluebg);}

/* ── KEYBOARD HELP ── */
.kb-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;}
.kb-spacer{grid-column:1/-1;height:6px;}
.kb-section{grid-column:1/-1;font-size:11px;font-weight:500;color:var(--text2);padding-top:4px;border-bottom:0.5px solid var(--border);padding-bottom:3px;}
.kb-key{font-size:12px;font-family:monospace;color:var(--text2);background:var(--bg3);padding:2px 6px;border-radius:var(--rs);white-space:nowrap;text-align:right;}
.kb-key-cfg{font-size:12px;font-family:monospace;color:var(--bluetxt);background:var(--bluebg);padding:2px 6px;border-radius:var(--rs);white-space:nowrap;text-align:right;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;}
.kb-key-cfg:hover{border-color:var(--blue);}
.kb-desc{font-size:12px;color:var(--text);padding:2px 0;}
.kb-desc-fixed{font-size:12px;color:var(--text2);padding:2px 0;}

/* ── COMMAND ERROR ── */
@keyframes cmdError{0%,100%{transform:none}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
#searchinput.cmd-error{animation:cmdError 0.3s ease;border-color:var(--red)!important;color:var(--red);}
.cmd-help{font-size:11px;font-family:monospace;padding:10px 12px;line-height:1.8;}
.cmd-help b{color:var(--bluetxt);}

/* ── FOCUS STYLES ── */
*:focus{outline:none;}
*:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:var(--r);transition:outline-offset 0.1s ease;}
.mcell:focus-visible{outline-offset:-2px;background:var(--bg2);border-radius:0;}
.kb-card:focus-visible{outline-offset:-2px;background:var(--bg2);}
.tab:focus-visible{outline:none;box-shadow:inset 0 -2px 0 var(--blue);color:var(--text);}
.bcs:focus-visible{outline-offset:0;background:var(--bluebg);}
.mm-node:focus-visible{outline-offset:0;background:var(--bg2);}
.btn:focus-visible{outline-offset:1px;}
input:focus-visible,select:focus-visible,textarea:focus-visible,[contenteditable]:focus-visible{outline:none;border-color:var(--blue);}

/* ── GEAR MENU ── */
.gear-wrap{position:relative;}
.gear-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;min-width:190px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);padding:4px 0;z-index:60;box-shadow:0 4px 16px rgba(0,0,0,0.12);transform-origin:top right;}
.gear-menu.open{display:block;animation:popIn 0.2s cubic-bezier(0.16,1,0.3,1);}
.gear-item{display:flex;align-items:center;gap:8px;width:100%;padding:7px 14px;font-size:12px;border:none;background:none;color:var(--text);cursor:pointer;font-family:inherit;text-align:left;transition:background 0.1s;}
.gear-item:hover{background:var(--bg2);}
.gear-item.danger{color:var(--red);}
.gear-sep{height:0;border-top:0.5px solid var(--border);margin:4px 0;}

/* ── ANIMATIONS ── */
/* A1: Panel navigation zoom+fade */
#panel{transform-origin:center top;}
#panel.exit-in{opacity:0;transform:scale(1.06);transition:opacity 0.18s ease-in,transform 0.18s ease-in;}
#panel.enter-in{opacity:0;transform:scale(0.94);}
#panel.exit-out{opacity:0;transform:scale(0.94);transition:opacity 0.18s ease-in,transform 0.18s ease-in;}
#panel.enter-out{opacity:0;transform:scale(1.06);}
#panel.exit-fade{opacity:0;transition:opacity 0.15s ease-in;}
#panel.enter-fade{opacity:0;}
#panel.anim-enter{transition:opacity 0.22s ease-out,transform 0.22s ease-out;opacity:1;transform:scale(1);}

/* A2: Card detail modal */
.modal-overlay{animation:overlayIn 0.2s ease-out;}
.modal{animation:modalIn 0.25s cubic-bezier(0.16,1,0.3,1);}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:translateY(24px) scale(0.97)}to{opacity:1;transform:none}}
.modal-overlay.closing{animation:overlayOut 0.18s ease-in forwards;}
.modal-overlay.closing .modal{animation:modalOut 0.18s ease-in forwards;}
@keyframes overlayOut{to{opacity:0}}
@keyframes modalOut{to{opacity:0;transform:translateY(12px) scale(0.98)}}

/* A3: Simple modal + Stammdaten */
.smodal-overlay{animation:overlayIn 0.18s ease-out;}
.smodal{animation:modalIn 0.22s cubic-bezier(0.16,1,0.3,1);}
.smodal-overlay.closing{animation:overlayOut 0.15s ease-in forwards;}
.smodal-overlay.closing .smodal{animation:modalOut 0.15s ease-in forwards;}
.smodal-overlay.closing .sdmodal{animation:modalOut 0.15s ease-in forwards;}

/* A4: Checkbox pop */
.cl-check.anim-done,.task-check.anim-done{animation:checkPop 0.35s cubic-bezier(0.16,1,0.3,1);}
@keyframes checkPop{0%{transform:scale(1)}40%{transform:scale(1.35) rotate(8deg)}70%{transform:scale(0.9)}100%{transform:scale(1)}}

/* A5: Badge/Tag slide-in */
@keyframes fadeSlideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.anim-slide-in{animation:fadeSlideIn 0.3s ease-out;}

/* A6: Kanban card add */
.kb-card{transition:opacity 0.15s,transform 0.15s;}
@keyframes cardSlideIn{from{opacity:0;transform:translateY(-8px) scale(0.96)}to{opacity:1;transform:none}}
.kb-card.anim-add{animation:cardSlideIn 0.25s cubic-bezier(0.16,1,0.3,1);}

/* A7: Minimap panel pop */
#minimap-panel{transform-origin:top right;}
#minimap-panel.open{animation:popIn 0.2s cubic-bezier(0.16,1,0.3,1);}
@keyframes popIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:none}}

/* A8: Search dropdown */
#searchresults{transform-origin:top right;}
.sr-anim{animation:popIn 0.18s ease-out;}

/* A9: Saved indicator */
#savedot{display:none;align-items:center;flex-shrink:0;}
#savedot svg{width:16px;height:16px;}
@keyframes savePulse{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes saveShake{0%,100%{transform:none}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@keyframes savedotFade{0%{opacity:1}60%{opacity:1}100%{opacity:0}}
#savedot.save-ok svg{color:var(--teal);animation:savePulse 0.5s ease;}
#savedot.save-ok{animation:savedotFade 2s ease forwards;}
#savedot.save-dirty svg{color:var(--blue);animation:savePulse 0.8s ease infinite;}
#savedot.save-err svg{color:var(--red);animation:saveShake 0.3s ease;}

/* Drag & Drop */
.kb-card[draggable="true"]{cursor:grab;}
.kb-card.dragging{opacity:0.4;transform:scale(0.96);}
.kb-cards.drag-over{background:var(--bluebg);border-radius:var(--r);transition:background 0.15s;}
.kb-drop-indicator{height:3px;background:var(--blue);border-radius:2px;margin:2px 0;transition:opacity 0.1s;}

/* ── HEADER REORDER ANIMATION ── */
.mh.swap-h,.daily-col.swap-h,.kb-col.swap-h{animation:swapH 0.22s ease-out;}
.mh.swap-v{animation:swapV 0.22s ease-out;}
@keyframes swapH{from{opacity:.5;transform:translateX(var(--dx))}to{opacity:1;transform:none}}
@keyframes swapV{from{opacity:.5;transform:translateY(var(--dy))}to{opacity:1;transform:none}}

/* ── HEADER MOVE ARROWS ── */
.hdr-arrows{display:none;position:absolute;gap:1px;z-index:2;}
.emode .mh:hover .hdr-arrows,.emode .mh:focus-within .hdr-arrows{display:flex;}
.hdr-arrows.col-arrows{bottom:-1px;left:50%;transform:translateX(-50%);flex-direction:row;}
.hdr-arrows.row-arrows{right:-1px;top:50%;transform:translateY(-50%);flex-direction:column;}
.hdr-arr{width:14px;height:14px;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:color 0.1s;opacity:0.6;}
.hdr-arr:hover{color:var(--blue);opacity:1;}

/* ── TRANSPOSE BUTTON ── */
.transpose-btn{width:22px;height:22px;border-radius:50%;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;padding:0;}
.transpose-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--bluebg);transform:rotate(90deg);}
.matrix.transpose-exit{animation:transposeOut 0.15s ease forwards;}
.matrix.transpose-enter{animation:transposeIn 0.25s ease-out;}
@keyframes transposeOut{to{filter:blur(4px);opacity:0.3;transform:scale(0.98)}}
@keyframes transposeIn{from{filter:blur(4px);opacity:0.3;transform:scale(0.98)}to{filter:none;opacity:1;transform:none}}

/* A10: Edit mode border */
#content{transition:border-left 0.2s ease,padding-left 0.2s ease;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="tl" style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
      <span id="applogo" style="flex-shrink:0;display:flex;align-items:center;cursor:pointer;" onclick="stack=[stack[0]];renderAnimated('out');" title="Infinite Matrix – Home"></span>
      <div class="bc" id="bc" style="flex:1;min-width:0;"></div>
      <span id="savedot"><svg viewBox="0 0 16 16" fill="none"><path d="M2 2h8l4 4v8H2V2z" stroke="currentColor" stroke-width="1.4"/><path d="M5 2v4h6V2" stroke="currentColor" stroke-width="1.2"/><path d="M4 9h8v5H4V9z" stroke="currentColor" stroke-width="1.2"/></svg></span>
      <div style="position:relative;flex-shrink:0;">
        <span id="searchicon" style="position:absolute;left:7px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:0.5;color:var(--text3);"></span>
        <input id="searchinput" type="text" placeholder="Suche oder ^Kommando..." style="font-size:12px;padding:4px 8px 4px 22px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);outline:none;width:160px;font-family:inherit;transition:width 0.2s ease;" oninput="onSearchInput(this.value)" onkeydown="searchInputKey(event)" onfocus="this.style.width='240px'" onblur="this.style.width='160px';setTimeout(()=>{if(!document.getElementById('searchinput').value)closeSearch();},150)"/>
        <div id="searchresults" style="display:none;position:absolute;top:32px;right:0;width:320px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--rl);z-index:80;max-height:360px;overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,0.1);"></div>
      </div>
    </div>
    <div id="tr">
      <button class="btn ico-btn" id="editbtn" onclick="toggleEdit()" title="Bearbeiten"></button>
      <button class="btn ico-btn" id="themebtn" onclick="cycleTheme()" title="Design"></button>
      <button class="btn ico-btn" id="mapbtn" onclick="toggleMM()" ondragenter="mmDragEnter()" title="Karte"></button>
      <div class="gear-wrap edit-only" style="position:relative;">
        <button class="btn ico-btn" onclick="toggleGearMenu()" id="gearbtn" title="Weitere Aktionen"></button>
        <div id="gearmenu" class="gear-menu">
          <button class="gear-item" id="filebtn"></button>
          <button class="gear-item" id="saveasbtn" onclick="saveFileAs();toggleGearMenu();"></button>
          <button class="gear-item" onclick="exportJSON();toggleGearMenu();" id="gear-export"></button>
          <label class="gear-item" style="cursor:pointer;" id="gear-import"><input type="file" accept=".json" style="display:none;" onchange="importJSON(event);toggleGearMenu();"></label>
          <div class="gear-sep"></div>
          <button class="gear-item" onclick="openStammdaten();toggleGearMenu();" id="gear-tags"></button>
          <button class="gear-item" onclick="showKeyboardHelp();toggleGearMenu();" id="gear-kb"></button>
          <div class="gear-sep"></div>
          <button class="gear-item" onclick="showSettings();toggleGearMenu();" id="gear-settings"></button>
          <div class="gear-sep"></div>
          <button class="gear-item danger" onclick="resetAll();" id="gear-reset"></button>
        </div>
      </div>
      <div id="minimap-panel"><div style="font-size:11px;font-weight:500;color:var(--text2);margin-bottom:6px;">Struktur</div><div id="mmtree"></div></div>
    </div>
  </div>
  <div id="content"><div id="panel"></div></div>
</div>
<div id="mc"></div><!-- simple modal -->
<div id="cardmodal"></div><!-- card detail -->

<script>
// ═══════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════
let nodes={}, nid=1;
function uid(){return 'n'+(nid++);}

// ── Shared constants ──
const WEEKDAY_NAMES=['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
const WEEKDAY_SHORT=['Mo','Di','Mi','Do','Fr','Sa','So'];
const MONTH_NAMES=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MONTH_SHORT=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const PRIO_COLORS={high:'var(--red)',medium:'var(--prio-medium)',low:'var(--teal)'};
const DAILY_COL_TYPES=[['today','Heute'],['thisweek','Diese Woche'],['nextweek','Nächste Woche'],['thismonth','Dieser Monat'],['nextmonth','Nächster Monat'],['thisquarter','Dieses Quartal'],['thisyear','Dieses Jahr'],['nextyear','Nächstes Jahr'],['nodate','Ohne Zeitangabe']];
const DCTYPE_LABELS=Object.fromEntries(DAILY_COL_TYPES);
const SAVE_INDICATOR_MS=1800;
const SAVE_WARN_MS=4000;
const SAVE_WARN_KB=3500;
const NOTE_TRUNCATE=80;
const SEARCH_MAX=20;
const SEARCH_MIN_LEN=2;
const HINT_DISPLAY_MS=2500;
const ANIM_EXIT_MS=180;
const ANIM_ENTER_MS=220;
const ANIM_CHECK_MS=350;
const RENDER_DELAY_MS=200;
const FOCUS_RESTORE_MS=50;
const MODAL_FOCUS_DELAY_MS=30;
const SMODAL_EXIT_MS=150;
const ARCHIVE_SCROLL_THRESHOLD=20;
const ARCHIVE_SCROLL_HEIGHT='480px';
const PRIO_LABELS={high:'Hoch 🔴',medium:'Mittel 🟡',low:'Niedrig 🟢','':'— Keine'};
const DATE_LOCALE='de-AT';
const KEYBINDINGS_KEY='imatrix-keybindings';
const UI={
  confirmDeleteCard:'Karte löschen?',
  confirmDeleteRow:'Zeile löschen?',
  confirmDeleteCol:'Spalte löschen?',
  confirmDeleteColArchive:'Spalte löschen? Karten bleiben erhalten (werden archiviert).',
  confirmDeleteMatrix:'Sub-Matrix unwiderruflich löschen?',
  confirmDeleteBoard:'Board-Daten unwiderruflich löschen?',
  confirmDeleteGlobal:'Löschen? Wird auch von allen Karten entfernt.',
  confirmReset:'Alle Daten löschen? Ein Backup wird automatisch heruntergeladen.',
  confirmDisconnect:'Datei trennen? Daten bleiben in localStorage.',
  confirmOverwriteBoard:'Bestehendes Board überschreiben?',
  confirmOverwriteMatrix:'Bestehende Sub-Matrix überschreiben?',
  errInvalidFormat:'Ungültiges Dateiformat.',
  errInvalidFile:'Ungültige Datei',

// ── Alias system ──
const ALIAS_MAX_LEN=8;
const ALIAS_RE=/^[a-z0-9]+$/;
const RESERVED_ALIASES=['n','fa','fi','fh','fc','home','w','s'];
let aliasIndex={}; // alias → {type,nodeId,boardId?,cardId?,linkId?}

function migrateNodeAliasesToCells(){
  // One-time migration: move aliases from board/matrix nodes to the cells that contain them
  if(!rootId)return;
  let migrated=false;
  function walk(matrixId){
    const m=nodes[matrixId];if(!m||m.type!=='matrix')return;
    Object.entries(m.data.cells).forEach(([key,c])=>{
      if(c.boardId&&nodes[c.boardId]?.alias&&!c.alias){
        c.alias=nodes[c.boardId].alias;
        delete nodes[c.boardId].alias;
        migrated=true;
      }
      if(c.matrixId&&nodes[c.matrixId]?.alias&&!c.alias){
        c.alias=nodes[c.matrixId].alias;
        delete nodes[c.matrixId].alias;
        migrated=true;
      }
      if(c.matrixId)walk(c.matrixId);
    });
  }
  walk(rootId);
  if(migrated)save();
}
function rebuildAliasIndex(){
  aliasIndex={};
  function walkNode(nodeId){
    const n=nodes[nodeId];if(!n||nodeId.startsWith('cell-'))return;
    if(n.alias)aliasIndex[n.alias]={type:n.type,nodeId};
    if(n.type==='board'){
      (n.data.kbCards||[]).forEach(c=>{if(c.alias)aliasIndex[c.alias]={type:'card',nodeId,boardId:nodeId,cardId:c.id};});
      (n.data.links||[]).forEach(l=>{if(l.alias)aliasIndex[l.alias]={type:l.type==='mail'?'mail':'link',nodeId,boardId:nodeId,linkId:l.id};});
    }
    if(n.type==='matrix'){
      Object.entries(n.data.cells).forEach(([key,c])=>{
        // Cell-level alias (1 alias for all 4 tabs)
        if(c.alias){
          const sep=key.indexOf('-');
          aliasIndex[c.alias]={type:'cell',parentId:nodeId,rowId:key.slice(0,sep),colId:key.slice(sep+1)};
        }
        if(c.boardId)walkNode(c.boardId);
        if(c.matrixId)walkNode(c.matrixId);
      });
    }
  }
  if(rootId)walkNode(rootId);
}
function validateAlias(alias,excludeAlias){
  if(!alias)return{valid:true,alias:''};
  const a=alias.toLowerCase().trim();
  if(!a)return{valid:true,alias:''};
  if(a.length>ALIAS_MAX_LEN)return{valid:false,msg:`Max ${ALIAS_MAX_LEN} Zeichen`};
  if(!ALIAS_RE.test(a))return{valid:false,msg:'Nur a-z, 0-9'};
  if(RESERVED_ALIASES.includes(a))return{valid:false,msg:`"${a}" ist reserviert`};
  if(aliasIndex[a]&&a!==excludeAlias)return{valid:false,msg:`"${a}" bereits vergeben`};
  return{valid:true,alias:a};
}
function setNodeAlias(nodeId,val){
  const n=nodes[nodeId];if(!n)return;
  const oldAlias=n.alias||'';
  const v=validateAlias(val,oldAlias);
  if(!v.valid){alert(v.msg);return;}
  n.alias=v.alias;
  rebuildAliasIndex();save();
}
function setCellAlias(parentId,rowId,colId,val){
  const cell=getCell(parentId,`${rowId}-${colId}`);if(!cell)return;
  const oldAlias=cell.alias||'';
  const v=validateAlias(val,oldAlias);
  if(!v.valid){alert(v.msg);return;}
  cell.alias=v.alias;
  rebuildAliasIndex();save();
}
function setCardAlias(boardId,cardId,val){
  const c=getCard(boardId,cardId);if(!c)return;
  const oldAlias=c.alias||'';
  const v=validateAlias(val,oldAlias);
  if(!v.valid){alert(v.msg);return;}
  c.alias=v.alias;
  rebuildAliasIndex();save();
}
function setLinkAlias(boardId,linkId,val){
  const l=nodes[boardId]?.data.links.find(x=>x.id===linkId);if(!l)return;
  const oldAlias=l.alias||'';
  const v=validateAlias(val,oldAlias);
  if(!v.valid){alert(v.msg);return;}

function matchShortcut(e,action){

  if(kb.ctrl&&!e.ctrlKey)return false;if(!kb.ctrl&&e.ctrlKey)return false;
  if(kb.shift&&!e.shiftKey)return false;if(!kb.shift&&e.shiftKey)return false;
  if(kb.alt&&!e.altKey)return false;if(!kb.alt&&e.altKey)return false;

}

function getCell(nid,key){
  if(!nodes[nid])return{boardId:null,matrixId:null,features:[]};
  const d=nodes[nid].data;
  if(!d.cells[key])d.cells[key]={boardId:null,matrixId:null,features:[]};
  const c=d.cells[key];
  // Migration: backfill features for legacy data
  if(!c.features)c.features=[];
  if(c.boardId&&c.features.length===0)c.features=['info','board','checklists'];
  if(c.matrixId&&!c.features.includes('matrix'))c.features.push('matrix');
  return c;
}

function getPayloadPretty(){return JSON.stringify({version:DATA_VERSION,nodes,nid,rootId,globalTags,globalPeople,dailyCols,keyBindings},null,2);}

function showSaveStatus(text,color,duration){
  const d=document.getElementById('savedot');if(!d)return;
  d.className='';d.style.display='inline-flex';d.style.opacity='1';
  if(color==='var(--teal)')d.className='save-ok';
  else if(color==='var(--blue)')d.className='save-dirty';
  else if(color==='var(--red)')d.className='save-err';
  else if(color==='var(--amber)')d.className='save-err';
  d.title=text;
  clearTimeout(d._t);
  if(d.className==='save-ok'){
    // Fadeout handled by CSS animation; hide element after animation ends
    d._t=setTimeout(()=>{d.style.display='none';d.className='';},2100);
  } else if(duration){
    d._t=setTimeout(()=>{d.style.display='none';d.className='';},duration);
  }
}

function save(){
  const payload=getPayload();
  // Always save to localStorage immediately
  try{localStorage.setItem(SAVE_KEY,payload);}catch(e){console.warn('localStorage save failed:',e.message);}

  if(fileHandle){
    fileDirty=true;
    showSaveStatus('● ungespeichert','var(--blue)',0); // persistent, no timeout
    clearTimeout(fileSaveTimer);
    fileSaveTimer=setTimeout(()=>flushToFile(),appSettings.autoSaveDelay||FILE_DEBOUNCE_MS);
  } else {
    const kb=Math.round(payload.length/1024);
    const warn=kb>SAVE_WARN_KB;
    showSaveStatus(
      warn?'localStorage '+kb+' KB — Datei wählen!':'gespeichert',
      warn?'var(--amber)':'var(--teal)',
      warn?SAVE_WARN_MS:SAVE_INDICATOR_MS
    );
  }
}

async function flushToFile(){
  if(!fileHandle||!fileDirty)return;
  try{
    const writable=await fileHandle.createWritable();
    await writable.write(getPayloadPretty());
    await writable.close();
    fileDirty=false;
    showSaveStatus('✓ gespeichert','var(--teal)',SAVE_INDICATOR_MS);
  }catch(e){
    showSaveStatus(`✗ Schreibfehler: ${fileHandle.name}`,'var(--red)',SAVE_WARN_MS);
  }
  updateFileBtn();
}

async function openFile(){
  if(!hasFileAPI)return;
  try{
    const[handle]=await window.showOpenFilePicker(FILE_OPTS);
    const file=await handle.getFile();
    const text=await file.text();
    const d=JSON.parse(text);
    if(!validateImport(d)){alert(UI.errInvalidFormat);return;}
    fileHandle=handle;
    loadData(d);save();render();
  }catch(e){
    if(e.name!=='AbortError')alert('Fehler beim Öffnen: '+e.message);
  }
}

async function saveFileAs(){
  if(!hasFileAPI)return;
  try{
    const handle=await window.showSaveFilePicker({...FILE_OPTS,suggestedName:'matrix-data.json'});
    fileHandle=handle;
    fileDirty=true;
    await flushToFile();
    render();
  }catch(e){
    if(e.name!=='AbortError')alert('Fehler beim Speichern: '+e.message);
  }
}

function disconnectFile(){

function loadData(d){

}
function exportJSON(){
  const cur=stack[stack.length-1];
  if(cur.cellRef){
    // On sub-level: export the active node (board or sub-matrix)
    const cell=getCell(cur.cellRef.parentId,`${cur.cellRef.rowId}-${cur.cellRef.colId}`);
    const tab=getTab(cur.nodeId,'board');
    const exportId=tab==='matrix'?cell.matrixId:cell.boardId;
    if(exportId)exportNode(exportId);
    return;
  }
  const blob=new Blob([getPayloadPretty()],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='matrix-backup.json';a.click();
}
function validateImport(d){
  if(!d||typeof d!=='object')return false;
  if(!d.nodes||typeof d.nodes!=='object')return false;
  if(typeof d.nid!=='number'||d.nid<1)return false;
  if(!d.rootId||!d.nodes[d.rootId])return false;
  const root=d.nodes[d.rootId];
  if(!root||root.type!=='matrix'||!root.data)return false;
  for(const[id,n]of Object.entries(d.nodes)){
    if(!n.id||!n.type||!n.data)return false;
    if(!['matrix','board','cell'].includes(n.type))return false;
  }
  if(d.globalTags&&!Array.isArray(d.globalTags))return false;
  if(d.globalPeople&&!Array.isArray(d.globalPeople))return false;
  if(d.dailyCols&&!Array.isArray(d.dailyCols))return false;
  return true;
}
function importJSON(e){
  const cur=stack[stack.length-1];
  if(cur.cellRef){
    // On sub-level: delegate to node import
    const tab=getTab(cur.nodeId,'board');
    const targetType=tab==='matrix'?'matrix':'board';
    importNodeData(e,cur.cellRef.parentId,cur.cellRef.rowId,cur.cellRef.colId,targetType);
    return;
  }
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{
    const d=JSON.parse(ev.target.result);
    if(!validateImport(d)){alert(UI.errImportAbort);return;}
    loadData(d);save();render();
  }catch(x){alert(UI.errInvalidFile);}};
  r.readAsText(f);
}

// ── Scroll-fade: dynamic mask on horizontally scrollable containers ──
function updateScrollFade(el){
  const t=2; // threshold px
  const canL=el.scrollLeft>t;
  const canR=el.scrollLeft<el.scrollWidth-el.clientWidth-t;
  el.classList.toggle('scroll-fade-lr',canL&&canR);
  el.classList.toggle('scroll-fade-l',canL&&!canR);
  el.classList.toggle('scroll-fade-r',!canL&&canR);
  if(!canL&&!canR){el.classList.remove('scroll-fade-lr','scroll-fade-l','scroll-fade-r');}
}
function initScrollFade(){
  document.querySelectorAll('.kb-wrap,.daily-cols').forEach(el=>{

    if(!el._sfBound){el.addEventListener('scroll',()=>updateScrollFade(el),{passive:true});el._sfBound=true;}
  });
}

function renderBC(){
  document.getElementById('bc').innerHTML=stack.map((s,i)=>{
    const sep=i>0?'<span class="bca">›</span>':'';
    return i<stack.length-1
      ?sep+`<span class="bcs" tabindex="0" role="link" onclick="navTo(${i})" onkeydown="if(event.key==='Enter'){event.preventDefault();navTo(${i});}">${esc(s.label)}</span>`
      :sep+`<span class="bcc">${esc(s.label)}</span>`;
  }).join('');
}
function navTo(i){
  // Remember cellRef of the view we're leaving, so we can restore focus
  const leaving=stack[i+1];
  const _cr=leaving&&leaving.cellRef?leaving.cellRef:null;
  stack=stack.slice(0,i+1);
  renderAnimated('out');
  if(_cr){
    // After animation + render, focus the cell we came from
    const delay=(appSettings.animationsEnabled?ANIM_EXIT_MS+ANIM_ENTER_MS:0)+FOCUS_RESTORE_MS;
    setTimeout(()=>{
      const cell=document.querySelector(`.mcell[data-node="${_cr.parentId}"][data-row="${_cr.rowId}"][data-col="${_cr.colId}"]`);
      if(cell)cell.focus();
    },delay);
  }
}

function renderMM(){
  function walk(nodeId,depth,cellAlias){
    const n=nodes[nodeId];if(!n||nodeId.startsWith('cell-'))return'';
    const color=n.type==='board'?'var(--teal)':'var(--blue)';
    const active=nodeId===stack[stack.length-1].nodeId;
    const alias=cellAlias||n.alias||(nodeId===rootId?'home':'');
    const _alias=alias?`<span style="margin-left:auto;font-size:10px;color:var(--text3);font-family:monospace;">${esc(alias)}</span>`:'';
    const _drop=n.type==='board'?` ondragover="mmDragOver(event)" ondragleave="mmDragLeave(event)" ondrop="mmDrop(event,'${nodeId}')"`:''
    let h=`<div class="mm-node${active?' active':''}" style="padding-left:${depth*10}px" tabindex="0" role="link" onclick="mmNav('${nodeId}')" onkeydown="if(event.key==='Enter'){event.preventDefault();mmNav('${nodeId}');}"${_drop}><div class="mm-dot" style="background:${color}"></div><span style="flex:1;">${esc(n.label)}</span>${_alias}</div>`;
    if(n.type==='matrix')Object.values(n.data.cells).forEach(c=>{const ca=c.alias||'';if(c.boardId)h+=walk(c.boardId,depth+1,ca);if(c.matrixId)h+=walk(c.matrixId,depth+1,ca);});
    return h;
  }
  document.getElementById('mmtree').innerHTML=walk(stack[0].nodeId,0,null);
}
function toggleMM(){mmOpen=!mmOpen;document.getElementById('minimap-panel').classList.toggle('open',mmOpen);renderMM();}
function mmDragEnter(){if(!_dragCardId)return;if(!mmOpen){mmOpen=true;document.getElementById('minimap-panel').classList.add('open');renderMM();}}
function mmDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';const n=e.target.closest('.mm-node');if(n)n.classList.add('drag-over');}
function mmDragLeave(e){const n=e.target.closest('.mm-node');if(n&&!n.contains(e.relatedTarget))n.classList.remove('drag-over');}
function mmDrop(e,targetBoardId){
  e.preventDefault();
  const n=e.target.closest('.mm-node');if(n)n.classList.remove('drag-over');
  if(!_dragCardId||!_dragBoardId||!targetBoardId)return;
  if(_dragBoardId===targetBoardId)return; // same board, ignore
  const tgt=nodes[targetBoardId];if(!tgt||tgt.type!=='board')return;
  const cols=tgt.data.kbCols;
  const srcBoardId=_dragBoardId,cardId=_dragCardId;
  if(cols.length<=1){
    // Single column or empty → move directly
    moveCardToBoard(srcBoardId,cardId,targetBoardId,null);
  } else {
    // Multiple columns → show column picker
    const opts=cols.map(c=>[c.id,c.label]);
    smodal('Zielspalte wählen',[{label:'Spalte',id:'c',sel:opts.map(o=>o[0]),sellabels:opts.map(o=>o[1]),v:opts[0][0]}],v=>{
      const col=cols.find(c=>c.id===v.c);
      moveCardToBoard(srcBoardId,cardId,targetBoardId,col?col.label:null);
    });
  }
}
function toggleGearMenu(){
  const menu=document.getElementById('gearmenu');if(!menu)return;
  const isOpen=menu.classList.contains('open');
  menu.classList.toggle('open',!isOpen);
  if(!isOpen){
    const close=e=>{if(!e.target.closest('.gear-wrap')){menu.classList.remove('open');document.removeEventListener('click',close);}};
    setTimeout(()=>document.addEventListener('click',close),0);
  }
}
function mmNav(nodeId){
  const target=nodes[nodeId];if(!target)return;
  // For boards/sub-matrices: find their parent cell and open via openCell
  if(target.type==='board'||target.type==='matrix'){
    for(const[nid,n]of Object.entries(nodes)){
      if(n.type!=='matrix')continue;
      for(const[k,c]of Object.entries(n.data.cells)){
        const match=(c.boardId===nodeId)?'board':(c.matrixId===nodeId)?'matrix':null;
        if(match){
          const[rowId,colId]=k.split('-');
          // First navigate to parent matrix
          function findPath(from,tgt,path){
            if(from===tgt)return[...path,from];
            const nd=nodes[from];if(!nd||nd.type!=='matrix')return null;
            for(const[key,cell]of Object.entries(nd.data.cells)){
              for(const cid of[cell.boardId,cell.matrixId]){if(!cid)continue;const r=findPath(cid,tgt,[...path,from]);if(r)return r;}
            }return null;
          }
          const parentPath=findPath(stack[0].nodeId,nid,[]);
          if(parentPath){
            stack=parentPath.map(id=>({nodeId:id,label:nodes[id].label,cellRef:null}));
            mmOpen=false;document.getElementById('minimap-panel').classList.remove('open');
            openCell(nid,rowId,colId,target.label,match==='board'?'board':'matrix');
            return;
          }
        }
      }
    }
  }
  // For matrix nodes: direct navigation
  function findPath(from,tgt,path){
    if(from===tgt)return[...path,from];
    const n=nodes[from];if(!n||n.type!=='matrix')return null;
    for(const[k,c]of Object.entries(n.data.cells)){
      for(const cid of[c.boardId,c.matrixId]){if(!cid)continue;const r=findPath(cid,tgt,[...path,from]);if(r)return r;}
    }return null;
  }
  const path=findPath(stack[0].nodeId,nodeId,[]);if(!path)return;
  stack=path.map(id=>({nodeId:id,label:nodes[id].label,cellRef:null}));
  mmOpen=false;document.getElementById('minimap-panel').classList.remove('open');renderAnimated('in');
}

  let h=`<div class="phd">

      <button class="btn edit-only" onclick="addRow('${node.id}')">+ Zeile</button>
    </div></div>`;

  if(rows.length===0&&cols.length===0){
    h+=`<div class="empty-state"><div class="empty-big">${ICO.map(32)}</div><div style="margin-bottom:10px;">Leere Matrix — leg los.</div>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button class="btn edit-only" onclick="addCol('${node.id}')">+ Spalte</button>
        <button class="btn edit-only" onclick="addRow('${node.id}')">+ Zeile</button>
      </div></div>`;
  } else {
    h+=renderMatrixGrid(node.id,rows,cols);
  }

  // Daily overview only on root
  // Show task overview if any tasks exist in this tree
  const _hasCards=hasCardsInTree(node.id);
  if(_hasCards) h+=renderTaskOverview(node.id);
  return h;
}

function renderMatrixGrid(nodeId,rows,cols){
  let h='';
  const cw=appSettings.colWidthEm||7;
  const gc=`${cw}em repeat(${cols.length},minmax(${cw}em,1fr))${editMode?' 2.25em':''}`;
  h+=`<div class="mwrap"><div class="matrix${editMode?' emode':''}" style="grid-template-columns:${gc};">`;
  h+=`<div class="mh corner">${editMode&&rows.length&&cols.length?`<button class="transpose-btn" onclick="transposeMatrix('${nodeId}')" title="Transponieren (Zeilen ↔ Spalten)">${ICO.transpose(14)}</button>`:''}</div>`;
  cols.forEach(col=>{
    const arrows=editMode?`<div class="hdr-arrows col-arrows"><button class="hdr-arr" tabindex="-1" onclick="moveCol('${nodeId}','${col.id}',-1)" title="Nach links"><svg width="7" height="8" viewBox="0 0 7 8"><path d="M6 1L2 4l4 3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="hdr-arr" tabindex="-1" onclick="moveCol('${nodeId}','${col.id}',1)" title="Nach rechts"><svg width="7" height="8" viewBox="0 0 7 8"><path d="M1 1l4 3-4 3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>`:'';
    h+=`<div class="mh ch" data-col-id="${col.id}"><input class="ni" value="${esc(col.label)}" onchange="renameCol('${nodeId}','${col.id}',this.value)" onkeydown="hdrKeydown(event,'col','${nodeId}','${col.id}')" ${editMode?'':'readonly tabindex="-1"'} style="text-align:center;"/>
      <span class="edel" onclick="delCol('${nodeId}','${col.id}')">${ICO.close(10)}</span>${arrows}</div>`;
  });
  if(editMode)h+=`<div class="addcolhdr"><button class="addbtn" id="addcol-${nodeId}" onclick="addCol('${nodeId}')">+</button></div>`;
  rows.forEach(row=>{
    const arrows=editMode?`<div class="hdr-arrows row-arrows"><button class="hdr-arr" tabindex="-1" onclick="moveRow('${nodeId}','${row.id}',-1)" title="Nach oben"><svg width="8" height="7" viewBox="0 0 8 7"><path d="M1 6l3-4 3 4" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="hdr-arr" tabindex="-1" onclick="moveRow('${nodeId}','${row.id}',1)" title="Nach unten"><svg width="8" height="7" viewBox="0 0 8 7"><path d="M1 1l3 4 3-4" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>`:'';
    h+=`<div class="mh rh" data-row-id="${row.id}"><input class="ni" value="${esc(row.label)}" onchange="renameRow('${nodeId}','${row.id}',this.value)" onkeydown="hdrKeydown(event,'row','${nodeId}','${row.id}')" ${editMode?'':'readonly tabindex="-1"'}/>
      <span class="edel" onclick="delRow('${nodeId}','${row.id}')">${ICO.close(10)}</span>${arrows}</div>`;
    cols.forEach(col=>{h+=cellHTML(nodeId,row,col);});
    if(editMode)h+=`<div class="addrowcol"></div>`;
  });
  if(editMode)h+=`<div class="addrowfull"><button class="addbtn" id="addrow-${nodeId}" onclick="addRow('${nodeId}')">+</button></div>`;
  h+=`</div></div>`;
  return h;
}

function cellHTML(nodeId,row,col){
  const key=`${row.id}-${col.id}`;
  const cell=getCell(nodeId,key);
  const hb=!!cell.boardId, hm=!!cell.matrixId;
  const lbl=esc(row.label+' / '+col.label);
  const features=cell.features||[];

  // Build segments for active features (ordered by CELL_FEATURES)
  let segments='', ghostBtns='';
  const activeFeatures=CELL_FEATURES.filter(f=>features.includes(f.key));
  const useQuad=appSettings.quadrantLayout;
  const _cp=appSettings.cellPadding||0.25;
  const _cg=appSettings.cellGap||0.15;

  // Build feature data lookup by key
  function getFeatData(feat){
    let meta='',label='';
    if(feat.key==='matrix'&&hm){
      const m=nodes[cell.matrixId];label=esc(m.label);
      let subCount=0;
      function countSub(nid){const nd=nodes[nid];if(!nd||nd.type!=='matrix')return;Object.values(nd.data.cells).forEach(c=>{if(c.matrixId){subCount++;countSub(c.matrixId);}});}
      countSub(cell.matrixId);
      meta=`${m.data.rows.length}×${m.data.cols.length}${subCount?'/'+subCount:''}`;
    } else if(feat.key==='board'&&hb){
      const b=nodes[cell.boardId];label=esc(b.label);
      const active=b.data.kbCards.filter(c=>!c.archived);
      meta=`${active.filter(c=>c.done).length}/${active.length}`;
    } else if(feat.key==='info'&&hb){
      label='Info';meta=`${nodes[cell.boardId].data.infoFields.length}/${nodes[cell.boardId].data.links.length}`;
    } else if(feat.key==='checklists'&&hb){
      label='Checklisten';meta=`${nodes[cell.boardId].data.checklists.length}`;
    } else return null;
    return{feat,meta,label};
  }

  if(useQuad){
    // Fixed 2×2 grid: matrix=TL, board=TR, info=BL, checklists=BR
    const qw=appSettings.quadWidth||2.5, qh=appSettings.quadHeight||2.5;
    const qico=appSettings.quadIconSize||1.4;
    segments=`<div class="cell-quad" style="grid-template-columns:${qw}em ${qw}em;grid-template-rows:${qh}em ${qh}em;gap:${_cg}em;">`;
    // Always render all 4 slots in fixed order
    CELL_FEATURES.forEach(feat=>{
      const hasIt=features.includes(feat.key);
      const data=hasIt?getFeatData(feat):null;
      if(data){
        const qicoPx=Math.round(qico*16);
        const ico=feat.icoLg.replace(/width="\d+"/,`width="${qicoPx}"`).replace(/height="\d+"/,`height="${qicoPx}"`);
        segments+=`<div class="cell-quad-item" style="background:${feat.bg};color:${feat.txt};padding:${_cp}em;" onclick="iconClick('${nodeId}','${row.id}','${col.id}','${feat.key}','${lbl}')">
          ${ico}<span class="cell-quad-meta">${data.meta}</span>
        </div>`;
      } else {
        // Empty slot — ghost button in edit mode, empty otherwise
        segments+=`<div class="cell-quad-item" style="padding:${_cp}em;">${editMode?`<span class="cell-ghost edit-only" onclick="iconClick('${nodeId}','${row.id}','${col.id}','${feat.key}','${lbl}')" title="${feat.label} anlegen" style="color:var(--text3);">${feat.icoSm}</span>`:''}</div>`;
      }
    });
    segments+=`</div>`;
  } else {
    // Stacked bar layout
    const featData=activeFeatures.map(f=>getFeatData(f)).filter(Boolean);
    const bs=appSettings.barIconSize||0.9;
    const bsPx=Math.round(bs*16);
    featData.forEach(({feat,meta,label})=>{
      const ico=feat.icoLg.replace(/width="\d+"/,`width="${bsPx}"`).replace(/height="\d+"/,`height="${bsPx}"`);
      segments+=`<div class="cell-segment" style="background:${feat.bg};color:${feat.txt};padding:${_cp}em ${_cp+0.2}em;" onclick="iconClick('${nodeId}','${row.id}','${col.id}','${feat.key}','${lbl}')">
        ${ico}
        <span class="cell-segment-label">${label}</span>
        <span class="cell-segment-meta">${meta}</span>
        ${editMode?`<span style="opacity:0.6;font-size:11px;cursor:pointer;" onclick="event.stopPropagation();removeFeature('${nodeId}','${row.id}','${col.id}','${feat.key}')" title="${feat.label} entfernen">${ICO.close(10)}</span>`:''}
      </div>`;
    });
  }

  // Ghost buttons for missing features (only in bar mode, quad mode has them inline)
  if(!useQuad){
    CELL_FEATURES.forEach(feat=>{
      if(!features.includes(feat.key)){
        ghostBtns+=`<span class="cell-ghost edit-only" onclick="iconClick('${nodeId}','${row.id}','${col.id}','${feat.key}','${lbl}')" title="${feat.label} anlegen">${feat.icoSm}</span>`;
      }
    });
  }

  const firstFeature=activeFeatures.length>0?activeFeatures[0].key:'';

  return `<div class="mcell" style="justify-content:space-between;" tabindex="0" data-row="${row.id}" data-col="${col.id}" data-node="${nodeId}"
    data-enter-node="${nodeId}" data-enter-row="${row.id}" data-enter-col="${col.id}" data-enter-type="${firstFeature}" data-enter-lbl="${lbl}"
    onkeydown="mcellKeydown(event,this)">
    <div style="flex:1;display:flex;flex-direction:column;gap:${_cg}em;">${segments}</div>
    ${ghostBtns?`<div class="cell-ghosts">${ghostBtns}</div>`:''}
  </div>`;
}

function renderCellPage(cur){
  const{parentId,rowId,colId}=cur.cellRef;
  const cell=getCell(parentId,`${rowId}-${colId}`);
  const hb=!!cell.boardId,hm=!!cell.matrixId;
  const tab=getTab(cur.nodeId, hb?'board':'matrix');
  // Find the boardId or matrixId to allow renaming
  const _cell=cur.cellRef?getCell(cur.cellRef.parentId,`${cur.cellRef.rowId}-${cur.cellRef.colId}`):null;
  const _renamableId=_cell?(tab==='board'?_cell.boardId:_cell.matrixId):null;
  const _exportId=tab==='board'?cell.boardId:cell.matrixId;
  const _exportType=tab==='board'?'board':'matrix';
  let h=`<div class="phd"><div style="flex:1;min-width:0;">
    ${editMode&&_renamableId
      ?`<input class="ptitle" style="border:none;outline:none;background:transparent;font-size:17px;font-weight:500;width:100%;font-family:inherit;" value="${esc(cur.label)}" onchange="renameBoardOrMatrix('${_renamableId}',this.value,'${cur.nodeId}')" />`
      :`<div class="ptitle">${esc(cur.label)}</div>`}
  </div>
  <div style="display:flex;gap:5px;flex-shrink:0;align-items:center;">
    ${editMode
      ?`<input class="alias-input" placeholder="Kürzel" maxlength="${ALIAS_MAX_LEN}" value="${esc(cell.alias||'')}" onchange="setCellAlias('${parentId}','${rowId}','${colId}',this.value)" title="Kürzel für Schnellnavigation (^kürzel m|i|b|c)"/>`
      :cell.alias?`<span class="alias-input" style="opacity:0.5;cursor:default;border:none;background:transparent;">${esc(cell.alias)}</span>`:''}
  </div>
  </div>`;
  const features=cell.features||[];
  h+=`<div class="tabs">`;
  if(features.includes('info')&&hb){
    const lbl=getTabLabel(cell,'info');
    h+=editMode?editTabBtn('info',tab,cur.nodeId,lbl,parentId,rowId,colId):tabBtn('info',tab,cur.nodeId,lbl);
  }
  if(features.includes('board')&&hb){
    const tot=nodes[cell.boardId].data.kbCards.filter(c=>!c.archived).length;
    const lbl=getTabLabel(cell,'board');
    h+=editMode?editTabBtn('board',tab,cur.nodeId,lbl,parentId,rowId,colId,`<span class="tbadge">${tot}</span>`):tabBtn('board',tab,cur.nodeId,`${esc(lbl)} <span class="tbadge">${tot}</span>`);
  }
  if(features.includes('checklists')&&hb){
    const cl=nodes[cell.boardId].data.checklists.length;
    const lbl=getTabLabel(cell,'checklists');
    h+=editMode?editTabBtn('checklists',tab,cur.nodeId,lbl,parentId,rowId,colId,`<span class="tbadge">${cl}</span>`):tabBtn('checklists',tab,cur.nodeId,`${esc(lbl)} <span class="tbadge">${cl}</span>`);
  }
  if(features.includes('matrix')&&hm){
    const lbl=getTabLabel(cell,'matrix');
    h+=editMode?editTabBtn('matrix',tab,cur.nodeId,lbl,parentId,rowId,colId):tabBtn('matrix',tab,cur.nodeId,lbl);
  }
  h+=`</div>`;
  if(tab==='info'&&hb&&features.includes('info')) h+=renderInfoTab(nodes[cell.boardId]);
  else if(tab==='board'&&hb&&features.includes('board')) h+=renderKanban(nodes[cell.boardId]);
  else if(tab==='checklists'&&hb&&features.includes('checklists')) h+=renderChecklists(nodes[cell.boardId]);
  else if(tab==='matrix'&&hm&&features.includes('matrix')) h+=renderSubMatrix(nodes[cell.matrixId]);
  return h;
}
function tabBtn(name,cur,nodeId,label){
  return `<div class="tab${cur===name?' active':''}" tabindex="0" role="tab" onclick="switchTab('${nodeId}','${name}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();switchTab('${nodeId}','${name}');}">${label}</div>`;
}
function editTabBtn(name,cur,nodeId,label,parentId,rowId,colId,badge){
  return `<div class="tab${cur===name?' active':''}" onclick="switchTab('${nodeId}','${name}')"><input style="border:none;outline:none;background:transparent;font:inherit;color:inherit;width:${Math.max(3,label.length+1)}ch;padding:0;" value="${esc(label)}" onclick="event.stopPropagation()" onchange="setTabLabel('${parentId}','${rowId}','${colId}','${name}',this.value)"/>${badge||''}</div>`;
}
function switchTab(nodeId,tab){setTab(nodeId,tab);renderAnimated('fade');}

function renderInfoTab(node){
  const{infoFields,links}=node.data;
  let h=`<div class="card">`;
  h+=`<div class="cardhd">Info-Felder ${editMode?`<button class="btn" style="margin-left:auto;padding:3px 8px;" onclick="addInfoField('${node.id}')">+ Feld</button>`:''}`;
  h+=`</div>`;
  if(infoFields.length===0&&!editMode) h+=`<div style="padding:12px 13px;font-size:12px;color:var(--text3);">Keine Felder — Bearbeiten-Modus zum Anlegen.</div>`;
  infoFields.forEach((f,idx)=>{
    h+=`<div class="info-field">
      <div style="display:flex;align-items:center;gap:6px;">
        ${editMode?`<div style="display:flex;flex-direction:column;gap:1px;margin-right:2px;">
          <span tabindex="0" role="button" style="font-size:9px;color:var(--text3);cursor:pointer;line-height:1;" onclick="moveInfoField('${node.id}','${f.id}',-1)" onkeydown="if(event.key==='Enter'){event.preventDefault();moveInfoField('${node.id}','${f.id}',-1);}" title="Nach oben">▲</span>
          <span tabindex="0" role="button" style="font-size:9px;color:var(--text3);cursor:pointer;line-height:1;" onclick="moveInfoField('${node.id}','${f.id}',1)" onkeydown="if(event.key==='Enter'){event.preventDefault();moveInfoField('${node.id}','${f.id}',1);}" title="Nach unten">▼</span>
        </div>`:''}
        <span class="info-label">${esc(f.label)}</span>
        ${editMode?`<span tabindex="0" role="button" style="font-size:11px;color:var(--red);cursor:pointer;margin-left:auto;" onclick="delInfoField('${node.id}','${f.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();delInfoField('${node.id}','${f.id}');}">${ICO.close(10)}</span>`:''}
      </div>
      <div class="info-val" contenteditable="true" onblur="saveInfoField('${node.id}','${f.id}',this.innerHTML)">${sanitizeHtml(f.value)||''}</div>
    </div>`;
  });
  h+=`</div>`;

  // Links block
  h+=`<div class="card" style="margin-top:8px;">`;
  h+=`<div class="cardhd">Links & Absprünge</div>`;
  h+=`<div class="links-grid">`;
  links.forEach(l=>{
    if(l.type==='mail'){
      const mailto=buildMailto(l);
      h+=`<a class="link-btn" href="${mailto}" style="color:var(--tealtxt);">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M1 4l6 4 6-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><rect x="1" y="3" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
        ${esc(l.label)}${l.alias?` <span style="font-size:9px;color:var(--text3);font-family:monospace;">^${esc(l.alias)}</span>`:''}
        ${editMode?`<span tabindex="0" role="button" onclick="event.preventDefault();editMailTemplate('${node.id}','${l.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();editMailTemplate('${node.id}','${l.id}');}" style="color:var(--text3);margin-left:4px;" title="Bearbeiten">${ICO.edit(10)}</span>`:''}
        ${editMode?`<span tabindex="0" role="button" onclick="event.preventDefault();delLink('${node.id}','${l.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();delLink('${node.id}','${l.id}');}" style="color:var(--red);margin-left:4px;">${ICO.close(10)}</span>`:''}
      </a>`;
    } else {
      h+=`<a class="link-btn" href="${esc(sanitizeUrl(l.url)||'#')}" target="_blank" rel="noopener">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M6 3H3a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V8" stroke="currentColor" stroke-width="1.3"/><path d="M9 1h4m0 0v4m0-4L7 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        ${esc(l.label)}${l.alias?` <span style="font-size:9px;color:var(--text3);font-family:monospace;">^${esc(l.alias)}</span>`:''}
        ${editMode?`<span tabindex="0" role="button" onclick="event.preventDefault();editLink('${node.id}','${l.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();editLink('${node.id}','${l.id}');}" style="color:var(--text3);margin-left:4px;" title="Bearbeiten">${ICO.edit(10)}</span>`:''}
        ${editMode?`<span tabindex="0" role="button" onclick="event.preventDefault();delLink('${node.id}','${l.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();delLink('${node.id}','${l.id}');}" style="color:var(--red);margin-left:4px;">${ICO.close(10)}</span>`:''}
      </a>`;
    }
  });
  h+=`<span class="link-btn link-add" tabindex="0" role="button" onclick="addLink('${node.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();addLink('${node.id}');}">+ Link</span>`;
  h+=`<span class="link-btn link-add" tabindex="0" role="button" onclick="addMailTemplate('${node.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();addMailTemplate('${node.id}');}">+ Mailvorlage</span>`;
  h+=`</div></div>`;
  return h;
}
function addInfoField(boardId){
  smodal('Neues Feld',[{label:'Feldname',id:'l',ph:'z.B. Kunde'}],v=>{
    if(!v.l)return;
    nodes[boardId].data.infoFields.push({id:uid(),label:v.l,value:''});
    save();render();
  });
}
function delInfoField(boardId,fid){nodes[boardId].data.infoFields=nodes[boardId].data.infoFields.filter(f=>f.id!==fid);save();render();}
function moveInfoField(boardId,fid,dir){
  const arr=nodes[boardId].data.infoFields;
  const idx=arr.findIndex(f=>f.id===fid);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=arr.length)return;
  const tmp=arr[idx];arr[idx]=arr[newIdx];arr[newIdx]=tmp;
  save();render();
}
function saveInfoField(boardId,fid,val){const f=nodes[boardId].data.infoFields.find(x=>x.id===fid);if(f)f.value=sanitizeHtml(val);save();}
function addLink(boardId){
  smodal('Neuer Link',[{label:'Bezeichnung',id:'l',ph:'z.B. Confluence'},{label:'URL',id:'u',ph:'https://...'},{label:'Kürzel (optional)',id:'a',ph:'z.B. conf'}],v=>{
    if(!v.u)return;
    const safeUrl=sanitizeUrl(v.u);if(!safeUrl)return;
    const link={id:uid(),label:v.l||safeUrl,url:safeUrl};
    if(v.a){const va=validateAlias(v.a);if(va.valid&&va.alias)link.alias=va.alias;}
    nodes[boardId].data.links.push(link);
    save();rebuildAliasIndex();render();
  });
}
function editLink(boardId,lid){
  const link=nodes[boardId].data.links.find(l=>l.id===lid);if(!link)return;
  smodal('Link bearbeiten',[{label:'Bezeichnung',id:'l',ph:'Bezeichnung',v:link.label},{label:'URL',id:'u',ph:'https://...',v:link.url},{label:'Kürzel',id:'a',ph:'z.B. conf',v:link.alias||''}],v=>{
    if(v.l)link.label=v.l;
    if(v.u){const safeUrl=sanitizeUrl(v.u);if(safeUrl)link.url=safeUrl;}
    const oldAlias=link.alias||'';
    if(v.a!==undefined){const va=validateAlias(v.a,oldAlias);if(va.valid)link.alias=va.alias;}
    save();rebuildAliasIndex();render();
  });
}
function delLink(boardId,lid){nodes[boardId].data.links=nodes[boardId].data.links.filter(l=>l.id!==lid);save();render();}
function buildMailto(l){
  const params=[];
  if(l.cc)params.push('cc='+encodeURIComponent(l.cc));
  if(l.bcc)params.push('bcc='+encodeURIComponent(l.bcc));
  if(l.subject)params.push('subject='+encodeURIComponent(l.subject));
  if(l.body)params.push('body='+encodeURIComponent(l.body));
  return'mailto:'+(l.to||'')+(params.length?'?'+params.join('&'):'');
}
function addMailTemplate(boardId){
  const id=uid();
  nodes[boardId].data.links.push({id,type:'mail',label:'Neue Mail',to:'',cc:'',bcc:'',subject:'',body:''});
  save();editMailTemplate(boardId,id);
}
function editMailTemplate(boardId,linkId){
  const link=nodes[boardId].data.links.find(l=>l.id===linkId);if(!link)return;
  let h=`<div class="smodal-overlay" onclick="closeS(event)"><div class="smodal" style="width:420px;"><h3>${ICO.mail(14)} Mailvorlage</h3>`;
  h+=`<label>Bezeichnung</label><input id="mf-ml" value="${esc(link.label)}"/>`;
  h+=`<label>An (To)</label><input id="mf-to" value="${esc(link.to||'')}" placeholder="empfaenger@firma.de"/>`;
  h+=`<label>CC</label><input id="mf-cc" value="${esc(link.cc||'')}" placeholder="cc@firma.de"/>`;

// ── NODE EXPORT / IMPORT ──
function collectNodeTree(nodeId){
  const collected={};
  function walk(id){
    const n=nodes[id];if(!n||collected[id])return;
    collected[id]=JSON.parse(JSON.stringify(n));
    if(n.type==='matrix'){
      Object.values(n.data.cells).forEach(c=>{
        if(c.boardId)walk(c.boardId);
        if(c.matrixId)walk(c.matrixId);
      });
    }
  }
  walk(nodeId);
  return collected;
}
function exportNode(nodeId){
  const n=nodes[nodeId];if(!n)return;
  const tree=collectNodeTree(nodeId);
  const payload={exportType:n.type,rootId:nodeId,nodes:tree,exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(n.label||n.type)+'-export.json';
  a.click();
}
function importNodeData(e,parentId,rowId,colId,targetType){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.nodes||!d.rootId||!d.nodes[d.rootId]){alert(UI.errExportFormat);return;}
      const srcRoot=d.nodes[d.rootId];
      // Remap all IDs to avoid conflicts
      const idMap={};
      Object.keys(d.nodes).forEach(oldId=>{idMap[oldId]=uid();});
      // Rebuild nodes with new IDs
      Object.entries(d.nodes).forEach(([oldId,node])=>{
        const newNode=JSON.parse(JSON.stringify(node));
        newNode.id=idMap[oldId];
        // Remap cell references
        if(newNode.type==='matrix'&&newNode.data.cells){
          const newCells={};
          Object.entries(newNode.data.cells).forEach(([k,c])=>{
            if(c.boardId&&idMap[c.boardId])c.boardId=idMap[c.boardId];
            if(c.matrixId&&idMap[c.matrixId])c.matrixId=idMap[c.matrixId];
            newCells[k]=c;
          });
          newNode.data.cells=newCells;
        }
        // Remap kanban card IDs
        if(newNode.type==='board'&&newNode.data.kbCards){
          newNode.data.kbCards.forEach(c=>{c.id=uid();});
          newNode.data.kbCols.forEach(c=>{
            const oldColId=c.id;c.id=uid();
            newNode.data.kbCards.forEach(card=>{if(card.colId===oldColId)card.colId=c.id;});
          });
          (newNode.data.checklists||[]).forEach(cl=>{cl.id=uid();cl.items.forEach(i=>{i.id=uid();});});
          (newNode.data.infoFields||[]).forEach(f=>{f.id=uid();});
          (newNode.data.links||[]).forEach(l=>{l.id=uid();});
        }
        nodes[newNode.id]=newNode;
      });
      // Attach to cell
      const key=`${rowId}-${colId}`;
      const cell=getCell(parentId,key);
      const newRootId=idMap[d.rootId];
      if(srcRoot.type==='board'){
        if(cell.boardId&&!confirm(UI.confirmOverwriteBoard))return;
        if(cell.boardId)delete nodes[cell.boardId];
        cell.boardId=newRootId;
      } else if(srcRoot.type==='matrix'){
        if(cell.matrixId&&!confirm(UI.confirmOverwriteMatrix))return;
        if(cell.matrixId)removeTree(cell.matrixId);
        cell.matrixId=newRootId;
      }
      save();render();
    }catch(x){alert('Fehler beim Import: '+x.message);}
  };
  r.readAsText(f);
  e.target.value=''; // reset file input
}
