# Supabase Self-Hosted — Minimal-Stack fuer Matrix-Phase-0 (Staging)
#
# Deploy-Reihenfolge:
#  1. .env aus .env.example kopieren und ausfuellen (insb. Keys generieren,
#     Ionos-SMTP-Credentials eintragen)
#  2. docker compose pull
#  3. docker compose up -d db
#     # warten bis db healthy (pg_isready)
#  4. docker compose up -d
#
# Alle Ports binden nur an 127.0.0.1 — nach aussen geht nur nginx (TLS).
# Memory-Limits sind fuer 4-GB-VPS konservativ gesetzt.

name: matrix-supabase

services:
  # ═══════════════════════════════════════════════════════════════
  # Postgres (Primaer-Datenbank)
  # ═══════════════════════════════════════════════════════════════
  db:
    image: supabase/postgres:15.8.1.060
    container_name: matrix-supabase-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:54322:5432" # psql-Debug-Zugriff via SSH-Tunnel
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data:Z
      # Eigene Init-Scripts: landen in /docker-entrypoint-initdb.d/init-scripts/
      # Das Supabase-Image laedt diese nach seinen eigenen migrations (migrations/)
      # und vor dem finalen Ready — so sehen Auth/Rest/Realtime die Rollen beim Connect.
      - ./volumes/db/init/01-roles.sql:/docker-entrypoint-initdb.d/init-scripts/01-roles.sql:ro
      - ./volumes/db/init/02-realtime.sql:/docker-entrypoint-initdb.d/init-scripts/02-realtime.sql:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    deploy:
      resources:
        limits:
          memory: 900M

  # ═══════════════════════════════════════════════════════════════
  # GoTrue (Auth)
  # ═══════════════════════════════════════════════════════════════
  auth:
    image: supabase/gotrue:v2.169.0
    container_name: matrix-supabase-auth
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_USERS:-false}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Matrix}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${ENABLE_GOOGLE_OAUTH:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback
      GOTRUE_EXTERNAL_LINKEDIN_OIDC_ENABLED: ${ENABLE_LINKEDIN_OAUTH:-false}
      GOTRUE_EXTERNAL_LINKEDIN_OIDC_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      GOTRUE_EXTERNAL_LINKEDIN_OIDC_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_LINKEDIN_OIDC_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    deploy:
      resources:
        limits:
          memory: 200M

  # ═══════════════════════════════════════════════════════════════
  # PostgREST (REST-API auf DB mit RLS)
  # ═══════════════════════════════════════════════════════════════
  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: matrix-supabase-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    command: "postgrest"
    deploy:
      resources:
        limits:
          memory: 200M

  # ═══════════════════════════════════════════════════════════════
  # Realtime (Postgres Change-Streams → WebSocket-Broadcast)
  # ═══════════════════════════════════════════════════════════════
  realtime:
    image: supabase/realtime:v2.34.47
    container_name: matrix-supabase-realtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - -sSfL
        - --head
        - -o
        - /dev/null
        - -H
        - "Authorization: Bearer ${ANON_KEY}"
        # AU-B1 K11b (B1-I-014): Tenant heisst "realtime" (Migration 006
        # hat den Alias angelegt), nicht "realtime-dev". Vorher Silent-
        # Failure bei tatsaechlichen Realtime-Ausfaellen.
        - http://localhost:4000/api/tenants/realtime/health
      timeout: 5s
      interval: 15s
      retries: 5
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
    deploy:
      resources:
        limits:
          memory: 350M

  # ═══════════════════════════════════════════════════════════════
  # Kong (API-Gateway — einzige Schnittstelle nach aussen)
  # ═══════════════════════════════════════════════════════════════
  kong:
    image: kong:2.8.1
    container_name: matrix-supabase-kong
    restart: unless-stopped
    ports:
      - "127.0.0.1:${KONG_HTTP_PORT:-8000}:8000/tcp"
      - "127.0.0.1:${KONG_HTTPS_PORT:-8443}:8443/tcp"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./volumes/api/kong.yml:/home/kong/temp.yml:ro
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'
    deploy:
      resources:
        limits:
          memory: 200M

  # ═══════════════════════════════════════════════════════════════
  # Studio (Admin-UI, optional — nur via profile=admin starten)
  # Aufruf:  docker compose --profile admin up -d studio
  # Zugriff: SSH-Tunnel (ssh -L 3002:127.0.0.1:3002 vps) → localhost:3002
  # ═══════════════════════════════════════════════════════════════
  studio:
    image: supabase/studio:2025.06.30-sha-6f5982d
    container_name: matrix-supabase-studio
    restart: unless-stopped
    profiles: [admin]
    ports:
      - "127.0.0.1:3002:3000" # nur lokal — SSH-Tunnel
    depends_on:
      rest:
        condition: service_started
      auth:
        condition: service_started
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-Matrix}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-Staging}
      SUPABASE_URL: ${API_EXTERNAL_URL}
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
    deploy:
      resources:
        limits:
          memory: 300M

  # Postgres-Meta — nur fuer Studio benoetigt
  meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: matrix-supabase-meta
    restart: unless-stopped
    profiles: [admin]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 150M

networks:
  default:
    name: matrix-supabase
