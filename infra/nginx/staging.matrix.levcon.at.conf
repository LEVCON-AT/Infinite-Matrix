# nginx-Site fuer staging.matrix.levcon.at
# Terminiert TLS, proxied alles weiter an Kong (localhost:8000).
# Aufruf: sudo ln -s /etc/nginx/sites-available/staging.matrix.levcon.at /etc/nginx/sites-enabled/
# TLS-Cert zuvor: sudo certbot certonly --nginx -d staging.matrix.levcon.at

# Rate-Limit-Zonen (einmalig; falls schon in matrix.conf definiert → diesen Block loeschen)
# limit_req_zone $binary_remote_addr zone=supabase_auth:10m rate=5r/s;
# limit_req_zone $binary_remote_addr zone=supabase_api:10m rate=50r/s;

server {
    listen 80;
    listen [::]:80;
    server_name staging.matrix.levcon.at;
    # HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.matrix.levcon.at;

    # TLS (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/staging.matrix.levcon.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.matrix.levcon.at/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security-Header (konservativ, SPA-kompatibel)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body-Limit (Import-Endpoints koennen groesser werden)
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types application/json application/javascript text/css text/html text/plain;
    gzip_min_length 1024;

    # ─── Realtime WebSocket ─────────────────────────────────
    location /realtime/v1/ {
        proxy_pass http://127.0.0.1:8000/realtime/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Langer Timeout fuer WS-Verbindungen
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─── Auth (GoTrue) ──────────────────────────────────────
    location /auth/v1/ {
        # limit_req zone=supabase_auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000/auth/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── Token-Brute-Force-Schutz fuer redeem_invite ────────
    # Phase 1 P1.A.3: 5 Requests/min pro IP, Burst 3 nodelay. 429 fuer
    # alles dadrueber. matrix_invite_redeem-Zone in conf.d/rate-limit.conf
    # definiert. Exact-Match via `=` damit nur diese eine RPC betroffen
    # ist — andere PostgREST-Calls laufen ueber den /rest/v1/ Block weiter.
    location = /rest/v1/rpc/redeem_invite {
        limit_req zone=matrix_invite_redeem burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000/rest/v1/rpc/redeem_invite;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── PostgREST (REST-API) ───────────────────────────────
    location /rest/v1/ {
        # limit_req zone=supabase_api burst=100 nodelay;
        proxy_pass http://127.0.0.1:8000/rest/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── Storage (ab Phase 1 aktivierbar) ───────────────────
    # location /storage/v1/ {
    #     proxy_pass http://127.0.0.1:8000/storage/v1/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     client_max_body_size 50M;
    # }

    # ─── SaaS-Client unter /app/ (statische Vite-Build-Assets) ──
    # Vite-Build mit VITE_BASE_PATH=/app/ landet in /var/www/matrix-saas/.
    # SPA-Fallback: alle nicht-Datei-Requests auf /app/index.html — Solid-Router
    # uebernimmt das Routing client-seitig (Memory feedback_spa_subpath_router).
    location /app/ {
        alias /var/www/matrix-saas/;
        try_files $uri $uri/ /app/index.html;

        # index.html nie cachen, sonst kleben User auf alter Bundle-Version
        # nach Deploy. Vite-Assets sind content-hashed → ewig cachebar.
        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate" always;
        }
        location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|webp|ico)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }
    }

    # ─── Root → kompakter Landing-Hint ──────────────────────
    # Backend-API laeuft, SaaS-Client liegt unter /app/. Root selbst zeigt
    # nur einen Hinweis + Link, damit Tippfehler nicht ins Leere laufen.
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><title>Matrix Staging</title><meta charset="utf-8"></head><body style="font-family:sans-serif;padding:2rem;max-width:720px;margin:auto;"><h1>Matrix Staging</h1><p>SaaS-Client: <a href="/app/">/app/</a></p><h3>API-Endpoints</h3><ul><li><code>/auth/v1/health</code> &mdash; GoTrue</li><li><code>/rest/v1/</code> &mdash; PostgREST (Header <code>apikey: &lt;ANON_KEY&gt;</code> erforderlich)</li><li><code>/realtime/v1/</code> &mdash; Realtime WebSocket</li></ul></body></html>';
    }
}
