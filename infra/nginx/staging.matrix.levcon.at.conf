# nginx-Site fuer staging.matrix.levcon.at
# Terminiert TLS, proxied alles weiter an Kong (localhost:8000).
# Aufruf: sudo ln -s /etc/nginx/sites-available/staging.matrix.levcon.at /etc/nginx/sites-enabled/
# TLS-Cert zuvor: sudo certbot certonly --nginx -d staging.matrix.levcon.at

# Rate-Limit-Zonen (einmalig; falls schon in matrix.conf definiert → diesen Block loeschen)
# limit_req_zone $binary_remote_addr zone=supabase_auth:10m rate=5r/s;
# limit_req_zone $binary_remote_addr zone=supabase_api:10m rate=50r/s;

server {
    listen 80;
    listen [::]:80;
    server_name staging.matrix.levcon.at;
    # HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging.matrix.levcon.at;

    # TLS (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/staging.matrix.levcon.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.matrix.levcon.at/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security-Header (konservativ, SPA-kompatibel)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body-Limit (Import-Endpoints koennen groesser werden)
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types application/json application/javascript text/css text/html text/plain;
    gzip_min_length 1024;

    # ─── Realtime WebSocket ─────────────────────────────────
    location /realtime/v1/ {
        proxy_pass http://127.0.0.1:8000/realtime/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Langer Timeout fuer WS-Verbindungen
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─── Auth (GoTrue) ──────────────────────────────────────
    location /auth/v1/ {
        # limit_req zone=supabase_auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000/auth/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── PostgREST (REST-API) ───────────────────────────────
    location /rest/v1/ {
        # limit_req zone=supabase_api burst=100 nodelay;
        proxy_pass http://127.0.0.1:8000/rest/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── Storage (ab Phase 1 aktivierbar) ───────────────────
    # location /storage/v1/ {
    #     proxy_pass http://127.0.0.1:8000/storage/v1/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     client_max_body_size 50M;
    # }

    # ─── SaaS-Client (statische Vite-Build-Assets) ──────────
    # Root ist Placeholder bis Phase 0d den Vite-Build ausrollt.
    # Spaeter: root /var/www/matrix-saas; try_files $uri $uri/ /index.html;
    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><title>Matrix Staging</title><meta charset="utf-8"></head><body style="font-family:sans-serif;padding:2rem;max-width:720px;margin:auto;"><h1>Matrix Staging</h1><p>Backend laeuft. SaaS-Client folgt in Phase 0d.</p><h3>API-Endpoints</h3><ul><li><code>/auth/v1/health</code> &mdash; GoTrue</li><li><code>/rest/v1/</code> &mdash; PostgREST (Header <code>apikey: &lt;ANON_KEY&gt;</code> erforderlich)</li><li><code>/realtime/v1/</code> &mdash; Realtime WebSocket</li></ul></body></html>';
    }
}
