# /etc/nginx/sites-available/matrix.conf
# Domain: matrix.levcon.at

# HTTP → HTTPS redirect (certbot --redirect ergänzt/überschreibt dies)
server {
    listen 80;
    listen [::]:80;
    server_name matrix.levcon.at;

    # certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: Client + Bridge-Proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name matrix.levcon.at;

    # TLS (Let's Encrypt) — Cert wird durch certbot --nginx --webroot
    # angelegt + per cron renewed (siehe certbot.timer auf dem VPS).
    # Pfade sind die certbot-Defaults; falls jemals eine andere CA
    # benutzt wird, hier anpassen.
    ssl_certificate     /etc/letsencrypt/live/matrix.levcon.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matrix.levcon.at/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    # ASVS V9.1.1 — sichere Cipher-Suite explizit setzen, statt sich
    # auf den nginx-Built-in-Default zu verlassen. Reihenfolge:
    # ECDHE > DHE, GCM/ChaCha20 vor CBC, 128/256 in beiden Varianten.
    # TLS 1.3 nutzt automatisch die hartcodierten Ciphers (nicht hier
    # konfiguriert), das ssl_ciphers-Setting wirkt nur fuer TLS 1.2.
    ssl_ciphers ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
    # Session-Cache reduziert Handshake-Overhead bei vielen Connections.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss://matrix.levcon.at https://matrix.levcon.at; worker-src 'self' blob:; object-src 'none'; base-uri 'self';" always;

    # Client assets
    root /var/www/matrix;
    index matrix_tool_beta.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/html text/css application/javascript application/json image/svg+xml;

    # Client — kurzer Cache, häufige Deploys
    location = / {
        try_files /matrix_tool_beta.html =404;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location = /matrix_tool_beta.html {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    # Standalone — frozen Single-File-Build (Phase 0g.1).
    # /standalone/ + /standalone/matrix.html werden aus
    # /var/www/matrix/standalone/ serviert. try_files probiert erst die
    # konkrete Datei ($uri), dann den Standalone-Index ($uri/matrix.html
    # — greift wenn $uri ein Directory ist, also bei trailing slash).
    # Fallback 404 statt directory-listing.
    location /standalone/ {
        try_files $uri $uri/matrix.html =404;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    # WebSocket für Matrix ↔ Bridge
    # Rate-Limit (ASVS V13.1.1): WS-Handshakes 5r/s, Burst 10. Innerhalb
    # einer offenen Verbindung ist nginx nicht mehr involved — Bridge-
    # Pings/Frames laufen direkt durch.
    location /ws {
        limit_req zone=matrix_ws burst=10 nodelay;
        proxy_pass http://127.0.0.1:3849/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # MCP (Streamable-HTTP / SSE)
    # Rate-Limit (ASVS V13.1.1): 20r/s, Burst 60. MCP-Tool-Calls
    # ausloesen DB-Operationen — strikter gecapped als generische API.
    location /mcp {
        limit_req zone=matrix_mcp burst=60 nodelay;
        proxy_pass http://127.0.0.1:3849/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Health (debug / uptime monitoring)
    location = /healthz {
        proxy_pass http://127.0.0.1:3849/healthz;
        access_log off;
    }

    # Versteckte Dateien blocken
    location ~ /\. { deny all; access_log off; log_not_found off; }
}
