# Rate-Limit-Zonen — ASVS V13.1.1.
#
# Muss in nginx http-Context stehen (NICHT im server-Block). Datei
# wird nach /etc/nginx/conf.d/rate-limit.conf kopiert; nginx-Default
# inkludiert /etc/nginx/conf.d/*.conf im http-Context.
#
# Zonen werden in matrix.conf per `limit_req zone=...` aktiviert.
#
#   matrix_api: 50r/s pro IP, 200-Burst (matched die Bridge-internen
#               @fastify/rate-limit-Limits — defense in depth).
#   matrix_mcp: 20r/s pro IP, 60-Burst — MCP-Tool-Calls sind teuer
#               (DB-Operationen), strenger gecapped.
#   matrix_ws : 5r/s pro IP, 10-Burst — WS-Handshakes sollten selten
#               sein, ein Reconnect-Storm wird hart abgeschnitten.
#   matrix_invite_redeem: 5r/m pro IP, 3-Burst — Phase 1 (P1.A.3).
#               Token-Brute-Force gegen redeem_invite-RPC. 256-bit
#               Token-Entropie + 8-byte Lookup-Index machen Bruteforce
#               kryptografisch unmoeglich, dennoch nginx-side cap als
#               Defense-in-Depth + Schutz gegen Distributed-Spam.
#
# Storage 10m haelt ~160k IP-States; mehr brauchen wir nicht.

limit_req_zone $binary_remote_addr zone=matrix_api:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=matrix_mcp:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=matrix_ws:10m  rate=5r/s;
limit_req_zone $binary_remote_addr zone=matrix_invite_redeem:10m rate=5r/m;

# Default-Status fuer ueberlaufende Requests: 429 Too Many Requests
# (statt nginx-Default 503). Klares Signal an Clients, dass es Rate-
# Limit-bedingt ist.
limit_req_status 429;
