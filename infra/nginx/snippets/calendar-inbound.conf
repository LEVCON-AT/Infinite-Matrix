# Welle I.4 — Calendar-Inbound-Sync Webhook-Endpoints.
# Einbinden in staging.matrix.levcon.at.conf via:
#   include /etc/nginx/snippets/calendar-inbound.conf;
# Innerhalb des HTTPS-Server-Blocks.
#
# Routet:
#   /api/calendar-inbound-webhook/google      → 127.0.0.1:8083/webhook/google
#   /api/calendar-inbound-webhook/microsoft/* → 127.0.0.1:8083/webhook/microsoft/*
#
# Defense-in-Depth: der Service bindet nur an 127.0.0.1; nginx ist die
# einzige oeffentliche Kontaktflaeche und filtert Methode + Body-Size.

location = /api/calendar-inbound-webhook/google {
    if ($request_method != POST) { return 405; }
    proxy_pass http://127.0.0.1:8083/webhook/google;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_request_headers on;
    client_max_body_size 64k;
    proxy_read_timeout 10s;
}

location ~ ^/api/calendar-inbound-webhook/microsoft/([A-Za-z0-9_\-]+)$ {
    if ($request_method != POST) { return 405; }
    proxy_pass http://127.0.0.1:8083/webhook/microsoft/$1$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 64k;
    proxy_read_timeout 10s;
}
